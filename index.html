<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEAT-LINK Ver 1.0</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .phase-container { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 5px; }
        .phase-card { flex: 1; padding: 8px; background: #2a2a2a; border-radius: 8px; font-size: 0.65em; opacity: 0.3; }
        .phase-card.active { opacity: 1; background: #007bff; }
        
        .monitor-panel { background: #000; margin: 10px 0; padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .time-display { font-family: monospace; font-size: 1.2em; color: #00ff00; }
        .bpm-main { font-size: 3em; font-weight: bold; color: #00ff88; margin: 5px 0; }
        
        .tap-area { 
            width: 100%; height: 200px; background: #252525; border: 4px dashed #444; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: none; position: relative;
        }
        .tap-area.active { border-style: solid; border-color: #007bff; background: #1a1a2e; }
        .tap-area.counting { border-color: #ffc107; color: #ffc107; }

        .seek-box { margin-top: 15px; display: none; }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        .jump-btns { display: flex; gap: 8px; }
        .jump-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #444; color: white; cursor: pointer; font-size: 0.8em; }
        
        .log-box { margin-top: 10px; background: #000; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.7em; text-align: left; color: #00ff00; height: 70px; overflow-y: auto; }
        .btn-start { padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: #6f42c1; color: white; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="phase-container">
        <div id="ph1" class="phase-card">序盤</div>
        <div id="ph2" class="phase-card">中盤</div>
        <div id="ph3" class="phase-card">終盤</div>
        <div id="ph4" class="phase-card">検証</div>
    </div>

    <div class="monitor-panel">
        <div class="time-display">TIME: <span id="currentTimeDisplay">0.000</span> s</div>
        <div class="bpm-main" id="bpmDisplay">--.----</div>
        <div id="statusLabel" style="font-size: 0.8em; color: #888;">READY</div>
    </div>

    <div class="tap-area" id="tapArea">
        <div id="tapLabel" style="font-size: 1.4em; font-weight: bold;">02-HANABI_1.m4a</div>
        <div id="tapSub" style="font-size: 0.8em; margin-top: 5px; color: #888;">フォルダを選択して開始</div>
    </div>

    <div class="seek-box" id="seekBox">
        <input type="range" id="seekBar" value="0" step="0.01">
        <div class="jump-btns">
            <button onclick="seekTo(scanOffsets[0])">P1 (序盤)</button>
            <button onclick="seekTo(scanOffsets[1])">P2 (中盤)</button>
            <button onclick="seekTo(scanOffsets[2])">P3 (終盤)</button>
        </div>
    </div>

    <div id="btnArea" style="margin-top: 15px;">
        <button id="folderBtn" class="btn-start">📁 フォルダ選択 & 解析開始</button>
    </div>
    <div class="log-box" id="log"></div>
</div>

<script>
    let audioCtx, audioBuf, currentSource, currentPhase = 0, scanOffsets = [], tapResults = [], tempTaps = [];
    let startTime = 0, isPlaying = false, finalBpm = 0, bestOffset = 0;

    const log = (msg) => { const d = document.getElementById('log'); d.innerHTML = `> ${msg}<br>${d.innerHTML}`; };

    // 監視ループ
    function updateLoop() {
        if (isPlaying && audioCtx) {
            const currentPos = audioCtx.currentTime - startTime;
            document.getElementById('currentTimeDisplay').innerText = currentPos.toFixed(3);
            document.getElementById('seekBar').value = currentPos;
        }
        requestAnimationFrame(updateLoop);
    }
    updateLoop();

    document.getElementById('folderBtn').onclick = async () => {
        try {
            const root = await window.showDirectoryPicker();
            let fileHandle = null;
            for await (const entry of root.values()) { if (entry.name === "02-HANABI_1.m4a") { fileHandle = entry; break; } }
            if (!fileHandle) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioBuf = await audioCtx.decodeAudioData(await (await fileHandle.getFile()).arrayBuffer());
            scanOffsets = [5, audioBuf.duration * 0.5, audioBuf.duration * 0.9];
            document.getElementById('seekBar').max = audioBuf.duration;
            document.getElementById('btnArea').style.display = 'none';
            startPhase();
        } catch (e) { log(e.message); }
    };

    async function startPhase() {
        currentPhase++;
        if (currentPhase > 3) { calculateFinal(); return; }
        
        document.querySelectorAll('.phase-card').forEach((el, i) => el.classList.toggle('active', i === currentPhase - 1));
        const area = document.getElementById('tapArea');
        area.className = 'tap-area counting';
        isPlaying = false;

        for (let i = 5; i > 0; i--) {
            document.getElementById('tapLabel').innerText = `準備: ${i}`;
            await new Promise(r => setTimeout(r, 1000));
        }

        area.className = 'tap-area active';
        document.getElementById('tapLabel').innerText = "TAP! (12回)";
        playAt(scanOffsets[currentPhase - 1], 35);
        tempTaps = [];
    }

    function playAt(offset, duration) {
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime - offset;
        currentSource.start(0, offset, duration);
        isPlaying = true;
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        if (currentPhase < 1 || currentPhase > 3 || e.currentTarget.classList.contains('counting')) return;
        if (navigator.vibrate) navigator.vibrate(20);
        tempTaps.push(audioCtx.currentTime);
        document.getElementById('tapSub').innerText = `タップ: ${tempTaps.length} / 12`;

        if (tempTaps.length >= 12) {
            const stable8 = tempTaps.slice(4);
            const bpm = getCompensatedBPM(stable8);
            const avgTime = stable8.reduce((a,b)=>a+b, 0) / stable8.length;
            const absPos = scanOffsets[currentPhase-1] + (avgTime - (audioCtx.currentTime - (audioCtx.currentTime - startTime)));
            tapResults.push({ absPos, bpm });
            log(`P${currentPhase} 確定: ${absPos.toFixed(3)}s`);
            if (currentSource) currentSource.stop();
            startPhase();
        }
    };

    function getCompensatedBPM(taps) {
        let ivls = [];
        for (let i = 1; i < taps.length; i++) ivls.push(taps[i] - taps[i-1]);
        const median = [...ivls].sort()[Math.floor(ivls.length / 2)];
        let totalB = 0, totalT = 0;
        ivls.forEach(v => { const b = Math.round(v / median); if (b >= 1 && b <= 3) { totalB += b; totalT += v; } });
        return (totalB * 60) / totalT;
    }

    function calculateFinal() {
        const p1 = tapResults[0], p2 = tapResults[1], p3 = tapResults[2];
        const dur = p3.absPos - p1.absPos;
        const beats = Math.round(dur * (p1.bpm / 60));
        finalBpm = (beats * 60) / dur;
        
        const ivl = 60 / finalBpm;
        bestOffset = ((p1.absPos % ivl) + (p2.absPos % ivl) + (p3.absPos % ivl)) / 3;

        document.getElementById('bpmDisplay').innerText = finalBpm.toFixed(4);
        document.getElementById('ph4').className = 'phase-card active';
        document.getElementById('seekBox').style.display = 'block';
        document.getElementById('tapArea').style.display = 'none';
        document.getElementById('statusLabel').innerText = "解析完了：検証モード";
        
        seekTo(0);
    }

    function seekTo(time) {
        if (currentPhase <= 3) return;
        time = parseFloat(time);
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime - time;
        currentSource.start(0, time);
        isPlaying = true;
        
        // メトロノーム予約
        const ivl = 60 / finalBpm;
        const firstBeat = time + (ivl - (time % ivl)) - bestOffset; 
        for (let t = time; t < audioBuf.duration; t += ivl) {
            const beatT = startTime + t + (ivl - ((t + bestOffset) % ivl));
            if (beatT >= audioCtx.currentTime) scheduleTick(beatT);
        }
    }

    function scheduleTick(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1000, t);
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
    }

    document.getElementById('seekBar').oninput = (e) => seekTo(e.target.value);
</script>
</body>
</html>
