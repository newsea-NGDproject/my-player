<!-- C014-T01.00-BS01-OFS利用表示確認 -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ノリRun Ver.9 - OFS利用表示確認</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            margin: 0; padding: 15px;
            color: #1c1c1e;
            -webkit-user-select: none; user-select: none;
            overflow-y: scroll;
        }
        .container {
            max-width: 500px; margin: 0 auto;
            background: #fff; padding: 15px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        /* 💡【書き換え】h2の文字サイズを調整し、右上に鉄壁のランプスペースを確保！ */
        h2 { 
            font-size: 1.1rem; 
            margin-top: 0; 
            text-align: left; 
            margin-bottom: 20px; 
            padding-right: 150px; 
            line-height: 1.4; 
        }

        /* 💡【ここから新規追記】右上固定・ランプ位置絶対死守インジケーターのスタイル */
        #ofs-lamp {
            position: absolute;
            top: 15px; right: 15px;
            display: flex;
            justify-content: space-between; /* 両端寄せにして右端のランプ位置を完全固定 */
            align-items: center;
            width: 145px; /* 取込中・取得中の文字が綺麗に収まる固定幅 */
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: bold;
            box-sizing: border-box;
            transition: opacity 0.5s ease; /* フェーズ3完了時のフワッと消滅用 */
            pointer-events: none;
            z-index: 10;
        }

        /* 🔴 フェーズ1用：激しい高速点滅（0.25秒サイクル） */
        @keyframes blink-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }
        .blink-fast { animation: blink-fast 0.25s infinite; }

        /* 🟢 フェーズ2用：普通テンポの点滅（0.8秒サイクル） */
        @keyframes blink-normal {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .blink-normal { animation: blink-normal 0.8s infinite; }

        .music-list {
            display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }

        /* --- 📐 通常時のスクロールを完全復活（縦スワイプを許可！） --- */
        .music-row {
            display: flex; align-items: center;
            background: #f8f8f8; border-radius: 12px;
            padding: 6px; box-sizing: border-box;
            border: 1px solid #e5e5ea;
            height: 56px;
            touch-action: pan-y; /* 曲名エリアでのスルスル快適スクロールを大復活 */
            transition: background-color 0.15s ease;
        }

        .square-btn {
            display: flex; align-items: center; justify-content: center;
            background: #ffffff; border: 1px solid #d1d1d6;
            border-radius: 10px; cursor: pointer;
            box-sizing: border-box; flex-shrink: 0;
            width: 44px; height: 44px;
        }
        .norinori-btn { font-size: 1.2rem; }
        .norinori-btn:active { background: #e5e5ea; }

        /* 🎨 【右端並び替え】ここだけタッチアクションを完全排他化 */
        .sort-handle {
            color: #b1b1b6;
            background: #ffffff;
            cursor: grab;
            touch-action: none; /* ↕ ボタンだけはスクロールジェスチャーを完全ブロック */
        }

        .sort-handle.active-blue {
            color: #00a2ff !important;
            border-color: #00a2ff !important;
            background: #e6f6ff;
        }

        /* 🚀 【竹弘指定：指先完全吸い付き空中浮遊エフェクト】 */
        .music-row.dragging {
            position: fixed; /* 画面全体の絶対的なレイアウトから独立 */
            box-shadow: 0 15px 35px rgba(0, 162, 255, 0.35);
            background: #ffffff;
            border-color: #00a2ff;
            z-index: 10000;
            opacity: 0.95;
            transform: scale(1.02);
            pointer-events: none; /* 下にある要素の重なり計算を邪魔しない */
            transition: none !important; /* 指に1ミリの遅れもなく追従させるため、位置アニメをカット */
        }

        /* 🌊 【竹弘指定：プロ仕様の海ブルーに光る差し込みスロット】 */
        .drag-placeholder {
            height: 56px;
            background: rgba(0, 162, 255, 0.03);
            border: 2px dashed #00a2ff; /* 美しいネオンブルーの点線 */
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.2);
            box-sizing: border-box;
            transition: transform 0.2s ease; /* 隙間がシュッと開く滑らかさ */
        }

        .title-area { flex: 3; min-width: 0; padding: 0 10px; overflow: hidden; white-space: nowrap; }
        .artist-area { flex: 2; min-width: 0; padding: 0 6px; overflow: hidden; white-space: nowrap; }

        .scroll-text { display: inline-block; font-size: 0.95rem; font-weight: 600; color: #1c1c1e; pointer-events: none; }
        .artist-text { display: inline-block; font-size: 0.75rem; font-weight: normal; color: #8e8e93; pointer-events: none; }

        @keyframes marquee-pattern-b {
            0% { transform: translateX(0); }
            75% { transform: translateX(var(--scroll-x)); opacity: 1; }
            80% { transform: translateX(var(--scroll-x)); opacity: 0; }
            81% { transform: translateX(30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .scroll-active { animation: marquee-pattern-b var(--scroll-duration) linear 1; }

        .glow-indicator {
            position: fixed; left: 0; width: 100%; height: 40px;
            pointer-events: none; z-index: 10000; opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-top { top: 0; background: linear-gradient(to bottom, rgba(0, 162, 255, 0.3), transparent); }
        .glow-bottom { bottom: 0; background: linear-gradient(to top, rgba(0, 162, 255, 0.3), transparent); }
        .glow-active { opacity: 1; }
    </style>
</head>
<body>

<div id="glow-top" class="glow-indicator glow-top"></div>
<div id="glow-bottom" class="glow-indicator glow-bottom"></div>

<div class="container">
    <div id="ofs-lamp" style="display: none;">
        <span id="ofs-lamp-text"></span>
        <span id="ofs-lamp-icon"></span>
    </div>

    <h2>メインメニュー（NoriRun OFS Ver.1.0）</h2>
    <div id="menu-list" class="music-list">
        <!-- JSで爆誕 -->
    </div>
</div>

<script>
let dbInstance = null;
let currentOrderList = []; 
let teheperoPhase = 0; // 💡【ここに追記】0:待機, 1:文字取込, 2:ジャケ写取得, 3:完了消滅
let draggingRow = null;       
let placeholder = null;       
let startOffsetY = 0;         
let currentClientY = 0;       
let autoScrollActive = false; 

window.addEventListener('DOMContentLoaded', () => {
    placeholder = document.createElement('div');
    placeholder.className = 'drag-placeholder';

    const request = indexedDB.open("NoriRunDB", 2);
    request.onsuccess = (e) => {
        dbInstance = e.target.result;
        loadMenuData();
    };

    window.addEventListener('pointerup', clearAllDraggingStates);
    window.addEventListener('pointercancel', clearAllDraggingStates);
});

function loadMenuData() {
    if (!dbInstance) return;
    const tx = dbInstance.transaction(['music_library', 'playlists'], 'readonly');
    const libraryStore = tx.objectStore('music_library');
    const playlistStore = tx.objectStore('playlists');
    let libraryMap = {};
    
    libraryStore.getAll().onsuccess = (e) => {
        const allSongs = e.target.result;
        allSongs.forEach(song => { libraryMap[song.file_path] = song; });

        playlistStore.get("main_menu_default").onsuccess = (ev) => {
            const playlistData = ev.target.result;
            if (playlistData && playlistData.file_path_list.length > 0) {
                currentOrderList = playlistData.file_path_list.filter(path => libraryMap[path]);
                allSongs.forEach(song => {
                    if (!currentOrderList.includes(song.file_path)) currentOrderList.push(song.file_path);
                });
            } else {
                currentOrderList = allSongs.map(song => song.file_path);
            }
            // 💡【ここを書き換え】従来の単純描画から、極上の3フェーズ演出エンジン着火へ！
            startTeheperoEngine(allSongs, libraryMap);
        };
    };
}

/* 💡【関数丸ごと差し替え】ジャケ写の右詰め配置に対応した新・描画ロジック */
function renderList(libraryMap) {
    const listContainer = document.getElementById('menu-list');
    listContainer.innerHTML = '';

    if (currentOrderList.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center;color:#8e8e93;padding:20px;">曲がありません。音楽スキャンをしてね！</div>';
        return;
    }

    currentOrderList.forEach((filePath, index) => {
        const song = libraryMap[filePath];
        if (!song) return;

        let displayName = song.title || song.file_path;
        let displayArtist = song.artist || "";
        
        if (index === 0) {
            if (displayName.length < 15) displayName = "【ロングテスト】明日への鼓動 - Falcom Sound Team jdk";
            if (displayArtist === "") displayArtist = "Falcom Sound Team jdk Special Running Club";
        } else {
            if (displayArtist === "") displayArtist = "Falcom " + (index + 1); 
        }

        // 🎨 フェーズ3（完了）以降、または通常の再描画時のみ最初からジャケ写を描画。
        // フェーズ2の時は、後方からリアルタイムに動的追加するため、ここでは初期描画しない（空白防止）。
        let jacketHtml = "";
        if (teheperoPhase >= 3 && song.is_cover_analyzed && song.cover_art) {
            const imgUrl = typeof song.cover_art === 'string' ? song.cover_art : URL.createObjectURL(song.cover_art);
            jacketHtml = `<img src="${imgUrl}" class="jacket-preview" style="width:38px; height:38px; border-radius:6px; object-fit:cover; margin-left:auto; flex-shrink:0;">`;
        }

        const icon = song.is_analyzed ? "🕺" : "🛌";

        const row = document.createElement('div');
        row.className = 'music-row';
        row.dataset.filePath = filePath;

        // 💡 title-area のスタイルを Flex にし、曲名テキストとジャケ写を両端寄せ（右詰め）に固定！
        row.innerHTML = `
            <button class="square-btn norinori-btn" onclick="openNoriNori('${filePath}', '${displayName}', this)">${icon}</button>
            <div class="title-area" onclick="triggerPatternBMarquee(this)" style="display: flex; align-items: center; justify-content: space-between; flex: 3; min-width: 0; padding: 0 10px; overflow: hidden; white-space: nowrap;">
                <span class="scroll-text" style="display: inline-block; font-size: 0.95rem; font-weight: 600; color: #1c1c1e; pointer-events: none;">${displayName}</span>
                ${jacketHtml}
            </div>
            <div class="artist-area" onclick="triggerPatternBMarquee(this)">
                <span class="artist-text">${displayArtist}</span>
            </div>
            <button class="square-btn sort-handle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <polyline points="7 7 12 2 17 7"></polyline>
                    <polyline points="7 17 12 22 17 17"></polyline>
                </svg>
            </button>
        `;

        const sortHandle = row.querySelector('.sort-handle');
        bindDragAndDropEvents(row, sortHandle);
        listContainer.appendChild(row);
    });
}

function openNoriNori(filePath, songName, buttonElement) {
    alert(`[ノリノリ設定] ${songName} のタップ補正画面を開くぜ！`);
    if (!dbInstance) return;
    const tx = dbInstance.transaction('music_library', 'readwrite');
    const store = tx.objectStore('music_library');
    store.get(filePath).onsuccess = (e) => {
        const songData = e.target.result;
        if (songData) { songData.is_analyzed = true; store.put(songData); }
    };
    tx.oncomplete = () => { buttonElement.textContent = "🕺"; };
}

function triggerPatternBMarquee(areaElement) {
    const textElement = areaElement.firstElementChild;
    textElement.classList.remove('scroll-active');
    void textElement.offsetWidth; 
    const areaWidth = areaElement.offsetWidth;
    const textWidth = textElement.scrollWidth;
    const speed = 50; 
    let scrollDistance = textWidth > areaWidth ? textWidth - areaWidth + 20 : textWidth * 0.6;
    const duration = (scrollDistance + areaWidth) / speed;
    textElement.style.setProperty('--scroll-x', `-${scrollDistance}px`);
    textElement.style.setProperty('--scroll-duration', `${duration}s`);
    textElement.classList.add('scroll-active');
    textElement.addEventListener('animationend', () => { textElement.classList.remove('scroll-active'); }, { once: true });
}

// 🪐 6. 【神修正】オンデマンド着火式・ドラッグ＆ドロップエンジン
function bindDragAndDropEvents(row, handle) {
    handle.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        draggingRow = row;
        currentClientY = e.clientY;
        
        const rect = row.getBoundingClientRect();
        startOffsetY = e.clientY - rect.top;

        // プレースホルダー（海ブルー光の隙間）をセット
        row.parentNode.insertBefore(placeholder, row);

        // 空中浮遊モード開始
        row.style.width = rect.width + 'px';
        row.style.height = rect.height + 'px';
        row.style.left = rect.left + 'px';
        row.style.top = rect.top + 'px';
        row.classList.add('dragging');
        handle.classList.add('active-blue');

        handle.setPointerCapture(e.pointerId);
        if (navigator.vibrate) navigator.vibrate(15); 

        // 🚨 【変更点】掴んだ瞬間は自動スクロールを起動しない！(オットット防止)
        // ユーザーが指を動かし始めたらセンサーを着火させるぜ。
    });

    handle.addEventListener('pointermove', (e) => {
        if (!draggingRow) return;
        e.preventDefault();
        currentClientY = e.clientY;

        // 指の真下に1ミリの狂いもなく追従
        draggingRow.style.top = (currentClientY - startOffsetY) + 'px';

        // 差し込み青光スロットの位置を更新
        updatePlaceholderPosition(currentClientY);

        // 🚀 【変更点】指が動くたびにセンサーを起動！真ん中から端に持っていった時もここで着火するぜ！
        startAutoScrollLoop();
    });

    handle.addEventListener('pointerup', (e) => {
        if (!draggingRow) return;
        handle.releasePointerCapture(e.pointerId);
        clearAllDraggingStates();
    });
}

function updatePlaceholderPosition(clientY) {
    if (!draggingRow || !placeholder) return;
    const container = document.getElementById('menu-list');
    const siblings = [...container.querySelectorAll('.music-row:not(.dragging)')];

    const nextSibling = siblings.find(sibling => {
        const box = sibling.getBoundingClientRect();
        return clientY <= box.top + box.height / 2;
    });

    if (nextSibling) {
        container.insertBefore(placeholder, nextSibling);
    } else {
        container.appendChild(placeholder);
    }
}

// 🚀 【神修正】いつでもどこからでも何度でも再着火するスクロールループ
function startAutoScrollLoop() {
    // すでにループが走っているなら二重起動を防いで即リターン
    if (autoScrollActive) return;

    const threshold = 100; // 端っこから100pxの検知ゾーン
    const windowHeight = window.innerHeight;

    // 現在の指の位置が、本当に上下の検知ゾーンに入っているかチェック
    const isTopZone = (currentClientY < threshold && window.scrollY > 0);
    const isBottomZone = (currentClientY > windowHeight - threshold);

    // ゾーン外ならループを起動すらさせずに静止を維持する（CPUにも優しいぜ！）
    if (!isTopZone && !isBottomZone) return;

    autoScrollActive = true;

    function scrollLoop() {
        if (!draggingRow) { stopAutoScroll(); return; }

        let speed = 0;
        const glowTop = document.getElementById('glow-top');
        const glowBottom = document.getElementById('glow-bottom');

        glowTop.classList.remove('glow-active');
        glowBottom.classList.remove('glow-active');

        // 1. 上端検知ゾーンでの加速計算
        if (currentClientY < threshold && window.scrollY > 0) {
            const ratio = (threshold - currentClientY) / threshold;
            speed = -Math.ceil(ratio * 25); 
            glowTop.classList.add('glow-active');
        } 
        // 2. 下端検知ゾーンでの加速計算
        else if (currentClientY > windowHeight - threshold) {
            const currentScrollMax = document.documentElement.scrollHeight - windowHeight;
            if (window.scrollY < currentScrollMax) {
                const ratio = (currentClientY - (windowHeight - threshold)) / threshold;
                speed = Math.ceil(ratio * 25); 
                glowBottom.classList.add('glow-active');
            }
        }

        // 🛹 速度が出ている間は画面を動かし、ループを継続！
        if (speed !== 0) {
            window.scrollBy(0, speed);
            updatePlaceholderPosition(currentClientY);
            requestAnimationFrame(scrollLoop);
        } else {
            // 🚨 【超重要】ゾーンから出たら、一旦フラグを折ってループを終了させる
            // これにより、次にpointermoveで端に入った時に「再着火」できるようになるぜ！
            autoScrollActive = false;
            stopAutoScroll();
        }
    }
    requestAnimationFrame(scrollLoop);
}

function stopAutoScroll() {
    document.getElementById('glow-top').classList.remove('glow-active');
    document.getElementById('glow-bottom').classList.remove('glow-active');
}

function clearAllDraggingStates() {
    const container = document.getElementById('menu-list');
    if (!container) return;

    let needSave = false;

    if (draggingRow && placeholder && placeholder.parentNode) {
        placeholder.parentNode.insertBefore(draggingRow, placeholder);
        needSave = true;
    }

    if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.removeChild(placeholder);
    }

    container.querySelectorAll('.music-row').forEach(row => {
        row.classList.remove('dragging');
        row.style.position = '';
        row.style.width = '';
        row.style.height = '';
        row.style.left = '';
        row.style.top = '';
    });
    
    container.querySelectorAll('.sort-handle').forEach(h => {
        h.classList.remove('active-blue');
    });

    draggingRow = null;
    autoScrollActive = false;
    stopAutoScroll();

    if (needSave) {
        saveNewOrderFromDOM();
    }
}

/* ========================================================================
   💡【ここに追記！】極上3フェーズ連動リアルタイムシミュレーターエンジン本体
   ======================================================================== */

// ✨ 🔴【フェーズ1：文字書き込み優先ステージ（赤点滅・超高速）】
function startTeheperoEngine(allSongs, libraryMap) {
    const lamp = document.getElementById('ofs-lamp');
    const lampText = document.getElementById('ofs-lamp-text');
    const lampIcon = document.getElementById('ofs-lamp-icon');
    const listContainer = document.getElementById('menu-list');
    if (!lamp || !lampText || !lampIcon) return;

    teheperoPhase = 1;
    lamp.style.display = "flex";
    lamp.style.opacity = "1";
    lamp.style.background = "#ffebe6"; // 淡い赤背景
    lamp.style.color = "#ff453a";      // iOSシステムレッド
    lampText.innerText = "曲データ取込中";
    lampIcon.innerText = "🔴";
    lampIcon.className = "blink-fast";   // 激しい超高速点滅をオン！
    
    listContainer.innerHTML = ''; 
    let currentIndex = 0;
    const originalOrder = [...currentOrderList];
    currentOrderList = []; // リストを空にして、ツラツラ降臨を再現
    
    const dropInterval = setInterval(() => {
        if (currentIndex < originalOrder.length) {
            currentOrderList.push(originalOrder[currentIndex]);
            renderList(libraryMap); // フェーズ1はテキストのみスッキリ配置
            currentIndex++;
        } else {
            clearInterval(dropInterval);
            // リストに全曲降り立ったら、1秒の余韻を置いてフェーズ2へ自動シフト！
            setTimeout(() => { goToPhase2(libraryMap); }, 1000);
        }
    }, 150); // 150ms間隔で小気味よくツラツラ降臨！
}

// ✨ 🟢【フェーズ2：ジャケ写右詰めリアルタイム上書きステージ（緑点滅・普通）】
function goToPhase2(libraryMap) {
    const lamp = document.getElementById('ofs-lamp');
    const lampText = document.getElementById('ofs-lamp-text');
    const lampIcon = document.getElementById('ofs-lamp-icon');

    teheperoPhase = 2;
    lamp.style.background = "#eafaf1"; // 淡い緑背景
    lamp.style.color = "#30d158";      // iOSシステムグリーン
    lampText.innerText = "ジャケ写取得中";
    lampIcon.innerText = "🟢";
    lampIcon.className = "blink-normal"; // 普通テンポの点滅（0.8秒サイクル）に切り替え！

    let targetRows = document.querySelectorAll('.music-row');
    let delay = 0;

    targetRows.forEach((row) => {
        const filePath = row.dataset.filePath;
        const song = libraryMap[filePath];
        
        // IndexedDBにジャケ写（cover_art）が実在する曲だけをロックオン
        if (song && song.is_cover_analyzed && song.cover_art) {
            setTimeout(() => {
                // 曲名エリアの右端に、ジャケ写画像をパッ、パッと美しく上書き挿入！
                const titleArea = row.querySelector('.title-area');
                if (titleArea && !titleArea.querySelector('.jacket-preview')) {
                    const imgUrl = typeof song.cover_art === 'string' ? song.cover_art : URL.createObjectURL(song.cover_art);
                    const img = document.createElement('img');
                    img.src = imgUrl;
                    img.className = 'jacket-preview';
                    img.style.width = "38px";
                    img.style.height = "38px";
                    img.style.borderRadius = "6px";
                    img.style.objectFit = "cover";
                    img.style.marginLeft = "auto"; // これで右端へ綺麗にパッキングされるぜ
                    img.style.flexShrink = "0";
                    
                    titleArea.appendChild(img);
                }
            }, delay);
            delay += 400; // 0.4秒の間隔をあけながら、リアルタイムに上書きしていくプロ演出！
        }
    });

    // すべてのジャケ写上書き工程が終わったら、フェーズ3へ自動シフト！
    setTimeout(() => { goToPhase3(); }, Math.max(delay + 500, 2000));
}

// ✨ 🔵【フェーズ3：全工程完了ステージ（青点灯・5秒キープ後に消滅）】
function goToPhase3() {
    const lamp = document.getElementById('ofs-lamp');
    const lampText = document.getElementById('ofs-lamp-text');
    const lampIcon = document.getElementById('ofs-lamp-icon');

    teheperoPhase = 3;
    lamp.style.background = "#e6f6ff"; // 淡い青背景
    lamp.style.color = "#007aff";      // iOSシステムブルー
    lampText.innerText = "全工程完了";
    lampIcon.innerText = "🔵";
    lampIcon.className = ""; // クラスを空にして点滅を解除、完全な常時点灯へ！

    // 5秒間、完了の余韻を誇らしげにキープ
    setTimeout(() => {
        lamp.style.opacity = "0"; // CSSの transition 効果でフワッと消える
        setTimeout(() => {
            lamp.style.display = "none"; // 完全に消えたら裏へ格納
        }, 500);
    }, 5000);
}

function saveNewOrderFromDOM() {
    const container = document.getElementById('menu-list');
    const rows = [...container.querySelectorAll('.music-row')];
    currentOrderList = rows.map(row => row.dataset.filePath);

    if (!dbInstance) return;
    const tx = dbInstance.transaction('playlists', 'readwrite');
    const store = tx.objectStore('playlists');

    const playlistData = {
        playlist_id: "main_menu_default",
        playlist_name: "メイン全曲リスト",
        file_path_list: currentOrderList
    };

    store.put(playlistData);
    console.log("[NoriRun] オンデマンド追随ソートの並び順をIndexedDBに完璧保存したぜ！");
}
</script>
