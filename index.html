<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 - Step 1-A</title>
<style>
/* 第2章 & 第3章: CSS聖域 */
:root {
--bg-color: #f2f2f7;
--accent-red: #ff3b30;
--main-blue: #007aff;
--text-black: #1c1c1e;
--text-gray: #8e8e93;
}
body, html {
margin: 0; padding: 0; width: 100%; height: 100%;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background-color: var(--bg-color);
overflow: hidden; touch-action: none;
}
#init-screen {
display: flex; flex-direction: column; align-items: center;
width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
text-align: center;
}
h1 { margin: 10px 0 5px; font-size: 1.6rem; color: var(--text-black); }
.instruction { font-size: 1rem; margin: 0; font-weight: 500; }
.sub-instruction { font-size: 0.85rem; color: var(--text-gray); margin-bottom: 5px; }

/* 第4章: 巨大BPM表示 */
#status-display { margin: 10px 0; }
#pitch-number {
font-size: 3.5rem; font-weight: 900; color: var(--text-black);
line-height: 1; margin-bottom: 5px; font-variant-numeric: tabular-nums;
}
#pitch-label {
font-size: 1.25rem; font-weight: bold; color: var(--text-black);
height: 1.5rem;
}

/* 第2章 & 第4章: スワイプ定規エリア (白い箱) /
.ruler-outer {
width: 100%; height: 160px;
background: #ffffff;
border-radius: 20px;
position: relative; / 子要素のabsoluteを制限する重要設定 /
box-shadow: 0 4px 15px rgba(0,0,0,0.08);
margin: 10px 0 20px;
overflow: hidden; / 赤い線のはみ出しを防ぐ /
}
/ 第3章: 中央の赤い固定線 /
.center-line {
position: absolute;
left: 50%; top: 0;
width: 3px; height: 100%;
background-color: var(--accent-red);
transform: translateX(-50%);
z-index: 10; / Canvasより上に表示 */
pointer-events: none;
}
canvas { width: 100%; height: 100%; display: block; }

/* 第4章: 安心メッセージ */
.safety-box {
background: #ffffff; border-radius: 12px; padding: 15px;
margin-top: auto; margin-bottom: 20px;
font-size: 0.85rem; line-height: 1.5; text-align: left;
color: #3a3a3c; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.safety-title { display: block; font-weight: bold; margin-bottom: 5px; }

#save-btn {
width: 100%; max-width: 320px; height: 56px;
background-color: var(--main-blue); color: white;
border: none; border-radius: 28px;
font-size: 1.1rem; font-weight: bold;
margin-bottom: 20px; cursor: pointer;
box-shadow: 0 4px 12px rgba(0,122,255,0.3);
-webkit-tap-highlight-color: transparent;
}
#save-btn:active { opacity: 0.8; transform: scale(0.98); }
</style>
</head>
<body>

<div id="init-screen">
<h1>初期設定</h1>
<p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
<p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>

<!-- ステータス表示エリア -->
<div id="status-display">
<div id="pitch-number">130</div>
<div id="pitch-label">--</div>
</div>

<!-- 定規エリア (第2章 構造) -->
<div class="ruler-outer" id="ruler-container">
<div class="center-line"></div>
<canvas id="ruler-canvas"></canvas>
</div>

<div class="safety-box">
<span class="safety-title">🛡️ 安心・安全への取り組み</span>
下記**「設定」**ボタンを押すと<br>
「このサイトにファイルの表示とコピーを許可しますか？ 」<br>
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>

<button id="save-btn">設定</button>
</div>

<script>
// --- 1. 状態管理 ---
const state = {
bpm: 130,
targetBpm: 130,
minBpm: 100,
maxBpm: 220,
isDragging: false,
lastX: 0,
audioCtx: null,
clickBuffer: null,
nextClickTime: 0,
isPlaying: false
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const numberEl = document.getElementById('pitch-number');
const labelEl = document.getElementById('pitch-label');

// --- 2. 音源準備 ---
async function initAudio() {
if (state.audioCtx) return;
state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
try {
const response = await fetch('click.wav');
const arrayBuffer = await response.arrayBuffer();
state.clickBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);
} catch (e) { console.error("Audio Load Error"); }
}

function playClick(time) {
if (!state.clickBuffer) return;
const source = state.audioCtx.createBufferSource();
source.buffer = state.clickBuffer;
source.connect(state.audioCtx.destination);
source.start(time);
}

// --- 3. 描画 & 物理演算 ---
function updateLabels(bpm) {
const b = Math.round(bpm);
numberEl.textContent = b;

let label = "";
if (b <= 120) label = "🚶‍♂️ ウォーキング";
else if (b <= 135) label = "🥁 行進";
else if (b <= 200) label = "🏃‍♂️ マラソン";
else label = "🏎️ 全力ダッシュ！";
labelEl.textContent = label;
}

function render() {
// 物理演算 (第4章 5)
state.bpm += (state.targetBpm - state.bpm) * 0.25;

const w = canvas.width;
const h = canvas.height;
const centerX = w / 2;

// 背景消去
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, w, h);

// 描画設定 (第4章 3)
const unitW = 20; // 1BPM = 20px
const start = Math.floor(state.bpm - (centerX / unitW)) - 1;
const end = Math.ceil(state.bpm + (centerX / unitW)) + 1;

ctx.textAlign = 'center';

for (let i = start; i <= end; i++) {
if (i < state.minBpm || i > state.maxBpm) continue;

const x = centerX + (i - state.bpm) * unitW;

let lineWidth = 1;
let lineHeight = 15;

if (i % 10 === 0) {
lineWidth = 2;
lineHeight = 45;
ctx.fillStyle = '#1c1c1e';
ctx.font = 'bold 13px sans-serif';
ctx.fillText(i, x, h - 65); // 第4章 3: 线上端から65
} else if (i % 5 === 0) {
lineWidth = 1.5;
lineHeight = 30;
}

ctx.beginPath();
ctx.strokeStyle = '#c7c7cc';
ctx.lineWidth = lineWidth;
ctx.moveTo(x, h);
ctx.lineTo(x, h - lineHeight);
ctx.stroke();
}

updateLabels(state.bpm);

// メトロノーム同期 (第4章 6)
if (state.isPlaying && state.audioCtx) {
const interval = 60 / Math.round(state.bpm);
const currentTime = state.audioCtx.currentTime;
if (state.nextClickTime < currentTime) {
if (state.nextClickTime === 0) state.nextClickTime = currentTime;
playClick(state.nextClickTime);
state.nextClickTime += interval;
}
}

requestAnimationFrame(render);
}

// --- 4. 操作イベント ---
function handleStart(x) {
if (state.audioCtx) state.audioCtx.resume(); else initAudio();
state.isPlaying = true;
state.isDragging = true;
state.lastX = x;
}

function handleMove(x) {
if (!state.isDragging) return;
const deltaX = x - state.lastX;
state.targetBpm -= deltaX / 20;
state.targetBpm = Math.max(state.minBpm, Math.min(state.maxBpm, state.targetBpm));
state.lastX = x;
}

function handleEnd() {
state.isDragging = false;
state.targetBpm = Math.round(state.targetBpm);
}

// Canvas上でのみドラッグ開始
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchmove', e => { if(state.isDragging) { e.preventDefault(); handleMove(e.touches[0].clientX); } }, {passive: false});
window.addEventListener('touchend', handleEnd);

canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- 5. IndexedDB & 完了処理 (第5章) ---
async function saveAndNext() {
const request = indexedDB.open("NoriRunDB", 1);
request.onupgradeneeded = e => {
const db = e.target.result;
if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
if (!db.objectStoreNames.contains('music_library')) db.createObjectStore('music_library', { keyPath: 'file_path' });
};
request.onsuccess = e => {
const db = e.target.result;
const tx = db.transaction('settings', 'readwrite');
const store = tx.objectStore('settings');
store.put(Math.round(state.bpm), 'my_pitch');
store.put(true, 'init_completed');
tx.oncomplete = () => {
alert("初期設定が完了しました！次は1-Bへ進みます。");
};
};
}

document.getElementById('save-btn').onclick = saveAndNext;

// --- 6. 初期化 ---
function init() {
const container = document.getElementById('ruler-container');
// 親要素のサイズを確実にCanvasに反映 (第4章 2)
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
render();
}

window.onload = init;
window.onresize = init;

</script>
</body>
</html>
