<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eef2f3; color: #333; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button, .btn-label { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-label { background: #28a745; }
        input[type="file"] { display: none; }
        audio { width: 100%; margin: 20px 0; }
        #playlist { text-align: left; list-style: none; padding: 0; margin-top: 20px; border-top: 2px solid #eee; }
        #playlist li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>🎵 竹弘のPWAプレイヤー</h2>
    <div id="currentSong">曲を選んでね</div>
    <audio id="audioPlayer" controls></audio>

    <div class="controls">
        <label class="btn-label">📂 音楽を選択
            <input type="file" id="fileInput" accept="audio/mp3" multiple>
        </label>
        <button onclick="savePlaylist()">💾 保存</button>
        <label class="btn-label" style="background:#6c757d;">📑 読込
            <input type="file" id="playlistInput" accept=".txt">
        </label>
    </div>
    
    <ul id="playlist"></ul>
</div>

<script>
    // サービスワーカー（裏方さん）の登録
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
            console.log('PWA準備完了！');
        });
    }

    // --- ここから下は前の音楽再生コードと同じ ---
    const fileInput = document.getElementById('fileInput');
    const audioPlayer = document.getElementById('audioPlayer');
    const playlistElement = document.getElementById('playlist');
    let loadedFiles = {};

    fileInput.addEventListener('change', (e) => {
        Array.from(e.target.files).forEach(file => {
            loadedFiles[file.name] = URL.createObjectURL(file);
            updateUI();
        });
    });

    function updateUI() {
        playlistElement.innerHTML = '';
        Object.keys(loadedFiles).forEach(name => {
            const li = document.createElement('li');
            li.innerText = "▶ " + name;
            li.onclick = () => {
                audioPlayer.src = loadedFiles[name];
                document.getElementById('currentSong').innerText = name;
                audioPlayer.play();
            };
            playlistElement.appendChild(li);
        });
    }

    function savePlaylist() {
        const blob = new Blob([Object.keys(loadedFiles).join('\n')], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'playlist.txt';
        a.click();
    }
</script>

</body>
</html>
