<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ノリRun Ver.9 - データスキャン(曲データのindexDB書込み)</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            margin: 0; padding: 20px;
            color: #1c1c1e;
        }
        .container {
            max-width: 500px; margin: 0 auto;
            background: #fff; padding: 20px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { font-size: 1.4rem; margin-top: 0; text-align: center; }
        
        /* 予告メッセージ用ボックス */
        .alert-info {
            background-color: #f0f7ff; border: 1px solid #d1d1d6;
            padding: 15px; border-radius: 12px;
            font-size: 0.88rem; line-height: 1.5; margin-bottom: 20px;
        }
        
        /* 実験用のでかいボタン */
        .scan-btn {
            display: block; width: 100%; box-sizing: border-box;
            background: #007aff; color: white; border: none;
            padding: 18px; font-size: 1.1rem; font-weight: bold;
            border-radius: 15px; cursor: pointer; text-align: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .scan-btn:active { transform: scale(0.98); }

        /* 隠しインプット（JavaScriptから裏でクリックする） */
        #file-input { display: none; }

    </style>
</head>
<body>

<div class="container">
    <h2>STEP 1-B 独立実験場</h2>
    
    <div class="alert-info">
        <strong>🛡️ 恐怖のメッセージ発動テスト</strong><br>
        下のボタンをタップすると、スマホのOSから<br>
        <strong>「ファイルの表示とコピーを許可しますか？」</strong><br>
        という確認画面が即座に立ち上がります。これが1-Aで予告した安心のセキュリティ関門です！
    </div>

    <!-- 1-Aの設定ボタンに見立ててテストに使うぜ！ -->
    <button class="scan-btn" id="mock-trigger-btn">【実験用】音楽フォルダを選択</button>
</div>

<!-- ==========================================
     START STEP1-B CUSTOM_DIALOG (追加箇所だぜ！)
     ========================================== -->
<div id="norirun-alert-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
  <div style="background: #2a2a35; border: 2px solid #ff4757; border-radius: 12px; padding: 24px; max-width: 360px; width: 100%; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: sans-serif;">
    <div style="font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #ff4757; display: flex; align-items: center; gap: 8px;">
      ⚠️ 読み込みエラー
    </div>
    <div style="font-size: 14px; line-height: 1.5; color: #eee; margin-bottom: 16px;">
      音楽ファイルが1件も見つかりませんでした。<br><br>
      <span style="color: #ffdd57; font-weight: bold;">💡 ノリRunからのアドバイス</span><br>
      Apple MusicやSpotifyなどの『サブスクのダウンロード曲』は、スマホのセキュリティ仕様上、アプリに読み込むことができません。<strong>MP3、MP4、WAVなどの音楽ファイル</strong>が保存されている別のフォルダを選択し直しますか？
    </div>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button id="norirun-alert-cancel" style="padding: 10px 16px; background: #444; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">キャンセル</button>
      <button id="norirun-alert-retry" style="padding: 10px 16px; background: #2ed573; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">選択し直す</button>
    </div>
  </div>
</div>

<!-- 隠しファイルインプット（フォルダ選択を起動するためのトリガー） -->
<input type="file" id="norirun-folder-picker" webkitdirectory directory multiple style="display: none;">
<!-- ==========================================
     END STEP1-B CUSTOM_DIALOG
     ========================================== -->

<script>
/**
 * NoriRun Ver.9 - STEP 1-B 本番スキャン＆DB Ver 2 格納エンジン
 * (C) 2026 Takehiro & つよぽん
 */

let db = null;
const DB_NAME = "NoriRunDB";
const DB_VERSION = 2; // 竹弘と決めたバージョン2！

// IndexedDBを立ち上げる関数
function openDatabase() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onerror = (event) => {
      console.error("データベースのオープンに失敗:", event.target.error);
      reject(event.target.error);
    };

    request.onsuccess = (event) => {
      db = event.target.result;
      console.log("NoriRunDB Ver 2 接続成功ぜ！");
      resolve(db);
    };

    // 初めてDBを作る、またはバージョンが上がった時に走る設計図
    request.onupgradeneeded = (event) => {
      const currentDb = event.target.result;
      
      // 箱①: settings ストア
      if (!currentDb.objectStoreNames.contains('settings')) {
        currentDb.createObjectStore('settings');
      }
      
      // 箱②: music_library ストア (主キー: file_path)
      let musicStore;
      if (!currentDb.objectStoreNames.contains('music_library')) {
        musicStore = currentDb.createObjectStore('music_library', { keyPath: 'file_path' });
      } else {
        musicStore = event.target.transaction.objectStore(currentDb.objectStoreNames.contains('music_library'));
      }
      
      // 箱③: playlists ストア
      if (!currentDb.objectStoreNames.contains('playlists')) {
        currentDb.createObjectStore('playlists', { keyPath: 'playlist_id' });
      }
      
      console.log("NoriRunDB のオブジェクトストア群の配備が完了したぜ！");
    };
  });
}

// フォルダスキャン ＆ ドッキング処理の心臓部
async function handleFolderScan(files) {
  let validMusicFiles = [];
  
  // 1. 竹弘提案の「MP3, MP4, WAV」を拡張子チェックで狙い撃ち
  // ※大文字小文字（.mp3, .MP4 等）を問わないように拡張子を小文字化して判定
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'mp3' || ext === 'mp4' || ext === 'm4a' || ext === 'wav') {
      validMusicFiles.push(file);
    }
  }

  // 2. 【0件サブスク警告】1件も無ければカスタムポップアップをドカンと出す
  if (validMusicFiles.length === 0) {
    showCustomAlert();
    return;
  }

  // 3. 音楽ファイルがあったら、IndexedDBの音楽箱（music_library）へ格納開始
  const tx = db.transaction(['music_library'], 'readwrite');
  const store = tx.objectStore('music_library');

  let skipCount = 0;
  let insertCount = 0;

  for (const file of validMusicFiles) {
    // 【最重要・重複回避ルール】既存の背番号（file.name）が既にあるかチェック
    const checkRequest = store.get(file.name);
    
    await new Promise((resolve) => {
      checkRequest.onsuccess = () => {
        if (checkRequest.result) {
          // すでに存在している場合は「完全読み飛ばし（スルー）」してユーザーデータを守る！
          skipCount++;
          resolve();
        } else {
          // 新規曲のみ、Ver 9.2の初期構造でガチッと保存
          const newTrack = {
            file_path: file.name, // 主キー
            title: "",            // 後ほどMITで解析
            artist: "",           // 後ほどMITで解析
            duration: 0,
            mix_duration: 0,
            is_analyzed: false,
            tag_bpm: null,
            baseBPM: 120,         // 解析前の暫定基準値
            userBPM: null,
            manualBPM: null,
            startTS: 0,
            endTS: 0,
            tick13TS: 0,
            is_cover_analyzed: false, // 新フラグ：最初は当然false
            cover_art: null           // 最後尾に配置
          };
          
          store.add(newTrack);
          insertCount++;
          resolve();
        }
      };
    });
  }

  tx.oncomplete = () => {
    console.log(`【スキャン完了】新規登録: ${insertCount}件 / 重複スルー: ${skipCount}件`);
    // スキャンが無事成功したら、settingsストアの init_completed を true に書き換える
    saveSetting('init_completed', true);
    
    // 次のステップ：OFS画面の爆速先行表示（④）へバトンタッチ！
    proceedToOFS();
  };
}

// --- カスタムダイアログの表示制御 ---
function showCustomAlert() {
  document.getElementById('norirun-alert-overlay').style.display = 'flex';
}
function hideCustomAlert() {
  document.getElementById('norirun-alert-overlay').style.display = 'none';
}

// ダイアログのボタンイベント仕込み
document.getElementById('norirun-alert-cancel').addEventListener('click', hideCustomAlert);
document.getElementById('norirun-alert-retry').addEventListener('click', () => {
  hideCustomAlert();
  document.getElementById('norirun-folder-picker').click(); // 再度ピッカー起動
});

// 既存のSTEP1-A「設定」ボタンが押された時の連動
// HTML側の設定ボタン（例：id="config-btn"）にイベントを仕込む
function setupScanButton(buttonId) {
  const configBtn = document.getElementById(buttonId);
  const hiddenPicker = document.getElementById('norirun-folder-picker');
  
  if (configBtn && hiddenPicker) {
    configBtn.addEventListener('click', () => {
      // OS防衛戦を突破：アラートを挟まずにダイレクトにフォルダ選択を起動
      hiddenPicker.click();
    });
    
    hiddenPicker.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFolderScan(e.target.files);
      }
    });
  }
}

// 汎用設定保存関数
function saveSetting(key, value) {
  const tx = db.transaction(['settings'], 'readwrite');
  tx.objectStore('settings').put(value, key);
}

function proceedToOFS() {
  // ここに、④で大改造するOFS画面への遷移ロジックをドッキングするぜ！
  alert("ノリRun曲データベース構築成功！爆速でOFS画面を表示するぜ！");
}

</script>
</body>
</html>
