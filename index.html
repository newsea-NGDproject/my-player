<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white; display: flex;
            justify-content: center; align-items: center; text-align: center;
            z-index: 1000; padding: 20px; font-size: 1.2em; line-height: 1.8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message">
        </div>
</div>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status">フォルダを認証してください</div>
    <div class="controls">
        <button id="scanFolder">📂 曲を読み込む</button>
        <button id="savePlaylist">💾 保存</button>
        <button id="loadPlaylist">📑 読込</button>
        <button onclick="resetFolder()" style="background:#666;">🔄 フォルダ変更</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    const audioPlayer = new Audio();
    let playlist = { songs: [] };
    let rootHandle = null;

    // 起動時に「保存されたフォルダ」があるかチェック
    window.onload = async () => {
        const savedHandle = await getSavedHandle();
        const msgDiv = document.getElementById('message');
        
        if (savedHandle) {
            rootHandle = savedHandle;
            msgDiv.innerHTML = `おかえりなさい！<br>前回設定したフォルダへの<br>アクセス再開を承諾お願いします。<br><br><span style="font-size:0.8em;">[ タップで承諾 ]</span>`;
        } else {
            msgDiv.innerHTML = `セキュリティ承諾をお願いします。<br>この後、2つの許可画面が出ますので<br>どちらも『許可』を選択してください。<br><br><span style="font-size:0.8em;">[ タップで開始 ]</span>`;
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                // 初回：フォルダ選択
                rootHandle = await window.showDirectoryPicker();
                await saveHandle(rootHandle); // フォルダを記憶
            } else {
                // 2回目以降：権限の再確認だけ
                const permission = await rootHandle.requestPermission({ mode: 'readwrite' });
                if (permission !== 'granted') throw new Error('Permission denied');
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (err) {
            alert("アクセスが許可されませんでした。");
        }
    }

    // --- フォルダ記憶用（IndexedDBを使用） ---
    async function saveHandle(handle) {
        const db = await openDB();
        await db.put("config", handle, "rootFolder");
    }
    async function getSavedHandle() {
        const db = await openDB();
        return await db.get("config", "rootFolder");
    }
    function openDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open("PlayerDB", 1);
            req.onupgradeneeded = () => req.result.createObjectStore("config");
            req.onsuccess = () => {
                const db = req.result;
                resolve({
                    put: (s, v, k) => new Promise(r => db.transaction(s, "readwrite").objectStore(s).put(v, k).onsuccess = r),
                    get: (s, k) => new Promise(r => db.transaction(s).objectStore(s).get(k).onsuccess = e => r(e.target.result))
                });
            };
        });
    }
    function resetFolder() {
        indexedDB.deleteDatabase("PlayerDB");
        location.reload();
    }

    // --- 以下、スキャン・再生ロジック（前回と同じ） ---
    document.getElementById('scanFolder').addEventListener('click', async () => {
        if (!rootHandle) return;
        playlist.songs = [];
        await scanDirectory(rootHandle);
        renderPlaylist();
    });

    async function scanDirectory(handle) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file' && (entry.name.endsWith('.mp3') || entry.name.endsWith('.m4a'))) {
                const file = await entry.getFile();
                playlist.songs.push({ name: entry.name, handle: entry, file: file, userBPM: 0 });
            } else if (entry.kind === 'directory') await scanDirectory(entry);
        }
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>▶ ${song.name}</span>`;
            li.onclick = async () => {
                const file = await song.handle.getFile();
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.play();
            };
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
