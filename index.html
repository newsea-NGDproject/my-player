<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 - Initial Setup</title>
<style>
:root {
--accent-red: #ff3b30;
--main-blue: #007aff;
--bg-color: #f2f2f7;
}
body, html {
margin: 0; padding: 0; width: 100%; height: 100%;
font-family: -apple-system, sans-serif;
background-color: var(--bg-color);
overflow: hidden; touch-action: none;
}
#init-screen {
display: flex; flex-direction: column; align-items: center;
width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
text-align: center;
}
h1 { margin: 10px 0 5px; font-size: 1.6rem; font-weight: 700; color: #1c1c1e; }
.instruction { font-size: 1rem; margin: 0; font-weight: 500; color: #3a3a3c; }
.sub-instruction { font-size: 0.85rem; color: #8e8e93; margin-bottom: 10px; }

/* --- 4段目: BPM表示 --- */
#bpm-display {
font-size: 4rem; font-weight: 900; color: #3a3a3c;
margin: 10px 0; line-height: 1;
}

/* --- 5段目: ラベル表示 --- */
#status-area {
font-size: 1.3rem; font-weight: 700; color: var(--main-blue);
margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
}

/* --- 6段目: スワイプ定規エリア --- */
#ruler-container {
width: 100%; height: 160px;
background: white; border-radius: 20px;
position: relative; overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.08);
margin-bottom: 15px;
}
#cursor {
position: absolute; left: 50%; top: 0; bottom: 0;
width: 3px; background: var(--accent-red);
transform: translateX(-50%); z-index: 10;
}
canvas { width: 100%; height: 100%; display: block; }

/* --- 7段目: 安心メッセージ (竹弘の最新修正) --- /
#safety-info {
background-color: #f0f7ff; / 修正：背景を水色に /
border: 1px solid #d1e9ff;
border-radius: 12px;
padding: 15px;
width: 100%; box-sizing: border-box;
text-align: left; margin-top: auto;
margin-bottom: 15px;
}
.safety-title {
font-size: 0.85rem; font-weight: 700; color: #1c1c1e;
display: flex; align-items: center; margin-bottom: 6px;
}
.safety-title::before { content: "🛡️"; margin-right: 6px; }
.safety-body {
font-size: 0.85rem; font-weight: 400; color: #3a3a3c; line-height: 1.5;
}
/ 修正：本文内の強調 */
.safety-body strong { font-weight: 900; color: #1c1c1e; }

/* --- 8段目: 保存ボタン --- */
#save-btn {
background: var(--main-blue); color: white;
border: none; border-radius: 35px;
padding: 18px 0; width: 80%; max-width: 300px;
font-size: 1.1rem; font-weight: 700;
box-shadow: 0 6px 20px rgba(0,122,255,0.4);
margin-bottom: 25px; cursor: pointer;
}
</style>
</head>
<body>

<div id="init-screen">
<h1>初期設定</h1>
<p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
<p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>

<div id="bpm-display">175</div>

<div id="status-area">
<span id="status-icon">🏃‍♂️</span>
<span id="status-text">マラソン</span>
</div>

<div id="ruler-container">
<div id="cursor"></div>
<canvas id="ruler-canvas"></canvas>
</div>

<div id="safety-info">
<div class="safety-title">安心・安全への取り組み</div>
<div class="safety-body">
下記<strong>「設定」</strong>ボタンを押すと<br>
「このサイトにファイルの表示とコピーを許可しますか？」<br>
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。<br>
NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>
</div>

<button id="save-btn">設定</button>
</div>

<script>
// --- 状態管理 ---
const state = {
bpm: 175,
isDragging: false,
startX: 0,
startBpm: 0,
audioCtx: null,
isPlaying: false
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d');
const bpmDisplay = document.getElementById('bpm-display');
const statusText = document.getElementById('status-text');
const statusIcon = document.getElementById('status-icon');

// --- サウンド生成 (カチカチ音) ---
function playTick() {
if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const osc = state.audioCtx.createOscillator();
const gain = state.audioCtx.createGain();
osc.type = 'sine';
osc.frequency.setValueAtTime(800, state.audioCtx.currentTime);
gain.gain.setValueAtTime(0.1, state.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.0001, state.audioCtx.currentTime + 0.05);
osc.connect(gain);
gain.connect(state.audioCtx.destination);
osc.start();
osc.stop(state.audioCtx.currentTime + 0.05);
}

// --- UI更新 ---
function updateUI() {
const b = Math.round(state.bpm);
bpmDisplay.textContent = b;

if (b <= 120) { statusText.textContent = "ウォーキング"; statusIcon.textContent = "🚶‍♂️"; }
else if (b <= 135) { statusText.textContent = "行進"; statusIcon.textContent = "🥁"; }
else if (b <= 200) { statusText.textContent = "マラソン"; statusIcon.textContent = "🏃‍♂️"; }
else { statusText.textContent = "全力ダッシュ！"; statusIcon.textContent = "🏎️"; }
}

// --- 描画 ---
function render() {
const w = canvas.width;
const h = canvas.height;
ctx.clearRect(0, 0, w, h);

const centerX = w / 2;
const step = 20; // 1BPM = 20px

for (let i = 80; i <= 220; i++) {
const x = centerX + (i - state.bpm) * step;
if (x < -50 || x > w + 50) continue;

ctx.beginPath();
if (i % 10 === 0) {
ctx.strokeStyle = '#3a3a3c';
ctx.lineWidth = 2;
ctx.moveTo(x, 0); ctx.lineTo(x, 40);
ctx.fillStyle = '#3a3a3c';
ctx.font = 'bold 14px sans-serif';
ctx.textAlign = 'center';
ctx.fillText(i, x, 60);
} else {
ctx.strokeStyle = '#c7c7cc';
ctx.lineWidth = 1;
ctx.moveTo(x, 0); ctx.lineTo(x, 20);
}
ctx.stroke();
}
requestAnimationFrame(render);
}

// --- インタラクション ---
function handleStart(x) {
state.isDragging = true;
state.startX = x;
state.startBpm = state.bpm;
if (state.audioCtx && state.audioCtx.state === 'suspended') state.audioCtx.resume();
}

function handleMove(x) {
if (!state.isDragging) return;
const diffX = state.startX - x;
const prevBpm = Math.round(state.bpm);
state.bpm = state.startBpm + (diffX / 20);

// 範囲制限
if (state.bpm < 80) state.bpm = 80;
if (state.bpm > 220) state.bpm = 220;

if (Math.round(state.bpm) !== prevBpm) {
playTick();
updateUI();
}
}

function handleEnd() {
state.isDragging = false;
state.bpm = Math.round(state.bpm);
updateUI();
}

canvas.addEventListener('touchstart', e => handleStart(e.touches[0].clientX), {passive: false});
window.addEventListener('touchmove', e => {
if (state.isDragging) e.preventDefault();
handleMove(e.touches[0].clientX);
}, {passive: false});
window.addEventListener('touchend', handleEnd);

canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- IndexedDB 保存 ---
async function saveSettings() {
const request = indexedDB.open("NoriRunDB", 1);

request.onupgradeneeded = e => {
const db = e.target.result;
db.createObjectStore('settings');
db.createObjectStore('music_library', { keyPath: 'file_path' });
};

request.onsuccess = e => {
const db = e.target.result;
const tx = db.transaction('settings', 'readwrite');
const store = tx.objectStore('settings');
store.put(Math.round(state.bpm), 'my_pitch');
store.put(true, 'init_completed');

tx.oncomplete = () => {
alert("初期設定が完了しました！次は音楽をスキャンしましょう。");
};
};
}

document.getElementById('save-btn').onclick = saveSettings;

// --- 初期化 ---
window.onload = () => {
const container = document.getElementById('ruler-container');
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
updateUI();
render();
};

window.onresize = () => {
const container = document.getElementById('ruler-container');
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
};
</script>

</body>
</html>
