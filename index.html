<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 - Step 1-A</title>
<style>
/* 第2章: CSS聖域の確立 /
:root {
--bg-color: #121212;
--text-color: #ffffff;
--accent-color: #ff3b30;
}
body, html {
margin: 0; padding: 0;
width: 100%; height: 100%;
overflow: hidden;
background-color: var(--bg-color);
color: var(--text-color);
font-family: sans-serif;
}
#app-container {
display: flex; flex-direction: column;
width: 100%; height: 100%;
padding: 20px; box-sizing: border-box;
text-align: center;
}
canvas {
width: 100%; height: 120px; / 定規エリア /
touch-action: none;
background: #1e1e1e;
border-radius: 8px;
margin: 20px 0;
}
/ 第4章: 文言・レイアウト（完全固定） */
.title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
.instruction { font-size: 1.1rem; margin-bottom: 5px; }
.sub-instruction { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
.label-display { font-size: 1.4rem; font-weight: bold; height: 1.8rem; color: #ffd700; }
.bpm-display { font-size: 3rem; font-weight: bold; margin: 10px 0; }

.safety-message {
background: #252525;
padding: 15px; border-radius: 10px;
font-size: 0.9rem; line-height: 1.6;
text-align: left; margin-top: auto;
}
.setup-button {
background: var(--accent-color);
color: white; border: none;
padding: 15px 40px; border-radius: 30px;
font-size: 1.2rem; font-weight: bold;
margin-top: 20px; cursor: pointer;
}
</style>
</head>
<body>

<div id="app-container">
<div class="title">初期設定</div>
<div class="instruction">あなたの「マイ・ピッチ」を設定して下さい</div>
<div class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</div>

<div id="label-area" class="label-display"></div>
<div id="bpm-area" class="bpm-display">120</div>

<canvas id="rulerCanvas"></canvas>

<div class="safety-message">
🛡️ 安心・安全への取り組み<br>
下記**「設定」**ボタンを押すと<br>
「このサイトにファイルの表示とコピーを許可しますか？ 」<br>
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>

<button id="setupButton" class="setup-button">設定</button>
</div>

<script>
// --- 第2章・第3章: 技術仕様・物理演算 ---
const state = {
bpm: 120,
targetBpm: 120,
isDragging: false,
lastX: 0,
audioCtx: null,
audioBuffer: null,
nextNoteTime: 0,
isInitCompleted: false
};

const canvas = document.getElementById('rulerCanvas');
const ctx = canvas.getContext('2d');
const bpmDisplay = document.getElementById('bpm-area');
const labelDisplay = document.getElementById('label-area');

// 第2章: 横画面対応（解像度再設定）
function resize() {
canvas.width = canvas.clientWidth * window.devicePixelRatio;
canvas.height = canvas.clientHeight * window.devicePixelRatio;
}
window.addEventListener('resize', resize);
resize();

// 第2章: 音源デグレード封印 (click.wav 低遅延処理)
async function initAudio() {
if (state.audioCtx) return;
state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
try {
const response = await fetch('click.wav');
const arrayBuffer = await response.arrayBuffer();
state.audioBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);
} catch (e) { console.error("click.wav not found. Please ensure the file exists."); }
}

function playClick(time) {
if (!state.audioBuffer) return;
const source = state.audioCtx.createBufferSource();
source.buffer = state.audioBuffer;
source.connect(state.audioCtx.destination);
source.start(time);
}

// 第3章: 描画エンジン (60fps) & 第5章: 相互作用
function update() {
// 吸い付く操作感（慣性補完ロジック）
state.bpm += (state.targetBpm - state.bpm) * 0.25;

const displayBpm = state.isDragging ? Math.round(state.bpm) : Math.round(state.bpm);
bpmDisplay.innerText = displayBpm;

// 第5章: ピッチ・ラベルの可視化
if (displayBpm <= 120) labelDisplay.innerText = "🚶‍♂️ ウォーキング";
else if (displayBpm <= 135) labelDisplay.innerText = "🥁 行進";
else if (displayBpm <= 200) labelDisplay.innerText = "🏃‍♂️ マラソン";
else labelDisplay.innerText = "🏎️ 全力ダッシュ！";

// 第3章: 音と描画の同期（Web Audio API currentTimeベース）
if (state.audioCtx && state.audioCtx.state === 'running') {
const secondsPerBeat = 60.0 / displayBpm;
if (state.audioCtx.currentTime > state.nextNoteTime) {
state.nextNoteTime = state.audioCtx.currentTime + secondsPerBeat;
playClick(state.nextNoteTime);
}
}

drawRuler();
requestAnimationFrame(update);
}

function drawRuler() {
const w = canvas.width;
const h = canvas.height;
ctx.clearRect(0, 0, w, h);

const centerX = w / 2;
const step = 20; // 目盛りの間隔

ctx.strokeStyle = '#555';
ctx.lineWidth = 2;
ctx.font = "20px Arial";
ctx.fillStyle = "#888";
ctx.textAlign = "center";

// 目盛りの描画
for (let i = -20; i <= 20; i++) {
const currentTickBpm = Math.round(state.bpm) + i;
const x = centerX + (currentTickBpm - state.bpm) * step;

ctx.beginPath();
ctx.moveTo(x, h);
ctx.lineTo(x, h - (currentTickBpm % 5 === 0 ? 40 : 20));
ctx.stroke();

if (currentTickBpm % 5 === 0) {
ctx.fillText(currentTickBpm, x, h - 50);
}
}

// 中心赤線
ctx.strokeStyle = '#ff3b30';
ctx.lineWidth = 4;
ctx.beginPath();
ctx.moveTo(centerX, 0);
ctx.lineTo(centerX, h);
ctx.stroke();
}

// タッチイベント (第2章: 音制限解除 & 第5章: 収束)
canvas.addEventListener('touchstart', (e) => {
if (state.audioCtx) state.audioCtx.resume(); else initAudio();
state.isDragging = true;
state.lastX = e.touches[0].clientX;
});

canvas.addEventListener('touchmove', (e) => {
const deltaX = e.touches[0].clientX - state.lastX;
state.targetBpm -= deltaX * 0.1; // 感度調整
state.lastX = e.touches[0].clientX;
});

canvas.addEventListener('touchend', () => {
state.isDragging = false;
// 第5章: 整数値への収束
state.targetBpm = Math.round(state.targetBpm);
});

// 第6章: 完了処理（IndexedDB）
async function saveAndNext() {
// ここでIndexedDBにstate.targetBpmとisInitCompleted = trueを保存
// 本番ではここでIDBへの書き込み待機
console.log("Saving BPM:", Math.round(state.targetBpm));

// シームレス遷移（メッセージを出さず次へ）
if (window.showDirectoryPicker) {
try {
const handle = await window.showDirectoryPicker();
console.log("Folder selected, proceeding to 1-B...");
// ここで1-Bの画面生成処理へ
} catch (e) {
console.log("User cancelled folder picker");
}
} else {
alert("お使いのブラウザはフォルダアクセスに対応していません。");
}
}

document.getElementById('setupButton').addEventListener('click', saveAndNext);

// 起動
requestAnimationFrame(update);

</script>
</body>
</html>
