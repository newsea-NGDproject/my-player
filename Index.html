<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status">曲を選択してプレイリストを作ろう</div>
    <div class="controls">
        <button id="addFiles">📂 曲を追加</button>
        <button id="savePlaylist">💾 名前を付けて保存</button>
        <button id="loadPlaylist">📑 読込</button>
    </div>
    <ul id="playlist"></ul>
</div>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log('ServiceWorker登録完了'));
    }

    let playlist = { marathonMode: false, marathonBPM: 120, songs: [] };

    document.getElementById('addFiles').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true; input.accept = 'audio/mp3';
        input.onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                playlist.songs.push({ name: file.name, detectedBPM: 0, userBPM: 0 });
            });
            renderPlaylist();
        };
        input.click();
    });

    document.getElementById('savePlaylist').addEventListener('click', async () => {
        const name = prompt("プレイリストに名前を付けてください", "私のマラソンリスト");
        if (!name) return;
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: `${name}.json`,
                types: [{ description: 'JSONプレイリスト', accept: { 'application/json': ['.json'] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(JSON.stringify(playlist, null, 2));
            await writable.close();
            alert(`${name} を保存しました！`);
        } catch (err) { console.error(err); }
    });

    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        try {
            const [handle] = await window.showOpenFilePicker({
                types: [{ description: 'JSONプレイリスト', accept: { 'application/json': ['.json'] } }],
            });
            const file = await handle.getFile();
            playlist = JSON.parse(await file.text());
            renderPlaylist();
        } catch (err) { console.error(err); }
    });

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach(song => {
            const li = document.createElement('li');
            li.innerText = `▶ ${song.name} (BPM: ${song.userBPM || '解析未'})`;
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
