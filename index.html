<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC MASTER V3.0 - 13=0 Verification</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0a0a0a; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: #161616; padding: 20px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .monitor { background: #000; padding: 20px; border-radius: 20px; border: 2px solid #00ff88; margin-bottom: 15px; position: relative; }
        .timer { font-size: 2.8em; font-weight: bold; font-family: 'Courier New', monospace; color: #00ff88; }
        .phase-label { font-size: 0.9em; color: #ff00ff; letter-spacing: 2px; margin-top: 5px; }
        
        .mixer-panel { display: flex; flex-direction: column; gap: 15px; background: #222; padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .fader-group { display: flex; align-items: center; gap: 10px; }
        .fader-label { width: 80px; font-size: 0.8em; text-align: left; color: #bbb; }
        input[type=range] { flex: 1; accent-color: #00ff88; cursor: pointer; }
        
        .bpm-display { font-size: 2em; background: #000; color: #00ff88; padding: 10px; border-radius: 10px; margin: 10px 0; border: 1px solid #444; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-magenta { background: #ff00ff; color: white; box-shadow: 0 0 15px rgba(255,0,255,0.4); }
        .btn-stop { background: #441111; color: #ff8888; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin: 0 0 15px 0; color: #00ff88;">SYNC MASTER V3.0</h2>
    
    <div class="monitor">
        <div id="timerDisplay" class="timer">00:00.00</div>
        <div id="phaseLabel" class="phase-label">READY</div>
    </div>

    <div class="mixer-panel">
        <div class="fader-group">
            <div class="fader-label">1曲目音量</div>
            <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume()">
        </div>
        <div class="fader-group">
            <div class="fader-label">2曲目音量</div>
            <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume()">
        </div>
        <div class="fader-group">
            <div class="fader-label" style="color:#00ff88;">爆音メトロ</div>
            <input type="range" id="volM" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

    <div class="bpm-display" id="bpmDisp">BPM: ---</div>

    <button class="btn btn-blue" onclick="document.getElementById('file0').click()">🎵 1曲目（先行）ロード</button>
    <input type="file" id="file0" accept="audio/*" onchange="loadAudio(0, this)" style="display:none">
    
    <button class="btn btn-blue" onclick="document.getElementById('file1').click()">🎵 2曲目（後続）ロード</button>
    <input type="file" id="file1" accept="audio/*" onchange="loadAudio(1, this)" style="display:none">

    <button id="startBtn" class="btn btn-magenta" onclick="runSyncVerification()" disabled>🔗 同期検証スタート (15秒前〜)</button>
    <button class="btn btn-stop" onclick="stopEverything()">STOP / RESET</button>
</div>

<audio id="p1"></audio>
<audio id="p2"></audio>

<script>
    const players = [document.getElementById('p1'), document.getElementById('p2')];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songData = [null, null];
    let isRunning = false;
    let loopId = null;
    let nextTickTime = 0;

    // ローカルストレージから前回の解析データを読み込み
    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) {
            songData = [JSON.parse(d0), JSON.parse(d1)];
            document.getElementById('startBtn').disabled = false;
            document.getElementById('bpmDisp').innerText = `READY: ${songData[0].bpm} → ${songData[1].bpm}`;
        }
    };

    function loadAudio(idx, input) {
        const file = input.files[0];
        if (!file) return;
        players[idx].src = URL.createObjectURL(file);
        if (players[0].src && players[1].src) document.getElementById('startBtn').disabled = false;
    }

    async function runSyncVerification() {
        if (isRunning) return;
        await audioCtx.resume();
        isRunning = true;
        
        const targetBpm = songData[0].bpm; // 今回は1曲目のBPMを基準に検証
        const beatSec = 60 / targetBpm;
        
        // 13=0 地点の定義
        const exitPoint = songData[0].endTS; 
        const entryPoint = songData[1].startTS;
        
        // 15秒前からの助走
        const leadTime = 15;
        const startPos1 = exitPoint - leadTime;
        const startPos2 = entryPoint - leadTime;

        players[0].currentTime = startPos1;
        players[1].currentTime = startPos2;
        
        const startTime = audioCtx.currentTime;
        players[0].play();
        players[1].play();

        nextTickTime = startTime;

        loopId = setInterval(() => {
            const now = audioCtx.currentTime;
            const elapsed = now - startTime;
            const currentPos1 = startPos1 + elapsed;
            const distToJump = exitPoint - currentPos1;

            document.getElementById('timerDisplay').innerText = (distToJump > 0 ? "-" : "+") + Math.abs(distToJump).toFixed(2) + "s";

            // フェード・無音ロジック (接続点前後2秒)
            let v1 = document.getElementById('vol1').value;
            let v2 = document.getElementById('vol2').value;

            // 1曲目のフェードアウト (13=0の2秒前から消える)
            if (distToJump < 2 && distToJump > 0) {
                players[0].volume = v1 * (distToJump / 2);
                document.getElementById('phaseLabel').innerText = "FADE OUT...";
            } else if (distToJump <= 0) {
                players[0].volume = 0;
            } else {
                players[0].volume = v1;
                document.getElementById('phaseLabel').innerText = "DUAL RUNNING";
            }

            // 2曲目のフェードイン (13=0の2秒後から出る)
            if (distToJump < 0 && distToJump > -2) {
                players[1].volume = 0; // 無音区間
                document.getElementById('phaseLabel').innerText = "SILENCE (RE-SYNC)";
            } else if (distToJump <= -2 && distToJump > -4) {
                players[1].volume = v2 * (Math.abs(distToJump + 2) / 2);
                document.getElementById('phaseLabel').innerText = "FADE IN...";
            } else if (distToJump <= -4) {
                players[1].volume = v2;
                document.getElementById('phaseLabel').innerText = "POST-SYNC";
            } else {
                players[1].volume = 0; // 接続前は裏で鳴らすが音は出さない（検証で聴きたい時はスライダーで手動操作可）
            }

            // 爆音メトロノームの生成 (常時)
            if (now >= nextTickTime) {
                playTick(nextTickTime, 2000, document.getElementById('volM').value);
                nextTickTime += beatSec;
            }

        }, 20);
    }

    function playTick(t, freq, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.1);
    }

    function adjustVolume() {
        // インターバル内で自動制御しているが、ベース音量を反映させる
    }

    function stopEverything() {
        clearInterval(loopId);
        players.forEach(p => { p.pause(); p.volume = 0.5; });
        isRunning = false;
        document.getElementById('phaseLabel').innerText = "STOPPED";
        document.getElementById('timerDisplay').innerText = "00:00.00";
    }
</script>
</body>
</html>
