<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹弘の夢のプレイヤー Ver 5.8</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; overflow-x: hidden; touch-action: pan-y; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; flex-grow: 1; min-width: 120px; }
        button:active { filter: brightness(0.8); }

        /* BPM定規セクション */
        .bpm-panel { background: #f8f9fa; border-radius: 10px; padding: 20px 0; margin: 15px 0; border: 1px solid #dee2e6; position: relative; overflow: hidden; }
        .bpm-display-main { font-size: 2.2em; font-weight: bold; color: #007bff; margin-bottom: 5px; cursor: pointer; }
        .original-info { font-size: 0.8em; color: #888; margin-bottom: 15px; }

        /* 定規の外枠 */
        .ruler-viewport { width: 100%; height: 80px; position: relative; cursor: grab; overflow: hidden; touch-action: none; background: #fff; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .ruler-viewport:active { cursor: grabbing; }
        
        /* 中央の赤い針 */
        .ruler-center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #dc3545; z-index: 10; transform: translateX(-50%); pointer-events: none; }
        
        /* 定規本体（目盛り） */
        .ruler-track { position: absolute; height: 100%; display: flex; align-items: flex-start; will-change: transform; }
        .ruler-tick { width: 10px; height: 20px; border-left: 1px solid #ccc; flex-shrink: 0; position: relative; }
        .ruler-tick.major { height: 40px; border-left: 2px solid #333; }
        .ruler-tick.major::after { content: attr(data-val); position: absolute; top: 45px; left: -15px; width: 30px; text-align: center; font-size: 10px; color: #333; font-weight: bold; }
        .ruler-tick.out-of-range { border-color: #ddd !important; }
        .ruler-tick.out-of-range::after { color: #ccc !important; }

        #resetBpmBtn { background: #6c757d; font-size: 0.7em; padding: 5px 10px; border-radius: 20px; min-width: auto; margin-top: 10px; }

        /* プレイリスト関連 */
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-info { flex-grow: 1; cursor: pointer; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-bpm-tag { font-size: 0.7em; color: #666; background: #eee; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .item-controls { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 10px; font-size: 0.8em; background: #6c757d; min-width: 35px; flex-grow: 0; }
        .btn-del { background: #dc3545; }

        /* 各種オーバーレイ */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; justify-content: center; align-items: center; text-align: center; z-index: 1000; padding: 20px; cursor: pointer; }
        #exit-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 1.5em; }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message">読み込み中...</div>
</div>

<div id="exit-screen">
    <div>🏃‍♂️ プレイヤーを終了しました<br><span style="font-size: 0.6em; color: #aaa;">タブを閉じてください</span></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">📑 プレイリストを選択</h3>
        <div id="playlist-index"></div>
        <hr>
        <button onclick="closeModal()" style="width:100%; background:#666;">閉じる</button>
    </div>
</div>

<div class="player-card">
    <h2 id="appTitle">🎵 夢のプレイヤー Ver 5.8</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.85em;">フォルダを認証してください</div>

    <div class="bpm-panel">
        <div id="currentBpmDisplay" class="bpm-display-main" title="タップしてBPM入力">---</div>
        <div class="original-info">元BPM: <span id="originalBpmValue">---</span></div>
        
        <div class="ruler-viewport" id="rulerViewport">
            <div class="ruler-center-line"></div>
            <div class="ruler-track" id="rulerTrack"></div>
        </div>

        <button id="resetBpmBtn">元のBPMに戻す</button>
        <div style="font-size: 0.7em; color: #888; margin-top:10px;">グレーゾーンは再生限界(0.5x~2.0x)です</div>
    </div>
    
    <div class="controls">
        <button id="addSongs" style="background: #007bff;">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="savePlaylist" style="background: #28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;">📑 読込</button>
        <button id="exitBtn" style="background: #343a40;">🚪 終了</button>
    </div>
    <ul id="playlist"></ul>
    <audio id="hiddenAudio" style="display:none;"></audio>
</div>

<script>
    const audioTag = document.getElementById('hiddenAudio');
    let playlist = { songs: [] };
    let currentPlaylistName = "マイリスト";
    let rootHandle = null;
    let currentPlayingIdx = -1;
    let originalBpm = 0;

    // 定規用変数
    const TICK_WIDTH = 10; // 目盛り1つ(1BPM)の幅
    const MIN_BPM = 1;
    const MAX_BPM = 1000;
    let currentX = 0;
    let isDragging = false;
    let startX = 0;
    let velocity = 0;
    let rafId = null;

    const DB_NAME = "PlayerDB_V5";
    const STORE_LISTS = "playlists";
    const STORE_CONFIG = "config";

    // --- データベース & 認証関連 ---
    async function openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_LISTS)) db.createObjectStore(STORE_LISTS);
                if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function dbPut(store, key, value) {
        const db = await openDB();
        const tx = db.transaction(store, "readwrite");
        tx.objectStore(store).put(value, key);
    }

    async function dbGet(store, key) {
        const db = await openDB();
        return new Promise(r => db.transaction(store).objectStore(store).get(key).onsuccess = e => r(e.target.result));
    }

    window.onload = async () => {
        initRuler();
        const savedHandle = await dbGet(STORE_CONFIG, "rootFolder");
        if (savedHandle) {
            rootHandle = savedHandle;
            document.getElementById('message').innerHTML = "おかえりなさい！<br>[ タップして開始 ]";
        } else {
            document.getElementById('message').innerHTML = "Musicフォルダを選択してください<br>[ タップして選択 ]";
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                rootHandle = await window.showDirectoryPicker();
                await dbPut(STORE_CONFIG, "rootFolder", rootHandle);
            } else {
                if (await rootHandle.requestPermission() !== 'granted') return;
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (e) { alert("認証が必要です"); }
    }

    // --- BPM解析 & 再生 ---
    async function estimateBPM(file) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await file.arrayBuffer();
        const buffer = await audioCtx.decodeAudioData(arrayBuffer);
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        let peaks = [];
        for (let i = 0; i < data.length; i += 441) {
            if (Math.abs(data[i]) > 0.8) peaks.push(i);
        }
        if (peaks.length < 10) return 120;
        let intervals = [];
        for (let i = 1; i < peaks.length; i++) intervals.push(peaks[i] - peaks[i-1]);
        const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
        let bpm = Math.round(60 / (avgInterval / sampleRate));
        while (bpm < 60) bpm *= 2; while (bpm > 180) bpm /= 2;
        return Math.round(bpm);
    }

    async function playSong(idx) {
        const song = playlist.songs[idx];
        currentPlayingIdx = idx;
        document.getElementById('status').innerText = "解析中...";
        try {
            let h = song.handle || await findFileRecursive(rootHandle, song.name);
            const file = await h.getFile();
            if (!song.baseBpm) song.baseBpm = await estimateBPM(file);
            originalBpm = song.baseBpm;
            
            audioTag.src = URL.createObjectURL(file);
            audioTag.preservesPitch = true;
            
            // 保存されたBPMがあればそこに定規を飛ばす
            const targetBpm = (song.userBpm && song.userBpm !== 0) ? song.userBpm : originalBpm;
            scrollToBpm(targetBpm, false); 
            
            audioTag.play();
            renderPlaylist();
            updateRulerVisuals();
            document.getElementById('status').innerText = `再生中: ${song.name}`;
        } catch (e) { alert("再生エラーが発生しました"); }
    }

    // --- BPM定規ロジック ---
    function initRuler() {
        const track = document.getElementById('rulerTrack');
        track.innerHTML = '';
        for (let i = MIN_BPM; i <= MAX_BPM; i++) {
            const tick = document.createElement('div');
            tick.className = 'ruler-tick' + (i % 10 === 0 ? ' major' : '');
            if (i % 10 === 0) tick.setAttribute('data-val', i);
            tick.id = `tick-${i}`;
            track.appendChild(tick);
        }
        scrollToBpm(120, false);
    }

    // 再生限界(0.5x ~ 2.0x)に基づいた定規の色分け
    function updateRulerVisuals() {
        if (originalBpm === 0) return;
        const minSafe = Math.ceil(originalBpm * 0.5);
        const maxSafe = Math.floor(originalBpm * 2.0);
        
        document.querySelectorAll('.ruler-tick').forEach((tick, idx) => {
            const bpm = idx + 1;
            if (bpm < minSafe || bpm > maxSafe) {
                tick.classList.add('out-of-range');
            } else {
                tick.classList.remove('out-of-range');
            }
        });
    }

    function scrollToBpm(bpm, animate = true) {
        // 限界突破チェック
        if (originalBpm > 0) {
            bpm = Math.max(Math.ceil(originalBpm * 0.5), Math.min(Math.floor(originalBpm * 2.0), bpm));
        }
        
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        const targetX = (viewportWidth / 2) - ((bpm - MIN_BPM) * TICK_WIDTH);
        
        if (!animate) {
            currentX = targetX;
            applyTransform();
            updateBpmFromScroll();
        } else {
            animateTo(targetX);
        }
    }

    function applyTransform() {
        document.getElementById('rulerTrack').style.transform = `translateX(${currentX}px)`;
    }

    function updateBpmFromScroll() {
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        const centerOffset = (viewportWidth / 2) - currentX;
        let bpm = Math.round(centerOffset / TICK_WIDTH) + MIN_BPM;
        bpm = Math.max(MIN_BPM, Math.min(MAX_BPM, bpm));
        
        document.getElementById('currentBpmDisplay').innerText = bpm;
        document.getElementById('originalBpmValue').innerText = originalBpm || "---";

        if (originalBpm > 0) {
            const rate = bpm / originalBpm;
            audioTag.playbackRate = rate;
            if (currentPlayingIdx !== -1) {
                playlist.songs[currentPlayingIdx].userBpm = bpm;
            }
        }
    }

    // ドラッグ操作
    const viewport = document.getElementById('rulerViewport');
    viewport.addEventListener('mousedown', startDrag);
    viewport.addEventListener('touchstart', (e) => startDrag(e.touches[0]));

    function startDrag(e) {
        isDragging = true;
        startX = e.clientX;
        velocity = 0;
        cancelAnimationFrame(rafId);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('touchmove', (e) => moveDrag(e.touches[0]), {passive: false});
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);
    }

    function moveDrag(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        velocity = dx; // 簡易的な速度計算
        currentX += dx;
        startX = e.clientX;
        applyTransform();
        updateBpmFromScroll();
    }

    function endDrag() {
        if (!isDragging) return;
        isDragging = false;
        window.removeEventListener('mousemove', moveDrag);
        window.removeEventListener('mouseup', endDrag);
        
        // 慣性スクロール
        if (Math.abs(velocity) > 2) {
            startInertia();
        } else {
            snapToGrid();
        }
    }

    function startInertia() {
        velocity *= 0.95; // 摩擦
        currentX += velocity;
        applyTransform();
        updateBpmFromScroll();

        if (Math.abs(velocity) > 0.5) {
            rafId = requestAnimationFrame(startInertia);
        } else {
            snapToGrid();
        }
    }

    function snapToGrid() {
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        const centerOffset = (viewportWidth / 2) - currentX;
        const bpm = Math.round(centerOffset / TICK_WIDTH) + MIN_BPM;
        scrollToBpm(bpm, true);
    }

    function animateTo(targetX) {
        const step = () => {
            const diff = targetX - currentX;
            if (Math.abs(diff) < 0.5) {
                currentX = targetX;
                applyTransform();
                updateBpmFromScroll();
                renderPlaylist(); // リストのタグも更新
                return;
            }
            currentX += diff * 0.2; // 滑らかなアニメーション
            applyTransform();
            updateBpmFromScroll();
            rafId = requestAnimationFrame(step);
        };
        rafId = requestAnimationFrame(step);
    }

    // --- その他ボタン連動 ---
    document.getElementById('resetBpmBtn').addEventListener('click', () => {
        if (originalBpm > 0) scrollToBpm(originalBpm, true);
    });

    document.getElementById('currentBpmDisplay').addEventListener('click', () => {
        if (originalBpm === 0) return;
        const input = prompt("BPMを直接入力:", document.getElementById('currentBpmDisplay').innerText);
        if (input && !isNaN(input)) scrollToBpm(parseInt(input), true);
    });

    // --- プレイリスト管理 ---
    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            const info = document.createElement('div');
            info.className = 'song-info';
            const bpmTag = song.userBpm ? `<span class="song-bpm-tag">🏃 ${song.userBpm}</span>` : song.baseBpm ? `<span class="song-bpm-tag">${song.baseBpm}</span>` : '';
            info.innerHTML = `▶ ${song.name} ${bpmTag}`;
            info.onclick = () => playSong(i);
            
            const ctrl = document.createElement('div');
            ctrl.className = 'item-controls';
            const upBtn = document.createElement('button'); upBtn.className = 'btn-sm'; upBtn.innerText = '↑';
            upBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, -1); };
            if (i === 0) upBtn.style.visibility = 'hidden';
            const downBtn = document.createElement('button'); downBtn.className = 'btn-sm'; downBtn.innerText = '↓';
            downBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, 1); };
            if (i === playlist.songs.length - 1) downBtn.style.visibility = 'hidden';
            const delBtn = document.createElement('button'); delBtn.className = 'btn-sm btn-del'; delBtn.innerText = '❌';
            delBtn.onclick = (e) => { e.stopPropagation(); removeSong(i); };
            
            ctrl.appendChild(upBtn); ctrl.appendChild(downBtn); ctrl.appendChild(delBtn);
            li.appendChild(info); li.appendChild(ctrl);
            list.appendChild(li);
        });
    }

    async function performSave() {
        let name = prompt("プレイリスト名を入力してください", currentPlaylistName);
        if (!name) return false;
        currentPlaylistName = name;
        const data = { 
            songs: playlist.songs.map(s => ({name: s.name, baseBpm: s.baseBpm, userBpm: s.userBpm})), 
            updatedAt: new Date().toLocaleString() 
        };
        await dbPut(STORE_LISTS, name, data);
        document.getElementById('appTitle').innerText = `🎵 ${name}`;
        return true;
    }

    document.getElementById('savePlaylist').addEventListener('click', async () => {
        if (await performSave()) alert("保存しました！");
    });

    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        const db = await openDB();
        const keys = await new Promise(r => db.transaction(STORE_LISTS).objectStore(STORE_LISTS).getAllKeys().onsuccess = e => r(e.target.result));
        const indexDiv = document.getElementById('playlist-index');
        indexDiv.innerHTML = '';
        for (const key of keys) {
            const data = await dbGet(STORE_LISTS, key);
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div>📑 ${key}</div><div style="font-size:0.7em; color:#888;">${data.updatedAt || ''}</div>`;
            div.onclick = () => { 
                playlist.songs = data.songs; 
                currentPlaylistName = key;
                document.getElementById('appTitle').innerText = `🎵 ${key}`;
                renderPlaylist(); 
                closeModal(); 
            };
            indexDiv.appendChild(div);
        }
        document.getElementById('modal').style.display = 'flex';
    });

    document.getElementById('exitBtn').addEventListener('click', async () => {
        const choice = confirm("終了する前にプレイリストを保存しますか？");
        if (choice) { if (await performSave()) executeExit(); }
        else { if (confirm("保存せずに終了しますか？")) executeExit(); }
    });

    function executeExit() { audioTag.pause(); document.getElementById('exit-screen').style.display = 'flex'; }
    document.getElementById('stopBtn').addEventListener('click', () => audioTag.pause());
    document.getElementById('addSongs').addEventListener('click', async () => {
        try {
            const fileHandles = await window.showOpenFilePicker({ multiple: true, types: [{ accept: {'audio/*': ['.mp3', '.m4a']} }] });
            for (const h of fileHandles) {
                if (!playlist.songs.some(s => s.name === h.name)) {
                    playlist.songs.push({ name: h.name, handle: h, baseBpm: 0, userBpm: 0 });
                }
            }
            renderPlaylist();
        } catch(e){}
    });
    function moveSong(idx, dir) {
        const nIdx = idx + dir;
        if (nIdx < 0 || nIdx >= playlist.songs.length) return;
        [playlist.songs[idx], playlist.songs[nIdx]] = [playlist.songs[nIdx], playlist.songs[idx]];
        if (currentPlayingIdx === idx) currentPlayingIdx = nIdx;
        else if (currentPlayingIdx === nIdx) currentPlayingIdx = idx;
        renderPlaylist();
    }
    function removeSong(idx) {
        if (confirm("削除しますか？")) {
            playlist.songs.splice(idx, 1);
            if (currentPlayingIdx === idx) currentPlayingIdx = -1;
            renderPlaylist();
        }
    }
    async function findFileRecursive(h, name) {
        for await (const e of h.values()) {
            if (e.kind === 'file' && e.name === name) return e;
            if (e.kind === 'directory') { const r = await findFileRecursive(e, name); if (r) return r; }
        }
        return null;
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
