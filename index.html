<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹弘の夢のプレイヤー Ver 5.9</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; overflow-x: hidden; touch-action: pan-y; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        
        /* BPM定規セクション */
        .bpm-panel { background: #f8f9fa; border-radius: 10px; padding: 20px 0; margin: 15px 0; border: 1px solid #dee2e6; position: relative; text-align: center; }
        .bpm-display-main { font-size: 2.5em; font-weight: bold; color: #007bff; margin-bottom: 2px; }
        .original-info { font-size: 0.85em; color: #888; margin-bottom: 10px; }

        /* 定規ビューポート */
        .ruler-viewport { 
            width: 100%; 
            height: 100px; 
            position: relative; 
            overflow: hidden; 
            background: #fff; 
            border-top: 1px solid #ddd; 
            border-bottom: 1px solid #ddd;
            touch-action: none; 
            cursor: grab;
        }
        
        /* 中央の赤いインジケーター */
        .ruler-center-line { 
            position: absolute; 
            left: 50%; 
            top: 0; 
            width: 2px; 
            height: 100%; 
            background: #dc3545; 
            z-index: 20; 
            transform: translateX(-50%); 
            pointer-events: none; 
        }

        /* 定規トラック */
        .ruler-track { 
            position: absolute; 
            height: 100%; 
            display: flex; 
            align-items: flex-start; 
            will-change: transform; 
        }

        /* グレーエリア（再生限界表示用） */
        .ruler-safe-zone {
            position: absolute;
            height: 100%;
            background: rgba(200, 200, 200, 0.2); /* 安心のグレーエリア */
            z-index: 1;
            pointer-events: none;
        }

        .ruler-tick { 
            width: 10px; 
            height: 25px; 
            border-left: 1px solid #bbb; 
            flex-shrink: 0; 
            position: relative; 
            z-index: 5;
        }
        .ruler-tick.major { height: 50px; border-left: 2px solid #333; }
        .ruler-tick.major::after { 
            content: attr(data-val); 
            position: absolute; 
            top: 55px; 
            left: -15px; 
            width: 30px; 
            text-align: center; 
            font-size: 11px; 
            color: #333; 
        }

        /* 既存ボタン・リスト等のスタイルは維持 */
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; flex-grow: 1; }
        #resetBpmBtn { background: #6c757d; font-size: 0.8em; padding: 6px 15px; margin-top: 10px; border-radius: 20px; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; margin-bottom: 5px; border-radius: 8px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; }
    </style>
</head>
<body>

<div class="player-card">
    <h2 id="appTitle">🎵 夢のプレイヤー Ver 5.9</h2>
    
    <div class="bpm-panel">
        <div id="currentBpmDisplay" class="bpm-display-main">---</div>
        <div class="original-info">元BPM: <span id="originalBpmValue">---</span></div>
        
        <div class="ruler-viewport" id="rulerViewport">
            <div class="ruler-center-line"></div>
            <div id="rulerTrack" class="ruler-track">
                <div id="safeZoneLeft" class="ruler-safe-zone" style="left:0;"></div>
                <div id="safeZoneRight" class="ruler-safe-zone"></div>
            </div>
        </div>

        <button id="resetBpmBtn">元のBPMに戻す</button>
    </div>

    <div class="controls">
        <button id="addSongs">📂 曲追加</button>
        <button id="savePlaylist" style="background:#28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background:#17a2b8;">📑 読込</button>
    </div>
    <ul id="playlist"></ul>
    <audio id="hiddenAudio"></audio>
</div>

<script>
    const audioTag = document.getElementById('hiddenAudio');
    let playlist = { songs: [] };
    let currentPlayingIdx = -1;
    let originalBpm = 0;

    // 定規設定
    const TICK_SPACING = 10; // 1BPMあたりのピクセル数
    const MIN_BPM = 1;
    const MAX_BPM = 1000;
    let currentX = 0;
    let isDragging = false;
    let startX = 0;
    let velocity = 0;
    let rafId = null;

    // 初期化：定規の目盛り生成
    function initRuler() {
        const track = document.getElementById('rulerTrack');
        // 目盛り生成（既存のsafeZoneは残す）
        for (let i = MIN_BPM; i <= MAX_BPM; i++) {
            const tick = document.createElement('div');
            tick.className = 'ruler-tick' + (i % 10 === 0 ? ' major' : '');
            if (i % 10 === 0) tick.setAttribute('data-val', i);
            track.appendChild(tick);
        }
        updateBpmFromScroll(); // 初期表示
    }

    // BPM値から座標を計算（ズレ防止の核心）
    function bpmToX(bpm) {
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        const offsetFromStart = (bpm - MIN_BPM) * TICK_SPACING;
        return (viewportWidth / 2) - offsetFromStart;
    }

    // 座標からBPM値を計算（ズレ防止の核心）
    function xToBpm(x) {
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        const centerOffset = (viewportWidth / 2) - x;
        let bpm = (centerOffset / TICK_SPACING) + MIN_BPM;
        return Math.round(Math.max(MIN_BPM, Math.min(MAX_BPM, bpm)));
    }

    function scrollToBpm(bpm, animate = true) {
        // 再生限界による制限（0.5x ~ 2.0x）
        if (originalBpm > 0) {
            const minSafe = Math.ceil(originalBpm * 0.5);
            const maxSafe = Math.floor(originalBpm * 2.0);
            bpm = Math.max(minSafe, Math.min(maxSafe, bpm));
        }

        const targetX = bpmToX(bpm);
        if (!animate) {
            currentX = targetX;
            applyTransform();
            updateBpmFromScroll();
        } else {
            animateTo(targetX);
        }
    }

    function updateBpmFromScroll() {
        const bpm = xToBpm(currentX);
        document.getElementById('currentBpmDisplay').innerText = bpm;
        document.getElementById('originalBpmValue').innerText = originalBpm || "---";

        if (originalBpm > 0) {
            audioTag.playbackRate = bpm / originalBpm;
            if (currentPlayingIdx !== -1) playlist.songs[currentPlayingIdx].userBpm = bpm;
        }
        updateSafeZoneVisuals();
    }

    // グレーエリア（再生限界外）の更新
    function updateSafeZoneVisuals() {
        if (originalBpm === 0) return;
        const minSafe = Math.ceil(originalBpm * 0.5);
        const maxSafe = Math.floor(originalBpm * 2.0);

        const leftZone = document.getElementById('safeZoneLeft');
        const rightZone = document.getElementById('safeZoneRight');

        // 左側グレー（BPM 1 から minSafe まで）
        leftZone.style.width = `${(minSafe - MIN_BPM) * TICK_SPACING}px`;
        // 右側グレー（maxSafe から MAX_BPM まで）
        rightZone.style.left = `${(maxSafe - MIN_BPM) * TICK_SPACING}px`;
        rightZone.style.width = `${(MAX_BPM - maxSafe) * TICK_SPACING}px`;
    }

    function applyTransform() {
        document.getElementById('rulerTrack').style.transform = `translateX(${currentX}px)`;
    }

    // --- ドラッグ・慣性・吸い付き処理 ---
    const viewport = document.getElementById('rulerViewport');
    viewport.addEventListener('mousedown', dragStart);
    viewport.addEventListener('touchstart', (e) => dragStart(e.touches[0]));

    function dragStart(e) {
        isDragging = true;
        startX = e.clientX;
        velocity = 0;
        cancelAnimationFrame(rafId);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('touchmove', (ev) => dragMove(ev.touches[0]), {passive:false});
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchend', dragEnd);
    }

    function dragMove(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        currentX += dx;
        velocity = dx;
        startX = e.clientX;
        applyTransform();
        updateBpmFromScroll();
    }

    function dragEnd() {
        isDragging = false;
        window.removeEventListener('mousemove', dragMove);
        window.removeEventListener('mouseup', dragEnd);
        if (Math.abs(velocity) > 1) {
            startInertia();
        } else {
            snapToGrid();
        }
    }

    function startInertia() {
        velocity *= 0.95;
        currentX += velocity;
        applyTransform();
        updateBpmFromScroll();
        if (Math.abs(velocity) > 0.5) {
            rafId = requestAnimationFrame(startInertia);
        } else {
            snapToGrid();
        }
    }

    function snapToGrid() {
        const bpm = xToBpm(currentX);
        scrollToBpm(bpm, true);
    }

    function animateTo(targetX) {
        const step = () => {
            const diff = targetX - currentX;
            if (Math.abs(diff) < 0.2) {
                currentX = targetX;
                applyTransform();
                updateBpmFromScroll();
                return;
            }
            currentX += diff * 0.15;
            applyTransform();
            updateBpmFromScroll();
            rafId = requestAnimationFrame(step);
        };
        rafId = requestAnimationFrame(step);
    }

    // --- 再生・リスト処理（基本機能維持） ---
    async function playSong(idx) {
        currentPlayingIdx = idx;
        const song = playlist.songs[idx];
        // 擬似的なBPM解析（実際は前回のコードと同様のロジック）
        if (!song.baseBpm) song.baseBpm = 120; 
        originalBpm = song.baseBpm;
        
        audioTag.src = "dummy.mp3"; // 実際はファイルハンドルから生成
        audioTag.preservesPitch = true;
        
        const target = song.userBpm || originalBpm;
        scrollToBpm(target, false);
        renderPlaylist();
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((s, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            li.innerHTML = `<div>▶ ${s.name} <span style="font-size:0.7em; color:#888;">🏃${s.userBpm || s.baseBpm}</span></div>`;
            li.onclick = () => playSong(i);
            list.appendChild(li);
        });
    }

    document.getElementById('resetBpmBtn').onclick = () => scrollToBpm(originalBpm, true);
    window.onload = initRuler;
</script>
</body>
</html>
