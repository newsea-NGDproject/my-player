<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEAT-LINK Ver 0.98</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .phase-container { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 5px; }
        .phase-card { flex: 1; padding: 8px; background: #2a2a2a; border-radius: 8px; font-size: 0.65em; opacity: 0.3; }
        .phase-card.active { opacity: 1; background: #007bff; }
        
        .monitor-panel { background: #000; margin: 10px 0; padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .time-display { font-family: monospace; font-size: 1.2em; color: #00ff00; }
        .bpm-main { font-size: 3em; font-weight: bold; color: #00ff88; margin: 5px 0; }
        
        .tap-area { 
            width: 100%; height: 200px; background: #252525; border: 4px dashed #444; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: none; position: relative;
        }
        .tap-area.active { border-style: solid; border-color: #007bff; background: #1a1a2e; }
        .beat-flash { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; border-radius: 50%; background: #ff0000; opacity: 0; }
        .beat-flash.on { opacity: 1; box-shadow: 0 0 15px #ff0000; }

        .data-table { width: 100%; font-size: 0.7em; margin-top: 10px; color: #aaa; text-align: left; }
        .log-box { margin-top: 10px; background: #000; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.7em; text-align: left; color: #00ff00; height: 80px; overflow-y: auto; }
        .btn-start { padding: 15px; border-radius: 12px; border: none; font-weight: bold; background: #6f42c1; color: white; font-size: 1em; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="phase-container">
        <div id="ph1" class="phase-card">序盤</div>
        <div id="ph2" class="phase-card">中盤</div>
        <div id="ph3" class="phase-card">終盤</div>
        <div id="ph4" class="phase-card">検証</div>
    </div>

    <div class="monitor-panel">
        <div class="time-display">TIME: <span id="currentTime">0.000</span> s</div>
        <div class="bpm-main" id="bpmDisplay">--.----</div>
        <table class="data-table" id="pointsTable">
            <tr><td>P1 (序盤): <span id="p1Time">--</span></td><td>P2 (中盤): <span id="p2Time">--</span></td><td>P3 (終盤): <span id="p3Time">--</span></td></tr>
        </table>
    </div>

    <div class="tap-area" id="tapArea">
        <div id="beatIndicator" class="beat-flash"></div>
        <div id="tapLabel" style="font-size: 1.4em; font-weight: bold;">02-HANABI_1.m4a</div>
        <div id="tapSub" style="font-size: 0.8em; margin-top: 5px; color: #888;">フォルダを選択</div>
    </div>

    <div id="btnArea" style="margin-top: 15px;">
        <button id="folderBtn" class="btn-start">📁 フォルダ選択 & 開始</button>
    </div>
    <div class="log-box" id="log"></div>
</div>

<script>
    let audioCtx, audioBuf, currentSource, currentPhase = 0, scanOffsets = [], tapResults = [], tempTaps = [];
    let startTime = 0, isPlaying = false;

    const log = (msg) => { const d = document.getElementById('log'); d.innerHTML = `> ${msg}<br>${d.innerHTML}`; };

    // タイムコード更新ループ
    function updateMonitor() {
        if (isPlaying) {
            const elapsed = audioCtx.currentTime - startTime + (scanOffsets[currentPhase-1] || 0);
            document.getElementById('currentTime').innerText = elapsed.toFixed(3);
        }
        requestAnimationFrame(updateMonitor);
    }
    updateMonitor();

    document.getElementById('folderBtn').onclick = async () => {
        try {
            const root = await window.showDirectoryPicker();
            let fileHandle = null;
            for await (const entry of root.values()) { if (entry.name === "02-HANABI_1.m4a") { fileHandle = entry; break; } }
            if (!fileHandle) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioBuf = await audioCtx.decodeAudioData(await (await fileHandle.getFile()).arrayBuffer());
            scanOffsets = [5, audioBuf.duration * 0.5, audioBuf.duration * 0.9];
            document.getElementById('btnArea').style.display = 'none';
            startPhaseSequence();
        } catch (e) { log(e.message); }
    };

    async function startPhaseSequence() {
        currentPhase++;
        if (currentPhase > 3) { calculateFinal(); return; }
        document.querySelectorAll('.phase-card').forEach((el, i) => el.classList.toggle('active', i === currentPhase - 1));
        const tapArea = document.getElementById('tapArea');
        tapArea.className = 'tap-area counting';
        isPlaying = false;
        for (let i = 5; i > 0; i--) {
            document.getElementById('tapLabel').innerText = `準備: ${i}`;
            await new Promise(r => setTimeout(r, 1000));
        }
        tapArea.className = 'tap-area active';
        document.getElementById('tapLabel').innerText = "TAP! (12回)";
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime;
        currentSource.start(0, scanOffsets[currentPhase - 1], 35);
        isPlaying = true;
        tempTaps = [];
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        if (currentPhase < 1 || currentPhase > 3 || e.currentTarget.classList.contains('counting')) return;
        if (navigator.vibrate) navigator.vibrate(20);
        const tapTime = audioCtx.currentTime;
        tempTaps.push(tapTime);
        if (tempTaps.length >= 12) {
            const stable8 = tempTaps.slice(4);
            const correctedBpm = getCompensatedBPM(stable8);
            const avgTapTime = stable8.reduce((a,b)=>a+b, 0) / stable8.length;
            const absPos = scanOffsets[currentPhase-1] + (avgTapTime - startTime);
            tapResults.push({ absPos, bpm: correctedBpm });
            document.getElementById(`p${currentPhase}Time`).innerText = absPos.toFixed(3);
            if (currentSource) currentSource.stop();
            startPhaseSequence();
        }
    };

    function getCompensatedBPM(taps) {
        let intervals = [];
        for (let i = 1; i < taps.length; i++) intervals.push(taps[i] - taps[i-1]);
        const sorted = [...intervals].sort();
        const median = sorted[Math.floor(sorted.length / 2)];
        let totalBeats = 0, totalTime = 0;
        intervals.forEach(interval => {
            const beats = Math.round(interval / median);
            if (beats >= 1 && beats <= 3) { totalBeats += beats; totalTime += interval; }
        });
        return (totalBeats * 60) / totalTime;
    }

    function calculateFinal() {
        isPlaying = false;
        const p1 = tapResults[0], p2 = tapResults[1], p3 = tapResults[2];
        const totalDur = p3.absPos - p1.absPos;
        const totalBeats = Math.round(totalDur * (p1.bpm / 60));
        const finalBpm = (totalBeats * 60) / totalDur;
        document.getElementById('bpmDisplay').innerText = finalBpm.toFixed(4);
        document.getElementById('ph4').className = 'phase-card active';
        document.getElementById('tapArea').className = 'tap-area';
        document.getElementById('tapLabel').innerText = "検証再生中";
        
        const fullSource = audioCtx.createBufferSource();
        fullSource.buffer = audioBuf;
        fullSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime;
        scanOffsets[currentPhase-1] = 0; // 表示用オフセットリセット
        fullSource.start(startTime);
        isPlaying = true;

        const interval = 60 / finalBpm;
        const bestOffset = ((p1.absPos % interval) + (p2.absPos % interval) + (p3.absPos % interval)) / 3;

        for (let i = 0; i < (audioBuf.duration / interval) + 1; i++) {
            const t = startTime - bestOffset + (i * interval);
            if (t >= startTime) scheduleTick(t);
        }
    }

    function scheduleTick(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1000, t);
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
        // ビジュアルフィードバック
        setTimeout(() => {
            const f = document.getElementById('beatIndicator');
            f.classList.add('on');
            setTimeout(() => f.classList.remove('on'), 50);
        }, (t - audioCtx.currentTime) * 1000);
    }
</script>
</body>
</html>
