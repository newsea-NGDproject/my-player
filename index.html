<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoriRun Ver.9 - STEP 1-B 実験場</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            margin: 0; padding: 20px;
            color: #1c1c1e;
        }
        .container {
            max-width: 500px; margin: 0 auto;
            background: #fff; padding: 20px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { font-size: 1.4rem; margin-top: 0; text-align: center; }
        
        /* 予告メッセージ用ボックス */
        .alert-info {
            background-color: #f0f7ff; border: 1px solid #d1d1d6;
            padding: 15px; border-radius: 12px;
            font-size: 0.88rem; line-height: 1.5; margin-bottom: 20px;
        }
        
        /* 実験用のでかいボタン */
        .scan-btn {
            display: block; width: 100%; box-sizing: border-box;
            background: #007aff; color: white; border: none;
            padding: 18px; font-size: 1.1rem; font-weight: bold;
            border-radius: 15px; cursor: pointer; text-align: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }
        .scan-btn:active { transform: scale(0.98); }

        /* 隠しインプット（JavaScriptから裏でクリックする） */
        #file-input { display: none; }

        /* 実験結果ログ表示エリア */
        .log-box {
            margin-top: 20px; background: #1c1c1e; color: #34c759;
            font-family: monospace; padding: 15px; border-radius: 12px;
            font-size: 0.85rem; max-height: 250px; overflow-y: auto;
        }
        .log-entry { margin-bottom: 4px; line-height: 1.4; }
        .log-success { color: #34c759; }
        .log-warn { color: #ff9500; }
    </style>
</head>
<body>

<div class="container">
    <h2>STEP 1-B 独立実験場</h2>
    
    <div class="alert-info">
        <strong>🛡️ 恐怖のメッセージ発動テスト</strong><br>
        下のボタンをタップすると、スマホのOSから<br>
        <strong>「ファイルの表示とコピーを許可しますか？」</strong><br>
        という確認画面が即座に立ち上がります。これが1-Aで予告した安心のセキュリティ関門です！
    </div>

    <button class="scan-btn" id="mock-trigger-btn">【実験用】音楽フォルダを選択</button>
    
    <input type="file" id="file-input" webkitdirectory directory multiple>

    <div class="log-box" id="log-output">
        <div class="log-entry">システム待機中... ボタンを押してくれ！</div>
    </div>
</div>

<script>
/**
 * NoriRun Ver.9 - STEP 1-B 独立スキャン実験エンジン
 * (C) 2026 Takehiro & つよぽん
 */

const mockBtn = document.getElementById('mock-trigger-btn');
const fileInput = document.getElementById('file-input');
const logOutput = document.getElementById('log-output');

// ログ画面にリアルタイム出力するヘルパー関数だぜ
function writeLog(text, type = 'success') {
    const div = document.createElement('div');
    div.className = `log-entry ${type === 'warn' ? 'log-warn' : 'log-success'}`;
    div.innerText = text;
    logOutput.appendChild(div);
    logOutput.scrollTop = logOutput.scrollHeight;
}

// 1. ボタンを押したら、隠されたインプットを裏から叩いて「恐怖のメッセージ」を即出すぜ！
mockBtn.addEventListener('click', () => {
    logOutput.innerHTML = ''; // ログをクリア
    writeLog("-> フォルダ選択を要求。OSのダイアログを起動します...");
    fileInput.click(); 
});

// 2. ユーザーがフォルダを承認し、ファイル群を選んだ瞬間に走るスキャンコアロジック
fileInput.addEventListener('change', async (event) => {
    const files = Array.from(event.target.files);
    if (files.length === 0) {
        writeLog("-> キャンセルされました", 'warn');
        return;
    }

    writeLog(`-> 選択された全ファイル数: ${files.length}個。解析を開始します...`);

    // 音声ファイル（mp3, m4a, wav）だけをフィルタリングするぜ
    const audioFiles = files.filter(file => {
        const ext = file.name.split('.').pop().toLowerCase();
        return ['mp3', 'm4a', 'wav'].includes(ext);
    });

    writeLog(`-> 対象となる音声ファイル数: ${audioFiles.length}個`);

    // IndexedDB（NoriRunDB）を開くぜ！（1-Aと全く同じ名前のデータベース）
    const dbOpenRequest = indexedDB.open("NoriRunDB", 1);

    dbOpenRequest.onupgradeneeded = (e) => {
        // 万が一ストアが作られていなかったときのためのセーフティネット
        const db = e.target.result;
        if (!db.objectStoreNames.contains('music_library')) {
            db.createObjectStore('music_library', { keyPath: 'file_path' });
        }
    };

    dbOpenRequest.onsuccess = (e) => {
        const db = e.target.result;
        processScan(db, audioFiles);
    };

    dbOpenRequest.onerror = () => {
        writeLog("![エラー] IndexedDBのオープンに失敗しました", 'warn');
    };
});

// 3. 重複をチェックしながら、設計図通りの構造でIndexedDBへ保存する心臓部だぜ！
function processScan(db, audioFiles) {
    // 読み込みと書き込みの両方を行うトランザクションを開始
    const tx = db.transaction('music_library', 'readwrite');
    const store = tx.objectStore('music_library');

    let newSavedCount = 0;
    let skippedCount = 0;

    // まずは現在すでにデータベースに入っている曲のリスト（背番号一覧）を一発で全取得する
    const getAllKeysRequest = store.getAllKeys();

    getAllKeysRequest.onsuccess = () => {
        const existingKeys = new Set(getAllKeysRequest.result);

        audioFiles.forEach(file => {
            const fileName = file.name; // ブラウザ仕様に基づき、ファイル名そのものを主キーにするぜ

            // 【竹弘定義の重複回避ルール】すでに同じファイル名（背番号）があったら完全スキップ！
            if (existingKeys.has(fileName)) {
                writeLog(`[重複スキップ] ${fileName}`, 'warn');
                skippedCount++;
                return; 
            }

            // テキスト資料「Ver 9.1 仕様書」に完全合致させた、1曲分の美しいオブジェクトデータ
            const musicData = {
                file_path: fileName,            // 1. 主キー（重複不可）
                title: "",                      // 2. タグ内曲名（初期値は空文字、本番時にタグ解析）
                artist: "",                     // 3. アーティスト名（初期値は空文字）
                duration: 0,                    // 4. 元の曲の長さ（初期値0）
                mix_duration: 0,                // 5. 【竹弘考案】ノリノリRun時の実効接続長さ（初期値0）
                is_analyzed: false,             // 6. 【竹弘定義】手動タップ補正クオリティフラグ（初期値false）
                tag_bpm: null,                  // 7. タグ内BPM（初期値null）
                baseBPM: 120,                   // 8. 基本テンポ初期値（つよぽん案に基づき120をセット）
                userBPM: null,                  // 9. 確定ユーザーBPM（初期値null）
                manualBPM: null,                // 10. 手動計測BPM（初期値null）
                startTS: 0,                     // 11. 1箇所目の1拍目（初期値0）
                endTS: 0,                       // 12. 2箇所目の1拍目（初期値0）
                tick13TS: 0,                    // 13. 微調整用13拍目（初期値0）
                cover_art: null                 // 14. 【拡張機能用】可変・大容量画像用に構造の一番最後へ配置！
            };

            // データベースにガシッと保存
            store.put(musicData);
            writeLog(`[新規登録成功] ${fileName}`);
            newSavedCount++;
            
            // 処理中に次々と重複判定ができるように、既存セットにも名前を足しておくぜ
            existingKeys.add(fileName);
        });
    };

    // すべての保存処理が完全にコミットされたら呼ばれる最終結果報告
    tx.oncomplete = () => {
        writeLog("=========================================");
        writeLog(`🎉 スキャン完了！完了報告：`);
        writeLog(`・新しく登録された曲: ${newSavedCount} 件`);
        writeLog(`・重複で安全に飛ばされた曲: ${skippedCount} 件`);
        writeLog("=========================================");
        alert(`音楽スキャン実験完了！\n新規登録: ${newSavedCount}件\nスキップ: ${skippedCount}件`);
    };

    tx.onerror = (e) => {
        writeLog(`![エラー] データベース書き込み中に問題が発生しました: ${e.target.error}`, 'warn');
    };
}
</script>
</body>
</html>
