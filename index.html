<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13=0 接続テストモジュール V4.5</title>
    <style>
        :root { --bg: #1a1a1a; --text: #e0e0e0; --accent: #00ffcc; --warn: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .monitor { background: #000; border: 2px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; }
        .status-lamp { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #333; margin-right: 8px; }
        .lamp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .step-box { border: 1px solid #444; padding: 15px; border-radius: 8px; }
        button { background: #333; color: var(--text); border: 1px solid var(--accent); padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .slider-group { margin-top: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--accent); }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .val { float: right; color: var(--warn); }
    </style>
</head>
<body>

    <h2>📘 13=0 接続テストモジュール <small>V4.5</small></h2>

    <div class="monitor">
        <div>D1: <span id="d1-info">No Data</span> | D2: <span id="d2-info">No Data</span></div>
        <div style="font-size: 1.5rem; margin: 10px 0;">
            COUNT: <span id="timer-display">-00.000s</span>
        </div>
        <div>
            <span id="res-lamp" class="status-lamp"></span> RESERVATION: <span id="res-status">WAITING</span>
        </div>
        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">
            Target BPM: <span id="target-bpm-val">---</span> | Pitch: <span id="pitch-val">1.000</span>
        </div>
    </div>

    <div class="control-panel">
        <div class="step-box">
            <h3>検証ステップ</h3>
            <button id="btn-step1">STEP 1: 資産ロード</button><br><br>
            <button id="btn-step2" disabled>STEP 2: L1逆算同期</button><br><br>
            <button id="btn-final" disabled>FINAL: 総合接続試験</button><hr>
            <button id="btn-stop" style="border-color: #ff4444; color: #ff4444;">STOP (Emergency)</button>
        </div>

        <div class="step-box">
            <h3>リアルタイム・ミキサー</h3>
            <div class="slider-group">
                <label>L1 Vol (先行曲) <span id="l1-vol-val" class="val">0.5</span></label>
                <input type="range" id="l1-vol" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-group">
                <label>L2 Vol (後続曲) <span id="l2-vol-val" class="val">0.5</span></label>
                <input type="range" id="l2-vol" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-group" style="border-top: 1px dashed #555; padding-top: 10px;">
                <label>🛡️ レイテンシ補正 (ms) <span id="latency-val" class="val">0</span></label>
                <input type="range" id="latency-adj" min="-200" max="200" step="1" value="0">
            </div>
            <div class="slider-group">
                <label>検証モード選択</label>
                <select id="mode-select" style="width:100%; background:#222; color:#fff; padding:5px;">
                    <option value="seamless">シームレスモード (重なり検証)</option>
                    <option value="brain-sync">脳内整理モード (本番フェード検証)</option>
                </select>
            </div>
        </div>
    </div>

    <audio id="audio1" preload="auto"></audio>
    <audio id="audio2" preload="auto"></audio>

<script>
/**
 * 🎙️ つよぽん's Logic Core
 * 最強仕様書 V4.5 準拠
 */

class ConnectionEngine {
    constructor() {
        this.ctx = null;
        this.deck1 = { audio: document.getElementById('audio1'), gainRes: null, gainMan: null };
        this.deck2 = { audio: document.getElementById('audio2'), gainRes: null, gainMan: null };
        this.clickBuffer = null;
        this.isReserved = false;
        
        // 精度規定：丸め処理 (toFixed)
        this.clean = (val, dec) => parseFloat(parseFloat(val).toFixed(dec));
    }

    async step1_LoadAssets() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        
        // click.wav ロード（AudioBuffer化で遅延抹殺）
        try {
            const res = await fetch('click.wav');
            const ab = await res.arrayBuffer();
            this.clickBuffer = await this.ctx.decodeAudioData(ab);
            document.getElementById('btn-step2').disabled = false;
            console.log("STEP 1 OK: Click logic initialized.");
        } catch (e) {
            alert("click.wavが見つからないぜ！同じフォルダに置いてくれ。");
        }
    }

    async startTest(isFinal = false) {
        // localStorageからクレンジング済みデータを取得
        const d1 = JSON.parse(localStorage.getItem('d1_data') || '{"bpm":128, "endTS":30}');
        const d2 = JSON.parse(localStorage.getItem('d2_data') || '{"bpm":128, "startTS":5}');
        const targetBPM = this.clean(d1.bpm, 2);
        const pitch = 1.0; // 本来は計算式が入る

        // 13=0 物理同期計算 (図解準拠)
        const beatDur = this.clean(60 / targetBPM, 3);
        const endTS = this.clean(d1.endTS, 3);
        const l2StartInL1 = endTS - beatDur; // 0拍目
        
        // ノード構築（第7章：直列ゲイン）
        this.setupGraph();

        // 再生開始（EndTSの25秒前からスタートして20秒予約を検証）
        const startOffset = endTS - 25;
        this.deck1.audio.currentTime = startOffset;
        this.deck1.audio.play();

        // 監視ループ
        const monitor = setInterval(() => {
            const curr = this.deck1.audio.currentTime;
            const remain = endTS - curr;
            document.getElementById('timer-display').innerText = (remain * -1).toFixed(3) + "s";

            // L4予約トリガー (20秒前、または20秒を切って開始した場合)
            if (!this.isReserved && remain <= 20) {
                this.executeL4Reservation(endTS, beatDur, isFinal);
            }

            if (curr >= endTS + 15) clearInterval(monitor);
        }, 16);
    }

    setupGraph() {
        // L1直列接続 (Source -> ReserveGain -> ManualGain -> Dest)
        const s1 = this.ctx.createMediaElementSource(this.deck1.audio);
        this.deck1.gainRes = this.ctx.createGain();
        this.deck1.gainMan = this.ctx.createGain();
        s1.connect(this.deck1.gainRes).connect(this.deck1.gainMan).connect(this.ctx.destination);

        // L2直列接続
        const s2 = this.ctx.createMediaElementSource(this.deck2.audio);
        this.deck2.gainRes = this.ctx.createGain();
        this.deck2.gainMan = this.ctx.createGain();
        s2.connect(this.deck2.gainRes).connect(this.deck2.gainMan).connect(this.ctx.destination);
    }

    executeL4Reservation(endTS, beatDur, isFinal) {
        const now = this.ctx.currentTime;
        const mode = document.getElementById('mode-select').value;
        const latency = parseInt(document.getElementById('latency-adj').value) / 1000;

        // 脳内整理モード（おもてなしフェード）
        if (mode === 'brain-sync') {
            // L1 フェードアウト (EndTS-12s ～ -2s)
            this.deck1.gainRes.gain.setValueAtTime(1, now + (endTS - 12 - this.deck1.audio.currentTime));
            this.deck1.gainRes.gain.linearRampToValueAtTime(0, now + (endTS - 2 - this.deck1.audio.currentTime));
            
            // L2 フェードイン (EndTS+2s ～ +12s)
            if (isFinal) {
                this.deck2.gainRes.gain.setValueAtTime(0, now + (endTS + 2 - this.deck1.audio.currentTime));
                this.deck2.gainRes.gain.linearRampToValueAtTime(1, now + (endTS + 12 - this.deck1.audio.currentTime));
            }
        }

        // メトロノーム予約 (STEP2以上)
        for (let i = -20; i <= 20; i++) {
            const beatTime = now + (endTS - this.deck1.audio.currentTime) + (i * beatDur) + latency;
            if (beatTime > now) {
                const osc = this.ctx.createBufferSource();
                osc.buffer = this.clickBuffer;
                osc.connect(this.ctx.destination);
                osc.start(beatTime);
            }
        }

        this.isReserved = true;
        document.getElementById('res-lamp').classList.add('lamp-on');
        document.getElementById('res-status').innerText = "RESERVED (L4 ACTIVE)";
    }

    stopAll() {
        location.reload(); // 確実な初期化のためにリロード
    }
}

const engine = new ConnectionEngine();

// UI Events
document.getElementById('btn-step1').onclick = () => engine.step1_LoadAssets();
document.getElementById('btn-step2').onclick = () => engine.startTest(false);
document.getElementById('btn-final').onclick = () => {
    document.getElementById('btn-final').disabled = true; // ピンポン準備想定
    engine.startTest(true);
};
document.getElementById('btn-stop').onclick = () => engine.stopAll();

// リアルタイム・ミキサー反映 (ManualGain層への介入)
document.getElementById('l1-vol').oninput = (e) => {
    const v = e.target.value;
    document.getElementById('l1-vol-val').innerText = v;
    if (engine.deck1.gainMan) engine.deck1.gainMan.gain.value = v;
};
document.getElementById('l2-vol').oninput = (e) => {
    const v = e.target.value;
    document.getElementById('l2-vol-val').innerText = v;
    if (engine.deck2.gainMan) engine.deck2.gainMan.gain.value = v;
};
</script>
</body>
</html>
