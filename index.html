<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13=0 接続テスト V4.5.1 - Sync Fixed</title>
    <style>
        :root { --bg: #1a1a1a; --text: #e0e0e0; --accent: #00ffcc; --warn: #ffcc00; --danger: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .monitor { background: #000; border: 2px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .monitor-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 8px 0; font-family: monospace; }
        .val { color: var(--warn); font-weight: bold; }
        .status-lamp { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #333; margin-right: 5px; }
        .lamp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .step-box { border: 1px solid #444; padding: 15px; border-radius: 10px; background: #222; }
        button { background: #333; color: var(--text); border: 1px solid var(--accent); padding: 12px; cursor: pointer; width: 100%; border-radius: 6px; font-weight: bold; }
        button:disabled { opacity: 0.2; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        .label-sm { font-size: 0.75rem; color: var(--accent); display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2 style="margin-top:0;">🎙️ 接続テスト V4.5.1 <small>Sync-Key Fixed</small></h2>

    <div class="monitor">
        <div class="monitor-row">
            <span>D1(song_0): <span id="d1-stat" class="val">CHECKING...</span></span>
            <span>BPM: <span id="m-bpm1" class="val">--</span> | End: <span id="m-end1" class="val">--</span>s</span>
        </div>
        <div class="monitor-row">
            <span>D2(song_1): <span id="d2-stat" class="val">CHECKING...</span></span>
            <span>BPM: <span id="m-bpm2" class="val">--</span> | Start: <span id="m-start2" class="val">--</span>s</span>
        </div>
        <div style="text-align: center; padding: 15px 0;">
            <div id="timer-display" style="font-size: 2.2rem; color: var(--warn); font-family: monospace;">-00.000s</div>
        </div>
        <div class="monitor-row" style="border:none; font-size: 0.85rem;">
            <span><span id="res-lamp" class="status-lamp"></span> L4 RESERVATION</span>
            <span>Latency: <span id="lat-disp">0</span>ms</span>
        </div>
    </div>

    <div class="control-panel">
        <div class="step-box">
            <span class="label-sm">STEP 1: 資産ロード</span>
            <input type="file" id="f-l1" accept="audio/*" style="font-size:0.7rem; margin-bottom:10px;">
            <input type="file" id="f-l2" accept="audio/*" style="font-size:0.7rem; margin-bottom:10px;">
            <button id="btn-step1">Audio資産 & 準備</button>
        </div>

        <div class="step-box">
            <span class="label-sm">STEP 2 / FINAL: 実行</span>
            <button id="btn-step2" disabled style="margin-bottom:10px;">STEP 2: L1単独同期</button>
            <button id="btn-final" disabled>FINAL: 2曲接続試験</button>
        </div>

        <div class="step-box">
            <span class="label-sm">L1/L2 ミキサー</span>
            <input type="range" id="v1" min="0" max="1" step="0.01" value="0.5">
            <input type="range" id="v2" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="step-box">
            <button id="btn-stop" style="border-color: var(--danger); color: var(--danger);">STOP / RELOAD</button>
            <button onclick="alert(localStorage.getItem('song_0_data'))" style="margin-top:10px; font-size:0.6rem; border-color:#555;">Debug: Storage確認</button>
        </div>
    </div>

    <audio id="a1"></audio><audio id="a2"></audio>

<script>
class ConnectionEngine {
    constructor() {
        this.ctx = null;
        this.d1 = null; this.d2 = null;
        this.deck1 = { el: document.getElementById('a1'), gRes: null, gMan: null, src: null };
        this.deck2 = { el: document.getElementById('a2'), gRes: null, gMan: null, src: null };
        this.clickBuf = null;
        this.isReserved = false;

        // 起動時に「下準備ツール」のキー名でロード
        this.loadFromPrepTool();
    }

    loadFromPrepTool() {
        // キー名を「song_0_data」「song_1_data」に完全アジャスト
        const raw1 = localStorage.getItem('song_0_data');
        const raw2 = localStorage.getItem('song_1_data');

        if (raw1) {
            this.d1 = JSON.parse(raw1);
            document.getElementById('m-bpm1').innerText = parseFloat(this.d1.bpm).toFixed(2);
            document.getElementById('m-end1').innerText = parseFloat(this.d1.endTS).toFixed(3);
            document.getElementById('d1-stat').innerText = "LOADED";
        } else {
            document.getElementById('d1-stat').innerText = "MISSING";
            document.getElementById('d1-stat').style.color = "red";
        }

        if (raw2) {
            this.d2 = JSON.parse(raw2);
            document.getElementById('m-bpm2').innerText = parseFloat(this.d2.bpm).toFixed(2);
            document.getElementById('m-start2').innerText = parseFloat(this.d2.startTS).toFixed(3);
            document.getElementById('d2-stat').innerText = "LOADED";
        } else {
            document.getElementById('d2-stat').innerText = "MISSING";
            document.getElementById('d2-stat').style.color = "red";
        }
    }

    async init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const res = await fetch('click.wav');
            this.clickBuf = await this.ctx.decodeAudioData(await res.arrayBuffer());
            document.getElementById('btn-step2').disabled = false;
            document.getElementById('btn-final').disabled = false;
            alert("準備完了！");
        } catch (e) { alert("click.wavを置いてくれ！"); }
    }

    setupGraph() {
        if (!this.deck1.src) {
            this.deck1.src = this.ctx.createMediaElementSource(this.deck1.el);
            this.deck1.gRes = this.ctx.createGain(); this.deck1.gMan = this.ctx.createGain();
            this.deck1.src.connect(this.deck1.gRes).connect(this.deck1.gMan).connect(this.ctx.destination);
        }
        if (!this.deck2.src) {
            this.deck2.src = this.ctx.createMediaElementSource(this.deck2.el);
            this.deck2.gRes = this.ctx.createGain(); this.deck2.gMan = this.ctx.createGain();
            this.deck2.src.connect(this.deck2.gRes).connect(this.deck2.gMan).connect(this.ctx.destination);
        }
    }

    async run(isFinal) {
        if (!this.d1 || !this.deck1.el.src) return alert("データかファイルがないぜ");
        this.setupGraph();
        this.isReserved = false;
        document.getElementById('res-lamp').classList.remove('lamp-on');

        const endTS = parseFloat(this.d1.endTS);
        const beatDur = 60 / parseFloat(this.d1.bpm);

        this.deck1.el.currentTime = Math.max(0, endTS - 25);
        this.deck1.el.play();

        const timer = setInterval(() => {
            const curr = this.deck1.el.currentTime;
            const remain = endTS - curr;
            document.getElementById('timer-display').innerText = (remain * -1).toFixed(3) + "s";

            if (!this.isReserved && remain <= 20) {
                this.executeL4(endTS, beatDur, isFinal);
            }
            if (curr >= endTS + 10) clearInterval(timer);
        }, 16);
    }

    executeL4(endTS, beatDur, isFinal) {
        const now = this.ctx.currentTime;
        const curr = this.deck1.el.currentTime;

        if (isFinal && this.d2) {
            const startTS2 = parseFloat(this.d2.startTS);
            // 13=0 同期スタート
            const delay = (endTS - beatDur - curr) - (startTS2 - beatDur);
            setTimeout(() => this.deck2.el.play(), delay * 1000);
        }

        for (let i = -20; i <= 20; i++) {
            const bTime = now + (endTS - curr) + (i * beatDur);
            if (bTime > now) {
                const s = this.ctx.createBufferSource(); s.buffer = this.clickBuf;
                s.connect(this.ctx.destination); s.start(bTime);
            }
        }
        this.isReserved = true;
        document.getElementById('res-lamp').classList.add('lamp-on');
    }
}

const engine = new ConnectionEngine();
document.getElementById('f-l1').onchange = (e) => engine.deck1.el.src = URL.createObjectURL(e.target.files[0]);
document.getElementById('f-l2').onchange = (e) => engine.deck2.el.src = URL.createObjectURL(e.target.files[0]);
document.getElementById('btn-step1').onclick = () => engine.init();
document.getElementById('btn-step2').onclick = () => engine.run(false);
document.getElementById('btn-final').onclick = () => engine.run(true);
document.getElementById('btn-stop').onclick = () => location.reload();
document.getElementById('v1').oninput = (e) => engine.deck1.gMan && (engine.deck1.gMan.gain.value = e.target.value);
document.getElementById('v2').oninput = (e) => engine.deck2.gMan && (engine.deck2.gMan.gain.value = e.target.value);
</script>
</body>
</html>
