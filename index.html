<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC MASTER V3.5 - 13=0 Definitive</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #050505; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: #121212; padding: 25px; border-radius: 35px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .monitor { background: #000; padding: 25px; border-radius: 25px; border: 2px solid #00ff88; margin-bottom: 20px; box-shadow: inset 0 0 15px #00ff8833; }
        .timer { font-size: 3.2em; font-weight: 900; font-family: 'Courier New', monospace; color: #00ff88; text-shadow: 0 0 10px #00ff88aa; }
        .status-msg { font-size: 1em; color: #ff00ff; font-weight: bold; margin-top: 8px; text-transform: uppercase; }
        
        .panel { background: #1e1e1e; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #2a2a2a; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: bold; }
        .bpm-val { color: #00ff88; font-size: 1.4em; }
        
        input[type=number] { width: 100px; background: #000; color: #ff00ff; border: 1px solid #444; border-radius: 8px; padding: 8px; font-size: 1.2em; text-align: center; }
        input[type=range] { width: 100%; height: 12px; background: #333; border-radius: 6px; accent-color: #00ff88; margin: 15px 0; }
        
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #888; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .mode-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }

        .btn { width: 100%; padding: 20px; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2em; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-load { background: #007bff; color: white; margin-bottom: 15px; }
        .btn-start { background: #ff00ff; color: white; box-shadow: 0 5px 20px rgba(255,0,255,0.4); }
        .btn-stop { background: #331111; color: #ff6666; font-size: 0.9em; }
        .btn:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="monitor">
        <div id="timerDisplay" class="timer">--:--.--</div>
        <div id="phaseLabel" class="status-msg">WAITING FOR FILES</div>
    </div>

    <div class="panel">
        <div class="label-row">
            <span>MY PITCH (BPM)</span>
            <input type="number" id="targetBpm" value="128.0" step="0.1" onchange="updateInfo()">
        </div>
        <div class="mode-selector">
            <button id="modeSeamless" class="mode-btn active" onclick="setMode('seamless')">シームレス検証</button>
            <button id="modeBrain" class="mode-btn" onclick="setMode('brain')">脳内整理(無音)</button>
        </div>
    </div>

    <div class="panel">
        <div class="label-row"><span>Deck 1 (先行)</span><span id="v1Label">50%</span></div>
        <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.5" oninput="v1Label.innerText=Math.round(this.value*100)+'%'">
        
        <div class="label-row"><span>Deck 2 (後続)</span><span id="v2Label">50%</span></div>
        <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.5" oninput="v2Label.innerText=Math.round(this.value*100)+'%'">
        
        <div style="font-size: 0.7em; color: #00ff88; text-align: left; font-weight: bold;">※爆音メトロノーム常駐 (Deck 1同期)</div>
    </div>

    <button class="btn btn-load" onclick="document.getElementById('f0').click()">🎵 先行曲 選択</button>
    <input type="file" id="f0" accept="audio/*" onchange="setupAudio(0, this)" style="display:none">
    
    <button class="btn btn-load" onclick="document.getElementById('f1').click()">🎵 後続曲 選択</button>
    <input type="file" id="f1" accept="audio/*" onchange="setupAudio(1, this)" style="display:none">

    <button id="startBtn" class="btn btn-start" onclick="beginVerification()" disabled>SYNC VERIFICATION START</button>
    <button class="btn btn-stop" onclick="killSwitch()">EMERGENCY STOP</button>
</div>

<audio id="p1"></audio>
<audio id="p2"></audio>

<script>
    const players = [document.getElementById('p1'), document.getElementById('p2')];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songData = [null, null];
    let verifyMode = 'seamless';
    let isPlaying = false;
    let mainLoop = null;
    let lastBeatCount = -1;

    // 初期化：データ復旧
    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) {
            songData = [JSON.parse(d0), JSON.parse(d1)];
            document.getElementById('targetBpm').value = songData[0].bpm;
            updateStatus();
        }
    };

    function setMode(m) {
        verifyMode = m;
        document.getElementById('modeSeamless').classList.toggle('active', m === 'seamless');
        document.getElementById('modeBrain').classList.toggle('active', m === 'brain');
    }

    function setupAudio(idx, input) {
        const file = input.files[0];
        if (file) {
            players[idx].src = URL.createObjectURL(file);
            updateStatus();
        }
    }

    function updateStatus() {
        if (players[0].src && players[1].src && songData[0]) {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('phaseLabel').innerText = "READY TO SYNC";
        }
    }

    async function beginVerification() {
        if (isPlaying) return;
        await audioCtx.resume();
        isPlaying = true;
        
        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        const exitPoint = songData[0].endTS; 
        const entryPoint = songData[1].startTS;
        const leadTime = 15; // 助走15秒

        // マイピッチ適用
        players[0].playbackRate = targetBpm / songData[0].bpm;
        players[1].playbackRate = targetBpm / songData[1].bpm;

        players[0].currentTime = exitPoint - leadTime;
        players[1].currentTime = entryPoint - leadTime;
        
        // 同時スタート（Deck 2はボリューム0で開始）
        players[0].volume = document.getElementById('vol1').value;
        players[1].volume = 0;
        
        players[0].play();
        players[1].play();

        lastBeatCount = -1;
        document.getElementById('phaseLabel').innerText = "PRE-ROLL SYNC";

        mainLoop = setInterval(() => {
            const cur1 = players[0].currentTime;
            const dist = exitPoint - cur1;
            document.getElementById('timerDisplay').innerText = (dist > 0 ? "-" : "+") + Math.abs(dist).toFixed(2) + "s";

            // メトロノーム：Deck 1の絶対位置から計算（Deck 1が動いている限り正確）
            const beatSec = 60 / songData[0].bpm;
            const currentBeat = Math.floor(cur1 / beatSec);
            if (currentBeat !== lastBeatCount) {
                playClick(audioCtx.currentTime, 2000, 0.8);
                lastBeatCount = currentBeat;
            }

            // ボリューム制御ロジック
            const v1Base = parseFloat(document.getElementById('vol1').value);
            const v2Base = parseFloat(document.getElementById('vol2').value);

            if (verifyMode === 'brain') {
                // 脳内整理モード：フェード＋無音
                if (dist > 2) {
                    players[0].volume = v1Base;
                    players[1].volume = v2Base; // 助走中は手動確認可能
                } else if (dist <= 2 && dist > 0) {
                    players[0].volume = v1Base * (dist / 2);
                    players[1].volume = 0;
                    document.getElementById('phaseLabel').innerText = "FADE OUT...";
                } else if (dist <= 0 && dist > -2) {
                    players[0].volume = 0; // ボリューム0で完走維持
                    players[1].volume = 0;
                    document.getElementById('phaseLabel').innerText = "SILENCE 4s";
                } else if (dist <= -2 && dist > -4) {
                    players[1].volume = v2Base * (Math.abs(dist + 2) / 2);
                    document.getElementById('phaseLabel').innerText = "FADE IN...";
                } else {
                    players[1].volume = v2Base;
                    document.getElementById('phaseLabel').innerText = "SYNC COMPLETE";
                }
            } else {
                // シームレス検証モード
                if (dist > 0) {
                    players[0].volume = v1Base;
                    players[1].volume = v2Base; 
                    document.getElementById('phaseLabel').innerText = "MONITORING...";
                } else {
                    players[0].volume = 0; // 瞬時に切り替え
                    players[1].volume = v2Base;
                    document.getElementById('phaseLabel').innerText = "SWITCHED";
                }
            }
        }, 16);
    }

    function playClick(t, f, v) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.setValueAtTime(f, t);
        g.gain.setValueAtTime(v, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.05);
    }

    function killSwitch() {
        clearInterval(mainLoop);
        players.forEach(p => { p.pause(); p.volume = 0.5; });
        isPlaying = false;
        document.getElementById('timerDisplay').innerText = "--:--.--";
        document.getElementById('phaseLabel').innerText = "STOPPED";
    }
</script>
</body>
</html>
