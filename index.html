<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <title>竹弘の特別プレイヤー Ver 2.0</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #007bff; margin-bottom: 10px; }
        .bpm-view { font-size: 3.5em; font-weight: bold; color: #00ff88; font-family: monospace; line-height: 1.1; }
        .ts-view { font-size: 1.1em; color: #ffcc00; font-family: monospace; margin: 5px 0; }
        .latency-badge { display: inline-block; background: #ff3e3e; color: white; padding: 2px 10px; border-radius: 5px; font-size: 0.9em; font-weight: bold; }

        .guide-text { font-size: 0.9em; color: #00ff88; font-weight: bold; margin: 10px 0; background: rgba(0,255,136,0.1); padding: 5px; border-radius: 5px; }
        .mini-guide { font-size: 0.75em; color: #aaa; margin-top: 4px; text-align: center; }

        .adj-group { background: #2a2a2a; padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #00ff88; text-align: left; }
        .adj-title { font-size: 0.8em; font-weight: bold; margin-bottom: 8px; color: #aaa; }
        .adj-row { display: flex; gap: 5px; }
        .btn-mini { flex: 1; padding: 12px 5px; background: #444; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-bottom: 10px; }
        .btn-next { background: #6f42c1; color: white; }
        .btn-file { background: #007bff; color: white; }
        
        .tap-zone { height: 120px; background: #1a1a1a; border: 3px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; }
        .log { text-align: left; font-family: monospace; font-size: 0.75em; background: #000; padding: 10px; height: 80px; overflow-y: auto; color: #00ff00; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="monitor">
        <div id="modeLabel" style="font-size:0.7em; color:#007bff; font-weight:bold;">READY</div>
        <div id="bpmDisplay" class="bpm-view">---.--</div>
        <div id="tsDisplay" class="ts-view">TS: --.---s</div>
        <div id="latencyDisplay" class="latency-badge">Slide: 0ms</div>
    </div>

    <div class="guide-text">メトロノームの速度を曲に合わせて下さい</div>

    <div id="tapArea" class="tap-zone" style="display:none;">
        <div id="tapLabel" style="font-size: 1.1em; font-weight: bold;">リズムに合わせて12回タップ</div>
        <div id="tapCount" style="font-size: 0.9em; color: #888; margin-top: 5px;">準備完了</div>
    </div>

    <div id="adjustPanel" style="display:none;">
        <div class="adj-group" style="border-color: #00ff88;">
            <div class="adj-title">① BPM微調整（数値を上げると速くなります）</div>
            <div class="adj-row">
                <button class="btn-mini" onclick="adjBpm(-0.1)">-0.1</button>
                <button class="btn-mini" onclick="adjBpm(-0.01)">-0.01</button>
                <button class="btn-mini" onclick="adjBpm(0.01)">+0.01</button>
                <button class="btn-mini" onclick="adjBpm(0.1)">+0.1</button>
            </div>
        </div>

        <div class="adj-group" style="border-color: #ffcc00;">
            <div class="adj-title">② 一拍目位置スライド</div>
            <div class="adj-row">
                <button class="btn-mini" onclick="nudgeLatency(-10)">-10ms</button>
                <button class="btn-mini" onclick="nudgeLatency(-1)">-1ms</button>
                <button class="btn-mini" onclick="nudgeLatency(1)">+1ms</button>
                <button class="btn-mini" onclick="nudgeLatency(10)">+10ms</button>
            </div>
            <div class="mini-guide">※Bluetooth遅延は+250前後が目安です</div>
        </div>
        
        <button class="btn-action btn-next" onclick="proceedToNext()">これで確定！</button>
    </div>

    <button id="fileBtn" class="btn-action btn-file">📁 曲を読み込む</button>
    <div id="logBox" class="log"></div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
    }

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songs = [];
    let currentSongIdx = 0;
    let mode = 'start'; 
    let currentSource = null, startTime = 0, currentOffset = 0;
    let songGain = audioCtx.createGain(); // 楽曲用ボリューム
    songGain.connect(audioCtx.destination);
    songGain.gain.value = 0.5; // 楽曲ボリュームを半分に！

    let tempTaps = [];
    let scheduledTicks = [];
    let currentLatencyTotal = 0;

    const log = (m) => { const b = document.getElementById('logBox'); b.innerHTML = `> ${m}<br>${b.innerHTML}`; };

    document.getElementById('fileBtn').onclick = async () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const buffer = await audioCtx.decodeAudioData(arrayBuffer);
            songs.push({ buffer: buffer, config: { adjBpm: 120, startOff: 0, endOff: 0 } });
            currentSongIdx = songs.length - 1;
            startPhase('start');
        };
        input.click();
    };

    function startPhase(m) {
        mode = m; tempTaps = []; currentLatencyTotal = 0;
        document.getElementById('adjustPanel').style.display = 'none';
        document.getElementById('tapArea').style.display = 'flex';
        document.getElementById('modeLabel').innerText = `SONG ${currentSongIdx + 1}: ${mode.toUpperCase()} ADJ`;
        
        const s = songs[currentSongIdx];
        playAt((mode === 'start') ? 5 : s.buffer.duration - 25, false);
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        e.preventDefault();
        const now = (audioCtx.currentTime - startTime) + currentOffset;
        tempTaps.push(now);
        document.getElementById('tapCount').innerText = `${tempTaps.length} / 12`;
        if (tempTaps.length >= 12) {
            const stable = tempTaps.slice(4);
            let ivls = [];
            for(let i=1; i<stable.length; i++) ivls.push(stable[i] - stable[i-1]);
            const s = songs[currentSongIdx];
            s.config.adjBpm = 60 / (ivls.reduce((a,b)=>a+b, 0) / ivls.length);
            if (mode === 'start') s.config.startOff = stable[0]; else s.config.endOff = stable[0];
            showAdjustPanel();
        }
    };

    function showAdjustPanel() {
        document.getElementById('tapArea').style.display = 'none';
        document.getElementById('adjustPanel').style.display = 'block';
        updateDisplay();
        playAt(currentOffset, true);
    }

    function updateDisplay() {
        const s = songs[currentSongIdx];
        document.getElementById('bpmDisplay').innerText = s.config.adjBpm.toFixed(2);
        const ts = (mode === 'start') ? s.config.startOff : s.config.endOff;
        document.getElementById('tsDisplay').innerText = `TS: ${ts.toFixed(3)}s`;
        document.getElementById('latencyDisplay').innerText = `Slide: ${currentLatencyTotal}ms`;
    }

    function adjBpm(val) { 
        songs[currentSongIdx].config.adjBpm += val; 
        updateDisplay(); 
        playAt(currentOffset, true); // 即座に再生成して鳴らし直す
    }

    function nudgeLatency(ms) {
        const s = songs[currentSongIdx];
        currentLatencyTotal += ms;
        if (mode === 'start') s.config.startOff += (ms/1000); else s.config.endOff += (ms/1000);
        updateDisplay(); 
        playAt(currentOffset, true);
    }

    function playAt(time, withMetronome) {
        stopAll();
        if (!songs[currentSongIdx]) return;
        const s = songs[currentSongIdx];
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = s.buffer;
        currentSource.connect(songGain); // 楽曲用ゲインに接続
        startTime = audioCtx.currentTime; currentOffset = time;
        currentSource.start(0, time);
        if (withMetronome) {
            const ivl = 60 / s.config.adjBpm;
            const anchor = (mode === 'start') ? s.config.startOff : s.config.endOff;
            // メトロノームを即座に鳴らす
            for (let t = anchor - (ivl * 20); t < currentOffset + 30; t += ivl) {
                if (t >= currentOffset) scheduleTick(startTime + (t - currentOffset));
            }
        }
    }

    function scheduleTick(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1500, t);
        g.gain.setValueAtTime(0.5, t); // メトロノーム音量は大きく
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.15);
        scheduledTicks.push(osc);
    }

    function stopAll() {
        if (currentSource) try{currentSource.stop();}catch(e){}
        scheduledTicks.forEach(o => { try{o.stop();}catch(e){} });
        scheduledTicks = [];
    }

    function proceedToNext() {
        if (mode === 'start') startPhase('end');
        else log("BPM確定。次へ進めます。");
    }
</script>
</body>
</html>
