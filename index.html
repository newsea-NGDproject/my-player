<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beat-Link Mod Ver 1.1</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 20px; border: 1px solid #333; }
        
        /* 状態表示パネル */
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #6f42c1; margin-bottom: 10px; }
        .bpm-view { font-size: 2.8em; font-weight: bold; color: #00ff88; font-family: monospace; }
        .status-text { font-size: 0.8em; color: #aaa; margin-top: 5px; }

        /* 2地点アンカー切り替え */
        .anchor-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 12px; background: #333; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9em; border: 2px solid transparent; }
        .tab.active { background: #6f42c1; border-color: #a27dfa; }

        /* タップエリア */
        .tap-zone {
            height: 180px; background: #252525; border: 3px dashed #444; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: none; margin-bottom: 10px;
        }
        .tap-zone:active { background: #333; border-style: solid; border-color: #007bff; }
        .tap-count { font-size: 1.2em; font-weight: bold; }

        /* 聴覚補正コントロール */
        .adj-panel { background: #2a2a2a; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; }
        .nudge-btns { display: flex; gap: 5px; margin-top: 10px; }
        .nudge-btns button { flex: 1; padding: 10px; background: #444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .btn-save { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1em; cursor: pointer; }
        .log { text-align: left; font-family: monospace; font-size: 0.7em; background: #000; padding: 10px; height: 80px; overflow-y: auto; color: #00ff00; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="anchor-tabs">
        <div id="tabStart" class="tab active" onclick="switchAnchor('start')">開始アンカー</div>
        <div id="tabEnd" class="tab" onclick="switchAnchor('end')">終了アンカー</div>
    </div>

    <div class="monitor">
        <div id="bpmDisplay" class="bpm-view">---.--</div>
        <div id="statusLabel" class="status-text">曲を読み込んでください</div>
    </div>

    <div id="tapArea" class="tap-zone">
        <div class="tap-count" id="tapLabel">READY</div>
        <div style="font-size: 0.7em; color: #888; margin-top: 5px;" id="tapSub">タップで計測開始（12回）</div>
    </div>

    <div class="adj-panel">
        <div class="slider-label"><span>遅延補正 (Bluetooth等)</span><span id="valLatency">0ms</span></div>
        <input type="range" id="slipLatency" min="0" max="500" value="0">
        
        <div class="nudge-btns">
            <button onclick="nudge(-0.01)">-0.01s (早める)</button>
            <button onclick="nudge(0.01)">+0.01s (遅らせる)</button>
        </div>
    </div>

    <button id="fileBtn" class="btn-save" style="background:#007bff; margin-bottom:10px;">📁 ファイル読み込み</button>
    <button id="saveBtn" class="btn-save" onclick="saveConfig()">✅ この接続情報を保存</button>
    
    <div id="logBox" class="log"></div>
</div>

<script>
    let audioCtx, audioBuf, currentSource;
    let currentMode = 'start'; // 'start' or 'end'
    let startTime = 0, currentOffset = 0;
    let isPlaying = false;
    let tempTaps = [];
    let scheduledTicks = [];

    // 保存用データ
    let config = {
        bpm: 0,
        startOffset: 0,
        endOffset: 0,
        latency: 0,
        anchorTimes: { start: 0, end: 0 }
    };

    const log = (m) => { const b = document.getElementById('logBox'); b.innerHTML = `> ${m}<br>${b.innerHTML}`; };

    document.getElementById('fileBtn').onclick = async () => {
        try {
            const [fileHandle] = await window.showOpenFilePicker();
            const file = await fileHandle.getFile();
            log(`読み込み: ${file.name}`);
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioBuf = await audioCtx.decodeAudioData(await file.arrayBuffer());
            
            // 事前解析（簡易予約）: 開始5秒後と、終了10秒前をアンカーに設定
            config.anchorTimes.start = 5;
            config.anchorTimes.end = Math.max(0, audioBuf.duration - 15);
            
            document.getElementById('statusLabel').innerText = "解析準備完了";
            switchAnchor('start');
        } catch (e) { log("エラー: " + e.message); }
    };

    function switchAnchor(mode) {
        currentMode = mode;
        document.getElementById('tabStart').classList.toggle('active', mode === 'start');
        document.getElementById('tabEnd').classList.toggle('active', mode === 'end');
        
        currentOffset = config.anchorTimes[mode];
        tempTaps = [];
        document.getElementById('tapLabel').innerText = mode === 'start' ? "開始地点" : "終了地点";
        document.getElementById('tapSub').innerText = "タップして計測(12回)";
        
        playAt(currentOffset);
    }

    function playAt(time) {
        if (!audioBuf) return;
        stopAll();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime;
        currentOffset = time;
        currentSource.start(0, time);
        isPlaying = true;
        
        // メトロノーム再開
        if (config.bpm > 0) scheduleMetronome();
    }

    function stopAll() {
        if (currentSource) currentSource.stop();
        scheduledTicks.forEach(osc => { try { osc.stop(); } catch(e){} });
        scheduledTicks = [];
        isPlaying = false;
    }

    // タップ計測ロジック
    document.getElementById('tapArea').onpointerdown = (e) => {
        if (!isPlaying) return;
        if (navigator.vibrate) navigator.vibrate(20);
        
        const now = (audioCtx.currentTime - startTime) + currentOffset;
        tempTaps.push(now);
        
        const count = tempTaps.length;
        document.getElementById('tapSub').innerText = `計測中: ${count} / 12`;

        // 聴覚化：叩いた瞬間に音を鳴らす（エコー再生）
        scheduleTick(audioCtx.currentTime, 1800);

        if (count >= 12) {
            // 後半8回を採用
            const stable = tempTaps.slice(4);
            
            // 異常値除外と平均BPM算出
            let intervals = [];
            for(let i=1; i<stable.length; i++) intervals.push(stable[i] - stable[i-1]);
            const avgIvl = intervals.reduce((a,b)=>a+b, 0) / intervals.length;
            const detectedBpm = 60 / avgIvl;

            if (currentMode === 'start') {
                config.bpm = detectedBpm;
                config.startOffset = stable[0]; // 最初の杭
                document.getElementById('bpmDisplay').innerText = detectedBpm.toFixed(2);
            } else {
                config.endOffset = stable[0];
            }

            log(`${currentMode}地点 確定: ${stable[0].toFixed(3)}s`);
            tempTaps = [];
            playAt(currentOffset); // 再同期再生
        }
    };

    function scheduleMetronome() {
        if (config.bpm <= 0) return;
        const ivl = 60 / config.bpm;
        const anchor = (currentMode === 'start') ? config.startOffset : config.endOffset;
        const latency = config.latency / 1000;

        // 基準点からメトロノームの網を展開
        for (let t = anchor; t < currentOffset + 30; t += ivl) {
            if (t >= currentOffset) {
                scheduleTick(startTime + (t - currentOffset) + latency, 1500);
            }
        }
        for (let t = anchor - ivl; t >= currentOffset; t -= ivl) {
             scheduleTick(startTime + (t - currentOffset) + latency, 1500);
        }
    }

    function scheduleTick(t, freq) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, t);
        osc.type = 'square';
        g.gain.setValueAtTime(0.4, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.15);
        scheduledTicks.push(osc);
    }

    // 遅延スライダー
    document.getElementById('slipLatency').oninput = (e) => {
        config.latency = parseInt(e.target.value);
        document.getElementById('valLatency').innerText = config.latency + "ms";
        if (isPlaying) playAt(currentOffset); // 即座に反映
    };

    // 微調整（ナッジ）
    function nudge(sec) {
        if (currentMode === 'start') config.startOffset += sec;
        else config.endOffset += sec;
        log(`微調整: ${sec}s (現在: ${(currentMode === 'start' ? config.startOffset : config.endOffset).toFixed(3)}s)`);
        playAt(currentOffset);
    }

    function saveConfig() {
        const result = JSON.stringify(config, null, 2);
        log("--- 接続情報を保存しました ---");
        console.log(result);
        alert("BPM: " + config.bpm.toFixed(2) + " 等の接続情報を保存しました。詳細はコンソールとログを確認してください。");
    }
</script>
</body>
</html>
