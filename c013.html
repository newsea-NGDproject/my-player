settings

<!DOCTYPE html>
<html lang="ja">

<head>

    <!-- ==========================================================
         基本設定
    =========================================================== -->

    <!-- 日本語を使用 -->
    <meta charset="UTF-8">

    <!-- スマホ表示最適化 -->
    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no">

    <!-- PWA設定 -->
    <link rel="manifest" href="manifest.json">

    <!-- Androidアドレスバー色 -->
    <meta name="theme-color" content="#007aff">

    <!-- ブラウザタイトル -->
    <title>

        ノリRun
        Musicフォルダ データ登録

    </title>

    <!-- ==========================================================
         CSS
    =========================================================== -->
    <style>

        /* ======================================================
           NoriRun 共通デザイン
        ====================================================== */

        /*
        ----------------------------------------------------------
        色設定

        NoriRun全体で使用する色です。

        将来テーマカラーを変更する場合は
        この部分だけ修正します。
        ----------------------------------------------------------
        */

        :root{

            --main-blue:#007aff;

            --bg-color:#f2f2f7;

            --card-bg:#ffffff;

            --text-main:#1c1c1e;

            --text-sub:#8e8e93;

            --border-color:#d1d1d6;

        }

        /*
        ----------------------------------------------------------
        画面全体

        bodyは画面全体を意味します。
        htmlとbody両方へ指定しています。

        スマホ画面いっぱいに表示します。
        ----------------------------------------------------------
        */

        html,
        body{

            margin:0;

            padding:0;

            width:100%;

            min-height:100%;

            background:var(--bg-color);

            color:var(--text-main);

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Helvetica Neue",
                sans-serif;

        }

        /*
        ----------------------------------------------------------
        アプリ全体

        appは画面全体をまとめる箱です。

        将来ボタンや一覧が増えても
        この中へ追加していきます。
        ----------------------------------------------------------
        */

        #app{

            max-width:480px;

            margin:0 auto;

            padding:20px;

            box-sizing:border-box;

        }

        /*
        ----------------------------------------------------------
        白いカード

        NoriRunの画面は
        カードを積み重ねるデザインで統一します。
        ----------------------------------------------------------
        */

        .card{

            background:var(--card-bg);

            border-radius:18px;

            padding:20px;

            box-shadow:0 6px 16px rgba(0,0,0,0.08);

        }

        /*
        ----------------------------------------------------------
        タイトル
        ----------------------------------------------------------
        */

        h1{

            margin-top:0;

            text-align:center;

        }

        /*
        ----------------------------------------------------------
        説明文
        ----------------------------------------------------------
        */

        p{

            text-align:center;

            color:var(--text-sub);

            line-height:1.6;

        }

        /*
        ----------------------------------------------------------
        共通ボタン
        ----------------------------------------------------------
        */

        button{

            width:100%;

            padding:16px;

            margin-top:20px;

            border:none;

            border-radius:16px;

            background:var(--main-blue);

            color:white;

            font-size:1rem;

            font-weight:bold;

            cursor:pointer;

        }

        /*
        ----------------------------------------------------------
        ボタンを押した瞬間
        ----------------------------------------------------------
        */

        button:active{

            transform:scale(0.98);

        }

    </style>

</head>

<body>

<!-- ==========================================================
     アプリ画面
========================================================== -->

<div id="app">

    <!-- ======================================================
         メインカード

    <div class="card">

        <!-- 画面タイトル -->

        <h1>

            ノリRun

        </h1>

        <!-- 説明 -->

        <p>

        STEP02以降で

        -->

        <button id="start-button">

            Musicフォルダ確認

        </button>

    </div>

</div>

/* ==========================================================

</script>

</body>

</html>
