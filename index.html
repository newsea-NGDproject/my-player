<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prep Module V1.9.1 - Guarded</title>
    <style>
        /* 竹弘こだわりのV1.2 UIデザインを完全継承 */
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #007bff; margin-bottom: 10px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; }
        .bpm-view { font-size: 3.5em; font-weight: bold; color: #00ff88; font-family: monospace; line-height: 1.1; }
        .ts-view { font-size: 1.1em; color: #ffcc00; font-family: monospace; margin: 5px 0; }
        .latency-badge { display: inline-block; background: #ff3e3e; color: white; padding: 2px 10px; border-radius: 5px; font-size: 0.9em; font-weight: bold; }

        .guide-text { font-size: 0.9em; color: #00ff88; font-weight: bold; margin: 10px 0; background: rgba(0,255,136,0.1); padding: 12px; border-radius: 10px; line-height: 1.4; }
        .adj-group { background: #2a2a2a; padding: 10px; border-radius: 15px; margin-bottom: 8px; border-left: 5px solid #00ff88; text-align: left; }
        .adj-row { display: flex; gap: 5px; }
        .btn-mini { flex: 1; padding: 12px 5px; background: #444; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }

        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-orange { background: #ff8800; color: white; padding: 12px; font-size: 0.95em; }
        
        .tap-zone { height: 150px; background: #1a1a1a; border: 3px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .tap-zone:active { background: #333; }
        
        #finalResult { background: #000; border: 2px solid #00ff88; padding: 12px; border-radius: 15px; text-align: left; display: none; margin-top: 10px; }
        #finalResult pre { white-space: pre-wrap; font-size: 0.82em; color: #00ff88; margin: 0; font-family: monospace; line-height: 1.5; }
        .log { text-align: left; font-family: monospace; font-size: 0.8em; background: #000; padding: 10px; border-radius: 10px; margin-top: 10px; color: #00ff00; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="startMenu">
        <h2 style="color:#007bff;">PREP MODULE V1.9.1</h2>
        <button class="btn-action btn-blue" onclick="initFlow(false)">📁 2曲を新規解析する</button>
        <button id="resumeBtn" class="btn-action btn-green" style="display:none;" onclick="initFlow(true)">✅ 保存データを確認する</button>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="monitor">
            <div id="modeLabel" style="font-size:0.7em; color:#007bff; font-weight:bold;">READY</div>
            <div id="bpmDisplay" class="bpm-view">---.--</div>
            <div id="tsDisplay" class="ts-view">TS: --.---s</div>
            <div id="latencyDisplay" class="latency-badge">Slide: 0ms</div>
        </div>

        <div id="guide" class="guide-text"></div>

        <div id="tapArea" class="tap-zone">
            <div id="tapLabel" style="font-size: 1.1em; font-weight: bold;">リズムに合わせて12回タップ</div>
            <div id="tapCount" style="font-size: 1.2em; color: #00ff88; margin-top: 10px; font-family: monospace;">READY</div>
        </div>

        <div id="adjustPanel" style="display:none;">
            <button id="inheritBtn" class="btn-action btn-orange" style="display:none;" onclick="applyInherit()">
                開始地点のデータを引き継ぐ<br><span id="inheritDataLabel" style="font-size:0.8em;"></span>
            </button>

            <div class="adj-group">
                <div class="adj-row">
                    <button class="btn-mini" onclick="adjBpm(-0.1)">-0.1</button>
                    <button class="btn-mini" onclick="adjBpm(-0.01)">-0.01</button>
                    <button class="btn-mini" onclick="adjBpm(0.01)">+0.01</button>
                    <button class="btn-mini" onclick="adjBpm(0.1)">+0.1</button>
                </div>
            </div>
            <div class="adj-group" style="border-color: #ffcc00;">
                <div class="adj-row">
                    <button class="btn-mini" onclick="nudgeLatency(-10)">-10ms</button>
                    <button class="btn-mini" onclick="nudgeLatency(-1)">-1ms</button>
                    <button class="btn-mini" onclick="nudgeLatency(1)">+1ms</button>
                    <button class="btn-mini" onclick="nudgeLatency(10)">+10ms</button>
                </div>
            </div>
            <button id="confirmBtn" class="btn-action btn-green" onclick="confirmPhase()">これで確定、次へ</button>
        </div>
    </div>

    <div id="finalResult">
        <h4 style="margin:0 0 10px 0; color:#00ff88; text-align:center;">🎉 全解析データ取得完了</h4>
        <pre id="storageView"></pre>
        <button class="btn-action btn-blue" style="margin-top:15px; padding:12px;" onclick="location.reload()">最初からやり直す</button>
    </div>

    <div id="logBox" class="log">> Standby...</div>
</div>

<script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let currentSongIdx = 0, phase = 'start'; 
    let songBuffers = [null, null];
    let songResults = [{ bpm: 120, startTS: 0, endTS: 0, latency: 0 }, { bpm: 120, startTS: 0, endTS: 0, latency: 0 }];
    let aPointCache = { bpm: 0, latencyMs: 0 };
    let currentSource = null, startTime = 0, currentOffset = 0;
    let songGain = audioCtx.createGain(); 
    songGain.connect(audioCtx.destination); songGain.gain.value = 0.5;
    let tempTaps = [], scheduledTicks = [];

    // ★ガードレール用変数
    let isTransitioning = false;

    window.onload = () => {
        if(localStorage.getItem("song_0_data") && localStorage.getItem("song_1_data")) {
            document.getElementById('resumeBtn').style.display = 'block';
        }
    };

    function initFlow(resume) {
        if (!resume) { localStorage.clear(); startFilePick(); } else { showFinal(); }
    }

    async function startFilePick() {
        const input = document.createElement('input'); input.type = 'file'; input.multiple = true;
        input.onchange = async (e) => {
            if(e.target.files.length < 2) return alert("2曲選んでくれ！");
            document.getElementById('startMenu').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            songBuffers[0] = await audioCtx.decodeAudioData(await e.target.files[0].arrayBuffer());
            songBuffers[1] = await audioCtx.decodeAudioData(await e.target.files[1].arrayBuffer());
            startAnalyze(0, 'start');
        };
        input.click();
    }

    function startAnalyze(sIdx, p) {
        currentSongIdx = sIdx; phase = p; tempTaps = [];
        
        // ガード発動：遷移直後は入力を受け付けない
        isTransitioning = true;
        
        document.getElementById('adjustPanel').style.display = 'none';
        document.getElementById('inheritBtn').style.display = 'none';
        document.getElementById('tapArea').style.display = 'flex';
        document.getElementById('tapCount').innerText = "WAIT...";
        document.getElementById('tapCount').style.color = "#ff3e3e";
        
        const label = document.getElementById('modeLabel');
        label.innerText = `SONG ${sIdx+1} [${phase.toUpperCase()}]`;
        label.style.color = (phase === 'start') ? "#007bff" : "#ffcc00"; // Aは青、Bは黄色
        
        document.getElementById('guide').innerText = `【曲${sIdx+1}：${phase === 'start' ? 'A地点' : 'B地点'}】\n12回タップしてくれ！`;

        const pos = (phase === 'start') ? 5 : songBuffers[sIdx].duration - 25;
        playAt(pos, false);

        // 350ms後にロック解除
        setTimeout(() => {
            isTransitioning = false;
            document.getElementById('tapCount').innerText = "READY";
            document.getElementById('tapCount').style.color = "#00ff88";
        }, 350);
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        e.preventDefault();
        if (isTransitioning) return; // ロック中は何もしない

        const now = (audioCtx.currentTime - startTime) + currentOffset;
        tempTaps.push(now);
        document.getElementById('tapCount').innerText = `TAP: ${tempTaps.length} / 12`;
        
        if (tempTaps.length >= 12) {
            const stable = tempTaps.slice(4); 
            const ts = stable[0];
            const ivls = [];
            for(let i=1; i<stable.length; i++) ivls.push(stable[i] - stable[i-1]);
            const tappedBpm = 60 / (ivls.reduce((a,b)=>a+b, 0) / ivls.length);

            if (phase === 'start') {
                songResults[currentSongIdx].bpm = tappedBpm;
                songResults[currentSongIdx].startTS = ts;
                songResults[currentSongIdx].latency = 0;
            } else {
                songResults[currentSongIdx].endTS = ts;
                songResults[currentSongIdx].bpm = tappedBpm;
                document.getElementById('inheritBtn').style.display = 'block';
                document.getElementById('inheritDataLabel').innerText = `(BPM: ${aPointCache.bpm.toFixed(2)} / Slide: ${aPointCache.latencyMs}ms)`;
            }
            showAdjust();
        }
    };

    function applyInherit() {
        songResults[currentSongIdx].bpm = aPointCache.bpm;
        songResults[currentSongIdx].latency = aPointCache.latencyMs;
        songResults[currentSongIdx].endTS += (aPointCache.latencyMs / 1000);
        updateDisplay();
        playAt(currentOffset, true);
    }

    function showAdjust() {
        document.getElementById('tapArea').style.display = 'none';
        document.getElementById('adjustPanel').style.display = 'block';
        document.getElementById('guide').innerText = "メトロノームに合わせて微調整だ！";
        updateDisplay();
        playAt(currentOffset, true);
    }

    function updateDisplay() {
        document.getElementById('bpmDisplay').innerText = songResults[currentSongIdx].bpm.toFixed(2);
        const ts = (phase === 'start') ? songResults[currentSongIdx].startTS : songResults[currentSongIdx].endTS;
        document.getElementById('tsDisplay').innerText = `TS: ${ts.toFixed(3)}s`;
        document.getElementById('latencyDisplay').innerText = `Slide: ${songResults[currentSongIdx].latency}ms`;
    }

    function adjBpm(v) { songResults[currentSongIdx].bpm += v; updateDisplay(); playAt(currentOffset, true); }
    function nudgeLatency(ms) {
        songResults[currentSongIdx].latency += ms;
        if(phase === 'start') songResults[currentSongIdx].startTS += (ms/1000); else songResults[currentSongIdx].endTS += (ms/1000);
        updateDisplay(); playAt(currentOffset, true);
    }

    function confirmPhase() {
        if (phase === 'start') {
            aPointCache.bpm = songResults[currentSongIdx].bpm;
            aPointCache.latencyMs = songResults[currentSongIdx].latency;
            startAnalyze(currentSongIdx, 'end');
        } else {
            localStorage.setItem(`song_${currentSongIdx}_data`, JSON.stringify(songResults[currentSongIdx]));
            if (currentSongIdx === 0) { startAnalyze(1, 'start'); } else { stopAll(); showFinal(); }
        }
    }

    function playAt(time, metronome) {
        stopAll();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = songBuffers[currentSongIdx];
        currentSource.connect(songGain);
        startTime = audioCtx.currentTime; currentOffset = time;
        currentSource.start(0, time);
        if(metronome) {
            const ivl = 60 / songResults[currentSongIdx].bpm;
            const anchor = (phase === 'start') ? songResults[currentSongIdx].startTS : songResults[currentSongIdx].endTS;
            for (let t = anchor - (ivl * 100); t < currentOffset + 60; t += ivl) {
                if (t >= currentOffset) scheduleTick(startTime + (t - currentOffset));
            }
        }
    }

    function scheduleTick(t) {
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1500, t); g.gain.setValueAtTime(0.6, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.15);
        scheduledTicks.push(osc);
    }

    function stopAll() {
        if(currentSource) try{currentSource.stop();}catch(e){}
        scheduledTicks.forEach(o => { try{o.stop();}catch(e){} });
        scheduledTicks = [];
    }

    function showFinal() {
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('finalResult').style.display = 'block';
        const d0 = JSON.parse(localStorage.getItem("song_0_data"));
        const d1 = JSON.parse(localStorage.getItem("song_1_data"));
        let res = `【曲1】\n BPM: ${d0.bpm.toFixed(2)}\n START: ${d0.startTS.toFixed(3)}s\n END: ${d0.endTS.toFixed(3)}s\n Slide: ${d0.latency}ms\n\n`;
        res += `【曲2】\n BPM: ${d1.bpm.toFixed(2)}\n START: ${d1.startTS.toFixed(3)}s\n END: ${d1.endTS.toFixed(3)}s\n Slide: ${d1.latency}ms`;
        document.getElementById('storageView').innerText = res;
    }

    const log = (m) => { document.getElementById('logBox').innerHTML = `> ${m}`; };
</script>
</body>
</html>
