<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white; display: flex;
            justify-content: center; align-items: center; text-align: center;
            z-index: 1000; padding: 20px; font-size: 1.2em; line-height: 1.8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message"></div>
</div>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status">フォルダを認証してください</div>
    <div class="controls">
        <button id="addSongs">📂 曲を選択して追加</button>
        <button id="savePlaylist">💾 プレイリスト保存</button>
        <button id="loadPlaylist">📑 読込</button>
        <button onclick="resetFolder()" style="background:#666;">🔄 フォルダ変更</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    const audioPlayer = new Audio();
    let playlist = { songs: [] };
    let rootHandle = null;

    // 1. 起動時のフォルダ認証
    window.onload = async () => {
        const savedHandle = await getSavedHandle();
        const msgDiv = document.getElementById('message');
        if (savedHandle) {
            rootHandle = savedHandle;
            msgDiv.innerHTML = `おかえりなさい！<br>前回設定したフォルダへの<br>アクセス再開を承諾お願いします。<br><br>[ タップで承諾 ]`;
        } else {
            msgDiv.innerHTML = `セキュリティ承諾をお願いします。<br>この後、2つの許可画面が出ますので<br>どちらも『許可』を選択してください。<br><br>[ タップで開始 ]`;
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                rootHandle = await window.showDirectoryPicker();
                await saveHandle(rootHandle);
            } else {
                const permission = await rootHandle.requestPermission({ mode: 'readwrite' });
                if (permission !== 'granted') return;
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (err) { alert("認証に失敗しました。"); }
    }

    // 2. ここが重要！「認証したフォルダの中から曲を選んで追加」する機能
    document.getElementById('addSongs').addEventListener('click', async () => {
        if (!rootHandle) return alert("先にフォルダを認証してください");
        try {
            // 認証済みのフォルダ(Musicなど)を初期位置として、ファイル選択を開く
            const fileHandles = await window.showOpenFilePicker({
                multiple: true,
                startIn: rootHandle,
                types: [{
                    description: '音楽ファイル',
                    accept: { 'audio/*': ['.mp3', '.m4a', '.wav'] }
                }]
            });

            for (const handle of fileHandles) {
                const file = await handle.getFile();
                playlist.songs.push({ name: handle.name, handle: handle, file: file, userBPM: 0 });
            }
            renderPlaylist();
        } catch (err) { console.error("選択キャンセル:", err); }
    });

    // プレイリストの表示と再生
    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>▶ ${song.name}</span>`;
            li.onclick = async () => {
                // ファイルの実体を取得して再生
                const file = await song.handle.getFile();
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.play();
                document.getElementById('status').innerText = `再生中: ${song.name}`;
            };
            list.appendChild(li);
        });
    }

    // --- フォルダ記憶・IndexedDBロジック ---
    async function saveHandle(h) { const db = await openDB(); await db.put("config", h, "rootFolder"); }
    async function getSavedHandle() { const db = await openDB(); return await db.get("config", "rootFolder"); }
    function openDB() { return new Promise(r => { const req = indexedDB.open("PlayerDB", 1); req.onupgradeneeded = () => req.result.createObjectStore("config"); req.onsuccess = () => { const db = req.result; r({ put: (s, v, k) => new Promise(res => db.transaction(s, "readwrite").objectStore(s).put(v, k).onsuccess = res), get: (s, k) => new Promise(res => db.transaction(s).objectStore(s).get(k).onsuccess = e => res(e.target.result)) }); }; }); }
    function resetFolder() { indexedDB.deleteDatabase("PlayerDB"); location.reload(); }
</script>
</body>
</html>
