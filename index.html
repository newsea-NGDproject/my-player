<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Module V1.6 - Stable Pitch</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #ff00ff; margin-bottom: 10px; }
        .status-text { font-size: 1em; color: #00ff88; font-family: monospace; }
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-magenta { background: #ff00ff; color: white; }
        .bpm-input { width: 100%; background: #000; border: 1px solid #444; color: #00ff88; font-size: 2em; text-align: center; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        audio { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff00ff; margin:0 0 15px 0;">LINK MODULE V1.6</h2>
    <div class="monitor">
        <div id="linkStatus" class="status-text">音源をロードしてください</div>
        <div id="timerDisplay" style="font-size: 2.5em; font-weight: bold; font-family: monospace;">00:00.00</div>
    </div>

    <div style="text-align:left; padding:10px;">
        <button class="btn-action btn-blue" onclick="document.getElementById('file1').click()">🎵 曲1 ロード</button>
        <input type="file" id="file1" accept="audio/*" onchange="loadAudio(0, this)" style="display:none">
        
        <button class="btn-action btn-blue" onclick="document.getElementById('file2').click()">🎵 曲2 ロード</button>
        <input type="file" id="file2" accept="audio/*" onchange="loadAudio(1, this)" style="display:none">

        <label style="color:#888; font-size:0.8em;">目標BPM</label>
        <input type="number" id="targetBpm" class="bpm-input" value="128.0" step="0.1">
    </div>

    <button id="previewBtn" class="btn-action btn-magenta" onclick="startLink()" disabled>🔗 接続テスト（ピッチ安定版）</button>
    <button class="btn-action" style="background:#550000; color:#ff8888;" onclick="stopAll()">STOP</button>
</div>

<audio id="player0" controls></audio>
<audio id="player1" controls></audio>

<script>
    let players = [document.getElementById('player0'), document.getElementById('player1')];
    let songData = [null, null];
    let isPlaying = false;
    let timerIdx = null;

    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) {
            songData[0] = JSON.parse(d0);
            songData[1] = JSON.parse(d1);
        }
    };

    function loadAudio(idx, input) {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        players[idx].src = url;
        players[idx].load();
        
        // Ver 8.5と同じピッチ維持設定を強制
        players[idx].preservesPitch = true;
        players[idx].mozPreservesPitch = true;
        players[idx].webkitPreservesPitch = true;

        document.getElementById('linkStatus').innerText = `曲${idx+1} READY`;
        if (players[0].src && players[1].src) document.getElementById('previewBtn').disabled = false;
    }

    function startLink() {
        if (isPlaying) return;
        isPlaying = true;

        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        
        // 曲1の設定
        const rate1 = targetBpm / songData[0].bpm;
        players[0].playbackRate = rate1;
        players[0].volume = 1.0;

        // 曲2の設定
        const rate2 = targetBpm / songData[1].bpm;
        players[1].playbackRate = rate2;
        players[1].volume = 0; // 最初は消音

        const bPoint = songData[0].endTS;
        const startOffset = bPoint - 10; // 10秒前から
        
        players[0].currentTime = Math.max(0, startOffset);
        players[0].play();

        // 監視ループ
        const checkInterval = 20; // 20msごとにチェック
        let s2Started = false;

        timerIdx = setInterval(() => {
            const now1 = players[0].currentTime;
            document.getElementById('timerDisplay').innerText = now1.toFixed(2) + "s";

            // 接続の4拍前からフェード準備と曲2スタート
            const beatSec = 60 / targetBpm;
            const fadeDur = beatSec * 4;
            const linkTime = bPoint;

            // 曲2のスタートタイミング判定（実時間ではなく曲内秒数で計算）
            if (!s2Started && now1 >= linkTime - (fadeDur / 2) * rate1) {
                const s2Offset = (songData[1].startTS + (songData[1].latency/1000)) - (fadeDur / 2) * rate2;
                players[1].currentTime = Math.max(0, s2Offset);
                players[1].play();
                s2Started = true;
                document.getElementById('linkStatus').innerText = "CROSSFADING...";
            }

            // フェード処理（簡易版）
            if (s2Started) {
                const progress = (now1 - (linkTime - (fadeDur/2)*rate1)) / (fadeDur * rate1);
                if (progress >= 0 && progress <= 1) {
                    players[0].volume = Math.max(0, 1 - progress);
                    players[1].volume = Math.min(1, progress);
                } else if (progress > 1) {
                    players[0].volume = 0;
                    players[1].volume = 1;
                    players[0].pause();
                    document.getElementById('linkStatus').innerText = "CONNECTED";
                    clearInterval(timerIdx);
                }
            }
        }, checkInterval);
    }

    function stopAll() {
        players.forEach(p => { p.pause(); p.currentTime = 0; });
        clearInterval(timerIdx);
        isPlaying = false;
        document.getElementById('linkStatus').innerText = "STOPPED";
    }
</script>
</body>
</html>
