<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoriRun Ver.9.3 - メインメニュー極上ドラッグ実験場</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            margin: 0; padding: 15px;
            color: #1c1c1e;
            -webkit-user-select: none; user-select: none;
            overflow-y: scroll; /* リスト移動中も画面が安定する防壁 */
        }
        .container {
            max-width: 500px; margin: 0 auto;
            background: #fff; padding: 15px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { font-size: 1.3rem; margin-top: 0; text-align: center; margin-bottom: 15px; }

        /* --- 📋 曲一覧リストのコンテナ --- */
        .music-list {
            display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }

        /* --- 📐 1つのボタン集約によって極限まで広がった1行のレイアウト --- */
        .music-row {
            display: flex; align-items: center;
            background: #f8f8f8; border-radius: 12px;
            padding: 6px; box-sizing: border-box;
            border: 1px solid #e5e5ea;
            height: 56px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            touch-action: pan-y; /* 通常の上下スクロールを邪魔しない */
        }

        /* 🔳 左右ボタン共通の正方形ベース（44px × 44px） */
        .square-btn {
            display: flex; align-items: center; justify-content: center;
            background: #ffffff; border: 1px solid #d1d1d6;
            border-radius: 10px; cursor: pointer;
            box-sizing: border-box; flex-shrink: 0;
            width: 44px; height: 44px;
        }
        .norinori-btn { font-size: 1.2rem; }
        .norinori-btn:active { background: #e5e5ea; }

        /* 🎨 【右端：並び替え専用ボタン】通常時はスタイリッシュ・シルバーグレー */
        .sort-handle {
            color: #b1b1b6; /* 上品なシルバーグレー */
            background: #ffffff;
            touch-action: none; /* ここを触った時は画面スクロールを完全に封じ、ドラッグを優先！ */
            cursor: grab;
        }

        /* 🌊 【竹弘指定：アクティブ演出】掴んだ瞬間に美しい海ブルーへフラッシュ！ */
        .sort-handle.active-blue {
            color: #00a2ff !important; /* 鮮烈なコバルトブルー */
            border-color: #00a2ff !important;
            background: #e6f6ff;
            cursor: grabbing;
        }

        /* 🚀 【竹弘指定：空中浮遊エフェクト】1.03倍に拡大し、海ブルーの影を纏う */
        .music-row.dragging {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0, 162, 255, 0.25);
            background: #ffffff;
            border-color: #00a2ff;
            z-index: 999;
        }

        /* 🌟 【中央スペース】ボタン削減により、竹弘指定の「3 : 2」で広々と分け合う聖域 */
        .title-area {
            flex: 3; min-width: 0;
            padding: 0 10px; overflow: hidden;
            white-space: nowrap; cursor: pointer;
        }
        .artist-area {
            flex: 2; min-width: 0;
            padding: 0 6px; overflow: hidden;
            white-space: nowrap; cursor: pointer;
        }

        /* --- 📜 電光掲示板（パターンB：一律左スクロール1周ストップ） --- */
        .scroll-text {
            display: inline-block; font-size: 0.95rem; font-weight: 600;
            color: #1c1c1e; pointer-events: none;
        }
        .artist-text {
            display: inline-block; font-size: 0.75rem; font-weight: normal;
            color: #8e8e93; pointer-events: none;
        }

        @keyframes marquee-pattern-b {
            0% { transform: translateX(0); }
            75% { transform: translateX(var(--scroll-x)); opacity: 1; }
            80% { transform: translateX(var(--scroll-x)); opacity: 0; }
            81% { transform: translateX(30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .scroll-active {
            animation: marquee-pattern-b var(--scroll-duration) linear 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>メインメニュー（Ver.9.3 ドラッグ版）</h2>
    <div id="menu-list" class="music-list">
        </div>
</div>

<script>
/**
 * NoriRun Ver.9.3 - メインメニュー超絶ドラッグ＆カラーエンジン
 * (C) 2026 Takehiro & つよぽん
 */

let dbInstance = null;
let currentOrderList = []; 
let draggingRow = null; // 現在ドラッグ中の行要素

// 1. 🚀 データベース（Ver 2）に安全接続
window.addEventListener('DOMContentLoaded', () => {
    const request = indexedDB.open("NoriRunDB", 2);
    
    request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('playlists')) {
            db.createObjectStore('playlists', { keyPath: 'playlist_id' });
        }
        if (!db.objectStoreNames.contains('music_library')) {
            db.createObjectStore('music_library', { keyPath: 'file_path' });
        }
    };
    
    request.onsuccess = (e) => {
        dbInstance = e.target.result;
        loadMenuData();
    };

    request.onerror = () => {
        alert("データベースの読み込みに失敗しました。");
    };
});

// 2. データを取得してメインメニューを組み立て
function loadMenuData() {
    if (!dbInstance) return;

    const tx = dbInstance.transaction(['music_library', 'playlists'], 'readonly');
    const libraryStore = tx.objectStore('music_library');
    const playlistStore = tx.objectStore('playlists');

    let libraryMap = {};
    
    libraryStore.getAll().onsuccess = (e) => {
        const allSongs = e.target.result;
        allSongs.forEach(song => {
            libraryMap[song.file_path] = song;
        });

        playlistStore.get("main_menu_default").onsuccess = (ev) => {
            const playlistData = ev.target.result;
            
            if (playlistData && playlistData.file_path_list.length > 0) {
                currentOrderList = playlistData.file_path_list.filter(path => libraryMap[path]);
                allSongs.forEach(song => {
                    if (!currentOrderList.includes(song.file_path)) {
                        currentOrderList.push(song.file_path);
                    }
                });
            } else {
                currentOrderList = allSongs.map(song => song.file_path);
            }

            renderList(libraryMap);
        };
    };
}

// 3. 画面のレンダリング ＆ ドラッグソートイベントの組み込み
function renderList(libraryMap) {
    const listContainer = document.getElementById('menu-list');
    listContainer.innerHTML = ''; 

    if (currentOrderList.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center;color:#8e8e93;padding:20px;">曲がありません。音楽スキャンをしてね！</div>';
        return;
    }

    currentOrderList.forEach((filePath, index) => {
        const song = libraryMap[filePath];
        if (!song) return;

        let displayName = song.title || song.file_path;
        let displayArtist = song.artist || "";
        
        // 検証用ダミーデータ（1番目だけ超ロング化）
        if (index === 0) {
            if (displayName.length < 15) displayName = "【ロングテスト】明日への鼓動 - Falcom Sound Team jdk";
            if (displayArtist === "") displayArtist = "Falcom Sound Team jdk Special Running Club";
        } else {
            if (displayArtist === "") displayArtist = "Falcom"; 
        }

        const icon = song.is_analyzed ? "🕺" : "🛌";

        const row = document.createElement('div');
        row.className = 'music-row';
        row.dataset.filePath = filePath;

        // 🛠️ 竹弘指定：極太SVGによる美しい「↕」矢印アイコンを右端に1点集中配置！
        row.innerHTML = `
            <button class="square-btn norinori-btn" onclick="openNoriNori('${filePath}', '${displayName}', this)">${icon}</button>
            
            <div class="title-area" onclick="triggerPatternBMarquee(this)">
                <span class="scroll-text">${displayName}</span>
            </div>
            
            <div class="artist-area" onclick="triggerPatternBMarquee(this)">
                <span class="artist-text">${displayArtist}</span>
            </div>
            
            <button class="square-btn sort-handle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <polyline points="7 7 12 2 17 7"></polyline>
                    <polyline points="7 17 12 22 17 17"></polyline>
                </svg>
            </button>
        `;

        // 🚀 生JSによる最高峰の「するするドラッグソート」イベントをこの行に仕込むぜ！
        const sortHandle = row.querySelector('.sort-handle');
        bindDragAndDropEvents(row, sortHandle);

        listContainer.appendChild(row);
    });
}

// 4. 🕺 【リアルタイムお目覚め連動】
function openNoriNori(filePath, songName, buttonElement) {
    alert(`[ノリノリ設定] ${songName} のタップ補正画面を開発中だぜ！`);
    if (!dbInstance) return;
    
    const tx = dbInstance.transaction('music_library', 'readwrite');
    const store = tx.objectStore('music_library');
    
    store.get(filePath).onsuccess = (e) => {
        const songData = e.target.result;
        if (songData) {
            songData.is_analyzed = true; 
            store.put(songData);
        }
    };
    
    tx.oncomplete = () => {
        buttonElement.textContent = "🕺";
    };
}

// 5. 📜 【パターンB】一律左スクロール1周ストップエンジン
function triggerPatternBMarquee(areaElement) {
    const textElement = areaElement.firstElementChild;
    textElement.classList.remove('scroll-active');
    void textElement.offsetWidth; 
    
    const areaWidth = areaElement.offsetWidth;
    const textWidth = textElement.scrollWidth;
    const speed = 50; 
    
    let scrollDistance = 0;
    if (textWidth > areaWidth) {
        scrollDistance = textWidth - areaWidth + 20;
    } else {
        scrollDistance = textWidth * 0.6; 
    }
    
    const duration = (scrollDistance + areaWidth) / speed;
    textElement.style.setProperty('--scroll-x', `-${scrollDistance}px`);
    textElement.style.setProperty('--scroll-duration', `${duration}s`);
    
    textElement.classList.add('scroll-active');
    
    textElement.addEventListener('animationend', () => {
        textElement.classList.remove('scroll-active');
    }, { once: true });
}

// 6. 🌊 【最重要】するするドラッグ並び替え＆海ブルー変身の完全ローカルロジック
function bindDragAndDropEvents(row, handle) {
    // スマホ・PCの両方で超高速に応答する「ポインターイベント」を採用だぜ！
    handle.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        draggingRow = row;
        
        // 竹弘の指定演出を発動！
        row.classList.add('dragging');          // カードを1.03倍浮遊＆影を出す
        handle.classList.add('active-blue');     // アイコンをきれいな海ブルーへフラッシュ！

        // 【スマホ対応の神技術】指がボタンの外にハミ出ても、追跡を絶対に逃さないロックをかけるぜ
        handle.setPointerCapture(e.pointerId);

        // ガジェット感を極限まで高める「コッ…」という微かな触覚フィードバック（スマホ対応）
        if (navigator.vibrate) {
            navigator.vibrate(15); 
        }
    });

    handle.addEventListener('pointermove', (e) => {
        if (!draggingRow) return;
        e.preventDefault();

        const container = document.getElementById('menu-list');
        // 自分自身（ドラッグ中）以外のすべての行をリストアップ
        const siblings = [...container.querySelectorAll('.music-row:not(.dragging)')];

        // 指の今のY座標を元に、どの曲の間に挿入すべきかをミリ秒単位でミリピクセル自動計算！
        const nextSibling = siblings.find(sibling => {
            const box = sibling.getBoundingClientRect();
            // 他の曲の上下中央線を、竹弘の指が超えたかどうかを検知するぜ
            return e.clientY <= box.top + box.height / 2;
        });

        // DOMの入れ替えを実行！これでまわりの曲たちが「するする〜っ」と滑らかに避けて場所を譲るぜ！
        container.insertBefore(draggingRow, nextSibling);
    });

    handle.addEventListener('pointerup', (e) => {
        if (!draggingRow) return;
        
        // ロックを優しく解除
        handle.releasePointerCapture(e.pointerId);
        
        // 浮遊エフェクトと海ブルーを解除し、元の位置にしっとり着地
        row.classList.remove('dragging');
        handle.classList.remove('active-blue');
        draggingRow = null;

        // ドラッグ終了！最終的に決定した画面の並び順をそのままIndexedDBへ永続保存するぜ！
        saveNewOrderFromDOM();
    });
}

// 7. 決定したDOMの並び順をそのまま引っこ抜いて、IndexedDBへ美しく上書き保存
function saveNewOrderFromDOM() {
    const container = document.getElementById('menu-list');
    const rows = [...container.querySelectorAll('.music-row')];
    
    // 現在画面に並んでいる順番通りにファイルパスを背番号リスト化
    currentOrderList = rows.map(row => row.dataset.filePath);

    if (!dbInstance) return;
    const tx = dbInstance.transaction('playlists', 'readwrite');
    const store = tx.objectStore('playlists');

    const playlistData = {
        playlist_id: "main_menu_default",
        playlist_name: "メイン全曲リスト",
        file_path_list: currentOrderList
    };

    store.put(playlistData);
    
    console.log("[NoriRun] ドラッグによる新しい曲順を完璧にIndexedDBへ記憶したぜ！");
}
</script>
</body>
</html>
