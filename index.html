<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の夢のプレイヤー Ver 5.2</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; flex-grow: 1; min-width: 140px; }
        button:active { filter: brightness(0.8); }

        .bpm-panel { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px solid #dee2e6; text-align: center; }
        .bpm-display { font-size: 1.3em; font-weight: bold; color: #007bff; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .slider-container { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        input[type="range"] { flex-grow: 1; cursor: pointer; height: 8px; border-radius: 5px; background: #ddd; accent-color: #007bff; }
        
        #resetBpmBtn { background: #fff; color: #888; border: 1px solid #ccc; font-size: 0.6em; padding: 4px 10px; border-radius: 20px; min-width: auto; flex-grow: 0; }

        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-info { flex-grow: 1; cursor: pointer; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-bpm-tag { font-size: 0.7em; color: #666; background: #eee; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        
        /* 並べ替え・削除ボタン用コンテナ */
        .item-controls { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 10px; font-size: 0.8em; background: #6c757d; min-width: 35px; flex-grow: 0; }
        .btn-del { background: #dc3545; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; justify-content: center; align-items: center; text-align: center; z-index: 1000; padding: 20px; cursor: pointer; }
        #exit-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 1.5em; }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message">読み込み中...</div>
</div>

<div id="exit-screen">
    <div>🏃‍♂️ プレイヤーを終了しました<br><span style="font-size: 0.6em; color: #aaa;">タブを閉じてください</span></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">📑 プレイリストを選択</h3>
        <div id="playlist-index"></div>
        <hr>
        <button onclick="closeModal()" style="width:100%; background:#666;">閉じる</button>
    </div>
</div>

<div class="player-card">
    <h2>🎵 夢のプレイヤー Ver 5.2</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.85em;">フォルダを認証してください</div>

    <div class="bpm-panel">
        <div class="bpm-display">
            <span id="currentBpmDisplay">---</span> <span style="font-size: 0.6em;">BPM</span>
            <button id="resetBpmBtn">元: <span id="originalBpmValue">---</span></button>
        </div>
        <div class="slider-container">
            <span>🐢</span>
            <input type="range" id="tempoSlider" min="0.5" max="2.0" step="0.01" value="1.0">
            <span>🏃</span>
        </div>
        <div style="font-size: 0.7em; color: #888;">スライダーで調整 / 「元:」でリセット</div>
    </div>
    
    <div class="controls">
        <button id="addSongs" style="background: #007bff;">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="savePlaylist" style="background: #28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;">📑 読込</button>
        <button id="exitBtn" style="background: #343a40;">🚪 終了</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let sourceNode = null;
    let currentBuffer = null;
    let isPlaying = false;
    let playlist = { songs: [] };
    let rootHandle = null;
    let currentPlayingIdx = -1;
    let originalBpm = 0;

    const DB_NAME = "PlayerDB_V5";
    const STORE_LISTS = "playlists";
    const STORE_CONFIG = "config";

    async function openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_LISTS)) db.createObjectStore(STORE_LISTS);
                if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function dbPut(store, key, value) {
        const db = await openDB();
        const tx = db.transaction(store, "readwrite");
        tx.objectStore(store).put(value, key);
    }

    async function dbGet(store, key) {
        const db = await openDB();
        return new Promise(r => db.transaction(store).objectStore(store).get(key).onsuccess = e => r(e.target.result));
    }

    window.onload = async () => {
        const savedHandle = await dbGet(STORE_CONFIG, "rootFolder");
        if (savedHandle) {
            rootHandle = savedHandle;
            document.getElementById('message').innerHTML = "おかえりなさい！<br>[ タップして開始 ]";
        } else {
            document.getElementById('message').innerHTML = "Musicフォルダを選択してください<br>[ タップして選択 ]";
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                rootHandle = await window.showDirectoryPicker();
                await dbPut(STORE_CONFIG, "rootFolder", rootHandle);
            } else {
                if (await rootHandle.requestPermission() !== 'granted') return;
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (e) { alert("認証が必要です"); }
    }

    async function estimateBPM(buffer) {
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        let peaks = [];
        for (let i = 0; i < data.length; i += 441) {
            if (Math.abs(data[i]) > 0.8) peaks.push(i);
        }
        if (peaks.length < 10) return 120;
        let intervals = [];
        for (let i = 1; i < peaks.length; i++) intervals.push(peaks[i] - peaks[i-1]);
        const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
        let bpm = Math.round(60 / (avgInterval / sampleRate));
        while (bpm < 60) bpm *= 2; while (bpm > 180) bpm /= 2;
        return Math.round(bpm);
    }

    async function playSong(idx) {
        if (isPlaying) stopPlayback();
        const song = playlist.songs[idx];
        document.getElementById('status').innerText = "解析中...";
        
        try {
            let h = song.handle || await findFileRecursive(rootHandle, song.name);
            const file = await h.getFile();
            const arrayBuffer = await file.arrayBuffer();
            currentBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            if (!song.baseBpm) song.baseBpm = await estimateBPM(currentBuffer);
            originalBpm = song.baseBpm;
            
            const targetRate = (song.userBpm && song.userBpm !== 0) ? (song.userBpm / originalBpm) : 1.0;
            document.getElementById('tempoSlider').value = targetRate;
            updateBpmDisplay(targetRate);

            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = currentBuffer;
            sourceNode.playbackRate.value = targetRate;
            sourceNode.connect(audioCtx.destination);
            sourceNode.start(0);
            
            currentPlayingIdx = idx;
            isPlaying = true;
            renderPlaylist();
            document.getElementById('status').innerText = `再生中: ${song.name}`;
        } catch (e) { alert("再生エラーが発生しました"); }
    }

    function stopPlayback() {
        if (sourceNode) { sourceNode.stop(); sourceNode = null; }
        isPlaying = false;
        document.getElementById('status').innerText = "停止中";
    }

    function updateBpmDisplay(rate) {
        const currentBpm = Math.round(originalBpm * rate);
        document.getElementById('currentBpmDisplay').innerText = currentBpm;
        document.getElementById('originalBpmValue').innerText = originalBpm;
    }

    document.getElementById('tempoSlider').addEventListener('input', (e) => {
        const rate = parseFloat(e.target.value);
        if (sourceNode) sourceNode.playbackRate.value = rate;
        updateBpmDisplay(rate);
        if (currentPlayingIdx !== -1) playlist.songs[currentPlayingIdx].userBpm = Math.round(originalBpm * rate);
    });

    document.getElementById('resetBpmBtn').addEventListener('click', () => {
        if (originalBpm === 0) return;
        const rate = 1.0;
        document.getElementById('tempoSlider').value = rate;
        if (sourceNode) sourceNode.playbackRate.value = rate;
        updateBpmDisplay(rate);
        if (currentPlayingIdx !== -1) playlist.songs[currentPlayingIdx].userBpm = originalBpm;
    });

    document.getElementById('addSongs').addEventListener('click', async () => {
        try {
            const fileHandles = await window.showOpenFilePicker({ multiple: true, types: [{ accept: {'audio/*': ['.mp3', '.m4a']} }] });
            for (const h of fileHandles) {
                if (!playlist.songs.some(s => s.name === h.name)) {
                    playlist.songs.push({ name: h.name, handle: h, baseBpm: 0, userBpm: 0 });
                }
            }
            renderPlaylist();
        } catch(e){}
    });

    // --- 並べ替え・削除機能 ---
    function moveSong(idx, direction) {
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= playlist.songs.length) return;
        [playlist.songs[idx], playlist.songs[newIdx]] = [playlist.songs[newIdx], playlist.songs[idx]];
        if (currentPlayingIdx === idx) currentPlayingIdx = newIdx;
        else if (currentPlayingIdx === newIdx) currentPlayingIdx = idx;
        renderPlaylist();
    }

    function removeSong(idx) {
        if (confirm("リストから外しますか？")) {
            playlist.songs.splice(idx, 1);
            if (currentPlayingIdx === idx) { stopPlayback(); currentPlayingIdx = -1; }
            else if (currentPlayingIdx > idx) currentPlayingIdx--;
            renderPlaylist();
        }
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            
            const info = document.createElement('div');
            info.className = 'song-info';
            info.innerHTML = `▶ ${song.name} ${song.userBpm ? `<span class="song-bpm-tag">🏃 ${song.userBpm}</span>` : song.baseBpm ? `<span class="song-bpm-tag">${song.baseBpm}</span>` : ''}`;
            info.onclick = () => playSong(i);

            const ctrl = document.createElement('div');
            ctrl.className = 'item-controls';
            
            const upBtn = document.createElement('button'); upBtn.className = 'btn-sm'; upBtn.innerText = '↑';
            upBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, -1); };
            if (i === 0) upBtn.style.visibility = 'hidden';

            const downBtn = document.createElement('button'); downBtn.className = 'btn-sm'; downBtn.innerText = '↓';
            downBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, 1); };
            if (i === playlist.songs.length - 1) downBtn.style.visibility = 'hidden';

            const delBtn = document.createElement('button'); delBtn.className = 'btn-sm btn-del'; delBtn.innerText = '❌';
            delBtn.onclick = (e) => { e.stopPropagation(); removeSong(i); };

            ctrl.appendChild(upBtn); ctrl.appendChild(downBtn); ctrl.appendChild(delBtn);
            li.appendChild(info); li.appendChild(ctrl);
            list.appendChild(li);
        });
    }

    document.getElementById('savePlaylist').addEventListener('click', async () => {
        let name = prompt("プレイリスト名", "マイリスト");
        if (!name) return;
        const data = { songs: playlist.songs.map(s => ({name: s.name, baseBpm: s.baseBpm, userBpm: s.userBpm})), updatedAt: new Date().toLocaleString() };
        await dbPut(STORE_LISTS, name, data);
        alert("保存しました！");
    });

    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        const db = await openDB();
        const keys = await new Promise(r => db.transaction(STORE_LISTS).objectStore(STORE_LISTS).getAllKeys().onsuccess = e => r(e.target.result));
        const indexDiv = document.getElementById('playlist-index');
        indexDiv.innerHTML = '';
        for (const key of keys) {
            const data = await dbGet(STORE_LISTS, key);
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div>📑 ${key}</div><div style="font-size:0.7em; color:#888;">${data.updatedAt || ''}</div>`;
            div.onclick = () => { playlist.songs = data.songs; renderPlaylist(); closeModal(); };
            indexDiv.appendChild(div);
        }
        document.getElementById('modal').style.display = 'flex';
    });

    async function findFileRecursive(h, name) {
        for await (const e of h.values()) {
            if (e.kind === 'file' && e.name === name) return e;
            if (e.kind === 'directory') { const r = await findFileRecursive(e, name); if (r) return r; }
        }
        return null;
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('stopBtn').addEventListener('click', stopPlayback);
    document.getElementById('exitBtn').addEventListener('click', () => { if(confirm("終了しますか？")){ stopPlayback(); document.getElementById('exit-screen').style.display = 'flex'; } });
</script>
</body>
</html>
