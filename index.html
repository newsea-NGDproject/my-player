<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13=0 接続検証 V4.6.2 - Dynamic Pitch</title>
    <style>
        :root { --bg: #121212; --text: #e0e0e0; --accent: #00ffcc; --warn: #ffcc00; --danger: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; padding: 15px; line-height: 1.4; }
        .monitor { background: #000; border: 2px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,255,204,0.2); position: relative; }
        .monitor::before { content: "L4 STATUS MONITOR"; position: absolute; top: -10px; left: 10px; background: var(--bg); padding: 0 5px; font-size: 0.7rem; color: var(--accent); }
        .monitor-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 8px 0; }
        .val { color: var(--warn); font-weight: bold; }
        .status-lamp { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #333; margin-right: 5px; vertical-align: middle; }
        .lamp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .timer { font-size: 2.5rem; text-align: center; color: var(--warn); margin: 10px 0; text-shadow: 0 0 5px var(--warn); }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .panel { background: #1e1e1e; border: 1px solid #444; padding: 12px; border-radius: 8px; }
        .label { font-size: 0.7rem; color: var(--accent); margin-bottom: 5px; display: block; }
        button { background: #333; color: var(--text); border: 1px solid var(--accent); padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; margin-top: 5px; }
        button:active { background: var(--accent); color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="number"], input[type="file"] { background: #000; color: var(--accent); border: 1px solid #444; padding: 5px; width: 100%; box-sizing: border-box; }
        .mixer { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        input[type="range"] { accent-color: var(--accent); }
    </style>
</head>
<body>

    <div class="monitor">
        <div class="monitor-row">
            <span>D1: <span id="d1-tag">--</span></span>
            <span>BPM: <span id="d1-bpm" class="val">--</span> | End: <span id="d1-end" class="val">--</span>s</span>
        </div>
        <div class="monitor-row">
            <span>D2: <span id="d2-tag">--</span></span>
            <span>BPM: <span id="d2-bpm" class="val">--</span> | Start: <span id="d2-start" class="val">--</span>s</span>
        </div>
        <div class="timer" id="timer">-00.000</div>
        <div class="monitor-row" style="border:none;">
            <span><span id="res-lamp" class="status-lamp"></span> L4 RESERVATION</span>
            <span>Rate: <span id="rate-disp" class="val">1.000</span></span>
        </div>
    </div>

    <div class="control-grid">
        <div class="panel">
            <span class="label">STEP 1: ASSETS & PITCH</span>
            <input type="file" id="f1" accept="audio/*" style="font-size:0.7rem; margin-bottom:5px;">
            <input type="file" id="f2" accept="audio/*" style="font-size:0.7rem; margin-bottom:5px;">
            <div style="display:flex; align-items:center; gap:5px; margin-top:5px;">
                <span style="font-size:0.6rem;">MyPitch:</span>
                <input type="number" id="inp-pitch" value="120.00" step="0.01" style="width:70px;">
                <span style="font-size:0.6rem;">BPM</span>
            </div>
            <button id="btn-load">資産ロード(STEP 1)</button>
        </div>

        <div class="panel">
            <span class="label">STEP 2 / FINAL</span>
            <button id="btn-step2" disabled>L1 逆算同期試験</button>
            <button id="btn-final" disabled>総合接続試験</button>
            <button id="btn-stop" style="border-color:var(--danger); color:var(--danger); margin-top:15px;">STOP / RESET</button>
        </div>

        <div class="panel" style="grid-column: span 2;">
            <span class="label">REAL-TIME MIXER & LATENCY</span>
            <div class="mixer">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                    <span>L1 Vol: <input type="range" id="v1" min="0" max="1" step="0.01" value="0.5"></span>
                    <span>L2 Vol: <input type="range" id="v2" min="0" max="1" step="0.01" value="0.5"></span>
                </div>
                <div style="font-size:0.7rem;">
                    Latency Adj: <input type="range" id="lat-adj" min="-200" max="200" step="1" value="0">
                    <span id="lat-val">0</span>ms
                </div>
            </div>
        </div>
    </div>

    <audio id="a1"></audio><audio id="a2"></audio>

<script>
class ConnectionEngineV462 {
    constructor() {
        this.ctx = null;
        this.d1 = null; this.d2 = null;
        this.deck1 = { el: document.getElementById('a1'), gRes: null, gMan: null, src: null };
        this.deck2 = { el: document.getElementById('a2'), gRes: null, gMan: null, src: null };
        this.clickBuf = null;
        this.isReserved = false;
        this.timerId = null;
        this.initData();
    }

    initData() {
        const raw1 = localStorage.getItem('song_0_data');
        const raw2 = localStorage.getItem('song_1_data');
        if (raw1) {
            this.d1 = JSON.parse(raw1);
            document.getElementById('d1-tag').innerText = "LOADED";
            document.getElementById('d1-bpm').innerText = parseFloat(this.d1.bpm).toFixed(2);
            document.getElementById('d1-end').innerText = parseFloat(this.d1.endTS).toFixed(3);
        }
        if (raw2) {
            this.d2 = JSON.parse(raw2);
            document.getElementById('d2-tag').innerText = "LOADED";
            document.getElementById('d2-bpm').innerText = parseFloat(this.d2.bpm).toFixed(2);
            document.getElementById('d2-start').innerText = parseFloat(this.d2.startTS).toFixed(3);
        } else {
            console.warn("song_1_data(L2)が見つかりません。これは仕様書上の『致命的な不具合』です。");
        }
    }

    async load() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const res = await fetch('click.wav');
            const arrayBuf = await res.arrayBuffer();
            this.clickBuf = await this.ctx.decodeAudioData(arrayBuf);
            document.getElementById('btn-step2').disabled = false;
            document.getElementById('btn-final').disabled = false;
            alert("V4.6.2 資産ロード完了。マイピッチ計算準備OKだぜ。");
        } catch (e) {
            alert("click.wavのロードに失敗。サーバー直下に置いてくれ！");
        }
    }

    setupNodes() {
        if (!this.deck1.src) {
            this.deck1.src = this.ctx.createMediaElementSource(this.deck1.el);
            this.deck1.gRes = this.ctx.createGain(); // L4予約用
            this.deck1.gMan = this.ctx.createGain(); // 手動スライダー用
            this.deck1.src.connect(this.deck1.gRes).connect(this.deck1.gMan).connect(this.ctx.destination);
        }
        if (!this.deck2.src) {
            this.deck2.src = this.ctx.createMediaElementSource(this.deck2.el);
            this.deck2.gRes = this.ctx.createGain();
            this.deck2.gMan = this.ctx.createGain();
            this.deck2.src.connect(this.deck2.gRes).connect(this.deck2.gMan).connect(this.ctx.destination);
        }
    }

    async run(isFinal) {
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        this.setupNodes();
        this.isReserved = false;
        document.getElementById('res-lamp').classList.remove('lamp-on');

        const myBPM = parseFloat(document.getElementById('inp-pitch').value).toFixed(2);
        const oriBPM = parseFloat(this.d1.bpm).toFixed(2);
        const rate = (myBPM / oriBPM).toFixed(3);
        const endTS = parseFloat(this.d1.endTS).toFixed(3);
        const beatDurReal = (60 / myBPM).toFixed(3);

        this.deck1.el.playbackRate = rate;
        document.getElementById('rate-disp').innerText = rate;

        // 20秒前地点から再生開始（伸縮考慮）
        this.deck1.el.currentTime = Math.max(0, endTS - 20);
        this.deck1.el.play();

        this.timerId = setInterval(() => {
            const curr = this.deck1.el.currentTime;
            const remainReal = (endTS - curr) / rate;
            document.getElementById('timer').innerText = (remainReal * -1).toFixed(3);

            // 20秒前予約トリガー発火
            if (!this.isReserved && remainReal <= 20.0) {
                this.executeL4(endTS, rate, beatDurReal, isFinal);
            }
            if (curr >= endTS + 15) clearInterval(this.timerId);
        }, 16);
    }

    executeL4(endTS, rate, beatDur, isFinal) {
        const now = this.ctx.currentTime;
        const curr = this.deck1.el.currentTime;
        const lat = parseInt(document.getElementById('lat-adj').value) / 1000;
        const remainReal = (endTS - curr) / rate;

        // L3メトロノーム逆算予約（EndTSを基準に前後40拍分）
        for (let n = -30; n <= 10; n++) {
            const beatTime = now + remainReal + (n * beatDur) + lat;
            if (beatTime > now) {
                const s = this.ctx.createBufferSource();
                s.buffer = this.clickBuf;
                s.connect(this.ctx.destination);
                s.start(beatTime);
            }
        }

        if (isFinal && this.d2) {
            const startTS2 = parseFloat(this.d2.startTS);
            // 13=0 物理同期：L1のEndTSとL2の0拍目を重ねる
            // L2の0拍目は startTS2 - (60 / L2BPM)
            const l2BeatDur = (60 / (this.d2.bpm * rate)).toFixed(3); 
            const l2Offset = (startTS2 / rate) - (60 / (this.d2.bpm * rate)); 
            
            // 簡略化：L1の接続点(remainReal後)にL2の0拍目が来るように
            setTimeout(() => {
                this.deck2.el.playbackRate = rate;
                this.deck2.el.currentTime = 0; // 0拍目付近の処理は別途要調整
                this.deck2.el.play();
            }, remainReal * 1000);
        }

        this.isReserved = true;
        document.getElementById('res-lamp').classList.add('lamp-on');
    }

    stop() {
        if (this.ctx) this.ctx.close();
        location.reload();
    }
}

const engine = new ConnectionEngineV462();
document.getElementById('f1').onchange = (e) => engine.deck1.el.src = URL.createObjectURL(e.target.files[0]);
document.getElementById('f2').onchange = (e) => engine.deck2.el.src = URL.createObjectURL(e.target.files[0]);
document.getElementById('btn-load').onclick = () => engine.load();
document.getElementById('btn-step2').onclick = () => engine.run(false);
document.getElementById('btn-final').onclick = () => engine.run(true);
document.getElementById('btn-stop').onclick = () => engine.stop();
document.getElementById('v1').oninput = (e) => engine.deck1.gMan && (engine.deck1.gMan.gain.value = e.target.value);
document.getElementById('v2').oninput = (e) => engine.deck2.gMan && (engine.deck2.gMan.gain.value = e.target.value);
document.getElementById('lat-adj').oninput = (e) => {
    document.getElementById('lat-val').innerText = e.target.value;
};
</script>
</body>
</html>
