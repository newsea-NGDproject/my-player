<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Module V2.6 - Focus Sync</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #ff00ff; margin-bottom: 10px; }
        .control-panel { background: #2a2a2a; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; color: #00ff88; font-weight: bold; margin-bottom: 5px; font-size: 0.85em; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff00ff; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 6px; }
        .btn-magenta { background: #ff00ff; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .bpm-input { width: 100%; background: #000; color: #00ff88; font-size: 1.8em; text-align: center; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff00ff; margin:0 0 10px 0;">LINK MODULE V2.6</h2>
    
    <div class="monitor">
        <div id="linkStatus" style="color: #00ff88;">READY</div>
        <div id="timerDisplay" style="font-size: 2.2em; font-weight: bold; font-family: monospace;">00:00.00</div>
    </div>

    <div class="control-panel">
        <div class="label-row">
            <span>曲の音量 (0.0 - 0.5)</span>
            <span id="volVal">0.30</span>
        </div>
        <input type="range" id="volSlider" min="0" max="0.5" step="0.01" value="0.30" oninput="updateVolume(this.value)">
    </div>

    <div class="control-panel">
        <div class="label-row">
            <span>接続点オフセット (ms)</span>
            <span id="offsetVal">0 ms</span>
        </div>
        <input type="range" id="offsetSlider" min="-500" max="500" value="0" oninput="updateOffset(this.value)">
    </div>

    <div style="background:#2a2a2a; padding:12px; border-radius:15px; margin-bottom:10px; text-align:left;">
        <label style="color:#bbb; font-size:0.75em;">目標BPM</label>
        <input type="number" id="targetBpm" class="bpm-input" value="128.0" step="0.1">
    </div>

    <button class="btn-action btn-blue" onclick="document.getElementById('file0').click()">🎵 曲1 ロード</button>
    <input type="file" id="file0" accept="audio/*" onchange="loadAudio(0, this)" style="display:none">
    
    <button class="btn-action btn-blue" onclick="document.getElementById('file1').click()">🎵 曲2 ロード</button>
    <input type="file" id="file1" accept="audio/*" onchange="loadAudio(1, this)" style="display:none">

    <button id="previewBtn" class="btn-action btn-magenta" onclick="startTest(0, 1)" disabled>🔗 正接続 (1→2) テスト</button>
    <button id="reverseBtn" class="btn-action btn-magenta" style="background:#aa00aa;" onclick="startTest(1, 0)" disabled>🔄 逆接続 (2→1) テスト</button>

    <button class="btn-action" style="background:#440000; color:#ff8888;" onclick="stopAll()">STOP / RESET</button>
</div>

<audio id="player0"></audio>
<audio id="player1"></audio>

<script>
    const players = [document.getElementById('player0'), document.getElementById('player1')];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songData = [null, null];
    let isPlaying = false;
    let mainLoop = null;
    let lastTickTime = 0;
    let manualOffset = 0;
    let currentVol = 0.3;

    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) songData = [JSON.parse(d0), JSON.parse(d1)];
    };

    function updateVolume(val) {
        currentVol = parseFloat(val);
        document.getElementById('volVal').innerText = currentVol.toFixed(2);
        players.forEach(p => { if(p.volume > 0) p.volume = currentVol; });
    }

    function updateOffset(ms) {
        manualOffset = parseFloat(ms) / 1000;
        document.getElementById('offsetVal').innerText = ms + " ms";
    }

    function loadAudio(idx, input) {
        const file = input.files[0];
        if (!file) return;
        players[idx].src = URL.createObjectURL(file);
        players[idx].load();
        players[idx].preservesPitch = true;
        document.getElementById('linkStatus').innerText = `Song ${idx+1} READY`;
        if (players[0].src && players[1].src) {
            document.getElementById('previewBtn').disabled = false;
            document.getElementById('reverseBtn').disabled = false;
        }
    }

    function startTest(fromIdx, toIdx) {
        if (isPlaying) return;
        stopAll();
        audioCtx.resume();
        isPlaying = true;

        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        const beatSec = 60 / targetBpm;
        const rateF = targetBpm / songData[fromIdx].bpm;
        const rateT = targetBpm / songData[toIdx].bpm;

        players[fromIdx].playbackRate = rateF;
        players[toIdx].playbackRate = rateT;
        players[fromIdx].volume = currentVol;
        players[toIdx].volume = 0;

        const bPoint = songData[fromIdx].endTS;
        const aPoint = songData[toIdx].startTS + (songData[toIdx].latency/1000);

        players[fromIdx].currentTime = Math.max(0, bPoint - 8);
        players[fromIdx].play();

        let s2Started = false;

        mainLoop = setInterval(() => {
            const nowF = players[fromIdx].currentTime;
            const nowT = players[toIdx].currentTime;
            const displayTime = s2Started ? nowT : nowF;
            document.getElementById('timerDisplay').innerText = displayTime.toFixed(2) + "s";

            // 接続判定
            if (!s2Started && nowF >= (bPoint + manualOffset * rateF)) {
                players[toIdx].currentTime = aPoint;
                players[fromIdx].volume = 0; players[fromIdx].pause();
                players[toIdx].volume = currentVol; players[toIdx].play();
                s2Started = true;
                document.getElementById('linkStatus').innerText = "SWITCHED";
            }

            // 同一音色メトロノーム
            const curCtxTime = audioCtx.currentTime;
            const currentSongTime = s2Started ? nowT : nowF;
            const syncBase = s2Started ? aPoint : bPoint;
            const rate = s2Started ? rateT : rateF;

            const diff = (currentSongTime - syncBase) / rate;
            const nextTickIn = (Math.ceil(diff / beatSec) * beatSec) - diff;

            if (nextTickIn > 0 && nextTickIn < 0.05) {
                const scheduleTime = curCtxTime + nextTickIn;
                if (Math.abs(scheduleTime - lastTickTime) > 0.1) {
                    playUniformTick(scheduleTime);
                    lastTickTime = scheduleTime;
                }
            }
        }, 10);
    }

    function playUniformTick(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(2000, t); // 全編2000Hzで統一
        osc.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.7, t); // メトロノームはハッキリ
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.1);
    }

    function stopAll() {
        players.forEach(p => { p.pause(); p.currentTime = 0; });
        clearInterval(mainLoop);
        isPlaying = false;
        lastTickTime = 0;
        document.getElementById('linkStatus').innerText = "STOPPED";
    }
</script>
</body>
</html>
