<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <title>Song Connect Tester V1.3</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #007bff; margin-bottom: 10px; }
        .bpm-view { font-size: 2.5em; font-weight: bold; color: #00ff88; font-family: monospace; }
        .guide-text { font-size: 0.9em; color: #00ff88; font-weight: bold; margin: 10px 0; background: rgba(0,255,136,0.1); padding: 8px; border-radius: 5px; }
        
        .panel { background: #2a2a2a; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        .panel-title { font-size: 0.8em; color: #aaa; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-purple { background: #6f42c1; color: white; }
        
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        input[type="number"], input[type="range"] { background: #111; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; width: 80px; }
        input[type="range"] { width: 100%; margin-top: 10px; }

        .log { text-align: left; font-size: 0.75em; background: #000; padding: 10px; height: 60px; overflow-y: auto; color: #00ff00; border-radius: 10px; }
        .tap-zone { height: 80px; background: #1a1a1a; border: 2px dashed #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="monitor">
        <div style="font-size:0.7em; color:#007bff; padding-top:10px;">TARGET RUNNING BPM</div>
        <div id="targetBpmDisp" class="bpm-view">160.0</div>
        <div id="playStatus" style="font-size:0.8em; color:#ffcc00; padding-bottom:10px;">READY</div>
    </div>

    <div id="setupPanel" class="panel">
        <div class="panel-title">1. 解析データの読み込み / 目標設定</div>
        <div class="input-row">
            <span>目標BPM (Run):</span>
            <input type="number" id="targetBpmInput" value="160.0" step="0.1" onchange="updateTargetBpm()">
        </div>
        <button class="btn-action btn-blue" onclick="loadFiles()">📁 2曲読み込んでテスト開始</button>
        <button class="btn-action" style="background:#444; color:#ccc;" onclick="clearStorage()">データをリセット</button>
    </div>

    <div id="testPanel" class="panel" style="display:none;">
        <div class="panel-title">2. 接続シーク (接続点前後 30s)</div>
        <input type="range" id="masterSeek" min="0" max="30" step="0.1" value="0" oninput="seekTest()">
        <div style="display:flex; justify-content:space-between; font-size:0.7em; color:#aaa;">
            <span>1曲目終了 15s前</span>
            <span>2曲目開始 15s後</span>
        </div>
        
        <div class="guide-text" style="margin-top:15px;">接続テスト中：メトロノーム音を重畳</div>
        <button id="playBtn" class="btn-action btn-green" onclick="togglePlay()">PLAY / STOP</button>
    </div>

    <div id="tapPanel" style="display:none;">
        <div id="tapGuide" class="guide-text"></div>
        <div id="tapZone" class="tap-zone">TAP HERE (12回)</div>
    </div>

    <div id="logBox" class="log">> 解析データまたは曲の読み込みを待機中...</div>
</div>

<script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let targetBpm = 160.0;
    let songs = []; // {buffer, bpm, startTS, endTS}
    let isPlaying = false;
    let startTime = 0;
    let seekOffset = 0; // 0=曲1の終了15秒前
    let sources = [];
    let metronomeOscs = [];
    let songGain = audioCtx.createGain();
    songGain.connect(audioCtx.destination);
    songGain.gain.value = 0.5;

    // --- データ保存・読込 ---
    function updateTargetBpm() {
        targetBpm = parseFloat(document.getElementById('targetBpmInput').value);
        document.getElementById('targetBpmDisp').innerText = targetBpm.toFixed(1);
    }

    async function loadFiles() {
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = async (e) => {
            if (e.target.files.length < 2) return alert("2曲選択してください");
            log("曲をデコード中...");
            for (let file of e.target.files) {
                const buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
                // 保存されたデータを検索
                let saved = localStorage.getItem(file.name);
                if (saved) {
                    songs.push({buffer, ...JSON.parse(saved), name: file.name});
                    log(`既知の曲: ${file.name} を読み込みました`);
                } else {
                    // 新規曲の場合は解析へ（今回は簡易的にデフォルト値をセットして後で調整も可能）
                    songs.push({buffer, bpm:120, startTS:5, endTS:buffer.duration-5, name: file.name});
                    log(`新規曲: ${file.name} 解析データが必要です`);
                }
            }
            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('testPanel').style.display = 'block';
            log("準備完了。シークバーで位置を選んでPLAY！");
        };
        input.click();
    }

    function clearStorage() { localStorage.clear(); location.reload(); }
    const log = (m) => { document.getElementById('logBox').innerHTML = `> ${m}`; };

    // --- 再生コアロジック ---
    function togglePlay() {
        if (isPlaying) stopAll(); else playTest();
    }

    function stopAll() {
        isPlaying = false;
        sources.forEach(s => s.stop());
        metronomeOscs.forEach(o => o.stop());
        sources = []; metronomeOscs = [];
        document.getElementById('playBtn').innerText = "PLAY";
        document.getElementById('playStatus').innerText = "STOPPED";
    }

    function playTest() {
        isPlaying = true;
        document.getElementById('playBtn').innerText = "STOP";
        startTime = audioCtx.currentTime;
        
        const s1 = songs[0];
        const s2 = songs[1];
        
        // 速度計算（マイピッチ）
        const rate1 = targetBpm / s1.bpm;
        const rate2 = targetBpm / s2.bpm;

        // 接続点は「1曲目の終了地点」
        // シークバーの0は「1曲目の終了15秒前」
        let currentPosInS1 = (s1.endTS - (15 / rate1)) + (seekOffset / rate1);
        let timeUntilSwitch = 0;
        let s1Started = false;

        // 1曲目の再生が必要な場合
        if (currentPosInS1 < s1.endTS) {
            const src1 = audioCtx.createBufferSource();
            src1.buffer = s1.buffer;
            src1.playbackRate.value = rate1;
            src1.preservesPitch = true; // 宇宙人防止！
            src1.connect(songGain);
            
            timeUntilSwitch = (s1.endTS - currentPosInS1) / rate1;
            src1.start(startTime, currentPosInS1);
            sources.push(src1);
            s1Started = true;
        }

        // 2曲目の予約
        const src2 = audioCtx.createBufferSource();
        src2.buffer = s2.buffer;
        src2.playbackRate.value = rate2;
        src2.preservesPitch = true; // 宇宙人防止！
        src2.connect(songGain);

        let startInS2 = s2.startTS;
        let whenToStartS2 = startTime + timeUntilSwitch;
        
        // すでに2曲目に入っている場合
        if (timeUntilSwitch <= 0) {
            startInS2 = s2.startTS + (Math.abs(timeUntilSwitch) * rate2);
            whenToStartS2 = startTime;
        }

        src2.start(whenToStartS2, startInS2);
        sources.push(src2);

        // メトロノーム予約 (目標BPMで鳴らし続ける)
        const beatIvl = 60 / targetBpm;
        for (let i = 0; i < 40; i++) {
            scheduleTick(startTime + (i * beatIvl));
        }

        document.getElementById('playStatus').innerText = "TESTING CONNECT...";
    }

    function scheduleTick(t) {
        if (t < audioCtx.currentTime) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1200, t);
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
        metronomeOscs.push(osc);
    }

    function seekTest() {
        seekOffset = parseFloat(document.getElementById('masterSeek').value);
        if (isPlaying) {
            stopAll();
            playTest();
        }
    }
</script>
</body>
</html>
