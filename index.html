<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 - Final Master</title>
<style>
:root {
--accent-red: #ff3b30;
--main-blue: #007aff;
--bg-color: #f2f2f7;
--list-bg: #ffffff;
}
body, html {
margin: 0; padding: 0; width: 100%; height: 100%;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background-color: var(--bg-color);
overflow: hidden; touch-action: none;
}

/* 画面切り替え制御 */
.screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; box-sizing: border-box; }
.active { display: flex; }

/* --- [STEP 1-A] 初期設定画面スタイル --- */
#init-screen { padding: 15px; }
h1 { margin: 10px 0 5px; font-size: 1.6rem; color: #1c1c1e; }
.instruction { font-size: 1rem; margin: 0; font-weight: 500; }
.sub-instruction { font-size: 0.85rem; color: #8e8e93; margin-bottom: 10px; }
#pitch-number { font-size: 4rem; font-weight: 900; color: var(--main-blue); line-height: 1; margin: 10px 0; }
#pitch-label { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
.ruler-outer { position: relative; width: 100%; height: 140px; background: #fff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px; }
.center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--accent-red); z-index: 10; transform: translateX(-50%); }
#ruler-canvas { width: 100%; height: 100%; cursor: grab; }
.safety-box { background: #fff; border: 1px solid #d1d1d6; padding: 15px; border-radius: 15px; width: 95%; font-size: 0.85rem; line-height: 1.6; color: #3a3a3c; }
#save-btn { margin-top: auto; margin-bottom: 30px; background: var(--main-blue); color: white; border: none; padding: 16px 80px; font-size: 1.2rem; font-weight: bold; border-radius: 30px; box-shadow: 0 5px 15px rgba(0,122,255,0.3); }

/* --- [STEP 1-B] メインメニュー画面スタイル --- */
#main-menu { background: #fff; }
.menu-header { width: 100%; padding: 15px 20px; background: var(--main-blue); color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; position: sticky; top: 0; z-index: 100; }
.status-lamp { font-size: 0.85rem; display: flex; align-items: center; }
.lamp-dot { width: 10px; height: 10px; border-radius: 50%; margin-left: 6px; background: #999; }
.dot-red { background: #ff453a; animation: blinker 1s linear infinite; }
.dot-green { background: #32d74b; box-shadow: 0 0 8px #32d74b; }
@keyframes blinker { 50% { opacity: 0; } }

#song-list { width: 100%; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.song-item { display: flex; align-items: center; height: 75px; border-bottom: 1px solid #f2f2f7; padding: 0 5px; box-sizing: border-box; }

/* 竹弘指定比率 1:1:3:2:1:1 */
.col-nori { flex: 1; text-align: center; font-size: 1.6rem; }
.col-jacket { flex: 1; display: flex; justify-content: center; }
.col-jacket img { width: 50px; height: 50px; border-radius: 6px; background: #eee; object-fit: cover; }
.col-title { flex: 3; padding: 0 8px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 600; font-size: 0.95rem; }
.col-artist { flex: 2; padding: 0 5px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.8rem; color: #8e8e93; }
.col-up, .col-down { flex: 1; text-align: center; font-size: 1.4rem; color: var(--main-blue); cursor: pointer; }
</style>
</head>
<body>

<div id="init-screen" class="screen">
<h1>初期設定</h1>
<p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
<p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>

<div id="pitch-number">170</div>
<div id="pitch-label">🏃‍♂️ マラソン</div>

<div class="ruler-outer" id="ruler-container">
<div class="center-line"></div>
<canvas id="ruler-canvas"></canvas>
</div>

<div class="safety-box">
🛡️ <strong>安心・安全への取り組み</strong><br>
下記<strong>「設定」</strong>ボタンを押すと
「このサイトにファイルの表示とコピーを許可しますか？ 」
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>

<button id="save-btn">設定</button>
</div>

<div id="main-menu" class="screen">
<div class="menu-header">
<span style="font-weight:bold; font-size:1.1rem">🕺 ノリノリRun再生</span>
<div class="status-lamp" id="status-area">
曲データ取込中 <span id="lamp-dot" class="lamp-dot"></span>
</div>
</div>
<div id="song-list">
</div>
</div>

<script>
/**
• NoriRun Ver.9 - Final Integrated Script
• (C) 2026 Takehiro & つよぽん
*/

const state = {
bpm: 170,
targetBpm: 170,
lastX: 0,
isDragging: false,
db: null,
audioCtx: null
};

// --- [共通] IndexedDB 初期化 ---
async function initDB() {
return new Promise((resolve) => {
const request = indexedDB.open("NoriRunDB", 1);
request.onupgradeneeded = e => {
const db = e.target.result;
if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
if(!db.objectStoreNames.contains('music_library')) db.createObjectStore('music_library', { keyPath: 'file_path' });
};
request.onsuccess = e => {
state.db = e.target.result;
resolve();
};
});
}

// --- [STEP 1-A] 定規ロジック (Ver.8.5 完全継承) ---
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });

function updateBpmDisplay(b) {
let label = "";
if (b <= 120) label = "🚶‍♂️ ウォーキング";
else if (b <= 135) label = "🥁 行進";
else if (b <= 200) label = "🏃‍♂️ マラソン";
else label = "🏎️ 全力ダッシュ！";
document.getElementById('pitch-label').innerText = label;
document.getElementById('pitch-number').innerText = b;
}

function render() {
if (!state.isDragging) {
state.bpm += (state.targetBpm - state.bpm) * 0.25; // 黄金の減衰率
}
const w = canvas.width, h = canvas.height, centerX = w / 2, unitW = 20;
ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
ctx.strokeStyle = '#333'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.font = '14px sans-serif';

for (let i = Math.floor(state.bpm - 60); i <= Math.ceil(state.bpm + 60); i++) {
if (i < 100 || i > 220) continue;
const x = centerX + (i - state.bpm) * unitW;
ctx.beginPath(); ctx.moveTo(x, 0);
if (i % 10 === 0) {
ctx.lineWidth = 2; ctx.lineTo(x, 40);
ctx.fillStyle = '#333'; ctx.fillText(i, x, 60);
} else {
ctx.lineWidth = 1; ctx.lineTo(x, 15);
}
ctx.stroke();
}
updateBpmDisplay(Math.round(state.bpm));
requestAnimationFrame(render);
}

// --- [STEP 1-B] 自動アクセス ＆ おもてなしスキャン ---
async function startNoriRunFlow() {
try {
// 1. フォルダ選択を自動起動 (設定ボタンが承諾の合図)
const dirHandle = await window.showDirectoryPicker();

// 2. musicフォルダの最終確認
if (!confirm(選択した「${dirHandle.name}」フォルダでよろしいですか？`)) return;

// 3. メインメニューへ切り替え
document.getElementById('init-screen').classList.remove('active');
document.getElementById('main-menu').classList.add('active');

// 4. てへぺろランプ点灯 (赤点滅)
const dot = document.getElementById('lamp-dot');
dot.classList.add('dot-red');

// 5. 文字情報の先読み取込
await scanMusicFiles(dirHandle);

// 6. 取込完了 (緑点灯)
dot.classList.remove('dot-red');
dot.classList.add('dot-green');

} catch (err) {
console.error("ユーザーキャンセルまたはエラー:", err);
}
}

async function scanMusicFiles(handle) {
for await (const entry of handle.values()) {
if (entry.kind === 'directory') {
await scanMusicFiles(entry);
} else if (entry.name.match(/.(mp3|wav|m4a|ogg)$/i)) { const file = await entry.getFile(); // IFフォーマットに基づくデータ構築 (文字優先) const songData = { file_path: entry.name + file.size, title: entry.name.replace(/\.[^/.]+$/, ""), // まずはファイル名をタイトルに
artist: "",
nori_data: [] // 空なら 🛌
};

await saveToDB(songData);
renderSongItem(songData);
}
}
}

async function saveToDB(data) {
const tx = state.db.transaction('music_library', 'readwrite');
tx.objectStore('music_library').put(data);
}

function renderSongItem(song) {
const list = document.getElementById('song-list');
const row = document.createElement('div');
row.className = 'song-item';
row.innerHTML = &lt;div class="col-nori"&gt;${song.nori_data.length > 0 ? '🕺' : '🛌'}</div>
<div class="col-jacket"><img src="" alt=""></div>
<div class="col-title">

{song.artist}</div>
<div class="col-up">↑</div>
<div class="col-down">↓</div>
`;
list.appendChild(row);
}

// --- 共通イベント処理 ---
document.getElementById('save-btn').onclick = async () => {
// 1-Aの設定を保存
const tx = state.db.transaction('settings', 'readwrite');
tx.objectStore('settings').put(Math.round(state.bpm), 'my_pitch');
tx.objectStore('settings').put(true, 'init_completed');

// シームレスに1-Bのフォルダアクセスへ
await startNoriRunFlow();
};

function handleStart(x) { state.isDragging = true; state.lastX = x; }
function handleMove(x) {
if (!state.isDragging) return;
const dx = x - state.lastX;
state.targetBpm -= dx / 15;
state.lastX = x;
}
function handleEnd() {
state.isDragging = false;
state.targetBpm = Math.round(state.targetBpm);
}

canvas.addEventListener('touchstart', e => handleStart(e.touches[0].clientX), {passive: false});
window.addEventListener('touchmove', e => handleMove(e.touches[0].clientX), {passive: false});
window.addEventListener('touchend', handleEnd);

// 起動処理
async function startup() {
await initDB();
const tx = state.db.transaction('settings', 'readonly');
const store = tx.objectStore('settings');
const req = store.get('init_completed');

req.onsuccess = () => {
if (req.result) {
document.getElementById('main-menu').classList.add('active');
// ここでDBから既存リストを表示する処理(Ver.9.1予定)
} else {
document.getElementById('init-screen').classList.add('active');
const container = document.getElementById('ruler-container');
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
render();
}
};
}

startup();
</script>
</body>
</html>
