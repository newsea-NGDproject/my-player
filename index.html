<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; }
        button:active { filter: brightness(0.8); }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-info { flex-grow: 1; cursor: pointer; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-controls { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 10px; font-size: 0.8em; background: #6c757d; min-width: 35px; }
        .btn-del { background: #dc3545; }
        
        /* 読込メニュー用モーダル */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; color: #007bff; display: flex; justify-content: space-between; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; justify-content: center; align-items: center; text-align: center; z-index: 1000; padding: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message"></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">📑 プレイリストを選択</h3>
        <div id="playlist-index"></div>
        <hr>
        <button onclick="loadFromFile()" style="width:100%; background:#17a2b8;">📁 ファイルから読み込む</button>
        <button onclick="closeModal()" style="width:100%; margin-top:10px; background:#666;">閉じる</button>
    </div>
</div>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.85em;">フォルダを認証してください</div>
    
    <div class="controls">
        <button id="addSongs" style="background: #007bff;">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="savePlaylist" style="background: #28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;">📑 読込</button>
        <button onclick="resetFolder()" style="background:#666;">🔄 フォルダ変更</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    const audioPlayer = new Audio();
    let playlist = { songs: [] };
    let rootHandle = null;
    let currentPlayingIdx = -1;

    // --- IndexedDB 管理クラス ---
    const DB_NAME = "PlayerDB";
    const STORE_LISTS = "playlists";
    const STORE_CONFIG = "config";

    async function openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_LISTS)) db.createObjectStore(STORE_LISTS);
                if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function dbPut(store, key, value) {
        const db = await openDB();
        return new Promise(r => db.transaction(store, "readwrite").objectStore(store).put(value, key).onsuccess = r);
    }

    async function dbGet(store, key) {
        const db = await openDB();
        return new Promise(r => db.transaction(store).objectStore(store).get(key).onsuccess = e => r(e.target.result));
    }

    async function dbGetAllKeys(store) {
        const db = await openDB();
        return new Promise(r => db.transaction(store).objectStore(store).getAllKeys().onsuccess = e => r(e.target.result));
    }

    async function dbDelete(store, key) {
        const db = await openDB();
        return new Promise(r => db.transaction(store, "readwrite").objectStore(store).delete(key).onsuccess = r);
    }

    // --- 認証まわり ---
    window.onload = async () => {
        const savedHandle = await dbGet(STORE_CONFIG, "rootFolder");
        const msgDiv = document.getElementById('message');
        if (savedHandle) {
            rootHandle = savedHandle;
            msgDiv.innerHTML = `おかえりなさい！<br>Musicフォルダへのアクセスを再開します。<br><br>[ タップして開始 ]`;
        } else {
            msgDiv.innerHTML = `プレイヤーへようこそ。<br>音楽フォルダ（Musicなど）を選択してください。<br><br>[ タップして選択 ]`;
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                rootHandle = await window.showDirectoryPicker();
                await dbPut(STORE_CONFIG, "rootFolder", rootHandle);
            } else {
                const permission = await rootHandle.requestPermission({ mode: 'read' });
                if (permission !== 'granted') return;
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (err) { alert("認証が必要です。"); }
    }

    // --- 曲の管理 ---
    document.getElementById('addSongs').addEventListener('click', async () => {
        if (!rootHandle) return;
        try {
            const fileHandles = await window.showOpenFilePicker({
                multiple: true, startIn: rootHandle,
                types: [{ description: 'Music', accept: { 'audio/*': ['.mp3', '.m4a'] } }]
            });
            for (const handle of fileHandles) {
                if (!playlist.songs.some(s => s.name === handle.name)) {
                    playlist.songs.push({ name: handle.name, handle: handle });
                }
            }
            renderPlaylist();
        } catch (err) { console.error(err); }
    });

    // --- 保存（ダウンロード ＋ 内部記憶） ---
    document.getElementById('savePlaylist').addEventListener('click', async () => {
        if (playlist.songs.length === 0) return alert("曲がありません。");
        
        let fileName = prompt("プレイリストの名前を入力してください", "マイリスト");
        if (!fileName) return;

        const exportData = { songs: playlist.songs.map(s => ({ name: s.name })) };
        
        // 1. 内部メモリに記憶
        await dbPut(STORE_LISTS, fileName, exportData);

        // 2. ダウンロードフォルダに書き出し
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fileName + ".json";
        a.click();
        URL.revokeObjectURL(url);
        
        alert("『" + fileName + "』を保存しました！\n次回から『読込』メニューに表示されます。");
    });

    // --- 読込メニューの表示 ---
    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        const keys = await dbGetAllKeys(STORE_LISTS);
        const indexDiv = document.getElementById('playlist-index');
        indexDiv.innerHTML = '';

        if (keys.length === 0) {
            indexDiv.innerHTML = '<p style="color:#999;">保存されたリストはありません</p>';
        } else {
            keys.forEach(key => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span>📑 ${key}</span><span style="color:#dc3545;" onclick="event.stopPropagation(); deleteList('${key}')">消去</span>`;
                div.onclick = async () => {
                    const data = await dbGet(STORE_LISTS, key);
                    applyPlaylist(data);
                    closeModal();
                };
                indexDiv.appendChild(div);
            });
        }
        document.getElementById('modal').style.display = 'flex';
    });

    async function deleteList(key) {
        if (confirm(`プレイリスト「${key}」を記憶から消去しますか？`)) {
            await dbDelete(STORE_LISTS, key);
            document.getElementById('loadPlaylist').click(); // 再描画
        }
    }

    function applyPlaylist(data) {
        playlist.songs = data.songs.map(s => ({ ...s, handle: null }));
        currentPlayingIdx = -1;
        renderPlaylist();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // 従来のファイルから読み込む機能
    async function loadFromFile() {
        try {
            const [fileHandle] = await window.showOpenFilePicker({
                types: [{ accept: { 'application/json': ['.json'] } }]
            });
            const file = await fileHandle.getFile();
            applyPlaylist(JSON.parse(await file.text()));
            closeModal();
        } catch (e) {}
    }

    // --- その他機能（検索・並び替え・削除・再生）は前回を維持 ---
    async function findFileRecursive(directoryHandle, fileName) {
        for await (const entry of directoryHandle.values()) {
            if (entry.kind === 'file' && entry.name === fileName) return entry;
            if (entry.kind === 'directory') {
                const result = await findFileRecursive(entry, fileName);
                if (result) return result;
            }
        }
        return null;
    }

    function moveSong(idx, direction) {
        const newIdx = idx + direction;
        if (newIdx < 0 || newIdx >= playlist.songs.length) return;
        [playlist.songs[idx], playlist.songs[newIdx]] = [playlist.songs[newIdx], playlist.songs[idx]];
        if (currentPlayingIdx === idx) currentPlayingIdx = newIdx;
        else if (currentPlayingIdx === newIdx) currentPlayingIdx = idx;
        renderPlaylist();
    }

    function removeSong(idx) {
        if (confirm("リストから外しますか？")) {
            playlist.songs.splice(idx, 1);
            if (currentPlayingIdx === idx) { audioPlayer.pause(); currentPlayingIdx = -1; }
            else if (currentPlayingIdx > idx) currentPlayingIdx--;
            renderPlaylist();
        }
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            const info = document.createElement('div');
            info.className = 'song-info';
            info.innerText = `▶ ${song.name}`;
            info.onclick = async () => {
                try {
                    let h = song.handle;
                    if (!h) {
                        document.getElementById('status').innerText = "検索中...";
                        h = await findFileRecursive(rootHandle, song.name);
                    }
                    if (h) {
                        const file = await h.getFile();
                        audioPlayer.src = URL.createObjectURL(file);
                        audioPlayer.play();
                        currentPlayingIdx = i;
                        document.getElementById('status').innerText = `再生中: ${song.name}`;
                        renderPlaylist();
                    } else { alert("見つかりません。Musicフォルダを確認してください。"); }
                } catch (e) { alert("アクセス権を確認してください。"); }
            };
            const ctrl = document.createElement('div');
            ctrl.className = 'item-controls';
            const upBtn = document.createElement('button'); upBtn.className = 'btn-sm'; upBtn.innerText = '↑';
            upBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, -1); };
            if (i === 0) upBtn.style.visibility = 'hidden';
            const downBtn = document.createElement('button'); downBtn.className = 'btn-sm'; downBtn.innerText = '↓';
            downBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, 1); };
            if (i === playlist.songs.length - 1) downBtn.style.visibility = 'hidden';
            const delBtn = document.createElement('button'); delBtn.className = 'btn-sm btn-del'; delBtn.innerText = '❌';
            delBtn.onclick = (e) => { e.stopPropagation(); removeSong(i); };
            ctrl.appendChild(upBtn); ctrl.appendChild(downBtn); ctrl.appendChild(delBtn);
            li.appendChild(info); li.appendChild(ctrl);
            list.appendChild(li);
        });
    }

    document.getElementById('stopBtn').addEventListener('click', () => { audioPlayer.pause(); currentPlayingIdx = -1; renderPlaylist(); });
    function resetFolder() { indexedDB.deleteDatabase(DB_NAME); location.reload(); }
</script>
</body>
</html>
