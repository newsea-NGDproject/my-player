<!-- ==========================================================
     アプリ画面
========================================================== -->

<div id="app">

    <!-- ======================================================
         メインカード
    ======================================================= -->

        <!-- 画面タイトル -->

        <h1>

            ノリRun

        </h1>

        <!-- 説明 -->

        <p>

            Musicフォルダ データ登録

        </p>

        <!--
        STEP01

        Musicフォルダ取得開始ボタン

        現在はまだ押しても処理はありません。

        STEP02以降で
        Musicフォルダ取得処理を追加します。
        -->

        <button id="start-button">

            Musicフォルダ確認

        </button>

</div>

<script>

/* ==========================================================
   JavaScript

   NoriRunでは

   「画面」
   「DB」
   「フォルダ」
   「曲情報」

   の順番でプログラムを並べます。

   どの画面でも同じ並びにすることで、
   後から見ても迷わないようにします。

========================================================== */

// ==========================================================
// 0. 定数定義
// ==========================================================
/*
------------------------------------------------------------

定数とは

一度決めたら変更しない値です。

例えば

DB名

ストア名

画面名

などを書きます。

後で名前を変更するときも、
ここだけ直せば済みます。

------------------------------------------------------------
*/

// ------------------------------
// データベース名
// ------------------------------

const DB_NAME = "NoriRunDB";

// ------------------------------
// IndexedDB Version
//
// Versionが変わると
// onupgradeneeded が実行されます。
// ------------------------------

const DB_VERSION = 1;


// ------------------------------
// ストア名
// ------------------------------

// アプリ設定
const STORE_SETTINGS = "settings";

// 曲マスター
const STORE_MUSIC = "music_library";

// プレイリスト
const STORE_PLAYLISTS = "playlists";

// Musicフォルダ管理
const STORE_FOLDER_ROOTS = "folder_roots";


// ------------------------------
// Musicフォルダ管理番号
//
// c012で保存した
// Musicフォルダを取得するときに使用します。
//
// 将来固定文字列ではなく
// DBから取得する予定です。
// ------------------------------

const ROOT_MUSIC_ID = "root_music";

// ==========================================================
// 1. 画面部品取得
// ==========================================================

/*
------------------------------------------------------------

画面にある部品を取得します。

HTMLで

id="○○"

と書いた部品は

JavaScriptから

getElementById()

で取得できます。

取得すると

文字を書き換えたり

ボタンを押したり

色を変えたりできます。

------------------------------------------------------------
*/


// アプリ全体

const app = document.getElementById("app");


// Musicフォルダ確認ボタン

const startButton =
document.getElementById("start-button");

// ==========================================================
// 2. IndexedDBを開く
// ==========================================================

/*
------------------------------------------------------------

この関数は

NoriRunDBへ接続する共通関数です。

画面のどこからでも

DBを使いたい時は

必ずこの関数を呼びます。

------------------------------------------------------------
*/

function openNoriRunDB(){

    /*
    Promiseとは

    「終わったら教えるよ」

    という約束です。

    IndexedDBは

    開くまで少し時間が掛かるため

    Promiseを使用します。
    */

    return new Promise(

        function(resolve,reject){

            /*
            indexedDB.open()

            DBを開きます。
            */

            const request =
            indexedDB.open(
                DB_NAME,
                DB_VERSION
            );

            /*
            DBが存在しない時だけ
            実行されます。
            */

            request.onupgradeneeded =

            function(event){

                console.log(
                    "NoriRunDB 新規作成"
                );

            };

            /*
            接続成功
            */

            request.onsuccess =

            function(event){

                console.log(
                    "NoriRunDB 接続成功"
                );

                resolve(
                    event.target.result
                );

            };

            /*
            接続失敗
            */

            request.onerror =

            function(){

                reject(
                    "DB接続失敗"
                );

            };

        }

    );

}

// ==========================================================
// 3-1.
// DB共通関数
//
// 1件取得
// ==========================================================

/*
------------------------------------------------------------

この関数は

IndexedDBから

「1件だけ」

データを取得します。

例えば

設定情報

Musicフォルダ情報

1曲だけ

などを取得するときに使用します。

------------------------------------------------------------

使い方

const data =
await idbGet(
    STORE_SETTINGS,
    "volume"
);

------------------------------------------------------------
*/

function idbGet(storeName,key){

    /*
    Promiseを返します。

    asyncを付けることで

    await

    が使えるようになります。
    */

    return new Promise(

        async function(resolve,reject){

            try{

                /*
                DBへ接続
                */

                const db =
                await openNoriRunDB();

                /*
                transaction開始

                readonlyなので

                読むだけです。
                */

                const tx =
                db.transaction(
                    storeName,
                    "readonly"
                );

                /*
                ストア取得
                */

                const store =
                tx.objectStore(
                    storeName
                );

                /*
                指定キー取得
                */

                const request =
                store.get(key);

                /*
                読み込み成功
                */

                request.onsuccess =
                function(){

                    /*
                    DBを閉じる

                    開きっぱなし防止
                    */

                    db.close();

                    /*
                    呼び出し元へ返す
                    */

                    resolve(
                        request.result
                    );

                };

                /*
                読み込み失敗
                */

                request.onerror =
                function(){

                    db.close();

                    reject(
                        "データ取得失敗"
                    );

                };

            }

            /*
            tryの途中で

            エラーになった場合
            */

            catch(error){

                reject(error);

            }

        }

    );

}

// ==========================================================
// 3-2.
// DB共通関数
//
// 1件保存
// ==========================================================

/*
------------------------------------------------------------

この関数は

IndexedDBへ

「1件だけ」

データを保存します。

------------------------------------------------------------

使用例

await idbPut(

    STORE_MUSIC,

    track

);

------------------------------------------------------------

settingsストアだけは

キー(Key)

と

値(Value)

を別々に保存します。

music_libraryなどは

オブジェクトの中に

主キー(track_id)

が入っているので

keyは不要です。

------------------------------------------------------------
*/

function idbPut(storeName,value,key){

    /*
    Promiseを返します。

    保存が終わるまで待つため

    Promiseを使用します。
    */

    return new Promise(

        async function(resolve,reject){

            try{

                /*
                DBへ接続します。
                */

                const db =
                await openNoriRunDB();

                /*
                readwrite

                =

                読み書き可能

                という意味です。

                保存するため

                readonlyではなく

                readwrite

                を使用します。
                */

                const tx =
                db.transaction(

                    storeName,

                    "readwrite"

                );

                /*
                ストア取得
                */

                const store =
                tx.objectStore(

                    storeName

                );

                /*
                keyがあるか判定します。

                settings

                のような

                Key-Value型だけ

                keyを指定します。

                music_library

                は

                track_id

                が入っているので

                key不要です。
                */

                if(key===undefined){

                    store.put(value);

                }
                else{

                    store.put(

                        value,

                        key

                    );

                }

                /*
                保存完了
                */

                tx.oncomplete =

                function(){

                    /*
                    DBを閉じます。
                    */

                    db.close();

                    /*
                    呼び出し元へ

                    保存成功

                    を返します。
                    */

                    resolve();

                };

                /*
                保存失敗
                */

                tx.onerror =

                function(){

                    db.close();

                    reject(

                        "保存失敗"

                    );

                };

            }

            /*
            try中でエラー発生
            */

            catch(error){

                reject(error);

            }

        }

    );

}

// ==========================================================
// 3-3.
// DB共通関数
//
// 全件取得
// ==========================================================
/*
------------------------------------------------------------

この関数は

指定したストアの

全データ

を取得します。

------------------------------------------------------------

使用例

const tracks =
await idbGetAll(
    STORE_MUSIC
);

------------------------------------------------------------

戻り値は

配列(Array)

になります。

例

[
    曲①,
    曲②,
    曲③
]

------------------------------------------------------------
*/

function idbGetAll(storeName){

    /*
    Promiseを返します。

    全件取得が終わるまで待ちます。
    */

    return new Promise(

        async function(resolve,reject){

            try{

                /*
                DBへ接続
                */

                const db =
                await openNoriRunDB();

                /*
                読み込み専用
                */

                const tx =
                db.transaction(

                    storeName,

                    "readonly"

                );

                /*
                ストア取得
                */

                const store =
                tx.objectStore(

                    storeName

                );

                /*
                全件取得します。
                */

                const request =
                store.getAll();

                /*
                読み込み成功
                */

                request.onsuccess =
                function(){

                    /*
                    DBを閉じます。
                    */

                    db.close();

                    /*
                    request.result

                    には

                    配列(Array)

                    が入っています。

                    データが0件でも

                    []

                    が返るので安心です。
                    */

                    resolve(

                        request.result

                    );

                };

                /*
                読み込み失敗
                */

                request.onerror =
                function(){

                    db.close();

                    reject(

                        "全件取得失敗"

                    );

                };

            }

            /*
            try内エラー
            */

            catch(error){

                reject(error);

            }

        }

    );

}


</script>
