<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Module V1.0 - Double Layer</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 20px; border-radius: 15px; border: 2px solid #ff00ff; margin-bottom: 15px; }
        .status-text { font-size: 1.2em; color: #00ff88; font-family: monospace; margin: 5px 0; }
        
        .input-group { background: #2a2a2a; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; }
        .input-label { font-size: 0.85em; color: #bbb; margin-bottom: 5px; display: block; }
        .bpm-input { width: 100%; background: #000; border: 1px solid #444; color: #00ff88; font-size: 2em; text-align: center; border-radius: 10px; padding: 10px; box-sizing: border-box; }

        .btn-action { width: 100%; padding: 20px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-bottom: 10px; }
        .btn-magenta { background: #ff00ff; color: white; }
        .btn-red { background: #550000; color: #ff8888; }
        
        .data-card { background: #1a1a1a; padding: 10px; border-radius: 10px; font-size: 0.8em; text-align: left; font-family: monospace; color: #888; margin-bottom: 10px; border-left: 4px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff00ff; margin-top:0;">LINK MODULE V1.0</h2>

    <div class="monitor">
        <div id="linkStatus" class="status-text">STANDBY</div>
        <div id="timerDisplay" style="font-size: 2.5em; font-weight: bold; font-family: monospace;">00:00.00</div>
    </div>

    <div class="input-group">
        <label class="input-label">目標BPM (マイ・ピッチ)</label>
        <input type="number" id="targetBpm" class="bpm-input" value="128.0" step="0.1">
    </div>

    <div id="songInfo">
        <div class="data-card" id="info1">曲1: データ未ロード</div>
        <div class="data-card" id="info2">曲2: データ未ロード</div>
    </div>

    <button id="previewBtn" class="btn-action btn-magenta" onclick="startLinkPreview()">🔗 接続プレビュー実行</button>
    <button class="btn-red" style="width:100%; padding:10px;" onclick="stopAll()">緊急停止</button>
</div>

<script>
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songBuffers = [null, null];
    let sources = [null, null];
    let gains = [null, null];
    let songData = [null, null];
    let isPlaying = false;

    // 起動時に解析データをロード
    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (!d0 || !d1) {
            alert("解析データが見つからないぜ！先に下準備モジュールで解析してくれ。");
            return;
        }
        songData[0] = JSON.parse(d0);
        songData[1] = JSON.parse(d1);
        
        document.getElementById('info1').innerText = `曲1: BPM ${songData[0].bpm.toFixed(2)} / End: ${songData[0].endTS.toFixed(3)}s`;
        document.getElementById('info2').innerText = `曲2: BPM ${songData[1].bpm.toFixed(2)} / Start: ${songData[1].startTS.toFixed(3)}s`;
        
        // ファイル選択を促す
        alert("接続する2曲のファイルを順番に選択してくれ！");
        loadFiles();
    };

    async function loadFiles() {
        const input = document.createElement('input'); input.type = 'file'; input.multiple = true;
        input.onchange = async (e) => {
            if(e.target.files.length < 2) return alert("2曲選んでくれ！");
            songBuffers[0] = await audioCtx.decodeAudioData(await e.target.files[0].arrayBuffer());
            songBuffers[1] = await audioCtx.decodeAudioData(await e.target.files[1].arrayBuffer());
            document.getElementById('linkStatus').innerText = "READY TO LINK";
        };
        input.click();
    }

    function startLinkPreview() {
        if (!songBuffers[0] || isPlaying) return;
        isPlaying = true;
        audioCtx.resume();

        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        
        // --- 1曲目の設定 ---
        const rate1 = targetBpm / songData[0].bpm;
        const bPoint = songData[0].endTS; // 接続点（1曲目の終了TS）
        const startOffset = bPoint - 10; // 10秒前からプレビュー開始
        
        sources[0] = audioCtx.createBufferSource();
        sources[0].buffer = songBuffers[0];
        sources[0].playbackRate.value = rate1;
        // 声が宇宙人にならない設定（重要！）
        if (sources[0].preservesPitch !== undefined) sources[0].preservesPitch = true;

        gains[0] = audioCtx.createGain();
        sources[0].connect(gains[0]);
        gains[0].connect(audioCtx.destination);

        // --- 2曲目の設定 ---
        const rate2 = targetBpm / songData[1].bpm;
        const aPoint = songData[1].startTS; // 接続点（2曲目の開始TS）
        
        sources[1] = audioCtx.createBufferSource();
        sources[1].buffer = songBuffers[1];
        sources[1].playbackRate.value = rate2;
        if (sources[1].preservesPitch !== undefined) sources[1].preservesPitch = true;

        gains[1] = audioCtx.createGain();
        gains[1].gain.value = 0; // 最初は消音
        sources[1].connect(gains[1]);
        gains[1].connect(audioCtx.destination);

        // --- 接続タイミングの計算 ---
        const now = audioCtx.currentTime;
        const fadeDuration = (60 / targetBpm) * 4; // 4拍分かけてクロスフェード
        
        // 1曲目の再生開始
        sources[0].start(now, startOffset);

        // 接続点までの時間（実時間 = 曲内秒数 / 再生速度）
        const timeToLink = (bPoint - startOffset) / rate1;
        const linkTime = now + timeToLink;

        // 2曲目の予約開始（A地点からフェード分だけ前に戻って開始）
        const source2StartTime = linkTime - (fadeDuration / 2);
        const source2Offset = aPoint - ((fadeDuration / 2) * rate2);
        sources[1].start(source2StartTime, source2Offset);

        // --- クロスフェードの予約 ---
        // 1曲目：接続点の前後で 1.0 -> 0.0
        gains[0].gain.setValueAtTime(1.0, linkTime - (fadeDuration / 2));
        gains[0].gain.linearRampToValueAtTime(0.0, linkTime + (fadeDuration / 2));

        // 2曲目：接続点の前後で 0.0 -> 1.0
        gains[1].gain.setValueAtTime(0.0, linkTime - (fadeDuration / 2));
        gains[1].gain.linearRampToValueAtTime(1.0, linkTime + (fadeDuration / 2));

        updateMonitor(now, linkTime);
    }

    function updateMonitor(startTime, linkTime) {
        if (!isPlaying) return;
        const now = audioCtx.currentTime;
        const elapsed = now - startTime;
        const remain = linkTime - now;

        document.getElementById('timerDisplay').innerText = elapsed.toFixed(2) + "s";
        
        if (remain > 0) {
            document.getElementById('linkStatus').innerText = `LINK IN: ${remain.toFixed(1)}s`;
            requestAnimationFrame(() => updateMonitor(startTime, linkTime));
        } else {
            document.getElementById('linkStatus').innerText = "CONNECTED";
            document.getElementById('linkStatus').style.color = "#ff00ff";
        }
    }

    function stopAll() {
        sources.forEach(s => { if(s) try{s.stop();}catch(e){} });
        isPlaying = false;
        document.getElementById('linkStatus').innerText = "STOPPED";
        document.getElementById('linkStatus').style.color = "#00ff88";
    }
</script>
</body>
</html>
