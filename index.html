<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAT-LINK 実験室 Ver 0.9</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 650px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        /* フェーズ表示 */
        .phase-container { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
        .phase-card { flex: 1; padding: 12px; background: #2a2a2a; border-radius: 12px; font-size: 0.75em; border: 2px solid transparent; transition: 0.3s; opacity: 0.5; }
        .phase-card.active { opacity: 1; border-color: #007bff; background: #1a2a3a; box-shadow: 0 0 15px rgba(0,123,255,0.3); }
        
        .bpm-main { font-size: 4em; font-weight: bold; color: #00ff88; margin: 10px 0; text-shadow: 0 0 20px rgba(0,255,136,0.2); }
        
        /* タップエリア */
        .tap-inner { font-size: 1.8em; font-weight: bold; margin-bottom: 10px; }
        .tap-area { 
            width: 100%; height: 220px; background: #252525; border: 4px dashed #444; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: manipulation; transition: 0.1s;
        }
        .tap-area:active { background: #333; transform: scale(0.98); border-color: #00ff88; }
        .tap-area.ready { border-style: solid; border-color: #007bff; color: #007bff; }

        .log-box { margin-top: 20px; background: #000; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 0.8em; text-align: left; color: #00ff00; height: 120px; overflow-y: auto; }
        .btn-group { margin-top: 25px; display: flex; gap: 15px; justify-content: center; }
        button { padding: 15px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.2s; }
        #folderBtn { background: #6f42c1; color: white; }
        #resetBtn { background: #444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#007bff;">🔬 BEAT-LINK 実験室 Ver 0.9</h2>
    
    <div class="phase-container">
        <div id="ph1" class="phase-card">STEP 1<br>序盤(5s〜)</div>
        <div id="ph2" class="phase-card">STEP 2<br>中盤(50%)</div>
        <div id="ph3" class="phase-card">STEP 3<br>終盤(90%)</div>
        <div id="ph4" class="phase-card">FINAL<br>フル検証</div>
    </div>

    <div class="bpm-main" id="bpmDisplay">BPM: --</div>

    <div class="tap-area" id="tapArea">
        <div class="tap-inner" id="tapLabel">FOLDER SELECT</div>
        <div style="font-size: 0.8em; color: #888;" id="tapSub">まずはMusicフォルダを選択してくれ</div>
    </div>

    <div class="btn-group">
        <button id="folderBtn">📁 フォルダを選択</button>
        <button id="resetBtn" onclick="location.reload()">⏹ リセット</button>
    </div>

    <div class="log-box" id="log">ログ：待機中...</div>
</div>

<script>
    let audioCtx, audioBuf, currentSource;
    let currentPhase = 0; // 1: 序盤, 2: 中盤, 3: 終盤, 4: フル
    let scanOffsets = [];
    let tapData = []; // 各フェーズの {absTime, bpm}
    let tempTaps = [];
    let finalBpmValue = 0;

    const log = (msg) => {
        const d = document.getElementById('log');
        d.innerHTML = `> ${msg}<br>${d.innerHTML}`;
        d.scrollTop = 0;
    };

    const updateUI = () => {
        document.querySelectorAll('.phase-card').forEach((el, i) => {
            el.classList.toggle('active', i === currentPhase - 1);
        });
    };

    document.getElementById('folderBtn').onclick = async () => {
        try {
            const root = await window.showDirectoryPicker();
            for await (const entry of root.values()) {
                if (entry.name === "02-HANABI_1.m4a") {
                    log("ターゲット捕捉：02-HANABI_1.m4a");
                    await startExperiment(entry);
                    return;
                }
            }
            alert("ファイルが見つかりません。");
        } catch (e) { log("Error: " + e.message); }
    };

    async function startExperiment(handle) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const file = await handle.getFile();
        audioBuf = await audioCtx.decodeAudioData(await file.arrayBuffer());
        
        const dur = audioBuf.duration;
        scanOffsets = [5, dur * 0.5, dur * 0.9];
        log(`曲の長さ: ${Math.floor(dur)}秒。解析ポイントを設定しました。`);
        
        document.getElementById('folderBtn').style.display = 'none';
        nextPhase();
    }

    function nextPhase() {
        if (currentSource) currentSource.stop();
        currentPhase++;
        updateUI();

        if (currentPhase > 3) {
            calculateFinalBpm();
            return;
        }

        const offset = scanOffsets[currentPhase - 1];
        document.getElementById('tapLabel').innerText = "TAP!";
        document.getElementById('tapSub').innerText = `${Math.floor(offset)}秒付近を再生中... 4回刻んで！`;
        document.getElementById('tapArea').classList.add('ready');

        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        currentSource.start(0, offset, 20); // 20秒間プレビュー

        tempTaps = [];
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        if (currentPhase < 1 || currentPhase > 3) return;
        
        const now = audioCtx.currentTime;
        tempTaps.push(now);

        if (tempTaps.length >= 4) {
            const last4 = tempTaps.slice(-4);
            const intervals = [last4[1]-last4[0], last4[2]-last4[1], last4[3]-last4[2]];
            const avg = intervals.reduce((a, b) => a + b) / 3;
            const stability = intervals.every(v => Math.abs(v - avg) < 0.04);

            if (stability) {
                const bpm = 60 / avg;
                const absolutePos = scanOffsets[currentPhase - 1] + (last4[3] - (tempTaps[0])); 
                tapData.push({ absPos: absolutePos, bpm: bpm });
                
                log(`STEP ${currentPhase} 完了: 推定BPM ${bpm.toFixed(2)}`);
                nextPhase();
            }
        }
    };

    function calculateFinalBpm() {
        const start = tapData[0];
        const end = tapData[2];
        
        // 【3点計測ロジック】
        const duration = end.absPos - start.absPos;
        const estimatedBeats = Math.round(duration * (start.bpm / 60));
        finalBpmValue = (estimatedBeats * 60) / duration;

        document.getElementById('bpmDisplay').innerText = `BPM: ${finalBpmValue.toFixed(3)}`;
        document.getElementById('tapLabel').innerText = "DONE!";
        document.getElementById('tapSub').innerText = "高精度BPM確定。フル検証を開始します。";
        log(`最終確定BPM: ${finalBpmValue.toFixed(4)}`);
        
        runFullVerification(start.absPos, finalBpmValue);
    }

    function runFullVerification(refPos, bpm) {
        updateUI(); // STEP 4 をアクティブに
        if (currentSource) currentSource.stop();

        const fullSource = audioCtx.createBufferSource();
        fullSource.buffer = audioBuf;
        fullSource.connect(audioCtx.destination);
        
        const startTime = audioCtx.currentTime;
        fullSource.start(startTime);

        // 【逆算メトロノームロジック】
        const interval = 60 / bpm;
        // 最初の1拍目が「0秒以下」にならないギリギリの地点まで遡る
        const firstBeatOffset = refPos % interval; 

        for (let i = 0; i < (audioBuf.duration / interval) + 1; i++) {
            const beatTime = startTime + firstBeatOffset + (i * interval);
            if (beatTime >= startTime) {
                scheduleTick(beatTime);
            }
        }
        log("全編同期メトロノーム再生中。ズレがないか確認してくれ！");
    }

    function scheduleTick(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(1000, time);
        gain.gain.setValueAtTime(0.3, time);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.1);

        osc.start(time);
        osc.stop(time + 0.1);
    }
</script>
</body>
</html>
