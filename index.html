<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEAT-LINK Ver 0.99</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 20px; }
        .seek-box { margin: 15px 0; background: #000; padding: 15px; border-radius: 12px; }
        input[type=range] { width: 100%; margin: 10px 0; }
        .jump-btns { display: flex; gap: 10px; margin-top: 10px; }
        .jump-btns button { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #444; color: white; cursor: pointer; }
        .bpm-main { font-size: 2.5em; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔬 解析 Ver 0.99 (シーク対応)</h2>
    
    <div class="monitor-panel">
        <div class="bpm-main" id="bpmDisplay">READY</div>
        <div class="seek-box">
            <input type="range" id="seekBar" min="0" max="100" value="0">
            <div id="currentTime" style="font-family:monospace;">0.000 s</div>
            <div class="jump-btns">
                <button onclick="seekTo(scanOffsets[0])">P1 (序盤)</button>
                <button onclick="seekTo(scanOffsets[1])">P2 (中盤)</button>
                <button onclick="seekTo(scanOffsets[2])">P3 (終盤)</button>
            </div>
        </div>
    </div>

    <div id="btnArea" style="margin-top: 15px;">
        <button id="folderBtn" style="padding:15px; width:100%; background:#6f42c1; color:white; border:none; border-radius:10px;">📁 フォルダ選択 & 開始</button>
    </div>
</div>

<script>
    let audioCtx, audioBuf, currentSource, scanOffsets = [], startTime = 0;

    // シークバー移動処理
    function seekTo(time) {
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        startTime = audioCtx.currentTime - time;
        currentSource.start(0, time);
    }

    document.getElementById('folderBtn').onclick = async () => {
        const root = await window.showDirectoryPicker();
        for await (const entry of root.values()) {
            if (entry.name === "02-HANABI_1.m4a") {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioBuf = await audioCtx.decodeAudioData(await (await entry.getFile()).arrayBuffer());
                scanOffsets = [5, audioBuf.duration * 0.5, audioBuf.duration * 0.9];
                
                // シークバー最大値を更新
                document.getElementById('seekBar').max = audioBuf.duration;
                document.getElementById('btnArea').style.display = 'none';
                
                // 監視ループ開始
                setInterval(() => {
                    const elapsed = audioCtx.currentTime - startTime;
                    document.getElementById('seekBar').value = elapsed;
                    document.getElementById('currentTime').innerText = elapsed.toFixed(3) + " s";
                }, 50);
                return;
            }
        }
    };
    
    // シークバー手動操作
    document.getElementById('seekBar').oninput = (e) => seekTo(e.target.value);
</script>
</body>
</html>
