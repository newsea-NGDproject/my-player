<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:active { filter: brightness(0.8); }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; cursor: pointer; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-name { font-size: 1em; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white; display: flex;
            justify-content: center; align-items: center; text-align: center;
            z-index: 1000; padding: 20px; font-size: 1.2em; line-height: 1.8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message"></div>
</div>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.9em;">フォルダを認証してください</div>
    
    <div class="controls">
        <button id="addSongs" style="background: #007bff;">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="savePlaylist" style="background: #28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;">📑 読込</button>
        <button onclick="resetFolder()" style="background:#666;">🔄 フォルダ変更</button>
    </div>

    <ul id="playlist"></ul>
</div>

<script>
    const audioPlayer = new Audio();
    let playlist = { songs: [] };
    let rootHandle = null;
    let currentPlayingIdx = -1;

    window.onload = async () => {
        const savedHandle = await getSavedHandle();
        const msgDiv = document.getElementById('message');
        if (savedHandle) {
            rootHandle = savedHandle;
            msgDiv.innerHTML = `おかえりなさい！<br>アクセス再開を承諾お願いします。<br><br>[ タップで承諾 ]`;
        } else {
            msgDiv.innerHTML = `セキュリティ承諾をお願いします。<br>どちらも『許可』を選択してください。<br><br>[ タップで開始 ]`;
        }
    };

    async function handleAuth() {
        try {
            if (!rootHandle) {
                rootHandle = await window.showDirectoryPicker();
                await saveHandle(rootHandle);
            } else {
                const permission = await rootHandle.requestPermission({ mode: 'readwrite' });
                if (permission !== 'granted') return;
            }
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `場所: ${rootHandle.name}`;
        } catch (err) { alert("認証がキャンセルされました。"); }
    }

    document.getElementById('addSongs').addEventListener('click', async () => {
        if (!rootHandle) return;
        try {
            const fileHandles = await window.showOpenFilePicker({
                multiple: true,
                startIn: rootHandle,
                types: [{ description: '音楽', accept: { 'audio/*': ['.mp3', '.m4a'] } }]
            });
            for (const handle of fileHandles) {
                if (!playlist.songs.some(s => s.name === handle.name)) {
                    playlist.songs.push({ name: handle.name, handle: handle });
                }
            }
            renderPlaylist();
        } catch (err) { console.error(err); }
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        currentPlayingIdx = -1;
        document.getElementById('status').innerText = "停止中";
        renderPlaylist();
    });

    document.getElementById('savePlaylist').addEventListener('click', async () => {
        if (playlist.songs.length === 0) return alert("保存する曲がありません。");
        try {
            const fileHandle = await window.showSaveFilePicker({
                suggestedName: 'マイ・プレイリスト.json',
                types: [{ description: 'Playlist', accept: {'application/json': ['.json']} }],
            });
            const writable = await fileHandle.createWritable();
            // 子フォルダ対応のため、名前だけを保存
            const exportData = { songs: playlist.songs.map(s => ({ name: s.name })) };
            await writable.write(JSON.stringify(exportData, null, 2));
            await writable.close();
            alert("保存しました！");
        } catch (err) { if (err.name !== 'AbortError') alert("保存失敗"); }
    });

    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        try {
            const [fileHandle] = await window.showOpenFilePicker({
                types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
            });
            const file = await fileHandle.getFile();
            const data = JSON.parse(await file.text());
            playlist.songs = data.songs.map(s => ({ ...s, handle: null }));
            renderPlaylist();
            alert("プレイリストを読み込みました。再生時にフォルダ内を自動検索します。");
        } catch (err) { console.error(err); }
    });

    // --- 【今回の肝】子フォルダまで探しに行く関数 ---
    async function findFileRecursive(directoryHandle, fileName) {
        for await (const entry of directoryHandle.values()) {
            if (entry.kind === 'file' && entry.name === fileName) {
                return entry;
            } else if (entry.kind === 'directory') {
                const result = await findFileRecursive(entry, fileName);
                if (result) return result;
            }
        }
        return null;
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            
            li.innerHTML = `<span class="song-name">▶ ${song.name}</span>`;
            li.onclick = async () => {
                try {
                    let fileHandle = song.handle;
                    
                    // 読み込んだリストでハンドルがない場合、子フォルダまで探しに行く
                    if (!fileHandle) {
                        document.getElementById('status').innerText = "検索中...";
                        fileHandle = await findFileRecursive(rootHandle, song.name);
                    }

                    if (fileHandle) {
                        const file = await fileHandle.getFile();
                        audioPlayer.src = URL.createObjectURL(file);
                        audioPlayer.play();
                        currentPlayingIdx = i;
                        document.getElementById('status').innerText = `再生中: ${song.name}`;
                        renderPlaylist();
                    } else {
                        alert("曲が見つかりませんでした。Musicフォルダ内にファイルがあるか確認してください。");
                    }
                } catch (e) { alert("アクセスエラーが発生しました。"); }
            };
            list.appendChild(li);
        });
    }

    async function saveHandle(h) { const db = await openDB(); await db.put("config", h, "rootFolder"); }
    async function getSavedHandle() { const db = await openDB(); return await db.get("config", "rootFolder"); }
    function openDB() { return new Promise(r => { const req = indexedDB.open("PlayerDB", 1); req.onupgradeneeded = () => req.result.createObjectStore("config"); req.onsuccess = () => { const db = req.result; r({ put: (s, v, k) => new Promise(res => db.transaction(s, "readwrite").objectStore(s).put(v, k).onsuccess = res), get: (s, k) => new Promise(res => db.transaction(s).objectStore(s).get(k).onsuccess = e => res(e.target.result)) }); }; }); }
    function resetFolder() { indexedDB.deleteDatabase("PlayerDB"); location.reload(); }
</script>
</body>
</html>
