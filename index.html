<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>NoriRun</title>

<style>
/* 全体設定 */
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    color:#ffffff;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

/* 画面中央配置 */
body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* コンテンツ全体 */
.splash{
    text-align:center;
    width:100%;
}

/* ==============================
   アニメーション共通設定
   ============================== */

/*
    最初はすべて透明にしておきます。
    JavaScriptで show クラスが付くと表示されます。
*/
.fade-item{
    opacity:0;

    /* 下から動かさず、透明から見えるようにする */
    transition:opacity 1s ease;
}

/*
    表示状態です。
    opacity:1 で見えるようになります。
    transform:translateY(0) で少し下から浮いてくる動きになります。
*/
.fade-item.show{
    opacity:1;
}

/* ==============================
   メインタイトル部分
   ============================== */

/*
    ノッて・走る・プレイヤーを横並びにします。
*/
.main-title{
    display:flex;
    justify-content:center;
    align-items:flex-start;

    gap:1.2em;

    font-size:1.6rem;
    font-weight:300;
    letter-spacing:0.06em;

    white-space:nowrap;
    margin-bottom:80px;
}

/*
    文字と絵文字を縦並びにします。

    例：
    ノッて
     🕺
*/
.title-block{
    display:flex;
    flex-direction:column;
    align-items:center;

    gap:60px;
}

/*
    文字部分です。
*/
.title-word{
    display:block;
}

/*
    絵文字部分です。
    letter-spacing の影響を受けないようにしています。
*/
.emoji{
    font-size:2rem;
    letter-spacing:0;

    /* Androidでもカラー絵文字を優先して表示するための指定 */
    font-family:
        "Noto Color Emoji",
        "Apple Color Emoji",
        "Segoe UI Emoji",
        sans-serif;
}

/* ==============================
   ロゴ部分
   ============================== */

/*
    ノリRunを中央に配置します。
*/
.logo{
    display:flex;
    justify-content:center;
    align-items:center;

    font-size:3.2rem;
    margin-bottom:80px;
}

/*
    ノリとRunの間隔です。
*/
.logo-nori{
    margin-right:0.08em;
}

/*
    Runだけ太字にします。
*/
.logo-run{
    font-weight:700;
}


/* ==============================
   下部テキスト
   ============================== */

/*
    下部テキストは少しゆっくり優しく出します。
*/
.soft-fade{
    transition:
        opacity 1.5s ease,
        transform 1.5s ease;
}

/* サブタイトル */
.sub-title{
    font-size:clamp(1.6rem,6vw,3rem);
    font-weight:700;
    margin-bottom:15px;
}

/* フッター */
.footer{
    font-size:clamp(1.4rem,5vw,2.5rem);
    font-weight:300;
    letter-spacing:0.05em;
}

.splash{
    transform:translateY(-5%);
}
</style>

</head>
<body>

<div class="splash">

    <!--
        メインタイトル部分です。
        文字と絵文字を1セットにしてあります。

        step1：ノッて + 🕺
        step2：走る + 🏃
        step3：プレイヤー + 📱

        JavaScriptで順番に show クラスを付けて表示します。
    -->
    <div class="main-title">

        <span id="step1" class="fade-item title-block">
            <span class="title-word">ノッて</span>
            <span class="emoji">🕺</span>
        </span>

        <span id="step2" class="fade-item title-block">
            <span class="title-word">走る</span>
            <span class="emoji">🏃‍♂️</span>
        </span>

        <span id="step3" class="fade-item title-block">
            <span class="title-word">プレイヤー</span>
            <span class="emoji">📱</span>
        </span>

    </div>

    <!--
        ロゴ部分です。
        「ノリ」と「Run」を分けることで、
        ノリ → Run の順番で表示できます。
    -->
    <div class="logo">
        <span id="logo-nori" class="fade-item logo-nori">ノリ</span>
        <b id="logo-run" class="fade-item logo-run">Run</b>
    </div>

    <!--
        下部テキストです。
        2行まとめて最後にふわっと表示します。
    -->
    <div id="bottom-text" class="fade-item soft-fade">
        <div class="sub-title">
            Music Player NoriRun
        </div>

        <div class="footer">
            TOKYO JAPAN since 2026
        </div>
    </div>

</div>
<script>
window.addEventListener("load", function () {

    setTimeout(function () {
        const bottomText = document.getElementById("bottom-text");

        if (bottomText) {
            bottomText.classList.add("show");
        }

    }, 4000);

});
</script>
</body>
</html>
