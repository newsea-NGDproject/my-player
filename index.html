<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoriRun Ver.9 - Main Hub</title>
    <style>
        :root {
            --accent-red: #ff3b30;
            --main-blue: #007aff;
            --bg-color: #f2f2f7;
            --list-bg: #ffffff;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; touch-action: none;
        }

        /* --- 画面切り替え制御 --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex; }

        /* --- [STEP 1-A] 初期設定スタイル --- */
        #init-screen { padding: 15px; }
        .ruler-outer { position: relative; width: 100%; height: 160px; background: #fff; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 15px; overflow: hidden; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--accent-red); z-index: 10; transform: translateX(-50%); }
        #ruler-canvas { cursor: grab; width: 100%; height: 100%; }
        #pitch-number { font-size: 3.5rem; font-weight: 900; color: var(--main-blue); line-height: 1; }
        #pitch-label { font-size: 1.3rem; font-weight: bold; margin: 8px 0 15px; }
        .safety-box { background: #fff; border: 1px solid #d1d1d6; padding: 15px; border-radius: 15px; width: 90%; font-size: 0.88rem; line-height: 1.5; }
        #save-btn { margin-top: auto; margin-bottom: 25px; background: var(--main-blue); color: white; border: none; padding: 18px 60px; font-size: 1.2rem; font-weight: bold; border-radius: 35px; box-shadow: 0 6px 20px rgba(0,122,255,0.4); }

        /* --- [STEP 1-B] メインメニュースタイル --- */
        #main-menu { padding: 0; background: #fff; }
        .menu-header { width: 100%; padding: 15px; background: var(--main-blue); color: white; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #scan-indicator { font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; display: none; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        /* 黄金比リストレイアウト (1:1:3:2:1:1) */
        #song-list { width: 100%; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
        .song-item {
            display: flex; align-items: center; width: 100%; height: 70px;
            border-bottom: 1px solid #eee; padding: 0 5px; box-sizing: border-box;
        }
        .col-1 { flex: 1; text-align: center; font-size: 1.5rem; }
        .col-1-img { flex: 1; display: flex; justify-content: center; }
        .col-3 { flex: 3; padding-left: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: bold; }
        .col-2 { flex: 2; padding-left: 5px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-size: 0.85rem; color: #666; }
        
        .song-item img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; background: #eee; }
        .btn-move { background: none; border: none; font-size: 1.2rem; color: var(--main-blue); cursor: pointer; }

        #scan-trigger-btn { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 30px; background: var(--accent-red); color: white; border: none; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="init-screen" class="screen active">
    <h1 style="margin-top:20px">初期設定</h1>
    <p style="font-weight:bold; margin-bottom:5px">あなたの「マイ・ピッチ」を設定して下さい</p>
    <div id="status-display" style="text-align:center">
        <div id="pitch-number">170</div>
        <div id="pitch-label">🏃‍♂️ マラソン</div>
    </div>
    <div class="ruler-outer" id="ruler-container">
        <div class="center-line"></div>
        <canvas id="ruler-canvas"></canvas>
    </div>
    <div class="safety-box">
        <span style="font-weight:bold">🛡️ 安心・安全への取り組み</span><br>
        下記「設定」ボタンを押すと 「このサイトにファイルの表示とコピーを許可しますか？ 」 と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
    </div>
    <button id="save-btn">設定</button>
</div>

<div id="main-menu" class="screen">
    <div class="menu-header">
        <span style="font-weight:bold; font-size:1.2rem">🕺ノリノリRun再生</span>
        <span id="scan-indicator" class="blink">解析中...💡(てへぺろ)</span>
    </div>
    <div id="song-list">
        </div>
    <button id="scan-trigger-btn" title="音楽フォルダを選択">＋</button>
</div>

<script>
/**
 * NoriRun Ver.9 - STEP 1-A & 1-B Full Logic
 * (C) 2026 Takehiro & つよぽん
 */

const state = {
    bpm: 170,
    targetBpm: 170,
    isDragging: false,
    audioCtx: null,
    clickBuffer: null,
    isPlaying: false,
    db: null
};

// --- [共通] IndexedDB初期化 ---
async function initDB() {
    return new Promise((resolve) => {
        const req = indexedDB.open("NoriRunDB", 1);
        req.onupgradeneeded = e => {
            const db = e.target.result;
            db.createObjectStore('settings');
            db.createObjectStore('music_library', { key_path: 'file_path' });
        };
        req.onsuccess = e => {
            state.db = e.target.result;
            resolve();
        };
    });
}

// --- [STEP 1-A] 定規ロジック ---
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const numDisp = document.getElementById('pitch-number');
const labelDisp = document.getElementById('pitch-label');

function renderRuler() {
    if (!state.isDragging) state.bpm += (state.targetBpm - state.bpm) * 0.25;
    const w = canvas.width, h = canvas.height, centerX = w / 2, unitW = 20;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#333'; ctx.textAlign = 'center';
    for (let i = Math.floor(state.bpm - 50); i <= Math.ceil(state.bpm + 50); i++) {
        if (i < 100 || i > 220) continue;
        const x = centerX + (i - state.bpm) * unitW;
        ctx.beginPath(); ctx.moveTo(x, 0);
        if (i % 10 === 0) { ctx.lineWidth = 2; ctx.lineTo(x, 45); ctx.fillText(i, x, 65); }
        else { ctx.lineWidth = 1; ctx.lineTo(x, 15); }
        ctx.stroke();
    }
    const b = Math.round(state.bpm);
    numDisp.innerText = b;
    if (b <= 120) labelDisp.innerText = "🚶‍♂️ ウォーキング";
    else if (b <= 135) labelDisp.innerText = "🥁 行進";
    else if (b <= 200) labelDisp.innerText = "🏃‍♂️ マラソン";
    else labelDisp.innerText = "🏎️ 全力ダッシュ！";
    requestAnimationFrame(renderRuler);
}

// --- [STEP 1-B] メインメニュー・スキャンロジック ---
async function startScan() {
    try {
        // ※ showDirectoryPickerはChrome/Edgeの最新版で動作。iOS/Androidは通常のファイル選択へフォールバックが必要。
        const dirHandle = await window.showDirectoryPicker();
        document.getElementById('scan-indicator').style.display = 'block';
        await scanDirectory(dirHandle);
        document.getElementById('scan-indicator').style.display = 'none';
        alert("てへぺろ完了！全ての曲を読み込んだぜ。");
    } catch (err) {
        console.error("スキャン中止", err);
    }
}

async function scanDirectory(handle) {
    for await (const entry of handle.values()) {
        if (entry.kind === 'directory') {
            await scanDirectory(entry);
        } else if (entry.name.match(/\.(mp3|wav|m4a|ogg)$/i)) {
            await registerSong(entry);
        }
    }
}

async function registerSong(fileHandle) {
    const file = await fileHandle.getFile();
    // ここで本来はタグ解析（jsmediatags等）を行う。今は簡易版。
    const songData = {
        file_path: file.name + Date.now(), // ユニークキー
        title: file.name.replace(/\.[^/.]+$/, ""),
        artist: "Unknown Artist",
        has_nori: Math.random() > 0.7 // 🕺テスト用ランダム
    };

    const tx = state.db.transaction('music_library', 'readwrite');
    tx.objectStore('music_library').put(songData, songData.file_path);
    tx.oncomplete = () => addSongToList(songData);
}

function addSongToList(song) {
    const list = document.getElementById('song-list');
    const row = document.createElement('div');
    row.className = 'song-item';
    row.innerHTML = `
        <div class="col-1">${song.has_nori ? '🕺' : '🛌'}</div>
        <div class="col-1-img"><img src="" alt="Jacket"></div>
        <div class="col-3">${song.title}</div>
        <div class="col-2">${song.artist}</div>
        <div class="col-1"><button class="btn-move">↑</button></div>
        <div class="col-1"><button class="btn-move">↓</button></div>
    `;
    list.appendChild(row);
}

// --- イベント登録 ---
document.getElementById('save-btn').onclick = async () => {
    const tx = state.db.transaction('settings', 'readwrite');
    tx.objectStore('settings').put(Math.round(state.bpm), 'my_pitch');
    tx.objectStore('settings').put(true, 'init_completed');
    document.getElementById('init-screen').classList.remove('active');
    document.getElementById('main-menu').classList.add('active');
};

document.getElementById('scan-trigger-btn').onclick = startScan;

// タッチイベント (1-A 継承)
canvas.addEventListener('touchstart', e => { state.isDragging = true; state.lastX = e.touches[0].clientX; }, {passive:false});
window.addEventListener('touchmove', e => { 
    if(!state.isDragging) return;
    const deltaX = e.touches[0].clientX - state.lastX;
    state.targetBpm -= deltaX / 20;
    state.lastX = e.touches[0].clientX;
}, {passive:false});
window.addEventListener('touchend', () => { state.isDragging = false; state.targetBpm = Math.round(state.targetBpm); });

// 初期化起動
(async function init() {
    await initDB();
    const container = document.getElementById('ruler-container');
    canvas.width = container.clientWidth; canvas.height = container.clientHeight;
    renderRuler();
})();
</script>
</body>
</html>
