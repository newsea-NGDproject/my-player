<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Link Module V2.9 - Independent Sync</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #ff00ff; margin-bottom: 10px; }
        .control-panel { background: #2a2a2a; padding: 12px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; color: #00ff88; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff00ff; }
        .mute-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-mute { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .active-on { background: #00ff88; color: #000; }
        .active-off { background: #444; color: #888; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 6px; }
        .btn-magenta { background: #ff00ff; color: white; }
        .btn-blue { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#ff00ff; margin:0 0 10px 0;">LINK MODULE V2.9</h2>
    
    <div class="monitor">
        <div id="linkStatus" style="color: #00ff88; font-family: monospace;">READY</div>
        <div id="timerDisplay" style="font-size: 2.2em; font-weight: bold; font-family: monospace;">00:00.00</div>
    </div>

    <div class="mute-group">
        <button id="mute1" class="btn-mute active-on" onclick="toggleMute(1)">M1: 曲1拍 (高音)</button>
        <button id="mute2" class="btn-mute active-on" onclick="toggleMute(2)">M2: 曲2拍 (低音)</button>
    </div>

    <div class="control-panel">
        <div class="label-row"><span>曲の音量</span><span id="volVal">0.20</span></div>
        <input type="range" min="0" max="0.5" step="0.01" value="0.20" oninput="updateVolume(this.value)">
    </div>

    <div class="control-panel">
        <div class="label-row" style="color:#ffcc00;"><span>接続点オフセット</span><span id="offsetVal">0 ms</span></div>
        <input type="range" id="offsetSlider" min="-500" max="500" value="0" oninput="updateOffset(this.value)">
    </div>

    <div style="background:#2a2a2a; padding:12px; border-radius:15px; margin-bottom:10px;">
        <input type="number" id="targetBpm" style="width:100%; background:#000; color:#00ff88; font-size:1.8em; text-align:center; border:1px solid #444;" value="128.0" step="0.1">
    </div>

    <button class="btn-action btn-blue" onclick="document.getElementById('file0').click()">🎵 曲1 ロード</button>
    <input type="file" id="file0" accept="audio/*" onchange="loadAudio(0, this)" style="display:none">
    
    <button class="btn-action btn-blue" onclick="document.getElementById('file1').click()">🎵 曲2 ロード</button>
    <input type="file" id="file1" accept="audio/*" onchange="loadAudio(1, this)" style="display:none">

    <button id="previewBtn" class="btn-action btn-magenta" onclick="startVerification(0, 1)" disabled>🔗 検証再生</button>
    <button class="btn-action" style="background:#440000; color:#ff8888;" onclick="stopAll()">STOP / RESET</button>
</div>

<audio id="player0"></audio>
<audio id="player1"></audio>

<script>
    const players = [document.getElementById('player0'), document.getElementById('player1')];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songData = [null, null];
    let isPlaying = false;
    let mainLoop = null;
    let lastTick1 = 0, lastTick2 = 0;
    let manualOffset = 0, currentVol = 0.2;
    let m1Enabled = true, m2Enabled = true;

    // 同期用の基準時間
    let startTimeCtx = 0; 
    let startPosInSong = 0;

    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) songData = [JSON.parse(d0), JSON.parse(d1)];
    };

    function toggleMute(id) {
        if (id === 1) { m1Enabled = !m1Enabled; document.getElementById('mute1').className = m1Enabled ? 'btn-mute active-on' : 'btn-mute active-off'; }
        else { m2Enabled = !m2Enabled; document.getElementById('mute2').className = m2Enabled ? 'btn-mute active-on' : 'btn-mute active-off'; }
    }

    function updateVolume(v) { currentVol = parseFloat(v); document.getElementById('volVal').innerText = currentVol.toFixed(2); players.forEach(p => { if(p.volume > 0) p.volume = currentVol; }); }
    function updateOffset(ms) { manualOffset = parseFloat(ms) / 1000; document.getElementById('offsetVal').innerText = ms + " ms"; }

    function loadAudio(idx, input) {
        const file = input.files[0];
        if (!file) return;
        players[idx].src = URL.createObjectURL(file);
        players[idx].load();
        if (players[0].src && players[1].src) document.getElementById('previewBtn').disabled = false;
    }

    function startVerification(fromIdx, toIdx) {
        if (isPlaying) return;
        stopAll();
        audioCtx.resume();
        isPlaying = true;

        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        const beatSec = 60 / targetBpm;
        const rateF = targetBpm / songData[fromIdx].bpm;
        const rateT = targetBpm / songData[toIdx].bpm;

        players[fromIdx].playbackRate = rateF;
        players[toIdx].playbackRate = rateT;
        players[fromIdx].volume = currentVol;

        const bPoint = songData[fromIdx].endTS;
        const aPoint = songData[toIdx].startTS + (songData[toIdx].latency/1000);

        startPosInSong = Math.max(0, bPoint - 10);
        players[fromIdx].currentTime = startPosInSong;
        
        // 物理的な再生開始と同時に、AudioContext上の絶対基準時間を記録
        startTimeCtx = audioCtx.currentTime;
        players[fromIdx].play();

        let s2Started = false;

        mainLoop = setInterval(() => {
            const curCtxTime = audioCtx.currentTime;
            const elapsedCtx = curCtxTime - startTimeCtx; // 再生開始からの経過時間(秒)

            // 曲1内での理論上の現在位置（再生速度を考慮）
            const virtualNowF = startPosInSong + (elapsedCtx * rateF);
            
            if (!s2Started) {
                document.getElementById('timerDisplay').innerText = players[fromIdx].currentTime.toFixed(2) + "s";
                // 接続判定
                if (virtualNowF >= (bPoint + manualOffset * rateF)) {
                    players[toIdx].currentTime = aPoint;
                    players[fromIdx].volume = 0; players[fromIdx].pause();
                    players[toIdx].volume = currentVol; players[toIdx].play();
                    s2Started = true;
                    document.getElementById('linkStatus').innerText = "SWITCHED";
                }
            } else {
                document.getElementById('timerDisplay').innerText = players[toIdx].currentTime.toFixed(2) + "s";
            }

            // --- 独立タイマーメトロノーム ---
            // 曲の再生位置ではなく、開始時からの「経過時間」をベースに計算するため、接続の影響を受けない
            
            // 1. 曲1の拍 (高音): bPointを「0」とした経過時間から算出
            if (m1Enabled) {
                const timeToB_Ctx = (bPoint - startPosInSong) / rateF;
                const relTime = elapsedCtx - timeToB_Ctx; 
                const nextTick = Math.ceil(relTime / beatSec) * beatSec;
                const t = startTimeCtx + timeToB_Ctx + nextTick;
                if (t > curCtxTime && t < curCtxTime + 0.05 && Math.abs(t - lastTick1) > 0.05) {
                    playTick(t, 2500, 0.6); lastTick1 = t;
                }
            }

            // 2. 曲2の拍 (低音): オフセットを反映させた aPoint 基準
            if (m2Enabled) {
                // 曲1のbPointと同期すべき曲2のaPoint
                const timeToA_Ctx = (bPoint - startPosInSong) / rateF;
                const relTime = elapsedCtx - timeToA_Ctx;
                const nextTick = Math.ceil(relTime / beatSec) * beatSec;
                const t = startTimeCtx + timeToA_Ctx + nextTick;
                if (t > curCtxTime && t < curCtxTime + 0.05 && Math.abs(t - lastTick2) > 0.05) {
                    playTick(t, 1000, 0.4); lastTick2 = t;
                }
            }
        }, 15);
    }

    function playTick(t, freq, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, t);
        osc.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.1);
    }

    function stopAll() {
        players.forEach(p => { p.pause(); });
        clearInterval(mainLoop);
        isPlaying = false;
        lastTick1 = 0; lastTick2 = 0;
        document.getElementById('linkStatus').innerText = "STOPPED";
    }
</script>
</body>
</html>
