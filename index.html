<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect & Sync Tester V1.4</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 15px; border-radius: 25px; border: 1px solid #333; }
        .monitor { background: #000; padding: 15px; border-radius: 15px; border: 2px solid #007bff; margin-bottom: 10px; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .bpm-view { font-size: 2.8em; font-weight: bold; color: #00ff88; font-family: monospace; }
        
        .panel { background: #2a2a2a; padding: 15px; border-radius: 15px; margin-bottom: 10px; text-align: left; }
        .guide-text { font-size: 0.9em; color: #00ff88; font-weight: bold; margin-bottom: 10px; padding: 8px; border-radius: 5px; background: rgba(0,255,136,0.1); }
        
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-bottom: 10px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-purple { background: #6f42c1; color: white; }
        
        .tap-zone { height: 150px; background: #1a1a1a; border: 3px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 15px; }
        .log { text-align: left; font-family: monospace; font-size: 0.75em; background: #000; padding: 10px; color: #00ff00; border-radius: 10px; height: 50px; overflow-y: auto; }
        
        input[type="range"] { width: 100%; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="monitor">
        <div id="modeLabel" style="font-size:0.7em; color:#007bff; font-weight:bold;">INITIALIZING</div>
        <div id="bpmDisplay" class="bpm-view">READY</div>
        <div id="statusLabel" style="font-size:0.8em; color:#aaa;">ファイルを読み込んでください</div>
    </div>

    <div id="filePanel" class="panel">
        <div class="guide-text">ステップ1：接続する2つの曲を選択</div>
        <button class="btn-action btn-blue" onclick="pickFiles()">📁 2曲選んで解析開始</button>
    </div>

    <div id="analyzePanel" class="panel" style="display:none;">
        <div id="analyzeGuide" class="guide-text"></div>
        <div id="tapArea" class="tap-zone">
            <div style="font-size:1.2em;">TAP HERE</div>
            <div id="tapCount" style="color:#888;">12回タップ</div>
        </div>
        <div id="adjustControls" style="display:none;">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn-action" style="flex:1; padding:10px; background:#444; color:#fff;" onclick="adjBpm(-0.01)">-0.01</button>
                <button class="btn-action" style="flex:1; padding:10px; background:#444; color:#fff;" onclick="adjBpm(0.01)">+0.01</button>
            </div>
            <button class="btn-action btn-green" onclick="confirmAnalysis()">この数値で確定</button>
        </div>
    </div>

    <div id="connectPanel" class="panel" style="display:none;">
        <div class="guide-text">ステップ2：接続確認（Wメトロノーム同期）</div>
        <div style="font-size:0.8em; margin-bottom:5px;">目標BPM (Run): <span id="targetVal">160</span></div>
        <input type="range" id="targetBpmRange" min="100" max="200" step="1" value="160" oninput="updateTargetBpm(this.value)">
        
        <input type="range" id="masterSeek" min="0" max="30" step="0.1" value="15" oninput="seekTest()">
        <div style="display:flex; justify-content:space-between; font-size:0.7em; color:#aaa;">
            <span>1曲目終了前</span>
            <span>接続点</span>
            <span>2曲目開始後</span>
        </div>
        <button id="playBtn" class="btn-action btn-purple" onclick="togglePlay()">TEST PLAY / STOP</button>
    </div>

    <div id="logBox" class="log">> Standby...</div>
</div>

<script>
    // 起動時にlocalStorageをクリア
    localStorage.clear();
    console.log("Storage Cleared for Test");

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let rawFiles = [];
    let songData = []; // {buffer, bpm, startTS, endTS}
    let currentAnalyzeIdx = 0;
    let tempTaps = [];
    let targetBpm = 160;
    
    let isPlaying = false;
    let sources = [];
    let metronomeOscs = [];
    let songGain = audioCtx.createGain();
    songGain.connect(audioCtx.destination);
    songGain.gain.value = 0.5;

    const log = (m) => { document.getElementById('logBox').innerHTML = `> ${m}`; };

    // --- 1. ファイル選択 ---
    function pickFiles() {
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true;
        input.onchange = async (e) => {
            if (e.target.files.length < 2) return alert("2曲選んでくれ！");
            rawFiles = Array.from(e.target.files);
            document.getElementById('filePanel').style.display = 'none';
            startAnalyzeFlow(0);
        };
        input.click();
    }

    // --- 2. 解析フロー ---
    async function startAnalyzeFlow(idx) {
        currentAnalyzeIdx = idx;
        log(`${rawFiles[idx].name} を解析中...`);
        const buffer = await audioCtx.decodeAudioData(await rawFiles[idx].arrayBuffer());
        songData[idx] = { buffer, bpm: 120, startTS: 0, endTS: 0 };
        
        document.getElementById('analyzePanel').style.display = 'block';
        document.getElementById('modeLabel').innerText = `SONG ${idx + 1} ANALYZE`;
        document.getElementById('analyzeGuide').innerText = `${rawFiles[idx].name} の一拍目位置で12回タップ`;
        document.getElementById('adjustControls').style.display = 'none';
        tempTaps = [];
    }

    document.getElementById('tapArea').onpointerdown = (e) => {
        e.preventDefault();
        const now = audioCtx.currentTime;
        tempTaps.push(now);
        document.getElementById('tapCount').innerText = `${tempTaps.length} / 12`;
        if (tempTaps.length >= 12) {
            const stable = tempTaps.slice(4);
            let ivls = [];
            for(let i=1; i<stable.length; i++) ivls.push(stable[i] - stable[i-1]);
            const avgIvl = ivls.reduce((a,b)=>a+b, 0) / ivls.length;
            songData[currentAnalyzeIdx].bpm = 60 / avgIvl;
            songData[currentAnalyzeIdx].startTS = 5; // 簡易的に5秒地点を一拍目とする（テスト用）
            songData[currentAnalyzeIdx].endTS = songData[currentAnalyzeIdx].buffer.duration - 10;
            
            showAdjust();
        }
    };

    function showAdjust() {
        document.getElementById('bpmDisplay').innerText = songData[currentAnalyzeIdx].bpm.toFixed(2);
        document.getElementById('adjustControls').style.display = 'block';
    }

    function adjBpm(v) {
        songData[currentAnalyzeIdx].bpm += v;
        document.getElementById('bpmDisplay').innerText = songData[currentAnalyzeIdx].bpm.toFixed(2);
    }

    function confirmAnalysis() {
        if (currentAnalyzeIdx === 0) {
            startAnalyzeFlow(1);
        } else {
            document.getElementById('analyzePanel').style.display = 'none';
            document.getElementById('connectPanel').style.display = 'block';
            document.getElementById('modeLabel').innerText = "CONNECT TEST";
            document.getElementById('bpmDisplay').innerText = targetBpm;
            log("解析完了。接続テストを開始できます。");
        }
    }

    // --- 3. 接続テスト ---
    function updateTargetBpm(v) {
        targetBpm = parseFloat(v);
        document.getElementById('targetVal').innerText = v;
        document.getElementById('bpmDisplay').innerText = v;
        if(isPlaying) { stopAll(); togglePlay(); }
    }

    function togglePlay() {
        if (isPlaying) stopAll(); else playTest();
    }

    function stopAll() {
        isPlaying = false;
        sources.forEach(s => s.stop());
        metronomeOscs.forEach(o => o.stop());
        sources = []; metronomeOscs = [];
        document.getElementById('playBtn').innerText = "TEST PLAY";
    }

    function playTest() {
        isPlaying = true;
        document.getElementById('playBtn').innerText = "STOP";
        const now = audioCtx.currentTime;
        const seekVal = parseFloat(document.getElementById('masterSeek').value); // 0~30, 15が接続点

        const s1 = songData[0];
        const s2 = songData[1];
        const r1 = targetBpm / s1.bpm;
        const r2 = targetBpm / s2.bpm;

        // 接続までの残り時間（秒）を計算
        let timeToSwitch = (15 - seekVal); // 接続点(15)までの秒数

        // --- Song 1 再生 ---
        if (timeToSwitch > 0) {
            const src1 = audioCtx.createBufferSource();
            src1.buffer = s1.buffer;
            src1.playbackRate.value = r1;
            src1.preservesPitch = true;
            src1.connect(songGain);
            src1.start(now, s1.endTS - (timeToSwitch / r1));
            sources.push(src1);
            
            // Song 1 用メトロノーム (s1.endTSを基準に逆算)
            scheduleMetronome(now, timeToSwitch, targetBpm, 0); 
        }

        // --- Song 2 再生 ---
        const src2 = audioCtx.createBufferSource();
        src2.buffer = s2.buffer;
        src2.playbackRate.value = r2;
        src2.preservesPitch = true;
        src2.connect(songGain);

        let s2StartTime = now + Math.max(0, timeToSwitch);
        let s2Offset = (timeToSwitch < 0) ? s2.startTS + (Math.abs(timeToSwitch) / r2) : s2.startTS;
        src2.start(s2StartTime, s2Offset);
        sources.push(src2);

        // Song 2 用メトロノーム (s2StartTime を基準)
        scheduleMetronome(s2StartTime, 20, targetBpm, (timeToSwitch < 0) ? Math.abs(timeToSwitch) % (60/targetBpm) : 0);

        log("Wメトロノーム同期中...");
    }

    function scheduleMetronome(startTime, duration, bpm, initialDelay) {
        const ivl = 60 / bpm;
        for (let t = 0; t < duration; t += ivl) {
            const time = startTime + t - initialDelay;
            if (time < audioCtx.currentTime) continue;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(startTime === audioCtx.currentTime ? 1000 : 1500, time); // 曲によって音を変える
            g.gain.setValueAtTime(0.4, time);
            g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
            osc.start(time); osc.stop(time + 0.12);
            metronomeOscs.push(osc);
        }
    }

    function seekTest() {
        if (isPlaying) { stopAll(); playTest(); }
    }
</script>
</body>
</html>
