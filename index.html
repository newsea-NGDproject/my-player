<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* ポップアップ用スタイル */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: flex;
            justify-content: center; align-items: center; text-align: center;
            z-index: 1000; padding: 20px; font-size: 1.2em; line-height: 1.8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="startAuth()">
    <div>
        スマホのアクセスセキュリティ<br>
        ルールに従い、本アプリ起動時の<br>
        指定フォルダーへの<br>
        アクセス承諾お願いします。<br>
        <br>
        <span style="font-size: 0.8em; color: #aaa;">(画面をタップしてフォルダーを選択してください)</span>
    </div>
</div>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div id="status">指定フォルダを認証してください</div>
    <div class="controls">
        <button id="scanFolder">📂 曲を読み込む(フォルダ内スキャン)</button>
        <button id="savePlaylist">💾 プレイリスト保存</button>
        <button id="loadPlaylist">📑 プレイリスト読込</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    let playlist = { songs: [] };
    const audioPlayer = new Audio();
    let rootHandle = null;

    // フォルダ認証開始 (タップ時に実行)
    async function startAuth() {
        try {
            // フォルダを選択させるダイアログを表示
            rootHandle = await window.showDirectoryPicker();
            
            // 認証に成功したらオーバーレイを消す
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
        } catch (err) {
            console.error(err);
            // ユーザーがキャンセルした場合は、再度タップを促す
            alert("フォルダのアクセス許可が必要です。もう一度タップして選択してください。");
        }
    }

    // フォルダ内を再帰的にスキャン
    document.getElementById('scanFolder').addEventListener('click', async () => {
        if (!rootHandle) return alert("先にフォルダを認証してください");
        playlist.songs = [];
        await scanDirectory(rootHandle);
        renderPlaylist();
    });

    async function scanDirectory(handle) {
        for await (const entry of handle.values()) {
            if (entry.kind === 'file' && (entry.name.endsWith('.mp3') || entry.name.endsWith('.m4a'))) {
                const file = await entry.getFile();
                playlist.songs.push({ name: entry.name, handle: entry, file: file, userBPM: 0 });
            } else if (entry.kind === 'directory') {
                await scanDirectory(entry);
            }
        }
    }

    // 保存 (認証したフォルダ内に保存)
    document.getElementById('savePlaylist').addEventListener('click', async () => {
        if (!rootHandle) return;
        const name = prompt("プレイリスト名", "my_playlist");
        if (!name) return;

        try {
            const fileHandle = await rootHandle.getFileHandle(`${name}.json`, { create: true });
            const writable = await fileHandle.createWritable();
            const exportData = {
                songs: playlist.songs.map(s => ({ name: s.name, userBPM: s.userBPM }))
            };
            await writable.write(JSON.stringify(exportData, null, 2));
            await writable.close();
            alert("保存完了しました！");
        } catch (err) { console.error(err); }
    });

    // 読込
    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        if (!rootHandle) return;
        try {
            const [fileHandle] = await window.showOpenFilePicker({
                startIn: rootHandle
            });
            const file = await fileHandle.getFile();
            const data = JSON.parse(await file.text());
            playlist.songs = data.songs;
            renderPlaylist();
            document.getElementById('status').innerText = `読込完了: ${fileHandle.name}`;
        } catch (err) { console.error(err); }
    });

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>▶ ${song.name}</span><span>BPM: ${song.userBPM || '未解析'}</span>`;
            li.onclick = async () => {
                const file = song.file || await song.handle.getFile();
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.play();
                document.getElementById('status').innerText = `再生中: ${song.name}`;
            };
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
