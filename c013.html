<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun c013 権限実験</title>
<style>
    body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f2f2f7;
        color: #1c1c1e;
    }
    h1 {
        font-size: 1.35rem;
        margin: 0 0 12px;
        text-align: center;
    }
    .card {
        background: #fff;
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    button {
        width: 100%;
        box-sizing: border-box;
        border: none;
        border-radius: 14px;
        padding: 15px 12px;
        margin: 8px 0;
        font-size: 1rem;
        font-weight: bold;
        color: #fff;
        background: #007aff;
    }
    button.gray { background: #8e8e93; }
    button.green { background: #34c759; }
    button.red { background: #ff3b30; }
    .status {
        white-space: pre-wrap;
        font-size: 0.9rem;
        line-height: 1.5;
        background: #f7f7f7;
        border-radius: 12px;
        padding: 12px;
        min-height: 80px;
    }
    .track {
        border: 1px solid #d1d1d6;
        border-radius: 12px;
        padding: 12px;
        margin-top: 10px;
        background: #fafafa;
    }
    .track-title {
        font-weight: bold;
        word-break: break-all;
    }
    .small {
        font-size: 0.82rem;
        color: #666;
        line-height: 1.5;
    }
    audio {
        width: 100%;
        margin-top: 8px;
    }
</style>
</head>
<body>

<h1>NoriRun c013 権限実験</h1>

<div class="card">
    <p class="small">
        目的：曲ごとの file_handle ではなく、Musicフォルダの root_folder_handle から、
        ファイル名で曲を再取得できるか確認します。<br>
        まず「Musicフォルダを登録」→「曲を1曲登録」→再生確認→アプリ終了→再起動→「保存済み曲を再生」で確認してください。
    </p>
</div>

<div class="card">
    <button id="select-folder-btn">① Musicフォルダを登録する</button>
    <button id="select-track-btn" class="green">② 登録済みフォルダ内の曲を1曲登録する</button>
    <button id="play-saved-btn">③ 保存済み曲を再生する</button>
    <button id="check-permission-btn" class="gray">④ フォルダ権限状態を確認する</button>
    <button id="clear-test-db-btn" class="red">実験DBをクリア</button>
</div>

<div class="card">
    <div class="status" id="status">準備中...</div>
</div>

<div class="card">
    <h2 style="font-size:1.05rem; margin:0 0 8px;">保存済み曲</h2>
    <div id="track-box" class="small">まだ曲は登録されていません。</div>
    <audio id="audio" controls></audio>
</div>

<script>
// ====================================================== 
// NoriRun c013 権限実験コード
// ------------------------------------------------------
// 実験の狙い：
// 1. Musicフォルダのハンドルを IndexedDB に保存する
// 2. 曲は file_handle ではなく file_name だけ保存する
// 3. 再生時に root_folder_handle.getFileHandle(file_name) で
//    ファイルハンドルを毎回取り直す
// 4. アプリ再起動後も、この方式で再生できるか確認する
// ======================================================

const DB_NAME = "NoriRunPermissionTestDB";
const DB_VERSION = 1;

const ROOT_ID = "music_root_001";
const TRACK_ID = "test_track_001";

let db = null;
let currentObjectUrl = null;

const statusEl = document.getElementById("status");
const trackBox = document.getElementById("track-box");
const audioEl = document.getElementById("audio");

// 画面にログを出す関数です。
function log(message) {
    const now = new Date().toLocaleTimeString();
    statusEl.textContent = `[${now}] ${message}\n\n` + statusEl.textContent;
}

// IndexedDBを開きます。
// この実験専用DBなので、本体の NoriRunDB は触りません。
function openTestDB() {
    return new Promise(function(resolve, reject) {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = function(event) {
            const openedDb = event.target.result;

            // フォルダハンドル保存用ストア
            if (!openedDb.objectStoreNames.contains("folder_roots")) {
                openedDb.createObjectStore("folder_roots", { keyPath: "folder_roots_id" });
            }

            // 曲情報保存用ストア
            if (!openedDb.objectStoreNames.contains("music_library")) {
                openedDb.createObjectStore("music_library", { keyPath: "track_id" });
            }
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            resolve(db);
        };

        request.onerror = function() {
            reject(request.error);
        };
    });
}

function putRecord(storeName, value) {
    return new Promise(function(resolve, reject) {
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(value);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
    });
}

function getRecord(storeName, key) {
    return new Promise(function(resolve, reject) {
        const tx = db.transaction(storeName, "readonly");
        const request = tx.objectStore(storeName).get(key);
        request.onsuccess = function() { resolve(request.result); };
        request.onerror = function() { reject(request.error); };
    });
}

// フォルダ権限を確認します。
// granted ならそのまま使えます。
// prompt ならユーザー操作後に requestPermission() で再許可を求めます。
async function verifyDirectoryPermission(directoryHandle) {
    const options = { mode: "read" };

    if (!directoryHandle) {
        return false;
    }

    const current = await directoryHandle.queryPermission(options);
    log("現在のフォルダ権限: " + current);

    if (current === "granted") {
        return true;
    }

    // 重要：requestPermission はユーザー操作の直後に呼ぶのが安全です。
    const requested = await directoryHandle.requestPermission(options);
    log("再要求後のフォルダ権限: " + requested);

    return requested === "granted";
}

// Musicフォルダを登録します。
async function selectMusicFolder() {
    try {
        if (!window.showDirectoryPicker) {
            alert("このブラウザでは showDirectoryPicker が使えません。");
            return;
        }

        // ユーザーにフォルダを選んでもらいます。
        // Androidではここでシステムのフォルダ選択画面が出るかを確認します。
        const dirHandle = await window.showDirectoryPicker({
            mode: "read"
        });

        const rootRecord = {
            folder_roots_id: ROOT_ID,
            root_name: dirHandle.name,
            root_folder_handle: dirHandle,
            saved_at: Date.now()
        };

        await putRecord("folder_roots", rootRecord);
        log("Musicフォルダを保存しました: " + dirHandle.name);

        await refreshSavedTrackView();
    } catch (error) {
        if (error && error.name === "AbortError") {
            log("フォルダ選択がキャンセルされました。");
        } else {
            console.error(error);
            alert("フォルダ登録でエラーが発生しました: " + error);
        }
    }
}

// 登録済みフォルダ内から、曲を1曲選んで登録します。
// ここでは曲の file_handle は保存せず、file_name だけ保存します。
async function selectOneTrackFromFolder() {
    try {
        const rootRecord = await getRecord("folder_roots", ROOT_ID);

        if (!rootRecord || !rootRecord.root_folder_handle) {
            alert("先に Musicフォルダを登録してください。");
            return;
        }

        const ok = await verifyDirectoryPermission(rootRecord.root_folder_handle);
        if (!ok) {
            alert("Musicフォルダの許可が必要です。");
            return;
        }

        // フォルダ内の音楽ファイルを探します。
        const candidates = [];

        for await (const entry of rootRecord.root_folder_handle.values()) {
            if (entry.kind !== "file") continue;

            const lower = entry.name.toLowerCase();
            if (
                lower.endsWith(".mp3") ||
                lower.endsWith(".m4a") ||
                lower.endsWith(".mp4") ||
                lower.endsWith(".wav") ||
                lower.endsWith(".flac")
            ) {
                candidates.push(entry.name);
            }
        }

        if (candidates.length === 0) {
            alert("このフォルダ直下に音楽ファイルが見つかりませんでした。まずは直下にある曲で実験してください。");
            return;
        }

        // 実験を単純にするため、最初に見つかった曲を登録します。
        const fileName = candidates[0];

        const trackRecord = {
            track_id: TRACK_ID,
            file_name: fileName,
            folder_roots_id: ROOT_ID,
            registered_at: Date.now()
        };

        await putRecord("music_library", trackRecord);
        log("曲を保存しました: " + fileName);

        await refreshSavedTrackView();
    } catch (error) {
        console.error(error);
        alert("曲登録でエラーが発生しました: " + error);
    }
}

// 保存済みの曲を、フォルダハンドル経由で再生します。
async function playSavedTrack() {
    try {
        const rootRecord = await getRecord("folder_roots", ROOT_ID);
        const trackRecord = await getRecord("music_library", TRACK_ID);

        if (!rootRecord || !rootRecord.root_folder_handle) {
            alert("Musicフォルダが登録されていません。");
            return;
        }

        if (!trackRecord || !trackRecord.file_name) {
            alert("保存済み曲がありません。先に曲を1曲登録してください。");
            return;
        }

        const ok = await verifyDirectoryPermission(rootRecord.root_folder_handle);
        if (!ok) {
            alert("Musicフォルダの再許可が必要です。");
            return;
        }

        // ここが今回の最重要実験ポイントです。
        // 保存済み file_handle は使わず、フォルダからファイル名で取り直します。
        const fileHandle = await rootRecord.root_folder_handle.getFileHandle(trackRecord.file_name);
        const file = await fileHandle.getFile();

        if (currentObjectUrl) {
            URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = null;
        }

        currentObjectUrl = URL.createObjectURL(file);
        audioEl.src = currentObjectUrl;
        audioEl.volume = 0.8;
        await audioEl.play();

        log("再生成功: " + trackRecord.file_name);
    } catch (error) {
        console.error(error);
        alert("再生失敗: " + error.name + " / " + error.message);
        log("再生失敗: " + error.name + " / " + error.message);
    }
}

// 現在のフォルダ権限状態だけ確認します。
async function checkPermissionOnly() {
    try {
        const rootRecord = await getRecord("folder_roots", ROOT_ID);

        if (!rootRecord || !rootRecord.root_folder_handle) {
            alert("Musicフォルダが登録されていません。");
            return;
        }

        const state = await rootRecord.root_folder_handle.queryPermission({ mode: "read" });
        log("フォルダ権限状態: " + state);
        alert("フォルダ権限状態: " + state);
    } catch (error) {
        console.error(error);
        alert("権限確認でエラー: " + error);
    }
}

// 実験DBを消します。
function clearTestDB() {
    const ok = confirm("実験用DBだけ削除します。NoriRunDB本体は削除しません。よろしいですか？");
    if (!ok) return;

    if (db) {
        db.close();
        db = null;
    }

    const request = indexedDB.deleteDatabase(DB_NAME);

    request.onsuccess = function() {
        alert("実験DBを削除しました。ページを再読み込みします。");
        location.reload();
    };

    request.onerror = function() {
        alert("実験DB削除に失敗しました。");
    };
}

async function refreshSavedTrackView() {
    const rootRecord = await getRecord("folder_roots", ROOT_ID);
    const trackRecord = await getRecord("music_library", TRACK_ID);

    let html = "";

    if (rootRecord) {
        html += "登録フォルダ: " + rootRecord.root_name + "<br>";
    } else {
        html += "登録フォルダ: なし<br>";
    }

    if (trackRecord) {
        html += "保存済み曲: " + trackRecord.file_name + "<br>";
        html += "保存日時: " + new Date(trackRecord.registered_at).toLocaleString();
    } else {
        html += "保存済み曲: なし";
    }

    trackBox.innerHTML = html;
}

async function init() {
    try {
        await openTestDB();
        log("実験DBを開きました。NoriRunDB本体は触っていません。");
        await refreshSavedTrackView();
    } catch (error) {
        console.error(error);
        alert("初期化エラー: " + error);
    }
}

document.getElementById("select-folder-btn").addEventListener("click", selectMusicFolder);
document.getElementById("select-track-btn").addEventListener("click", selectOneTrackFromFolder);
document.getElementById("play-saved-btn").addEventListener("click", playSavedTrack);
document.getElementById("check-permission-btn").addEventListener("click", checkPermissionOnly);
document.getElementById("clear-test-db-btn").addEventListener("click", clearTestDB);

init();
</script>
</body>
</html>
