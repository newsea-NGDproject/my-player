<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13=0 接続テストモジュール V4.5 究極版</title>
    <style>
        :root { --bg: #1a1a1a; --text: #e0e0e0; --accent: #00ffcc; --warn: #ffcc00; --danger: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.4; }
        .monitor { background: #000; border: 2px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; }
        .monitor-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
        .status-lamp { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #333; margin-right: 8px; }
        .lamp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .step-box { border: 1px solid #444; padding: 15px; border-radius: 8px; background: #252525; }
        h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent); border-bottom: 1px solid #444; }
        button { background: #333; color: var(--text); border: 1px solid var(--accent); padding: 12px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: var(--accent); color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin: 10px 0; }
        .val { color: var(--warn); font-weight: bold; }
        .file-input-group { margin-bottom: 15px; }
        input[type="file"] { font-size: 0.8rem; color: #888; }
        select { width: 100%; background: #222; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>📘 接続テストモジュール V4.5</h2>

    <div class="monitor">
        <div class="monitor-row">
            <span>[D1 先行曲] <span id="d1-status" class="val">LOADED</span></span>
            <span>BPM: <span id="mon-bpm1" class="val">--</span> | EndTS: <span id="mon-end1" class="val">--</span>s</span>
        </div>
        <div class="monitor-row">
            <span>[D2 後続曲] <span id="d2-status" class="val">LOADED</span></span>
            <span>BPM: <span id="mon-bpm2" class="val">--</span> | StartTS: <span id="mon-start2" class="val">--</span>s</span>
        </div>
        <div style="text-align: center; padding: 15px 0;">
            <div style="font-size: 0.8rem; color: #888;">COUNTDOWN TO EndTS</div>
            <div id="timer-display" style="font-size: 2.5rem; font-weight: bold; color: var(--warn);">-00.000s</div>
        </div>
        <div class="monitor-row" style="border: none;">
            <span><span id="res-lamp" class="status-lamp"></span> RESERVATION: <span id="res-status" class="val">WAITING</span></span>
            <span>LATENCY: <span id="latency-disp" class="val">0</span>ms</span>
        </div>
    </div>

    <div class="control-panel">
        <div class="step-box">
            <h3>STEP 1: 資産 & ソース準備</h3>
            <div class="file-input-group">
                <label style="font-size: 0.7rem;">L1 (先行曲) ファイルを選択</label><br>
                <input type="file" id="file-l1" accept="audio/*">
            </div>
            <div class="file-input-group">
                <label style="font-size: 0.7rem;">L2 (後続曲) ファイルを選択</label><br>
                <input type="file" id="file-l2" accept="audio/*">
            </div>
            <button id="btn-init">STEP 1: Audio資産ロード</button>
        </div>

        <div class="step-box">
            <h3>STEP 2 / FINAL: 検証実行</h3>
            <button id="btn-step2" disabled style="margin-bottom: 10px;">STEP 2: L1逆算同期(単独)</button>
            <button id="btn-final" disabled>FINAL: 総合接続試験(2曲)</button>
            <div style="margin-top: 15px;">
                <label style="font-size: 0.7rem;">検証モード</label>
                <select id="mode-select">
                    <option value="seamless">シームレス (重なり検証)</option>
                    <option value="brain-sync">脳内整理 (フェード検証)</option>
                </select>
            </div>
        </div>

        <div class="step-box">
            <h3>2chミキサー (直列介入用)</h3>
            <label>L1 Vol <span id="vol1-txt" class="val">0.50</span></label>
            <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.5">
            <label>L2 Vol <span id="vol2-txt" class="val">0.50</span></label>
            <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="step-box">
            <h3>最終防衛：レイテンシ補正</h3>
            <label>補正量 (ms) <span id="lat-txt" class="val">0</span></label>
            <input type="range" id="lat-adj" min="-200" max="200" step="1" value="0">
            <button id="btn-stop" style="margin-top:15px; border-color: var(--danger); color: var(--danger);">STOP (緊急停止/リセット)</button>
        </div>
    </div>

    <audio id="audio-l1"></audio>
    <audio id="audio-l2"></audio>

<script>
/**
 * 🎙️ つよぽん's Engine V4.5
 * 「データ継承の完全保証」実装済み
 */

class ConnectionEngine {
    constructor() {
        this.ctx = null;
        this.deck1 = { el: document.getElementById('audio-l1'), gRes: null, gMan: null, src: null };
        this.deck2 = { el: document.getElementById('audio-l2'), gRes: null, gMan: null, src: null };
        this.clickBuffer = null;
        this.isReserved = false;
        this.d1 = null;
        this.d2 = null;
        
        // 精度規定クレンジング
        this.clean = (v, d) => parseFloat(parseFloat(v).toFixed(d));

        // 起動時：データ継承の完全保証
        this.autoLoad();
    }

    autoLoad() {
        // キー名を「d1_data」「d2_data」に固定
        this.d1 = JSON.parse(localStorage.getItem('d1_data'));
        this.d2 = JSON.parse(localStorage.getItem('d2_data'));

        if (this.d1) {
            document.getElementById('mon-bpm1').innerText = this.d1.bpm;
            document.getElementById('mon-end1').innerText = this.d1.endTS;
            document.getElementById('d1-status').innerText = "OK";
        } else {
            document.getElementById('d1-status').innerText = "MISSING";
            document.getElementById('d1-status').style.color = "red";
        }

        if (this.d2) {
            document.getElementById('mon-bpm2').innerText = this.d2.bpm;
            document.getElementById('mon-start2').innerText = this.d2.startTS;
            document.getElementById('d2-status').innerText = "OK";
        } else {
            document.getElementById('d2-status').innerText = "MISSING";
            document.getElementById('d2-status').style.color = "red";
        }
        console.log("Storage Data Loaded:", {d1: this.d1, d2: this.d2});
    }

    async initAssets() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') await this.ctx.resume();

        try {
            // click.wav はプロジェクトルートにある想定
            const res = await fetch('click.wav');
            const ab = await res.arrayBuffer();
            this.clickBuffer = await this.ctx.decodeAudioData(ab);
            
            document.getElementById('btn-step2').disabled = false;
            document.getElementById('btn-final').disabled = false;
            alert("STEP 1: 資産ロード完了だぜ！");
        } catch (e) {
            alert("click.wav が見つからないか、デコードに失敗したぜ。");
        }
    }

    setupGraph() {
        // L1直列ゲイン構成
        if (!this.deck1.src) {
            this.deck1.src = this.ctx.createMediaElementSource(this.deck1.el);
            this.deck1.gRes = this.ctx.createGain(); // 予約用
            this.deck1.gMan = this.ctx.createGain(); // 手動用
            this.deck1.src.connect(this.deck1.gRes).connect(this.deck1.gMan).connect(this.ctx.destination);
        }
        // L2直列ゲイン構成
        if (!this.deck2.src) {
            this.deck2.src = this.ctx.createMediaElementSource(this.deck2.el);
            this.deck2.gRes = this.ctx.createGain();
            this.deck2.gMan = this.ctx.createGain();
            this.deck2.src.connect(this.deck2.gRes).connect(this.deck2.gMan).connect(this.ctx.destination);
        }
    }

    async run(isFinal = false) {
        if (!this.d1 || !this.d2 || !this.deck1.el.src) {
            alert("データかファイルが足りないぜ。モニターを確認してくれ。");
            return;
        }

        this.isReserved = false;
        document.getElementById('res-lamp').classList.remove('lamp-on');
        document.getElementById('res-status').innerText = "WAITING";

        this.setupGraph();

        const endTS = this.clean(this.d1.endTS, 3);
        const targetBPM = this.clean(this.d1.bpm, 2);
        const beatDur = this.clean(60 / targetBPM, 3);

        // EndTSの25秒前からスタート（仕様準拠）
        this.deck1.el.currentTime = Math.max(0, endTS - 25);
        this.deck1.el.play();

        const monitor = setInterval(() => {
            const curr = this.deck1.el.currentTime;
            const remain = endTS - curr;
            document.getElementById('timer-display').innerText = (remain * -1).toFixed(3) + "s";

            // L4予約発火（20秒前、または即時）
            if (!this.isReserved && remain <= 20) {
                this.executeL4(endTS, beatDur, isFinal);
            }

            if (curr >= endTS + 15) {
                clearInterval(monitor);
                console.log("Test Loop Finished.");
            }
        }, 16);
    }

    executeL4(endTS, beatDur, isFinal) {
        const now = this.ctx.currentTime;
        const mode = document.getElementById('mode-select').value;
        const latency = parseInt(document.getElementById('lat-adj').value) / 1000;
        const currAtReserve = this.deck1.el.currentTime;

        // 脳内整理モード：おもてなしフェード予約
        if (mode === 'brain-sync') {
            const fadeOutStart = now + (endTS - 12 - currAtReserve);
            const fadeOutEnd = now + (endTS - 2 - currAtReserve);
            this.deck1.gRes.gain.setValueAtTime(1, fadeOutStart);
            this.deck1.gRes.gain.linearRampToValueAtTime(0, fadeOutEnd);

            if (isFinal) {
                const fadeInStart = now + (endTS + 2 - currAtReserve);
                const fadeInEnd = now + (endTS + 12 - currAtReserve);
                this.deck2.gRes.gain.setValueAtTime(0, fadeInStart);
                this.deck2.gRes.gain.linearRampToValueAtTime(1, fadeInEnd);
            }
        }

        // L2の物理同期スタート (13=0)
        if (isFinal) {
            const d2StartTS = this.clean(this.d2.startTS, 3);
            const l2TriggerDelay = (endTS - beatDur - currAtReserve) - (d2StartTS - beatDur);
            
            setTimeout(() => {
                this.deck2.el.play();
                console.log("L2 Started by L4 Scheduler.");
            }, l2TriggerDelay * 1000);
        }

        // メトロノーム予約 (±20拍)
        for (let i = -20; i <= 20; i++) {
            const beatTime = now + (endTS - currAtReserve) + (i * beatDur) + latency;
            if (beatTime > now) {
                const bSource = this.ctx.createBufferSource();
                bSource.buffer = this.clickBuffer;
                bSource.connect(this.ctx.destination);
                bSource.start(beatTime);
            }
        }

        this.isReserved = true;
        document.getElementById('res-lamp').classList.add('lamp-on');
        document.getElementById('res-status').innerText = "RESERVED";
    }
}

// Global Engine Instance
const engine = new ConnectionEngine();

// UI Event Binding
document.getElementById('file-l1').onchange = (e) => {
    engine.deck1.el.src = URL.createObjectURL(e.target.files[0]);
};
document.getElementById('file-l2').onchange = (e) => {
    engine.deck2.el.src = URL.createObjectURL(e.target.files[0]);
};
document.getElementById('btn-init').onclick = () => engine.initAssets();
document.getElementById('btn-step2').onclick = () => engine.run(false);
document.getElementById('btn-final').onclick = () => engine.run(true);
document.getElementById('btn-stop').onclick = () => location.reload();

document.getElementById('vol1').oninput = (e) => {
    const v = e.target.value;
    document.getElementById('vol1-txt').innerText = parseFloat(v).toFixed(2);
    if (engine.deck1.gMan) engine.deck1.gMan.gain.value = v;
};
document.getElementById('vol2').oninput = (e) => {
    const v = e.target.value;
    document.getElementById('vol2-txt').innerText = parseFloat(v).toFixed(2);
    if (engine.deck2.gMan) engine.deck2.gMan.gain.value = v;
};
document.getElementById('lat-adj').oninput = (e) => {
    document.getElementById('lat-txt').innerText = e.target.value;
    document.getElementById('latency-disp').innerText = e.target.value;
};
</script>
</body>
</html>
