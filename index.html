<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の特別プレイヤーPWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; }
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>🎵 竹弘の夢のプレイヤー</h2>
    <div class="controls">
        <button id="addFiles">📂 曲を追加</button>
        <button id="savePlaylist">💾 名前を付けて保存</button>
        <button id="loadPlaylist">📑 読込</button>
    </div>
    <ul id="playlist"></ul>
</div>

<script>
    let playlist = { marathonMode: false, marathonBPM: 120, songs: [] };

    // 1. 曲の追加と解析
    document.getElementById('addFiles').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.multiple = true; input.accept = 'audio/mp3';
        input.onchange = async (e) => {
            for (let file of e.target.files) {
                let song = { name: file.name, detectedBPM: 0, userBPM: 0 };
                playlist.songs.push(song);
                renderPlaylist(); // 一旦リスト表示
                song.detectedBPM = await analyzeBPM(file);
                song.userBPM = song.detectedBPM; // 初期値としてセット
                renderPlaylist(); // 解析後に更新
            }
        };
        input.click();
    });

    // 2. BPM解析エンジン (Web Audio API)
    async function analyzeBPM(file) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
        const data = buffer.getChannelData(0);
        
        // 簡易的なピーク検知ロジック (サンプリングして一定以上の振幅をカウント)
        let count = 0;
        const interval = Math.floor(buffer.sampleRate / 2); // 0.5秒間隔
        for (let i = 0; i < data.length; i += interval) {
            if (Math.abs(data[i]) > 0.3) count++;
        }
        return Math.floor((count / (buffer.duration / 60)) * 2);
    }

    // 保存・読込ロジックは前回同様
    document.getElementById('savePlaylist').addEventListener('click', async () => {
        const name = prompt("プレイリスト名", "私のマラソンリスト");
        if (!name) return;
        const handle = await window.showSaveFilePicker({suggestedName: `${name}.json`});
        const writable = await handle.createWritable();
        await writable.write(JSON.stringify(playlist, null, 2));
        await writable.close();
    });

    document.getElementById('loadPlaylist').addEventListener('click', async () => {
        const [handle] = await window.showOpenFilePicker();
        const file = await handle.getFile();
        playlist = JSON.parse(await file.text());
        renderPlaylist();
    });

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach(s => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${s.name}</span><span>BPM: ${s.userBPM || '解析中...'}</span>`;
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
