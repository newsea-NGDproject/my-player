<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC MASTER V3.1 - MyPitch Sync</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: #161616; padding: 20px; border-radius: 30px; border: 1px solid #333; }
        .monitor { background: #000; padding: 20px; border-radius: 20px; border: 2px solid #00ff88; margin-bottom: 15px; }
        .timer { font-size: 2.8em; font-weight: bold; font-family: monospace; color: #00ff88; }
        
        .control-panel { background: #222; padding: 15px; border-radius: 20px; margin-bottom: 10px; text-align: left; }
        .label-row { display: flex; justify-content: space-between; color: #00ff88; font-weight: bold; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: #00ff88; cursor: pointer; }
        
        .input-group { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .input-group input { flex: 1; background: #000; color: #ff00ff; border: 1px solid #444; font-size: 1.5em; text-align: center; padding: 5px; border-radius: 10px; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-magenta { background: #ff00ff; color: white; }
        .btn-stop { background: #441111; color: #ff8888; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #00ff88;">SYNC MASTER V3.1</h2>
    
    <div class="monitor">
        <div id="timerDisplay" class="timer">00:00.00</div>
        <div id="phaseLabel" style="color: #ff00ff; font-size: 0.9em;">READY</div>
    </div>

    <div class="control-panel">
        <div class="label-row"><span>マイピッチBPM (走る速度)</span><span id="targetBpmVal">128.0</span></div>
        <div class="input-group">
            <input type="number" id="targetBpm" value="128.0" step="0.1" oninput="updateTargetBpm(this.value)">
        </div>
    </div>

    <div class="control-panel">
        <div class="label-row"><span>1曲目 音量</span></div>
        <input type="range" id="vol1" min="0" max="1" step="0.01" value="0.5">
        <div class="label-row" style="margin-top:10px;"><span>2曲目 音量</span></div>
        <input type="range" id="vol2" min="0" max="1" step="0.01" value="0.5">
        <div class="label-row" style="margin-top:10px; color:#00ff88;"><span>爆音メトロ音量</span></div>
        <input type="range" id="volM" min="0" max="1" step="0.01" value="0.8">
    </div>

    <button class="btn btn-blue" onclick="document.getElementById('file0').click()">🎵 1曲目ロード</button>
    <input type="file" id="file0" accept="audio/*" onchange="loadAudio(0, this)" style="display:none">
    
    <button class="btn btn-blue" onclick="document.getElementById('file1').click()">🎵 2曲目ロード</button>
    <input type="file" id="file1" accept="audio/*" onchange="loadAudio(1, this)" style="display:none">

    <button id="startBtn" class="btn btn-magenta" onclick="runVerification()" disabled>🔗 検証スタート (15秒前〜)</button>
    <button class="btn btn-stop" onclick="stopEverything()">STOP / RESET</button>
</div>

<audio id="p1"></audio>
<audio id="p2"></audio>

<script>
    const players = [document.getElementById('p1'), document.getElementById('p2')];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let songData = [null, null];
    let isRunning = false;
    let loopId = null;
    let lastTickBeat = -1;

    window.onload = () => {
        const d0 = localStorage.getItem("song_0_data");
        const d1 = localStorage.getItem("song_1_data");
        if (d0 && d1) {
            songData = [JSON.parse(d0), JSON.parse(d1)];
            document.getElementById('startBtn').disabled = false;
        }
    };

    function updateTargetBpm(v) { document.getElementById('targetBpmVal').innerText = v; }

    function loadAudio(idx, input) {
        const file = input.files[0];
        if (!file) return;
        players[idx].src = URL.createObjectURL(file);
        if (players[0].src && players[1].src) document.getElementById('startBtn').disabled = false;
    }

    async function runVerification() {
        if (isRunning) return;
        await audioCtx.resume();
        isRunning = true;
        
        const targetBpm = parseFloat(document.getElementById('targetBpm').value);
        const exitPoint = songData[0].endTS; 
        const entryPoint = songData[1].startTS;
        const leadTime = 15;

        // 再生速度（Rate）を計算
        const rate1 = targetBpm / songData[0].bpm;
        const rate2 = targetBpm / songData[1].bpm;

        players[0].playbackRate = rate1;
        players[1].playbackRate = rate2;

        players[0].currentTime = exitPoint - leadTime;
        players[1].currentTime = entryPoint - leadTime;
        
        players[0].play();
        players[1].play();

        lastTickBeat = -1;

        loopId = setInterval(() => {
            const cur1 = players[0].currentTime;
            const distToJump = exitPoint - cur1;
            document.getElementById('timerDisplay').innerText = (distToJump > 0 ? "-" : "+") + Math.abs(distToJump).toFixed(2) + "s";

            // --- メトロノーム同期ロジック (V1.8方式の進化形) ---
            // 1曲目の再生位置(cur1)から、出口(exitPoint)までの「残り拍数」を計算
            const beatSec1 = 60 / songData[0].bpm; // 1曲目本来の1拍の秒数
            const remainingBeats = distToJump / beatSec1;
            
            // 拍の整数部分をトリガーにする
            const currentBeatCount = Math.floor(remainingBeats);
            if (currentBeatCount !== lastTickBeat) {
                playTick(audioCtx.currentTime, 2000, document.getElementById('volM').value);
                lastTickBeat = currentBeatCount;
            }

            // --- フェード & ミキサーロジック ---
            let v1Base = document.getElementById('vol1').value;
            let v2Base = document.getElementById('vol2').value;

            if (distToJump < 2 && distToJump > 0) {
                players[0].volume = v1Base * (distToJump / 2); // フェードアウト
                players[1].volume = 0;
                document.getElementById('phaseLabel').innerText = "FADE OUT...";
            } else if (distToJump <= 0 && distToJump > -2) {
                players[0].volume = 0;
                players[1].volume = 0; // 無音4秒区間
                document.getElementById('phaseLabel').innerText = "SILENCE (4s)";
            } else if (distToJump <= -2 && distToJump > -4) {
                players[1].volume = v2Base * (Math.abs(distToJump + 2) / 2); // フェードイン
                document.getElementById('phaseLabel').innerText = "FADE IN...";
            } else if (distToJump <= -4) {
                players[1].volume = v2Base;
                document.getElementById('phaseLabel').innerText = "POST-SYNC";
            } else {
                players[0].volume = v1Base;
                players[1].volume = 0; // 接続前は裏で鳴らす
                document.getElementById('phaseLabel').innerText = "DUAL RUNNING (PRE)";
            }
        }, 20);
    }

    function playTick(t, freq, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.1);
    }

    function stopEverything() {
        clearInterval(loopId);
        players.forEach(p => { p.pause(); });
        isRunning = false;
        document.getElementById('phaseLabel').innerText = "STOPPED";
    }
</script>
</body>
</html>
