<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoriRun Ver.9 - Initial Setup</title>
    <style>
        :root {
            --accent-red: #ff3b30;
            --main-blue: #007aff;
            --bg-color: #f2f2f7;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; touch-action: none;
        }
        #init-screen {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
        }
        h1 { margin: 10px 0 5px; font-size: 1.6rem; color: #1c1c1e; }
        .instruction { font-size: 1rem; margin: 0; font-weight: 500; }
        .sub-instruction { font-size: 0.85rem; color: #8e8e93; margin-bottom: 10px; }

        /* --- スワイプ定規エリア --- */
        .ruler-outer {
            position: relative; width: 100%; height: 160px;
            background: #fff; border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 15px; overflow: hidden;
        }
        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 3px; background: var(--accent-red);
            z-index: 10; transform: translateX(-50%);
            border-radius: 2px;
        }
        #ruler-canvas { cursor: grab; width: 100%; height: 100%; }

        /* --- ラベル表示 --- */
        #status-display { text-align: center; margin-bottom: 15px; }
        #pitch-number { font-size: 3.5rem; font-weight: 900; color: var(--main-blue); line-height: 1; font-variant-numeric: tabular-nums; }
        #pitch-label { font-size: 1.3rem; font-weight: bold; margin-top: 8px; }

        /* --- 安心メッセージ（竹弘指定：設定ボタン版） --- */
        .safety-box {
            background: #f0f7ff; border: 1px solid #d1d1d6;
            padding: 15px; border-radius: 15px;
            width: 90%; max-width: 450px;
            font-size: 0.88rem; line-height: 1.5; color: #3a3a3c;
        }
        .safety-title { font-weight: bold; display: block; margin-bottom: 6px; color: #000; }

        /* --- 設定ボタン --- */
        #save-btn {
            margin-top: auto; margin-bottom: 25px;
            background: var(--main-blue); color: white;
            border: none; padding: 18px 50px;
            font-size: 1.15rem; font-weight: bold;
            border-radius: 35px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
            transition: transform 0.1s;
        }
        #save-btn:active { transform: scale(0.96); }

        @media (orientation: landscape) {
            #init-screen { padding: 10px; }
            .ruler-outer { height: 110px; width: 70%; }
            #status-display { display: flex; align-items: center; gap: 20px; }
            #pitch-number { font-size: 2.5rem; }
            .safety-box { font-size: 0.8rem; padding: 8px; }
        }
    </style>
</head>
<body>

<div id="init-screen">
    <h1>初期設定</h1>
    <p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
    <p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>

    <div id="status-display">
        <div id="pitch-number">170</div>
        <div id="pitch-label">🏃‍♂️ マラソン</div>
    </div>

    <div class="ruler-outer" id="ruler-container">
        <div class="center-line"></div>
        <canvas id="ruler-canvas"></canvas>
    </div>

    <div class="safety-box">
        <span class="safety-title">🛡️ 安心・安全への取り組み</span>
        下記<strong>「設定」</strong>ボタンを押すと<br><strong>「このサイトにファイルの表示とコピーを許可しますか？」</strong><br>と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
    </div>

    <button id="save-btn">設定</button>
</div>

<script>
/**
 * NoriRun Ver.9 - STEP 1-A Final Source
 * (C) 2026 Takehiro & つよぽん
 */

const state = {
    bpm: 170,
    targetBpm: 170,
    minBpm: 100,
    maxBpm: 220,
    unitW: 20,
    isDragging: false,
    lastX: 0,
    audioCtx: null,
    clickBuffer: null,
    nextTickTime: 0,
    isPlaying: false
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const numDisp = document.getElementById('pitch-number');
const labelDisp = document.getElementById('pitch-label');

// --- 1. Audioエンジン (click.wav連動) ---
async function setupAudio() {
    if (state.audioCtx) return;
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        const res = await fetch('click.wav');
        const buf = await res.arrayBuffer();
        state.clickBuffer = await state.audioCtx.decodeAudioData(buf);
    } catch (e) { console.error("click.wavが見つかりません"); }
}

function scheduler() {
    if (!state.isPlaying) return;
    while (state.nextTickTime < state.audioCtx.currentTime + 0.1) {
        playClick(state.nextTickTime);
        state.nextTickTime += 60.0 / state.bpm;
    }
    requestAnimationFrame(scheduler);
}

function playClick(time) {
    if (!state.clickBuffer) return;
    const s = state.audioCtx.createBufferSource();
    s.buffer = state.clickBuffer;
    s.connect(state.audioCtx.destination);
    s.start(time);
}

// --- 2. ヌルヌル描画ロジック ---
function render() {
    if (!state.isDragging) {
        state.bpm += (state.targetBpm - state.bpm) * 0.25; // 吸い付き補完
    } else {
        state.bpm = state.targetBpm;
    }

    const w = canvas.width;
    const h = canvas.height;
    const centerX = w / 2;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#3a3a3c';
    ctx.lineWidth = 1;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';

    const start = Math.floor(state.bpm - (centerX / state.unitW)) - 1;
    const end = Math.ceil(state.bpm + (centerX / state.unitW)) + 1;

    for (let i = start; i <= end; i++) {
        if (i < state.minBpm || i > state.maxBpm) continue;
        const x = centerX + (i - state.bpm) * state.unitW;
        
        ctx.beginPath();
        ctx.moveTo(x, 0);
        if (i % 10 === 0) {
            ctx.lineWidth = 2;
            ctx.lineTo(x, 45);
            ctx.fillStyle = '#1c1c1e';
            ctx.fillText(i, x, 65);
        } else if (i % 5 === 0) {
            ctx.lineWidth = 1.5;
            ctx.lineTo(x, 30);
        } else {
            ctx.lineWidth = 1;
            ctx.lineTo(x, 15);
        }
        ctx.stroke();
    }

    updateLabel();
    requestAnimationFrame(render);
}

function updateLabel() {
    const b = Math.round(state.bpm);
    numDisp.innerText = b;
    if (b <= 120) labelDisp.innerText = "🚶‍♂️ ウォーキング";
    else if (b <= 135) labelDisp.innerText = "🥁 行進";
    else if (b <= 200) labelDisp.innerText = "🏃‍♂️ マラソン";
    else labelDisp.innerText = "🏎️ 全力ダッシュ！";
}

// --- 3. 操作制御 ---
function handleStart(x) {
    if (!state.audioCtx) {
        setupAudio().then(() => {
            state.isPlaying = true;
            state.nextTickTime = state.audioCtx.currentTime;
            scheduler();
        });
    } else if (state.audioCtx.state === 'suspended') {
        state.audioCtx.resume();
    }
    state.isDragging = true;
    state.lastX = x;
}

function handleMove(x) {
    if (!state.isDragging) return;
    const deltaX = x - state.lastX;
    state.targetBpm -= deltaX / state.unitW;
    if (state.targetBpm < state.minBpm) state.targetBpm = state.minBpm;
    if (state.targetBpm > state.maxBpm) state.targetBpm = state.maxBpm;
    state.lastX = x;
}

function handleEnd() {
    state.isDragging = false;
    state.targetBpm = Math.round(state.targetBpm);
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchend', handleEnd);

canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- 4. 保存 & 完了フラグ ---
async function saveAndNext() {
    state.isPlaying = false;
    const request = indexedDB.open("NoriRunDB", 1);

    request.onupgradeneeded = e => {
        const db = e.target.result;
        db.createObjectStore('settings');
        db.createObjectStore('music_library', { keyPath: 'file_path' });
    };

    request.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('settings', 'readwrite');
        tx.objectStore('settings').put(Math.round(state.bpm), 'my_pitch');
        tx.objectStore('settings').put(true, 'init_completed');
        
        tx.oncomplete = () => {
            alert("初期設定が完了しました！次は音楽をスキャンしましょう。");
            // location.reload(); // 次の工程ができたら遷移
        };
    };
}

document.getElementById('save-btn').onclick = saveAndNext;

// --- 5. 起動 ---
function init() {
    const container = document.getElementById('ruler-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    render();
}

window.addEventListener('resize', () => {
    const container = document.getElementById('ruler-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
});

init();
</script>
</body>
</html>
