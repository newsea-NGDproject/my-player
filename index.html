<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ノリRun Ver.9 - Initial Setup</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --accent-red: #ff3b30;
            --main-blue: #007aff;
            --bg-color: #f2f2f7;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; touch-action: none;
        }
        #init-screen {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
        }
        h1 { margin: 10px 0 5px; font-size: 1.6rem; color: #1c1c1e; }
        .instruction { font-size: 1rem; margin: 0; font-weight: 500; }
        .sub-instruction { font-size: 0.85rem; color: #8e8e93; margin-bottom: 10px; }

        /* --- スワイプ定規エリア --- */
        .ruler-outer {
            position: relative; width: 100%; height: 160px;
            background: #fff; border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 15px; overflow: hidden;
        }
        .center-line {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 3px; background: var(--accent-red);
            z-index: 10; transform: translateX(-50%);
            border-radius: 2px;
        }
        #ruler-canvas { cursor: grab; width: 100%; height: 100%; }

        /* --- ラベル表示 --- */
        #status-display { text-align: center; margin-bottom: 15px; }
        #pitch-number { font-size: 3.5rem; font-weight: 900; color: var(--main-blue); line-height: 1; font-variant-numeric: tabular-nums; }
        #pitch-label { font-size: 1.3rem; font-weight: bold; margin-top: 8px; }

        /* --- 安心メッセージ（竹弘指定：ノリRunおもてなし版へ変更） --- */
        .safety-box {
            background: #f0f7ff; border: 1px solid #d1d1d6;
            padding: 15px; border-radius: 15px;
            width: 90%; max-width: 450px;
            font-size: 0.88rem; line-height: 1.5; color: #3a3a3c;
        }
        .safety-title { font-weight: bold; display: block; margin-bottom: 6px; color: #000; }

        /* --- 設定ボタン --- */
        #save-btn {
            margin-top: auto; margin-bottom: 25px;
            background: var(--main-blue); color: white;
            border: none; padding: 18px 50px;
            font-size: 1.15rem; font-weight: bold;
            border-radius: 35px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
            transition: transform 0.1s;
        }
        #save-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<!-- ==========================================
     [追加] START STEP0 DEV_ONLY (開発完了後に丸ごと削除可能)
     ========================================== -->
<style id="step0-debug-style">
  #step0-debug-curtain {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(20, 20, 25, 0.95);
    z-index: 9999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    font-family: sans-serif; color: #fff;
    padding: 20px; box-sizing: border-box;
  }
  .debug-panel {
    background: #2a2a35; border: 2px solid #444; border-radius: 12px;
    padding: 24px; text-align: center; max-width: 340px; width: 100%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .debug-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #ffdd57; }
  .debug-desc { font-size: 13px; color: #ccc; margin-bottom: 20px; line-height: 1.4; }
  .debug-btn {
    width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 8px;
    font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s;
  }
  .btn-clear { background: #ff4757; color: white; }
  .btn-clear:active { background: #ff2e44; }
  .btn-test { background: #2ed573; color: white; }
  .btn-test:active { background: #26af5f; }
</style>

<div id="step0-debug-curtain">
  <div class="debug-panel">
    <div class="debug-title">🛠️ ノリRun 開発者専用テスト</div>
    <div class="debug-desc">本番公開時はこのカーテン（STEP0）が一撃で消滅し、ユーザーには直接定規画面（STEP1-A）が見えるぜ！</div>
    <button class="debug-btn btn-clear" id="step0-btn-clear">① 強制クリア（初回テスト）</button>
    <button class="debug-btn btn-test" id="step0-btn-test">② 2回目以降起動テスト</button>
  </div>
</div>
<!-- ==========================================
     [追加] END STEP0 DEV_ONLY
     ========================================== -->

<div id="init-screen">
    <h1>初期設定</h1>
    <p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
    <p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>

    <div id="status-display">
        <div id="pitch-number">170</div>
        <div id="pitch-label">🏃‍♂️ マラソン</div>
    </div>

    <div class="ruler-outer" id="ruler-container">
        <div class="center-line"></div>
        <canvas id="ruler-canvas"></canvas>
    </div>

    <!-- [変更] 竹弘大決断の「ノリRunおもてなし案内文」へリプレイス -->
    <div class="safety-box">
        <span class="safety-title">🛡️ 安心・安全　インストール手順</span>
        ①<strong>「設定」</strong>ボタンを押すと、<br>スマホのフォルダ選択画面が開きます。<br>②このフォルダの曲をアプリに登録でよければ、最下部の<strong>「このフォルダを使用」</strong>をタップし、フォルダのアクセスを<strong>「許可」</strong>して下さい。<br>　あなたのスマホ内の<strong>ノリRun曲データベース</strong>に曲情報を<strong>アップロード</strong>します。
    </div>

    <button id="save-btn">設定</button>
</div>

<script>
/**
 * ノリRun Ver.9 - STEP 1-A Final Source
 * (C) 2026 Takehiro & つよぽん
 */

const state = {
    bpm: 170,
    targetBpm: 170,
    minBpm: 100,
    maxBpm: 220,
    unitW: 20,
    isDragging: false,
    lastX: 0,
    audioCtx: null,
    clickBuffer: null,
    nextTickTime: 0,
    isPlaying: false
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const numDisp = document.getElementById('pitch-number');
const labelDisp = document.getElementById('pitch-label');

// --- 1. Audioエンジン (click.wav連動) ---
async function setupAudio() {
    if (state.audioCtx) return;
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        const res = await fetch('click.wav');
        const buf = await res.arrayBuffer();
        state.clickBuffer = await state.audioCtx.decodeAudioData(buf);
    } catch (e) { console.error("click.wavが見つかりません"); }
}

function scheduler() {
    if (!state.isPlaying) return;
    while (state.nextTickTime < state.audioCtx.currentTime + 0.1) {
        playClick(state.nextTickTime);
        state.nextTickTime += 60.0 / state.bpm;
    }
    requestAnimationFrame(scheduler);
}

function playClick(time) {
    if (!state.clickBuffer) return;
    const s = state.audioCtx.createBufferSource();
    s.buffer = state.clickBuffer;
    s.connect(state.audioCtx.destination);
    s.start(time);
}

// --- 2. ヌルヌル描画ロジック ---
function render() {
    if (!state.isDragging) {
        state.bpm += (state.targetBpm - state.bpm) * 0.25; // 吸い付き補完
    } else {
        state.bpm = state.targetBpm;
    }

    const w = canvas.width;
    const h = canvas.height;
    const centerX = w / 2;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#3a3a3c';
    ctx.lineWidth = 1;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';

    const start = Math.floor(state.bpm - (centerX / state.unitW)) - 1;
    const end = Math.ceil(state.bpm + (centerX / state.unitW)) + 1;

    for (let i = start; i <= end; i++) {
        if (i < state.minBpm || i > state.maxBpm) continue;
        const x = centerX + (i - state.bpm) * state.unitW;
        
        ctx.beginPath();
        ctx.moveTo(x, 0);
        if (i % 10 === 0) {
            ctx.lineWidth = 2;
            ctx.lineTo(x, 45);
            ctx.fillStyle = '#1c1c1e';
            ctx.fillText(i, x, 65);
        } else if (i % 5 === 0) {
            ctx.lineWidth = 1.5;
            ctx.lineTo(x, 30);
        } else {
            ctx.lineWidth = 1;
            ctx.lineTo(x, 15);
        }
        ctx.stroke();
    }

    updateLabel();
    requestAnimationFrame(render);
}

function updateLabel() {
    const b = Math.round(state.bpm);
    numDisp.innerText = b;
    if (b <= 120) labelDisp.innerText = "🚶‍♂️ ウォーキング";
    else if (b <= 135) labelDisp.innerText = "🥁 行進";
    else if (b <= 200) labelDisp.innerText = "🏃‍♂️ マラソン";
    else labelDisp.innerText = "🏎️ 全力ダッシュ！";
}

// --- 3. 操作制御 ---
function handleStart(x) {
    if (!state.audioCtx) {
        setupAudio().then(() => {
            state.isPlaying = true;
            state.nextTickTime = state.audioCtx.currentTime;
            scheduler();
        });
    } else if (state.audioCtx.state === 'suspended') {
        state.audioCtx.resume();
    }
    state.isDragging = true;
    state.lastX = x;
}

function handleMove(x) {
    if (!state.isDragging) return;
    const deltaX = x - state.lastX;
    state.targetBpm -= deltaX / state.unitW;
    if (state.targetBpm < state.minBpm) state.targetBpm = state.minBpm;
    if (state.targetBpm > state.maxBpm) state.targetBpm = state.maxBpm;
    state.lastX = x;
}

function handleEnd() {
    state.isDragging = false;
    state.targetBpm = Math.round(state.targetBpm);
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchend', handleEnd);

canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- 4. 保存 & 完了フラグ ---
async function saveAndNext() {
    state.isPlaying = false;
    const request = indexedDB.open("NoriRunDB", 1);

    request.onupgradeneeded = e => {
        const db = e.target.result;
        db.createObjectStore('settings');
        db.createObjectStore('music_library', { keyPath: 'file_path' });
    };

    request.onsuccess = e => {
        const db = e.target.result;
        const tx = db.transaction('settings', 'readwrite');
        tx.objectStore('settings').put(Math.round(state.bpm), 'my_pitch');
        tx.objectStore('settings').put(true, 'init_completed');
        
        tx.oncomplete = () => {
            alert("初期設定が完了しました！次は音楽をスキャンしましょう。");
            // location.reload(); // 次の工程ができたら遷移
        };
    };
}

document.getElementById('save-btn').onclick = saveAndNext;

// --- 5. [変更] 起動 ＆ ルート自動判別制御 ---
function init() {
  // --- STEP0: デバッグカーテンのボタンイベント仕込み ---
    const curtain = document.getElementById('step0-debug-curtain');
  
    if (curtain) {
        // ボタン①：強制クリア（DBを削除して初回起動状態を作り出す）
        document.getElementById('step0-btn-clear').addEventListener('click', () => {
            curtain.style.display = 'none'; // カーテンを開ける
            console.log("【デバッグ】初回起動（ルートA）をシミュレートします。");
            // ※ここにDB削除(indexedDB.deleteDatabase)と、フラグfalse初期化を後ほど連動
            // 現段階ではカーテンを閉じてそのまま既存の定規描画へ進む
            startRouteA(); 
        });

        // ボタン②：2回目以降起動テスト（フラグを強制的にtrueにしてOFSへ飛ばす）
        document.getElementById('step0-btn-test').addEventListener('click', () => {
            curtain.style.display = 'none'; // カーテンを開ける
            console.log("【デバッグ】2回目以降の起動（ルートB）をシミュレートします。");
            startRouteB();
        });
    }
    
    // 実際の自動判別ロジック（本番用）もここに用意
    checkLaunchRoute();
}

// 起動ルートを判定する関数（DB Ver 2の settings ストアを参照する予定の場所）
async function checkLaunchRoute() {
    // 現段階では、STEP0のカーテンが前面を覆っているため、裏でひっそり判定させるだけにする
    // 本番化の時は、ここが起動の最前線になって自動で画面を振り分けるぜ！
    let init_completed = false; // 将来的にDBから取得 
    
    if (init_completed) {
        // ルートB: OFS（メインメニュー）へ直撃
    } else {
        // ルートA: 定規画面（STEP1-A）を裏で安全に組み立てておく
        const container = document.getElementById('ruler-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
}

function startRouteA() {
    // 竹弘が作り込んだ極上のヌルヌル定規描画をここでキック！
    render(); 
}

function startRouteB() {
    // 将来的にOFS画面をパッと出現させる関数をここにドッキングするぜ
    alert("【仮実装】OFS画面へ直撃しました！（後ほど画面表示ロジックに差し替え）");
}

// サービスワーカーの登録スクリプト（PWA化用）
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker 登録成功！', reg.scope))
            .catch(err => console.log('Service Worker 登録失敗...', err));
    });
}

// 起動関数を実行
init();
</script>
</body>
</html>
