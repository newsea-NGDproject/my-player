<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">

    <title>ノリRun - 初期設定</title>
    <style>
        :root {
            --accent-red: #ff3b30;
            --main-blue: #007aff;
            --bg-color: #f2f2f7;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; touch-action: none;
        }
        #init-screen {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
        }
        h1 { margin: 10px 0 20px; font-size: 1.8rem; color: #1c1c1e; }/* margin: 10px 0 20px余白上10px　左右0px　下20px、font-size:1.8rem標準文字の約1.8倍 */
        .instruction {font-size: 1.1rem; margin: 0 0 20px; font-weight: 600;text-align: center;}

        /* --- 解説メッセージ(マイピッチとは) --- */
        .kaisetu-box {
            background: #f0f7ff; border: 1px solid #d1d1d6;
            padding: 10px; border-radius: 10px;/* padding:10px文字と枠の間を10px空けます */
            width: 90%; max-width: 450px;
            font-size: 0.88rem; line-height: 1.5; color: #3a3a3c; text-align: center;box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .kaisetu-title { font-weight: bold; display: block; margin-bottom: 6px; color: #000; }
        .sub-instruction { font-size: 0.88rem; color: #8e8e93; margin-bottom: 10px; }

        /* --- スワイプ定規エリア --- */
        .ruler-outer {/* 定規を置く箱 */
            position: relative; width: 100%; height: 160px;/* この箱を基準点にする、width:100% 横幅いっぱい使う、height:160px 定規の高さ */
            background: #fff; border-radius: 20px;/* border-radius:20px角を丸くする */
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);/* box-shadow:影を付ける、0横方向の影、8px下方向に影を落とす、20pxぼかし量、rgba(0,0,0,0.08)黒色透明度8%ふわっと浮いて見える */
            margin-bottom: 15px; overflow: hidden;/* margin-bottom:15px下に15pxの余白、overflow:hidden:はみ出した部分を隠す */
        }
        .center-line {/* BPMを読む基準線 */
            position: absolute; left: 50%; top: 0; bottom: 0;/* position:absolute好きな場所に置く、left:50%左から50%つまり真ん中、top:0;bottom:0上から下まで線を引く、 */
            width: 3px; background: var(--accent-red);/* width:3px線の太さ、background: var(--accent-red)赤色 */
            z-index: 10; transform: translateX(-50%);/* z-index:10一番前に表示、transform: translateX(-50%)線の半分だけ左へ戻す(線の中心＝画面中央) */
            border-radius: 2px;/* 線の角を少し丸くします */
        }
        #ruler-canvas { cursor: grab; width: 100%; height: 100%; }/* 定規を描く紙、cursor:grabマウスで見ると(スマホだと意味なし) */

        /* --- ラベル表示 --- */
        #status-display { text-align: center; margin-bottom: 15px; }
        #pitch-number { font-size: 3.5rem; font-weight: 900; color: var(--main-blue); line-height: 1; font-variant-numeric: tabular-nums; margin-top: 8px; }
        #pitch-label { font-size: 1.6rem; font-weight: bold; margin-top: 8px; }

        /* --- 設定ボタン --- */
        #save-btn {
            margin-top: auto; margin-bottom: 25px;
            background: var(--main-blue); color: white;
            border: none; padding: 18px 50px;
            font-size: 1.15rem; font-weight: bold;
            border-radius: 35px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
            transition: transform 0.1s;
        }
        #save-btn:active { transform: scale(0.96); }

        /* --- 起動設定表示 --- */
        #folder-setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 15px;
        }

        /* --- 起動設定ボタン --- */
        #folder-btn {
            margin-top: 30px;
            background: #34c759;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 35px;
            cursor: pointer;
         }
    </style>
</head>
<body>

<div id="init-screen">
    <h1>ノリRun 初期設定</h1>
    <p class="instruction">あなたの「<strong>マイ・ピッチ</strong>」を設定します</p>

    <!-- 角丸内　解説メッセージ　-->
    <div class="kaisetu-box">
        <span class="kaisetu-title">🛡️ マイ・ピッチとは 　</span>
        「<strong>イッチ、ニッ!、イッチ、ニッ!</strong>」の、<br>
        走る時の<strong>リズムスピード</strong>になります。

        <p class="sub-instruction">
            (※メニューの「設定」から後で変更できます)
        </p>
    </div>

    <div id="status-display">
        <div id="pitch-number">170</div>
        <div id="pitch-label">🏃‍♂️ マラソン</div>
    </div>

    <div class="ruler-outer" id="ruler-container">
        <div class="center-line"></div>
        <canvas id="ruler-canvas"></canvas>
    </div>

    <button id="save-btn">設定</button>
</div>
<div id="folder-setup-screen" style="display:none;">
    <h1>ノリRun 起動設定</h1>

    <!-- 角丸内　🎵 Musicフォルダの設定 解説メッセージ　-->
    <div class="kaisetu-box">

        <span class="kaisetu-title"
              id="folder-setup-title">
        </span>

        <p id="folder-setup-message"></p>

    </div>

    <button id="folder-btn">Musicフォルダを登録する</button>
</div>
<script>
/**
 * ノリRun Ver.9 - STEP 1-A Final Source
 * (C) 2026 Takehiro & つよぽん
 */

const state = {
    bpm: 170,
    targetBpm: 170,
    minBpm: 100,
    maxBpm: 250,
    unitW: 20,
    isDragging: false,
    lastX: 0,
    audioCtx: null,
    clickBuffer: null,
    nextTickTime: 0,
    isPlaying: false
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const numDisp = document.getElementById('pitch-number');
const labelDisp = document.getElementById('pitch-label');

// --- 1. Audioエンジン (click.wav連動) ---
async function setupAudio() {
    if (state.audioCtx) return;
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        const res = await fetch('click.wav');
        const buf = await res.arrayBuffer();
        state.clickBuffer = await state.audioCtx.decodeAudioData(buf);
    } catch (e) { console.error("click.wavが見つかりません"); }
}

function scheduler() {
    if (!state.isPlaying) return;
    while (state.nextTickTime < state.audioCtx.currentTime + 0.1) {
        playClick(state.nextTickTime);
        state.nextTickTime += 60.0 / state.bpm;
    }
    requestAnimationFrame(scheduler);
}

function playClick(time) {
    if (!state.clickBuffer) return;
    const s = state.audioCtx.createBufferSource();
    s.buffer = state.clickBuffer;
    s.connect(state.audioCtx.destination);
    s.start(time);
}

// --- 2. ヌルヌル描画ロジック ---
function render() {
    if (!state.isDragging) {
        state.bpm += (state.targetBpm - state.bpm) * 0.25; // 吸い付き補完
    } else {
        state.bpm = state.targetBpm;
    }

    const w = canvas.width;
    const h = canvas.height;
    const centerX = w / 2;

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#3a3a3c';
    ctx.lineWidth = 1;
    ctx.font = 'bold 20px sans-serif';//目盛り数字サイズ
    ctx.textAlign = 'center';

    const start = Math.floor(state.bpm - (centerX / state.unitW)) - 1;
    const end = Math.ceil(state.bpm + (centerX / state.unitW)) + 1;

    for (let i = start; i <= end; i++) {
        if (i < state.minBpm || i > state.maxBpm) continue;
        const x = centerX + (i - state.bpm) * state.unitW;
        
        ctx.beginPath();
        ctx.moveTo(x, 0);
        if (i % 10 === 0) {
            ctx.lineWidth = 2;
            ctx.lineTo(x, 45);
            ctx.fillStyle = '#1c1c1e';
            ctx.fillText(i, x, 65);
        } else if (i % 5 === 0) {
            ctx.lineWidth = 1.5;
            ctx.lineTo(x, 30);
        } else {
            ctx.lineWidth = 1;
            ctx.lineTo(x, 15);
        }
        ctx.stroke();
    }

    updateLabel();
    requestAnimationFrame(render);
}

function updateLabel() {
    const b = Math.round(state.bpm);
    numDisp.innerText = b;
    if (b <= 120) labelDisp.innerText = "🚶‍♂️ ウォーキング";
    else if (b <= 135) labelDisp.innerText = "🥁 行進";
    else if (b <= 200) labelDisp.innerText = "🏃‍♂️ マラソン";
    else labelDisp.innerText = "🏎️ 全力ダッシュ！";
}

// --- 3. 操作制御 ---
function handleStart(x) {
    if (!state.audioCtx) {
        setupAudio().then(() => {
            state.isPlaying = true;
            state.nextTickTime = state.audioCtx.currentTime;
            scheduler();
        });
    } else if (state.audioCtx.state === 'suspended') {
        state.audioCtx.resume();
    }
    state.isDragging = true;
    state.lastX = x;
}

function handleMove(x) {
    if (!state.isDragging) return;
    const deltaX = x - state.lastX;
    state.targetBpm -= deltaX / state.unitW;
    if (state.targetBpm < state.minBpm) state.targetBpm = state.minBpm;
    if (state.targetBpm > state.maxBpm) state.targetBpm = state.maxBpm;
    state.lastX = x;
}

function handleEnd() {
    state.isDragging = false;
    state.targetBpm = Math.round(state.targetBpm);
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchend', handleEnd);

canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- IndexedDB共通処理 ---
// NoriRunDBを開く。DBが無ければ作成し、本棚も準備する。
function openNoriRunDB() {

    return new Promise(function (resolve, reject) {

        const request = indexedDB.open("NoriRunDB", 1);

        request.onupgradeneeded = function (e) {

            const db = e.target.result;

            // settings 本棚が無い時だけ作る
            if (!db.objectStoreNames.contains("settings")) {

                db.createObjectStore("settings");

            }

            // music_library 本棚が無い時だけ作る
            if (!db.objectStoreNames.contains("music_library")) {

                db.createObjectStore(
                    "music_library",
                    { keyPath: "track_id" }
                );

            }
            // playlists 本棚が無い時だけ作る
            if (!db.objectStoreNames.contains("playlists")) {
                db.createObjectStore(
                    "playlists",
                    { keyPath: "playlist_id" }
                );
            }
            // folder_roots_id 本棚が無い時だけ作る
            if (!db.objectStoreNames.contains("folder_roots")) {
                db.createObjectStore(
                    "folder_roots",
                    { keyPath: "folder_roots_id" }
                );
            }
        };

        request.onsuccess = function (e) {

            resolve(e.target.result);

        };

        request.onerror = function () {

            reject("IndexedDBを開けませんでした。");

        };

    });

}



// --- 4. 保存 & 完了フラグ ---
async function saveAndNext() {

    state.isPlaying = false;

    try {

        const db = await openNoriRunDB();

        const tx = db.transaction("settings", "readwrite");
        const store = tx.objectStore("settings");

        store.put(Math.round(state.bpm), "my_pitch");
        store.put(true, "init_completed");
        store.put(0.8, "volume");
        store.put(0, "latency");
        store.put("registered_at_desc", "main_sort_order");
        store.put("", "current_playlist_id");

        tx.oncomplete = function () {

            db.close();

            showFolderSetupScreen();

        };

        tx.onerror = function () {

            db.close();

            alert("初期設定の保存に失敗しました。");

        };

    } catch (error) {

        alert(error);

    }

}

document.getElementById('save-btn').onclick = saveAndNext;
document.getElementById("folder-btn").onclick = registerMusicFolderAndNext;

/* --- 5. 起動ルート判定 ---
  ルートA
    初回起動用
    init_completed が未設定または false
    初期設定を行う

  ルートB
    2回目以降用
    init_completed が true
    初期設定を飛ばして次画面へ進む
*/

async function init() {

    try {

        const db = await openNoriRunDB();

        const tx = db.transaction("settings", "readonly");
        const store = tx.objectStore("settings");

        const getRequest = store.get("init_completed");

        getRequest.onsuccess = function () {

            const initCompleted = getRequest.result;

            if (initCompleted === true) {

                startRouteB();

            } else {

                startRouteA();

            }

            db.close();

        };

        getRequest.onerror = function () {

            db.close();

            alert("初期設定状態の確認に失敗しました。");

        };

    } catch (error) {

        alert(error);

    }

}

// --- ルートA：初回起動。初期設定画面を表示する ---
function startRouteA() {

    const container = document.getElementById("ruler-container");

    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;

    render();
}

// --------------------------------------------------
// 起動設定画面を表示する
//
// Musicフォルダがまだ未登録の時だけ表示する。
// 2回目以降は、保存済みの root_folder_handle を使って
// ブラウザの許可画面を出すため、この画面は表示しない。
// --------------------------------------------------
function showFolderSetupScreen() {

    document.getElementById("init-screen").style.display = "none";
    document.getElementById("folder-setup-screen").style.display = "flex";

    const title = document.getElementById("folder-setup-title");
    const message = document.getElementById("folder-setup-message");

    title.innerText = "🎵 Musicフォルダの設定";

    message.innerHTML =
        "①ノリRunで再生する<strong>「音楽フォルダ」</strong>を<strong>「登録」</strong>します。<br>" +
        "フォルダへのアクセスを<strong>「許可」</strong>してください。<br><br>" +
        "②あなたの端末内にあるノリRun曲データベースサイトに<br>" +
        "<strong>「曲情報」</strong>を<strong>「アップロード」</strong>します。<br><br>" +
        "（曲情報は端末内に保存され、外部へ送信されません。)";
}
// --------------------------------------------------
// 保存済みのMusicフォルダ情報を取得する
// folder_roots ストアから root_music を読む
// --------------------------------------------------
async function getMusicFolderRoot() {

    const db = await openNoriRunDB();

    return new Promise(function (resolve, reject) {

        const tx = db.transaction("folder_roots", "readonly");
        const store = tx.objectStore("folder_roots");

        const request = store.get("root_music");

        request.onsuccess = function () {
            db.close();
            resolve(request.result);
        };

        request.onerror = function () {
            db.close();
            reject("Musicフォルダ情報の確認に失敗しました。");
        };

    });

}

// --------------------------------------------------
// Musicフォルダを登録して、folder_rootsへ保存する
// --------------------------------------------------
async function registerMusicFolderAndNext() {

    try {

        if (!window.showDirectoryPicker) {
            alert("このブラウザはフォルダ選択に対応していません。");
            return;
        }

        const dirHandle = await window.showDirectoryPicker({
            mode: "read"
        });

        const db = await openNoriRunDB();

        const tx = db.transaction("folder_roots", "readwrite");
        const store = tx.objectStore("folder_roots");

        store.put({
            folder_roots_id: "root_music",
            root_name: dirHandle.name,
            root_folder_handle: dirHandle
        });

        tx.oncomplete = function () {
            db.close();
            location.href = "c013.html";
        };

        tx.onerror = function () {
            db.close();
            alert("Musicフォルダの保存に失敗しました。");
        };

    } catch (error) {
        alert("Musicフォルダの登録をキャンセルしました。");
    }
}

// --------------------------------------------------
// ルートB：2回目以降の起動ルート
//
// init_completed = true の場合に実行される。
// Musicフォルダが未登録なら、起動設定画面を表示する。
// Musicフォルダが登録済みなら、保存済みフォルダの再許可を求め、
// 許可されたら c013 へ進む。
// --------------------------------------------------
async function startRouteB() {

    try {

        const rootData = await getMusicFolderRoot();

        // Musicフォルダがまだ登録されていない場合
        if (!rootData || !rootData.root_folder_handle) {
            showFolderSetupScreen();
            return;
        }

        const dirHandle = rootData.root_folder_handle;

        // 保存済みフォルダの現在の権限状態を確認する
        let permission = await dirHandle.queryPermission({ mode: "read" });

        // 権限が切れている場合は、ここでブラウザの許可画面を出す
        if (permission !== "granted") {
            permission = await dirHandle.requestPermission({ mode: "read" });
        }

        // 許可されたらメインメニューへ
        if (permission === "granted") {
            location.href = "c013.html";
            return;
        }

        // ユーザーが許可しなかった場合
        alert("Musicフォルダへのアクセスが許可されませんでした。");

    } catch (error) {

        alert(error);

    }

}

// 起動関数を実行
init();
</script>
</body>
</html>
