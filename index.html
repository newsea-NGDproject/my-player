<script>
    // ... (中略：UI部分はVer 1.2と同じ)

    function calculateFinal() {
        const p1 = tapResults[0], p2 = tapResults[1], p3 = tapResults[2];
        
        // 1. P1を「絶対の基準点」として固定 (一拍目のズレを排除)
        // 2. 各区間の秒数を算出
        const sec12 = p2.absPos - p1.absPos;
        const sec13 = p3.absPos - p1.absPos;

        // 3. 各区間に含まれる「拍数」を、採取時のBPMから算出（四捨五入で整数化）
        const beats12 = Math.round(sec12 * (p1.bpm / 60));
        const beats13 = Math.round(sec13 * (p1.bpm / 60));

        // 4. 竹弘の狙い：3地点すべてで最も矛盾がないBPMを逆算
        // P1からP2までbeats12拍、P1からP3までbeats13拍でピッタリ到達するBPMの平均を取る
        const bpm12 = (beats12 * 60) / sec12;
        const bpm13 = (beats13 * 60) / sec13;
        finalBpm = (bpm12 + bpm13) / 2;

        // 5. 位相（1拍目の位置）を、加工せずにP1の平均タップ位置そのものに設定
        // 曲の0秒地点に遡るためのオフセットを計算
        const beatInterval = 60 / finalBpm;
        bestOffset = p1.absPos % beatInterval;

        document.getElementById('bpmDisplay').innerText = finalBpm.toFixed(4);
        document.getElementById('seekBox').style.display = 'block';
        document.getElementById('tapArea').style.display = 'none';
        
        log(`解析完了: BPM=${finalBpm.toFixed(4)}`);
        log(`P1基準点: ${p1.absPos.toFixed(3)}s`);
        
        seekTo(0);
    }

    function seekTo(time) {
        time = parseFloat(time);
        clearScheduledBeats();
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        phaseStartTime = audioCtx.currentTime;
        currentOffset = time;
        currentSource.start(0, time);
        isPlaying = true;
        
        const ivl = 60 / finalBpm;
        
        // P1の絶対位置から遡って、曲全体のメトロノーム位置を決定
        // beatTime = p1.absPos + (n * ivl) となる点をすべて打つ
        const p1Pos = tapResults[0].absPos;
        
        // P1より前の拍
        for (let t = p1Pos; t >= 0; t -= ivl) {
            if (t >= time) scheduleTick(phaseStartTime + (t - time));
        }
        // P1より後の拍
        for (let t = p1Pos + ivl; t < audioBuf.duration; t += ivl) {
            if (t >= time) scheduleTick(phaseStartTime + (t - time));
        }
    }
</script>
