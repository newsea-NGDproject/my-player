<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <title>NoriRun Launcher</title>

    <script>
    /* サービスワーカーの登録スクリプト（PWA化用）*/
    if ('serviceWorker' in navigator) {

        navigator.serviceWorker
        .register('sw.js')
        .then(function () {

            console.log("Service Worker登録完了");

            /* Service Worker登録完了後に
               起動オープニング(c011.html)へ移動する */
            window.location.href = "c011.html";
        });
    } else {

        /* Service Worker非対応ブラウザでも
           起動オープニングへ進む */   
        window.location.href = "c011.html";
    
    }
    </script>

</head>

<body>

    <p>Loading NoriRun...</p>

</body>

</html>
