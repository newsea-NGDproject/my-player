<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 CSS Strict Check</title>
<style>
/* * 【CSS指示画面テキスト化.txt】に基づき
* 数値、色、太さを一字一句違わず厳格に適用
*/

@charset "UTF-8";

:root {
--accent-red: #ff3b30;
--main-blue: #007aff;
--bg-color: #f2f2f7;
}

body, html {
margin: 0;
padding: 0;
width: 100%;
height: 100%;
/* AndroidのRobotoフォントをベース */
font-family: 'Roboto', -apple-system, sans-serif;
background-color: var(--bg-color);
overflow: hidden;
touch-action: none;
}

/* 全体コンテナ：パディング15pxでレイアウトを維持 */
#init-screen {
display: flex;
flex-direction: column;
align-items: center;
width: 100%;
height: 100%;
box-sizing: border-box;
padding: 15px;
text-align: center;
}

/* 【1】1段目：文字表示「初期設定」
Size:1.6rem / Weight:700 / Color:#1C1C1E */
.row-1 {
margin: 10px 0 5px;
font-size: 1.6rem;
font-weight: 700;
color: #1C1C1E;
}

/* 【2】2段目：文字表示「あなたの「マイ・ピッチ」を設定して下さい」
Size:1.0rem / Weight:500 / Color:#3A3A3C */
.row-2 {
font-size: 1.0rem;
font-weight: 500;
color: #3A3A3C;
margin: 0;
}

/* 【3】3段目：文字表示「(※次回以降は、メニューから再設定出来ます)」
Size:0.85rem / Weight:400 / Color:#8E8E93 */
.row-3 {
font-size: 0.85rem;
font-weight: 400;
color: #8E8E93;
margin-bottom: 10px;
}

/* 【4】4段目：マイ・ピッチ(BPM)の表示
Size:4.0rem / Weight:900 / Color:#3A3A3C */
.row-4 {
font-size: 4.0rem;
font-weight: 900;
color: #3A3A3C;
line-height: 1;
font-variant-numeric: tabular-nums;
margin-top: 10px;
}

/* 【5】5段目：ピッチ・ラベル(可視化)の表示
Size:1.3rem / Weight:700 / Color:#007AFF */
.row-5 {
font-size: 1.3rem;
font-weight: 700;
color: var(--main-blue);
margin-top: 8px;
margin-bottom: 15px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

/* ピッチ・ラベルの絵文字切り替えロジック (CSS) /
#pitch-icon::before { display: inline-block; }
/ BPM100~120: ウォーキング 🚶‍♂️ /
.status-walking #pitch-icon::before { content: "\1F6B6\200D\2642\FE0F"; }
/ BPM120~135: 行進 🥁 (赤字修正箇所) /
.status-marching #pitch-icon::before { content: "\1F941"; }
/ BPM135~200: マラソン 🏃‍♂️ /
.status-marathon #pitch-icon::before { content: "\1F3C3\200D\2642\FE0F"; }
/ BPM200超: 全力ダッシュ！ 🏎️ */
.status-dash #pitch-icon::before { content: "\1F3CE\FE0F"; }

/* 【6】6段目：スワイプ定規
白い角丸コンテナ(20px) / Background:#F2F2F7(Canvas) /
.ruler-outer {
position: relative;
width: 100%;
height: 160px;
background: #fff; / コンテナ自体は白 /
border-radius: 20px;
box-shadow: 0 8px 20px rgba(0,0,0,0.08);
margin-bottom: 15px;
overflow: hidden; / 赤線はみ出し防止 */
}

/* 赤の縦線：z-index:10 / left:50%固定 */
.center-line {
position: absolute;
left: 50%;
top: 0;
bottom: 0;
width: 3px;
background: var(--accent-red);
z-index: 10;
transform: translateX(-50%);
}

#ruler-canvas {
width: 100%;
height: 100%;
}

/* 【7】7段目：安心・安全メッセージ表示エリア
Background:#F0F7FF / Border:1px solid #D1E9FF / Radius:12px /
.safety-box {
background-color: #F0F7FF;
border: 1px solid #D1E9FF;
padding: 15px;
border-radius: 12px;
width: 100%;
box-sizing: border-box;
text-align: left;
margin-top: auto; / 8段目ボタンの上に配置 */
margin-bottom: 15px;
}

/* 安心メッセージ タイトル (盾アイコン🛡️)
Size:0.85rem / Weight:700 / Color:#1C1C1E /
.safety-title {
font-size: 0.85rem;
font-weight: 700;
color: #1C1C1E;
display: flex;
align-items: center;
margin-bottom: 6px;
}
.safety-title::before {
content: "\1F6E1\FE0F"; / 🛡️ */
margin-right: 6px;
}

/* 安心メッセージ 本文
Size:0.85rem / Weight:400 / Color:#3A3A3C / Line-height:1.5 */
.safety-text {
font-size: 0.85rem;
font-weight: 400;
color: #3A3A3C;
line-height: 1.5;
}

/* 強調テキスト */
.safety-text strong {
font-weight: 900;
color: #1C1C1E;
}

/* 【8】8段目：設定ボタン表示エリア
Radius:35px / Color:#007AFF (Background) / margin-bottom:25px */
#save-btn {
margin-bottom: 25px;
background: var(--main-blue);
color: white;
border: none;
padding: 18px 60px;
font-size: 1.1rem;
font-weight: 700;
border-radius: 35px;
cursor: pointer;
box-shadow: 0 6px 20px rgba(0,122,255,0.4);
transition: transform 0.1s;
}

#save-btn:active {
transform: scale(0.96);
}

/* 横画面対応 (Landscape) */
@media (orientation: landscape) {
#init-screen { padding: 8px; }
.row-4 { font-size: 2.5rem; margin-top: 5px; }
.ruler-outer { height: 100px; width: 80%; }
.safety-box { padding: 8px; margin-bottom: 8px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<div id="init-screen" class="status-marathon">
<div class="row-1">初期設定</div>
<div class="row-2">あなたの「マイ・ピッチ」を設定して下さい</div>
<div class="row-3">(※次回以降は、メニューから再設定出来ます)</div>

<div class="row-4" id="bpm-val">175</div>

<div class="row-5">
<span id="pitch-icon"></span>
<span id="label-text">マラソン</span>
</div>

<div class="ruler-outer" id="ruler-container">
<div class="center-line"></div>
<canvas id="ruler-canvas"></canvas>
</div>

<div class="safety-box">
<span class="safety-title">安心・安全への取り組み</span>
<div class="safety-text">
下記<strong>「設定」</strong>ボタンを押すと<br>
「このサイトにファイルの表示とコピーを許可しますか？」<br>
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。<br>
NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>
</div>

<button id="save-btn">設定</button>
</div>

<script>
/**
* スワイプ定規のロジック (ダミー機能)
* 竹弘の指示：1BPM = 20px / 範囲 80-220
*/
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d');
const bpmVal = document.getElementById('bpm-val');
const labelText = document.getElementById('label-text');
const screen = document.getElementById('init-screen');

let currentBpm = 175;
const step = 20; // 1BPM = 20px

function updateUI(bpm) {
bpmVal.innerText = Math.round(bpm);
let cls = "";
let txt = "";

// テキスト指示の数値を厳密に適用
if (bpm >= 100 && bpm <= 120) { cls = "status-walking"; txt = "ウォーキング"; }
else if (bpm >= 121 && bpm <= 135) { cls = "status-marching"; txt = "行進"; }
else if (bpm > 135 && bpm <= 200) { cls = "status-marathon"; txt = "マラソン"; }
else if (bpm > 200) { cls = "status-dash"; txt = "全力ダッシュ！"; }
else { cls = ""; txt = "---"; }

screen.className = cls;
labelText.innerText = txt;
}

function drawRuler() {
const w = canvas.width = canvas.offsetWidth;
const h = canvas.height = canvas.offsetHeight;
ctx.clearRect(0, 0, w, h);

const centerX = w / 2;
ctx.textAlign = 'center';
ctx.textBaseline = 'top';

for (let i = 80; i <= 220; i++) {
const x = centerX + (i - currentBpm) * step;
if (x < -20 || x > w + 20) continue;

if (i % 10 === 0) {
ctx.strokeStyle = '#C7C7CC';
ctx.lineWidth = 2;
ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 40); ctx.stroke();
ctx.fillStyle = '#3A3A3C';
ctx.font = 'bold 12px Roboto';
ctx.fillText(i, x, 45);
} else {
ctx.strokeStyle = '#D1D1D6';
ctx.lineWidth = 1;
ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 15); ctx.stroke();
}
}
}

// スワイプイベント
let isDragging = false;
let startX = 0;
let startBpm = 0;

const start = (x) => { isDragging = true; startX = x; startBpm = currentBpm; };
const move = (x) => {
if (!isDragging) return;
const diff = startX - x;
currentBpm = startBpm + (diff / step);
if (currentBpm < 80) currentBpm = 80;
if (currentBpm > 220) currentBpm = 220;
updateUI(currentBpm);
drawRuler();
};
const end = () => { isDragging = false; currentBpm = Math.round(currentBpm); drawRuler(); };

canvas.addEventListener('touchstart', e => start(e.touches[0].clientX));
window.addEventListener('touchmove', e => move(e.touches[0].clientX), {passive: false});
window.addEventListener('touchend', end);
canvas.addEventListener('mousedown', e => start(e.clientX));
window.addEventListener('mousemove', e => move(e.clientX));
window.addEventListener('mouseup', end);

window.onload = () => { updateUI(currentBpm); drawRuler(); };
window.onresize = drawRuler;

</script>
</body>
</html>
