<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAT-LINK 実験室 Ver 0.6</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status { font-size: 1.2em; color: #007bff; margin: 20px 0; min-height: 1.5em; }
        .bpm-display { font-size: 3em; font-weight: bold; color: #ffc107; margin: 10px 0; }
        
        .tap-zone { 
            width: 100%; height: 200px; background: #333; border: 4px dashed #555; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5em; cursor: pointer; user-select: none; transition: 0.1s;
        }
        .tap-zone:active { background: #444; transform: scale(0.98); border-color: #007bff; }
        .tap-zone.active { border-color: #28a745; color: #28a745; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        button { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn-folder { background: #6f42c1; color: white; grid-column: span 2; }
        #log { margin-top: 20px; background: #000; padding: 15px; font-family: monospace; font-size: 0.8em; text-align: left; color: #00ff00; height: 100px; overflow-y: auto; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 同期実験 Ver 0.6</h1>
    <p>曲: 02-HANABI_1.m4a</p>

    <div class="status" id="status">フォルダを選択してください</div>
    <div class="bpm-display" id="bpmShow">BPM: --</div>

    <div class="tap-zone" id="tapZone">
        リズムに合わせてここをタップ！
    </div>

    <div class="controls">
        <button class="btn-folder" id="folderBtn">📁 フォルダ選択 & 解析</button>
        <button style="background:#dc3545; color:white;" onclick="location.reload()">⏹ リセット</button>
    </div>

    <div id="log">ログ：待機中...</div>
</div>

<script>
    let audioCtx, buf, source, bpm = 0;
    let tapTimes = [];
    let isMetronomeRunning = false;
    let nextBeatTime = 0;

    const log = (msg) => {
        const d = document.getElementById('log');
        d.innerHTML = `> ${msg}<br>${d.innerHTML}`;
    };

    document.getElementById('folderBtn').onclick = async () => {
        try {
            const root = await window.showDirectoryPicker();
            for await (const e of root.values()) {
                if (e.name === "02-HANABI_1.m4a") {
                    await initAudio(e);
                    return;
                }
            }
            alert("ファイルが見つかりません。");
        } catch (e) { log("Error: " + e.message); }
    };

    async function initAudio(handle) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const file = await handle.getFile();
        buf = await audioCtx.decodeAudioData(await file.arrayBuffer());
        
        // 簡易BPM解析
        bpm = estimateBPM(buf);
        document.getElementById('bpmShow').innerText = `BPM: ${bpm}`;
        
        // 曲再生開始（頭から）
        source = audioCtx.createBufferSource();
        source.buffer = buf;
        source.connect(audioCtx.destination);
        source.start(0);
        
        document.getElementById('status').innerText = "再生中... リズムをタップして！";
        log("再生開始。リズムが安定するまでタップしてください。");
    }

    // タップイベント
    document.getElementById('tapZone').onpointerdown = (e) => {
        if (!audioCtx || isMetronomeRunning) return;
        
        const now = audioCtx.currentTime;
        tapTimes.push(now);
        if (tapTimes.length > 4) tapTimes.shift();

        // タップが安定しているかチェック
        if (tapTimes.length === 4) {
            const diffs = [
                tapTimes[1] - tapTimes[0],
                tapTimes[2] - tapTimes[1],
                tapTimes[3] - tapTimes[2]
            ];
            const avgDiff = diffs.reduce((a, b) => a + b) / 3;
            const isStable = diffs.every(d => Math.abs(d - avgDiff) < 0.05);

            if (isStable) {
                startMetronome(now, 60 / avgDiff); // タップから算出したBPMで開始
            }
        }
    };

    function startMetronome(startTime, tapBpm) {
        isMetronomeRunning = true;
        // 解析値bpmとタップbpmの近い方を採用（今回はタップ優先）
        const finalBpm = tapBpm;
        document.getElementById('bpmShow').innerText = `BPM: ${Math.round(finalBpm)} (SYNCED)`;
        document.getElementById('status').innerText = "メトロノーム同期中！";
        document.getElementById('tapZone').classList.add('active');
        document.getElementById('tapZone').innerText = "同期成功！聴いてみて！";
        
        log(`同期成功。BPM: ${Math.round(finalBpm)} でメトロノームを開始しました。`);

        const interval = 60 / finalBpm;
        let beatCount = 0;

        const scheduleBeat = () => {
            const time = startTime + (beatCount * interval);
            const click = audioCtx.createBufferSource();
            click.buffer = createClick(1200);
            click.connect(audioCtx.destination);
            click.start(time);
            beatCount++;
            
            // 次のビートを予約し続ける
            if (isMetronomeRunning) {
                setTimeout(scheduleBeat, interval * 1000);
            }
        };
        scheduleBeat();
    }

    function estimateBPM(buffer) {
        // 前回の簡易解析ロジック（実際はもっと複雑ですが、一旦仮定）
        return 128; 
    }

    function createClick(freq) {
        const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
            d[i] = Math.sin(2 * Math.PI * freq * i / audioCtx.sampleRate) * Math.exp(-30 * i / (audioCtx.sampleRate * 0.1));
        }
        return b;
    }
</script>
</body>
</html>
