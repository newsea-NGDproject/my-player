<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 - Step 1-B</title>
<style>
:root {
--accent-red: #ff3b30;
--main-blue: #007aff;
--bg-color: #f2f2f7;
}
body, html {
margin: 0; padding: 0; width: 100%; height: 100%;
font-family: -apple-system, sans-serif;
background-color: var(--bg-color);
overflow: hidden; touch-action: none;
}

/* --- [STEP 1-A] 画面レイアウト (一字一句引き継ぎ) --- */
#init-screen {
display: flex; flex-direction: column; align-items: center;
width: 100%; height: 100%; box-sizing: border-box; padding: 15px;
}
h1 { margin: 10px 0 5px; font-size: 1.6rem; color: #1c1c1e; }
.instruction { font-size: 1rem; margin: 0; font-weight: 500; }
.sub-instruction { font-size: 0.85rem; color: #8e8e93; margin-bottom: 10px; }

#pitch-number { font-size: 4rem; font-weight: 900; color: var(--main-blue); line-height: 1; margin: 10px 0; }
#pitch-label { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }

.ruler-outer {
position: relative; width: 100%; height: 140px;
background: #fff; border-radius: 20px;
box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px;
}
.center-line {
position: absolute; left: 50%; top: 0; bottom: 0;
width: 3px; background: var(--accent-red); z-index: 10; transform: translateX(-50%);
}
#ruler-canvas { width: 100%; height: 100%; cursor: grab; }

.safety-box {
background: #fff; border: 1px solid #d1d1d6; padding: 15px;
border-radius: 15px; width: 95%; font-size: 0.85rem; line-height: 1.6; color: #3a3a3c;
}
#save-btn {
margin-top: auto; margin-bottom: 30px;
background: var(--main-blue); color: white; border: none;
padding: 16px 80px; font-size: 1.2rem; font-weight: bold;
border-radius: 30px; box-shadow: 0 5px 15px rgba(0,122,255,0.3);
cursor: pointer;
}

/* --- [STEP 1-B] メインメニューレイアウト (1:1:3:2:1:1) --- */
#main-menu {
display: none; flex-direction: column;
width: 100%; height: 100%; background: #fff;
}
.header {
width: 100%; padding: 15px 20px; background: var(--main-blue); color: white;
display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
}
.status-lamp { font-size: 0.8rem; display: flex; align-items: center; }
.lamp-dot { width: 12px; height: 12px; border-radius: 50%; margin-left: 8px; background: #666; }
.dot-red { background: #ff453a; animation: blinker 1s linear infinite; }
.dot-green { background: #32d74b; box-shadow: 0 0 8px #32d74b; }
@keyframes blinker { 50% { opacity: 0.3; } }

#song-list { flex: 1; overflow-y: auto; width: 100%; }
.song-item {
display: flex; align-items: center; height: 75px; border-bottom: 1px solid #f2f2f7;
padding: 0 5px; box-sizing: border-box;
}
.col-nori { flex: 1; text-align: center; font-size: 1.6rem; }
.col-jacket { flex: 1; display: flex; justify-content: center; }
.col-jacket img { width: 50px; height: 50px; border-radius: 6px; background: #eee; object-fit: cover; }
.col-title { flex: 3; padding: 0 8px; font-weight: bold; font-size: 0.95rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.col-artist { flex: 2; padding: 0 5px; font-size: 0.8rem; color: #8e8e93; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.col-up, .col-down { flex: 1; text-align: center; font-size: 1.4rem; color: var(--main-blue); cursor: pointer; }
</style>
</head>
<body>

<div id="init-screen">
<h1>初期設定</h1>
<p class="instruction">あなたの「マイ・ピッチ」を設定して下さい</p>
<p class="sub-instruction">(※次回以降は、メニューから再設定出来ます)</p>
<div id="pitch-number">170</div>
<div id="pitch-label">🏃‍♂️ マラソン</div>
<div class="ruler-outer" id="ruler-container">
<div class="center-line"></div>
<canvas id="ruler-canvas"></canvas>
</div>
<div class="safety-box">
🛡️ <strong>安心・安全への取り組み</strong><br>
下記<strong>「設定」</strong>ボタンを押すと
「このサイトにファイルの表示とコピーを許可しますか？ 」
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>
<button id="save-btn">設定</button>
</div>

<div id="main-menu">
<div class="header">
<span style="font-weight:bold">🕺 ノリノリRunメニュー</span>
<div class="status-lamp">曲データ取込中 <span id="lamp-dot" class="lamp-dot"></span></div>
</div>
<div id="song-list"></div>
</div>

<script>
// --- 1. 状態管理 (1-A 継承) ---
const state = {
bpm: 170, targetBpm: 170, lastX: 0, isDragging: false,
audioCtx: null, clickBuffer: null
};

const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d', { alpha: false });

// --- 2. 1-A 描画ロジック (一字一句引き継ぎ) ---
function updateBpmLabel(b) {
let label = "";
if (b <= 120) label = "🚶‍♂️ ウォーキング";
else if (b <= 135) label = "🥁 行進";
else if (b <= 200) label = "🏃‍♂️ マラソン";
else label = "🏎️ 全力ダッシュ！";
document.getElementById('pitch-label').innerText = label;
document.getElementById('pitch-number').innerText = b;
}

function render() {
// 減衰計算 (慣性補完ロジック)
if (!state.isDragging) {
state.bpm += (state.targetBpm - state.bpm) * 0.25;
}
const w = canvas.width, h = canvas.height, centerX = w / 2, unitW = 20;
ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
ctx.strokeStyle = '#333'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.font = '14px sans-serif';

for (let i = Math.floor(state.bpm - 60); i <= Math.ceil(state.bpm + 60); i++) {
if (i < 100 || i > 220) continue;
const x = centerX + (i - state.bpm) * unitW;
ctx.beginPath(); ctx.moveTo(x, 0);
if (i % 10 === 0) {
ctx.lineWidth = 2; ctx.lineTo(x, 40);
ctx.fillStyle = '#333'; ctx.fillText(i, x, 60);
} else {
ctx.lineWidth = 1; ctx.lineTo(x, 15);
}
ctx.stroke();
}
updateBpmLabel(Math.round(state.bpm));
requestAnimationFrame(render);
}

// 音声初期化 (1-A 継承)
async function setupAudio() {
if (state.audioCtx) return;
state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
try {
const response = await fetch('click.wav');
const arrayBuffer = await response.arrayBuffer();
state.clickBuffer = await state.audioCtx.decodeAudioData(arrayBuffer);
} catch (e) { console.log("click.wav skip"); }
}

function playClick() {
if (!state.clickBuffer || !state.audioCtx) return;
const source = state.audioCtx.createBufferSource();
source.buffer = state.clickBuffer;
source.connect(state.audioCtx.destination);
source.start();
}

// --- 3. 操作イベント (1-A 継承) ---
function handleStart(x) {
state.isDragging = true; state.lastX = x;
setupAudio();
}
function handleMove(x) {
if (!state.isDragging) return;
const dx = x - state.lastX;
const oldBpm = Math.round(state.targetBpm);
state.targetBpm -= dx / 15;
if (Math.round(state.targetBpm) !== oldBpm) playClick();
state.lastX = x;
}
function handleEnd() {
state.isDragging = false;
state.targetBpm = Math.round(state.targetBpm);
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchmove', e => { handleMove(e.touches[0].clientX); }, {passive: false});
window.addEventListener('touchend', handleEnd);
canvas.addEventListener('mousedown', e => handleStart(e.clientX));
window.addEventListener('mousemove', e => handleMove(e.clientX));
window.addEventListener('mouseup', handleEnd);

// --- 4. [STEP 1-B] 自動アクセス & スキャン ---
async function startNoriRunScan() {
try {
// OS標準メッセージを表示
const dirHandle = await window.showDirectoryPicker();

// 許可が得られたら画面切り替え
document.getElementById('init-screen').style.display = 'none';
const mainMenu = document.getElementById('main-menu');
mainMenu.style.display = 'flex';

const dot = document.getElementById('lamp-dot');
dot.classList.add('dot-red');

// 「てへぺろ」取込開始
for await (const entry of dirHandle.values()) {
if (entry.kind === 'file' && entry.name.match(/.(mp3|wav|m4a|ogg)latex
/i)) { // ここでは文字情報のみ優先して描画 (1-B仕様) const song = { title: entry.name.replace(/\.[^/.]+

/, ""),
artist: "",
nori_data: [] // 空なので 🛌 表示
};
renderRow(song);
// 本来はここでIndexedDBに保存するが、1-Bでは描画を優先
}
}

// 文字取込完了で緑へ
dot.classList.remove('dot-red');
dot.classList.add('dot-green');

} catch (e) {
console.log("User cancelled or Error:", e);
}
}

function renderRow(song) {
const list = document.getElementById('song-list');
const row = document.createElement('div');
row.className = 'song-item';
// 仕様書の比率 1:1:3:2:1:1 を適用
row.innerHTML = &lt;div class="col-nori"&gt;${song.nori_data.length > 0 ? '🕺' : '🛌'}</div>
<div class="col-jacket"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ccc' d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'/%3E%3C/svg%3E"></div>
<div class="col-title">${song.title}&lt;/div&gt; &lt;div class="col-artist"&gt;${song.artist}&lt;/div&gt; &lt;div class="col-up"&gt;↑&lt;/div&gt; &lt;div class="col-down"&gt;↓&lt;/div&gt;;
list.appendChild(row);
}

// --- 5. 保存 & 接続 ---
async function saveAndNext() {
const request = indexedDB.open("NoriRunDB", 1);
request.onupgradeneeded = e => {
const db = e.target.result;
if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings');
if(!db.objectStoreNames.contains('music_library')) db.createObjectStore('music_library', { keyPath: 'file_path' });
};
request.onsuccess = e => {
const db = e.target.result;
const tx = db.transaction('settings', 'readwrite');
tx.objectStore('settings').put(Math.round(state.bpm), 'my_pitch');
tx.objectStore('settings').put(true, 'init_completed');
tx.oncomplete = () => {
// 保存完了後、自動でスキャン開始 (1-B 2項)
startNoriRunScan();
};
};
}
document.getElementById('save-btn').onclick = saveAndNext;

// --- 6. 起動 (1-A優先描画 & デグレード防止) ---
function init() {
// 1-A優先描画: DBを待たずに定規を出す
const container = document.getElementById('ruler-container');
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
render();

// 裏でDBチェック
const checkDB = indexedDB.open("NoriRunDB", 1);
checkDB.onsuccess = e => {
const db = e.target.result;
if (!db.objectStoreNames.contains('settings')) return;
const tx = db.transaction('settings', 'readonly');
tx.objectStore('settings').get('init_completed').onsuccess = (ev) => {
if (ev.target.result) {
// 設定済みならメニューへ自動遷移 (1-B 6項)
document.getElementById('init-screen').style.display = 'none';
document.getElementById('main-menu').style.display = 'flex';
// ※本来はここで保存済みリストを表示するが1-Bではスキャンから入る
startNoriRunScan();
}
};
};
}

window.addEventListener('resize', () => {
const container = document.getElementById('ruler-container');
if (container && document.getElementById('init-screen').style.display !== 'none') {
canvas.width = container.clientWidth;
canvas.height = container.clientHeight;
}
});

init();
</script>
</body>
</html>
