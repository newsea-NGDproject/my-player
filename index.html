<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoriRun Ver.9 STEP1-A Final Test</title>
<style>
/* * 🎨 竹弘の「CSS指示画面.pdf」に基づく厳格スタイル定義
*/
:root {
--bg-color: #F2F2F7;
--white: #FFFFFF;
--safety-blue: #F0F7FF;
--safety-border: #D1E9FF;
--accent-blue: #007AFF;
--accent-red: #FF3B30;

/* PDF指定のテキストカラー */
--text-1c: #1C1C1E;
--text-3a: #3A3A3C;
--text-8e: #8E8E93;
--text-c7: #C7C7CC;
}

body, html {
margin: 0; padding: 0;
width: 100%; height: 100%;
background-color: var(--bg-color);
font-family: 'Roboto', 'Noto Sans JP', sans-serif;
overflow: hidden;
touch-action: none;
}

/* 1段目から8段目をパディング15pxによってレイアウトを維持 */
#main-layout {
width: 100%; height: 100%;
padding: 15px;
box-sizing: border-box;
display: flex;
flex-direction: column;
text-align: center;
}

/* 【1】1段目: 初期設定 */
.row-1 {
font-size: 1.6rem;
font-weight: 700;
color: var(--text-1c);
margin: 10px 0 0 0;
}

/* 【2】2段目: あなたの「マイ・ピッチ」を… */
.row-2 {
font-size: 1.0rem;
font-weight: 500;
color: var(--text-3a);
margin: 5px 0 0 0;
}

/* 【3】3段目: (※次回以降は…) */
.row-3 {
font-size: 0.85rem;
font-weight: 400;
color: var(--text-8e);
margin: 2px 0 0 0;
}

/* 【4】4段目: マイ・ピッチ(BPM)の表示 */
.row-4 {
font-size: 4.0rem;
font-weight: 900;
color: var(--text-3a);
margin: 15px 0 0 0;
line-height: 1;
}

/* 【5】5段目: ピッチ・ラベル */
.row-5 {
font-size: 1.3rem;
font-weight: 700;
color: var(--accent-blue);
margin: 10px 0 15px 0;
}

/* 【6】6段目: スワイプ定規表示エリア /
.row-6-container {
width: 100%;
height: 150px;
background-color: var(--white);
border-radius: 20px; / 白い角丸コンテナ(20px) /
position: relative;
overflow: hidden; / overflow: hiddenを設定 */
margin-bottom: 20px;
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* 赤の縦線 (z-index:10 / Top固定 / 3px) */
.red-line {
position: absolute;
left: 50%; top: 0;
width: 3px; height: 100%;
background-color: var(--accent-red);
z-index: 10;
transform: translateX(-50%);
}

#ruler-canvas {
width: 100%; height: 100%;
display: block;
z-index: 1;
}

/* 【7】7段目: 安心メッセージ表示エリア /
.row-7-container {
background-color: var(--safety-blue); / Background#F0F7FF(LightBlue) /
border: 1px solid var(--safety-border); / Border:1px solid #D1E9FF /
border-radius: 12px; / 角丸コンテナ(12px) /
padding: 15px;
text-align: left; / text-align:left(左揃え) */
margin-top: auto;
margin-bottom: 15px;
box-sizing: border-box;
}

.safety-title {
font-size: 0.85rem;
font-weight: 700; /* Weight: 700 */
margin-bottom: 8px;
display: block;
}

.safety-body {
font-size: 0.85rem;
font-weight: 400; /* Weight: 400 /
color: var(--text-3a);
line-height: 1.5; / Line-height:1.5 */
}

/* 「設定」のみ太字(Strong) */
strong {
font-weight: 900;
color: var(--text-1c);
}

/* 【8】8段目: 設定ボタン /
.row-8-area {
width: 100%;
margin-bottom: 10px;
display: flex;
justify-content: center; / 配置:Center */
}

#save-btn {
width: 220px; height: 50px; /* Size:w220px x H50px /
background-color: var(--accent-blue);
color: var(--white);
border: none;
border-radius: 25px; / Radius:25px */
font-size: 1.1rem;
font-weight: 700;
cursor: pointer;
box-shadow: 0 4px 10px rgba(0,122,255,0.2);
}
</style>
</head>
<body>

<div id="main-layout">
<div class="row-1">初期設定</div>
<div class="row-2">あなたの「マイ・ピッチ」を設定して下さい</div>
<div class="row-3">(※次回以降は、メニューから再設定出来ます)</div>
<div class="row-4" id="bpm-display">175</div>
<div class="row-5" id="label-display">🏃‍♂️ マラソン</div>

<div class="row-6-container">
<div class="red-line"></div>
<canvas id="ruler-canvas"></canvas>
</div>

<div class="row-7-container">
<span class="safety-title">🛡️ 安心・安全への取り組み</span>
<div class="safety-body">
下記<strong>「設定」</strong>ボタンを押すと<br>
「このサイトにファイルの表示とコピーを許可しますか？」<br>
と、ブラウザの確認画面が出ますが、あなたの個人情報が外部に漏れることは一切ありません。<br>
NoriRunアプリで作成されるデータは、あなたのスマホ内にのみ安全に保存されます。
</div>
</div>

<div class="row-8-area">
<button id="save-btn">設定</button>
</div>
</div>

<script>
/**
* 【6】スワイプ定規の厳格実装
* 配置:コンテナ内上端(Top基準) / 1BPM:20px / 範囲:80-220
*/
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d');
const bpmTxt = document.getElementById('bpm-display');
const labelTxt = document.getElementById('label-display');

let currentBPM = 175;

function getLabel(bpm) {
if (bpm < 120) return "🚶 ウォーキング";
if (bpm < 135) return "🚶‍♂️ 行進";
if (bpm < 200) return "🏃‍♂️ マラソン";
return "⚡ 全力ダッシュ！";
}

function drawRuler() {
const dpr = window.devicePixelRatio || 1;
const rect = canvas.getBoundingClientRect();
canvas.width = rect.width * dpr;
canvas.height = rect.height * dpr;
ctx.scale(dpr, dpr);

const w = rect.width;
const h = rect.height;
const unitW = 20; // 1BPM = 20px
const centerX = w / 2;

ctx.clearRect(0, 0, w, h);

// 目盛り描画基準をコンテナTopに設定
ctx.textAlign = 'center';
ctx.textBaseline = 'top';

for (let i = 80; i <= 220; i++) {
const x = centerX + (i - currentBPM) * unitW;
if (x < -50 || x > w + 50) continue;

ctx.beginPath();
ctx.strokeStyle = '#C7C7CC';

if (i % 10 === 0) {
// 10刻み: 長さ50pxの線
ctx.lineWidth = 2;
ctx.moveTo(x, 0); // Top基準
ctx.lineTo(x, 50);
// 数字は線の終点から5px下
ctx.fillStyle = '#3A3A3C';
ctx.font = 'bold 13px Roboto';
ctx.fillText(i, x, 55);
} else if (i % 5 === 0) {
// 5刻み: 25pxの線
ctx.lineWidth = 1.5;
ctx.moveTo(x, 0);
ctx.lineTo(x, 25);
} else {
// 1刻み
ctx.lineWidth = 1;
ctx.moveTo(x, 0);
ctx.lineTo(x, 15);
}
ctx.stroke();
}
}

// スワイプ処理
let isDragging = false;
let startX = 0;

const start = (e) => { isDragging = true; startX = e.touches ? e.touches[0].clientX : e.clientX; };
const move = (e) => {
if (!isDragging) return;
const x = e.touches ? e.touches[0].clientX : e.clientX;
const diff = startX - x;
currentBPM += diff / 20;
if (currentBPM < 80) currentBPM = 80;
if (currentBPM > 220) currentBPM = 220;

const displayBPM = Math.round(currentBPM);
bpmTxt.innerText = displayBPM;
labelTxt.innerText = getLabel(displayBPM);

startX = x;
drawRuler();
};
const end = () => { isDragging = false; currentBPM = Math.round(currentBPM); drawRuler(); };

canvas.addEventListener('touchstart', start);
window.addEventListener('touchmove', move, {passive: false});
window.addEventListener('touchend', end);
canvas.addEventListener('mousedown', start);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);

window.onload = drawRuler;
window.onresize = drawRuler;
</script>
</body>
</html>
