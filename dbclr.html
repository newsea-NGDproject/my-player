<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<title>NoriRun DBクリア</title>

<style>
body{
    margin:0;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.box{
    text-align:center;
}

button{
    margin-top:20px;
    padding:16px 32px;
    font-size:1.1rem;
    border:none;
    border-radius:12px;
    background:#ff3b30;
    color:#fff;
    font-weight:bold;
}
#skip-btn {
    margin-top: 15px;
    background: #8e8e93;
    color: white;
    border: none;
    padding: 16px 35px;
    font-size: 1rem;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>NoriRun DBクリア</h1>
    <p>テスト用に IndexedDB を削除します。</p>

    <button id="clear-btn">DBをクリアする</button>
    <button id="skip-btn">DBクリアせずに進む</button>

    <p id="message"></p>
</div>

<script>
document.getElementById("clear-btn").addEventListener("click", function () {

    const result = confirm("NoriRunDBを削除します。よろしいですか？");

    if (!result) {
        return;
    }

    const request = indexedDB.deleteDatabase("NoriRunDB");

    request.onsuccess = function () {
        document.getElementById("message").textContent =
            "DBクリア完了。c012.htmlへ移動します。";

        setTimeout(function () {
            location.href = "c012.html";
        }, 1000);
    };
    request.onerror = function () {
        document.getElementById("message").textContent =
            "DBクリアに失敗しました。";
    };

    request.onblocked = function () {
        document.getElementById("message").textContent =
            "⚠️ 他のNoriRun画面が開いています。閉じてから再実行してください。";
    };

});

// ------------------------------
// DBクリアをしないで次へ進む
// ------------------------------
document.getElementById("skip-btn").onclick = function () {

// DBは削除しない
// そのまま c012 に進む
    location.href = "c012.html";

};

</script>

</body>
</html>
