<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竹弘の夢のプレイヤー Ver 8.5</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; flex-grow: 1; min-width: 130px; }
        button:active { filter: brightness(0.8); }

        .seek-container { margin: 15px 0; padding: 0 5px; }
        #seekBar { width: 100%; height: 8px; cursor: pointer; accent-color: #007bff; }
        .time-display { display: flex; justify-content: space-between; font-size: 0.75em; color: #666; margin-top: 5px; font-family: monospace; }

        .bpm-panel { background: #f8f9fa; border-radius: 10px; padding: 15px; margin: 15px 0; border: 1px solid #dee2e6; text-align: center; }
        .bpm-display { font-size: 1.3em; font-weight: bold; color: #007bff; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #bpmWrapper, #pitchBpmWrapper { cursor: pointer; padding: 5px 15px; border-radius: 8px; transition: background 0.2s; border-bottom: 2px dashed #007bff; }
        #bpmWrapper:active, #pitchBpmWrapper:active { background: #e7f3ff; }
        #currentBpmDisplay, #pitchBpmDisplay { font-size: 2em; line-height: 1; }

        .ruler-container { position: relative; width: 100%; height: 60px; margin: 10px 0; overflow: hidden; background: white; border-radius: 5px; border: 1px solid #eee; }
        canvas { cursor: grab; display: block; }
        .red-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #dc3545; z-index: 10; pointer-events: none; transform: translateX(-50%); }
        #resetBpmBtn { background: #fff; color: #888; border: 1px solid #ccc; font-size: 0.6em; padding: 4px 10px; border-radius: 20px; min-width: auto; flex-grow: 0; }

        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-info { flex-grow: 1; cursor: pointer; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-bpm-tag { font-size: 0.7em; color: #666; background: #eee; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        
        .item-controls { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 10px; font-size: 0.8em; background: #6c757d; min-width: 35px; flex-grow: 0; }
        .btn-del { background: #dc3545; }
        .btn-tool { background: #f39c12; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #saveNameInput { width: 100%; padding: 12px; border: 2px solid #007bff; border-radius: 8px; font-size: 1em; box-sizing: border-box; margin-bottom: 15px; }
        
        .setting-section { background: #f0f4f8; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; justify-content: center; align-items: center; text-align: center; z-index: 1000; padding: 20px; cursor: pointer; }
        #exit-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 1.5em; }

        /* タップ補正用 */
        #tapArea { width: 100%; height: 150px; background: #e7f3ff; border: 3px dashed #007bff; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 1.5em; font-weight: bold; color: #007bff; margin: 20px 0; cursor: pointer; user-select: none; }
        #tapArea:active { background: #007bff; color: white; }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message">読み込み中...</div>
</div>

<div id="exit-screen">
    <div>🏃‍♂️ プレイヤーを終了しました<br><span style="font-size: 0.6em; color: #aaa;">タブを閉じてください</span></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0;">📑 プレイリストを選択</h3>
        <div id="saveArea" style="display:none;">
            <input type="text" id="saveNameInput" placeholder="プレイリスト名を入力">
            <button style="background: #28a745; width: 100%; margin-bottom: 10px;" onclick="executeSaveWorkflow()">💾 この名前で保存</button>
        </div>
        <div id="playlist-index"></div>
        <hr>
        <button onclick="closeModal()" style="width:100%; background:#666;">閉じる</button>
    </div>
</div>

<div id="settingModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">🏃‍♂️ マイ・ピッチ設定</h3>
        <div class="setting-section">
            <div id="pitchBpmWrapper" onclick="editPitchBpmDirectly()">
                <span id="pitchBpmDisplay">120</span> <span style="font-size: 0.5em;">BPM</span>
            </div>
            <div class="ruler-container" id="pitchRulerParent">
                <div class="red-line"></div>
                <canvas id="pitchCanvas"></canvas>
            </div>
            <div style="margin-top: 15px;">
                <span>🔈</span> <input type="range" id="metronomeVolume" min="0" max="2" step="0.1" value="1.0" style="width: 150px;"> <span>🔊</span>
            </div>
        </div>
        <button style="background: #28a745; width: 100%; margin-bottom: 10px;" onclick="saveMyPitch()">💾 設定を保存して戻る</button>
        <button onclick="closeSettingModal()" style="width:100%; background:#666;">キャンセル</button>
    </div>
</div>

<div id="tapModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">🔧 BPM補正 (12回タップ)</h3>
        <p style="font-size:0.8em; color:#666;">リズムに合わせてタップしてください。後半8回の平均で算出します。</p>
        <div id="tapArea">TAP HERE!</div>
        <div id="tapStatus" style="text-align:center; font-size:1.2em; font-weight:bold; color:#007bff;">0 / 12</div>
        <p id="tapResult" style="text-align:center; margin-top:10px;"></p>
        <button id="applyTapBtn" style="display:none; background:#28a745; width:100%; margin-bottom:10px;" onclick="applyTapResult()">✅ このBPMを確定する</button>
        <button onclick="closeTapModal()" style="width:100%; background:#666;">閉じる</button>
    </div>
</div>

<div class="player-card">
    <h2 id="appTitle">🎵 夢のプレイヤー Ver 8.5</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.85em;">フォルダを認証してください</div>

    <div class="seek-container">
        <input type="range" id="seekBar" value="0" min="0" step="0.1">
        <div class="time-display">
            <span id="currentTime">00:00</span>
            <span id="durationTime">00:00</span>
        </div>
    </div>

    <div class="bpm-panel">
        <div class="bpm-display">
            <div id="bpmWrapper" onclick="editBpmDirectly()">
                <span id="currentBpmDisplay">---</span> <span style="font-size: 0.5em;">BPM</span>
            </div>
            <button id="resetBpmBtn">元: <span id="originalBpmValue">---</span></button>
        </div>
        <div class="ruler-container" id="mainRulerParent">
            <div class="red-line"></div>
            <canvas id="rulerCanvas"></canvas>
        </div>
    </div>
    
    <div class="controls">
        <button id="addSongs" style="background: #007bff;">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="mFuncBtn" style="background: #e67e22;" onclick="toggleMFunction()">M-Function OFF</button>
        <button id="savePlaylist" style="background: #28a745;" onclick="openSaveModal()">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;" onclick="openLoadModal()">📑 読込</button>
        <button id="configBtn" style="background: #6f42c1;" onclick="openSettingModal()">⚙ 設定</button>
        <button id="exitBtn" style="background: #343a40;">🚪 終了</button>
    </div>
    <ul id="playlist"></ul>
    <audio id="hiddenAudio" style="display:none;"></audio>
</div>

<script>
    const audioTag = document.getElementById('hiddenAudio');
    const seekBar = document.getElementById('seekBar');
    let playlist = { songs: [] };
    let currentPlaylistName = "マイリスト";
    let rootHandle = null;
    let currentPlayingIdx = -1;
    let originalBpm = 0;
    let userMyPitch = 120;
    let isMFunctionMode = false;
    let wasPlayingBeforeSetting = false;
    let isDraggingSeek = false;

    // タップ補正用変数
    let tapTimes = [];
    let tapCount = 0;
    let measuredBpm = 0;

    const GAP = 12;
    const mainCanvas = document.getElementById('rulerCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const pitchCanvas = document.getElementById('pitchCanvas');
    const pitchCtx = pitchCanvas.getContext('2d');

    let audioCtx = null, timerID = null, metronomeBpm = 120, masterGain = null, nextNoteTime = 0.0;
    const DB_NAME = "PlayerDB_V5", STORE_LISTS = "playlists", STORE_CONFIG = "config";

    async function openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_LISTS)) db.createObjectStore(STORE_LISTS);
                if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function dbPut(store, key, value) { const db = await openDB(); const tx = db.transaction(store, "readwrite"); tx.objectStore(store).put(value, key); }
    async function dbGet(store, key) { const db = await openDB(); return new Promise(r => db.transaction(store).objectStore(store).get(key).onsuccess = e => r(e.target.result)); }

    window.onload = async () => {
        const savedHandle = await dbGet(STORE_CONFIG, "rootFolder");
        if (savedHandle) { rootHandle = savedHandle; document.getElementById('message').innerHTML = "おかえりなさい、竹弘！<br>[ タップして開始 ]"; }
        const savedPitch = await dbGet(STORE_CONFIG, "myPitchBpm");
        if (savedPitch) userMyPitch = savedPitch;
        syncCanvasSize(mainCanvas); drawRuler(mainCtx, mainCanvas, 120);
    };

    // --- レスポンシブ定規ズレ防止対策 ---
    function syncCanvasSize(canvasObj) {
        canvasObj.width = canvasObj.parentElement.clientWidth;
        canvasObj.height = 60;
    }
    const refreshAllRulers = () => {
        syncCanvasSize(mainCanvas);
        const curBpm = parseInt(document.getElementById('currentBpmDisplay').innerText) || 120;
        drawRuler(mainCtx, mainCanvas, curBpm);
        if (document.getElementById('settingModal').style.display === 'flex') {
            syncCanvasSize(pitchCanvas); drawRuler(pitchCtx, pitchCanvas, metronomeBpm);
        }
    };
    window.addEventListener('resize', refreshAllRulers);
    window.addEventListener('orientationchange', () => setTimeout(refreshAllRulers, 300));

    async function handleAuth() {
        try {
            if (!rootHandle) { rootHandle = await window.showDirectoryPicker(); await dbPut(STORE_CONFIG, "rootFolder", rootHandle); }
            else if (await rootHandle.requestPermission() !== 'granted') return;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = `認証済み: ${rootHandle.name}`;
            refreshAllRulers();
        } catch (e) { alert("認証が必要です"); }
    }

    // --- コア再生・BPMロジック ---
    function getTrueBaseBpm(song) {
        return song.manualBpm || song.baseBpm || 120;
    }

    function applyTempo(rate, shouldRender = true) {
        if (originalBpm === 0) return;
        const safeRate = Math.min(Math.max(rate, 0.5), 2.0);
        audioTag.playbackRate = safeRate;
        const currentBpm = Math.round(originalBpm * safeRate);
        document.getElementById('currentBpmDisplay').innerText = currentBpm;
        document.getElementById('originalBpmValue').innerText = originalBpm;
        if (currentPlayingIdx !== -1) {
            playlist.songs[currentPlayingIdx].userBpm = currentBpm;
            if (shouldRender) renderPlaylist();
        }
        drawRuler(mainCtx, mainCanvas, currentBpm);
    }

    async function playSong(idx) {
        if (idx < 0 || idx >= playlist.songs.length) return;
        const song = playlist.songs[idx];
        currentPlayingIdx = idx;
        document.getElementById('status').innerText = "解析中...";
        try {
            let h = song.handle || await findFileRecursive(rootHandle, song.name);
            const file = await h.getFile();
            if (!song.baseBpm) song.baseBpm = await estimateBPM(file);
            
            originalBpm = song.baseBpm;
            audioTag.src = URL.createObjectURL(file);
            audioTag.preservesPitch = true;

            let targetRate = 1.0;
            if (isMFunctionMode) {
                targetRate = userMyPitch / getTrueBaseBpm(song);
            } else if (song.userBpm) {
                targetRate = song.userBpm / originalBpm;
            }

            applyTempo(targetRate, false);
            audioTag.play();
            renderPlaylist();
            document.getElementById('status').innerText = `再生中: ${song.name}`;
        } catch (e) { alert("再生エラーが発生しました"); }
    }

    // --- M-Function & タップ補正 ---
    function toggleMFunction() {
        isMFunctionMode = !isMFunctionMode;
        const btn = document.getElementById('mFuncBtn');
        btn.innerText = isMFunctionMode ? "M-Function ON" : "M-Function OFF";
        btn.style.background = isMFunctionMode ? "#2ecc71" : "#e67e22";
        if (currentPlayingIdx !== -1) playSong(currentPlayingIdx); // 再計算のため再開
        renderPlaylist();
    }

    function openTapModal(idx) {
        currentPlayingIdx = idx;
        tapCount = 0; tapTimes = [];
        audioTag.loop = true;
        document.getElementById('tapStatus').innerText = "0 / 12";
        document.getElementById('tapResult').innerText = "";
        document.getElementById('applyTapBtn').style.display = 'none';
        document.getElementById('tapModal').style.display = 'flex';
    }

    document.getElementById('tapArea').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const now = performance.now();
        tapTimes.push(now);
        tapCount++;
        document.getElementById('tapStatus').innerText = `${tapCount} / 12`;
        if (tapCount >= 12) {
            const intervals = [];
            for (let i = 5; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
            const avg = intervals.reduce((a, b) => a + b) / intervals.length;
            measuredBpm = Math.round(60000 / avg);
            document.getElementById('tapResult').innerHTML = `算出BPM: <span style="font-size:1.5em; color:#e67e22;">${measuredBpm}</span>`;
            document.getElementById('applyTapBtn').style.display = 'block';
        }
    });

    async function applyTapResult() {
        const song = playlist.songs[currentPlayingIdx];
        song.manualBpm = measuredBpm;
        // 即時保存（聖域保護）
        const data = await dbGet(STORE_LISTS, currentPlaylistName);
        if (data) {
            data.songs = playlist.songs.map(s => ({name: s.name, baseBpm: s.baseBpm, userBpm: s.userBpm, manualBpm: s.manualBpm}));
            await dbPut(STORE_LISTS, currentPlaylistName, data);
        }
        alert(`${song.name} のBPMを ${measuredBpm} に確定しました！`);
        closeTapModal();
        if (isMFunctionMode) playSong(currentPlayingIdx);
    }

    function closeTapModal() {
        audioTag.loop = false;
        document.getElementById('tapModal').style.display = 'none';
    }

    // --- UI描画・イベント ---
    function renderPlaylist() {
        const list = document.getElementById('playlist'); list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li'); if (i === currentPlayingIdx) li.className = 'playing';
            const info = document.createElement('div'); info.className = 'song-info';
            const displayBpm = isMFunctionMode ? getTrueBaseBpm(song) : (song.userBpm || song.baseBpm || '---');
            const tagClass = song.manualBpm ? 'style="background:#f39c12; color:white;"' : '';
            info.innerHTML = `▶ ${song.name} <span class="song-bpm-tag" ${tagClass}>${displayBpm}</span>`;
            info.onclick = () => playSong(i);
            
            const ctrl = document.createElement('div'); ctrl.className = 'item-controls';
            if (isMFunctionMode) {
                const toolBtn = document.createElement('button'); toolBtn.className = 'btn-sm btn-tool'; toolBtn.innerText = '🔧';
                toolBtn.onclick = (e) => { e.stopPropagation(); openTapModal(i); };
                ctrl.appendChild(toolBtn);
            } else {
                const upBtn = document.createElement('button'); upBtn.className = 'btn-sm'; upBtn.innerText = '↑';
                upBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, -1); };
                const delBtn = document.createElement('button'); delBtn.className = 'btn-sm btn-del'; delBtn.innerText = '×';
                delBtn.onclick = (e) => { e.stopPropagation(); removeSong(i); };
                ctrl.appendChild(upBtn); ctrl.appendChild(delBtn);
            }
            li.appendChild(info); li.appendChild(ctrl); list.appendChild(li);
        });
    }

    // --- 上書き確認機能付き保存フロー ---
    async function executeSaveWorkflow() {
        const name = document.getElementById('saveNameInput').value.trim(); 
        if (!name) return;
        
        // 【デグレード防止】上書き確認ロジック
        const existing = await dbGet(STORE_LISTS, name);
        if (existing) {
            if (!confirm(`「${name}」は既に存在します。上書きしてもよろしいですか？`)) return;
        }

        currentPlaylistName = name;
        const data = { 
            songs: playlist.songs.map(s => ({name: s.name, baseBpm: s.baseBpm, userBpm: s.userBpm, manualBpm: s.manualBpm})), 
            updatedAt: new Date().toLocaleString() 
        };
        await dbPut(STORE_LISTS, name, data);
        document.getElementById('appTitle').innerText = `🎵 ${name}`;
        alert("プレイリストを保存しました！");
        closeModal();
    }

    // --- その他既存機能の完全継承 ---
    function formatTime(s) { if (isNaN(s)) return "00:00"; const m = Math.floor(s/60), ss = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`; }
    audioTag.addEventListener('timeupdate', () => { if(!isDraggingSeek){ seekBar.value = audioTag.currentTime; document.getElementById('currentTime').innerText = formatTime(audioTag.currentTime); }});
    audioTag.addEventListener('loadedmetadata', () => { seekBar.max = audioTag.duration; document.getElementById('durationTime').innerText = formatTime(audioTag.duration); });
    audioTag.addEventListener('ended', () => { if(!audioTag.loop) playNext(); });
    seekBar.addEventListener('input', () => { isDraggingSeek = true; document.getElementById('currentTime').innerText = formatTime(seekBar.value); });
    seekBar.addEventListener('change', () => { audioTag.currentTime = seekBar.value; isDraggingSeek = false; });
    
    function playNext() { if(playlist.songs.length === 0) return; let n = currentPlayingIdx + 1; if(n >= playlist.songs.length) n = 0; playSong(n); }
    function stopPlayback() { audioTag.pause(); document.getElementById('status').innerText = "停止中"; }
    function moveSong(idx, dir) { let n = idx + dir; if(n<0 || n>=playlist.songs.length) return; [playlist.songs[idx], playlist.songs[n]] = [playlist.songs[n], playlist.songs[idx]]; if(currentPlayingIdx === idx) currentPlayingIdx = n; else if(currentPlayingIdx === n) currentPlayingIdx = idx; renderPlaylist(); }
    function removeSong(idx) { if(confirm("削除しますか？")){ playlist.songs.splice(idx, 1); if(currentPlayingIdx === idx) stopPlayback(); renderPlaylist(); }}
    
    function drawRuler(ctx, cvs, centerBpm) {
        ctx.clearRect(0,0,cvs.width,cvs.height); const mid = cvs.width/2; if(mid<=0) return;
        for(let b=Math.floor(centerBpm-35); b<=Math.ceil(centerBpm+35); b++){
            let x = Math.round(mid + (b-centerBpm)*GAP) - 0.4; ctx.beginPath(); ctx.strokeStyle='#999';
            if(b%10===0){ ctx.moveTo(x,0); ctx.lineTo(x,25); ctx.fillStyle='#333'; ctx.font='10px Arial'; ctx.fillText(b,x-8,40); }
            else if(b%5===0) { ctx.moveTo(x,0); ctx.lineTo(x,15); } else { ctx.moveTo(x,0); ctx.lineTo(x,8); }
            ctx.stroke();
        }
    }

    // メトロノーム・設定系
    function scheduler() { while(nextNoteTime < audioCtx.currentTime + 0.1){ playClick(nextNoteTime); nextNoteTime += 60.0/metronomeBpm; } timerID = setTimeout(scheduler, 25); }
    function playClick(t) { const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type='triangle'; o.frequency.value=880; g.gain.setValueAtTime(parseFloat(document.getElementById('metronomeVolume').value), t); g.gain.exponentialRampToValueAtTime(0.001, t+0.08); o.connect(g); g.connect(masterGain); masterGain.connect(audioCtx.destination); o.start(t); o.stop(t+0.1); }
    function openSettingModal() { wasPlayingBeforeSetting = !audioTag.paused; stopPlayback(); metronomeBpm = userMyPitch; document.getElementById('settingModal').style.display='flex'; setTimeout(()=>refreshAllRulers(),100); if(!audioCtx){ audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value=1.5; } nextNoteTime=audioCtx.currentTime; scheduler(); }
    function closeSettingModal() { clearTimeout(timerID); document.getElementById('settingModal').style.display='none'; if(wasPlayingBeforeSetting && currentPlayingIdx!==-1) audioTag.play(); }
    async function saveMyPitch() { userMyPitch = metronomeBpm; await dbPut(STORE_CONFIG, "myPitchBpm", userMyPitch); closeSettingModal(); alert(`保存完了: ${userMyPitch} BPM`); }

    // ドラッグ・共通
    function setupDraggable(cvs, fn) { let d=false, lx=0; const s=(x)=>{d=true; lx=x;}; const m=(x)=>{ if(!d)return; const dx=x-lx; if(Math.abs(dx)>3){fn(dx>0?-1:1); lx=x;} }; cvs.addEventListener('mousedown',e=>s(e.clientX)); window.addEventListener('mousemove',e=>m(e.clientX)); window.addEventListener('mouseup',()=>d=false); cvs.addEventListener('touchstart',e=>{s(e.touches[0].clientX);}, {passive:false}); cvs.addEventListener('touchmove',e=>m(e.touches[0].clientX), {passive:false}); window.addEventListener('touchend',()=>d=false); }
    setupDraggable(mainCanvas, (d)=>{ if(originalBpm===0)return; const c=parseInt(document.getElementById('currentBpmDisplay').innerText); applyTempo((c+d)/originalBpm, true); });
    setupDraggable(pitchCanvas, (d)=>{ metronomeBpm=Math.min(Math.max(metronomeBpm+d,40),250); document.getElementById('pitchBpmDisplay').innerText=metronomeBpm; drawRuler(pitchCtx, pitchCanvas, metronomeBpm); });

    // その他
    async function estimateBPM(f) { const c=new AudioContext(), b=await c.decodeAudioData(await f.arrayBuffer()), d=b.getChannelData(0); let p=[]; for(let i=0; i<d.length; i+=441){ if(Math.abs(d[i])>0.8)p.push(i); } if(p.length<10)return 120; let v=[]; for(let i=1; i<p.length; i++) v.push(p[i]-p[i-1]); let bpm=Math.round(60/( (v.reduce((a,b)=>a+b)/v.length)/b.sampleRate )); while(bpm<60)bpm*=2; while(bpm>180)bpm/=2; return bpm; }
    async function findFileRecursive(h, n) { for await(const e of h.values()){ if(e.kind==='file' && e.name===n)return e; if(e.kind==='directory'){ const r=await findFileRecursive(e,n); if(r)return r;} } return null; }
    function openSaveModal() { document.getElementById('modalTitle').innerText="💾 保存"; document.getElementById('saveArea').style.display='block'; document.getElementById('saveNameInput').value=currentPlaylistName; refreshPlaylistIndex(true); document.getElementById('modal').style.display='flex'; }
    function openLoadModal() { document.getElementById('modalTitle').innerText="📑 読込"; document.getElementById('saveArea').style.display='none'; refreshPlaylistIndex(false); document.getElementById('modal').style.display='flex'; }
    async function refreshPlaylistIndex(isS) { const db=await openDB(), ks=await new Promise(r=>db.transaction(STORE_LISTS).objectStore(STORE_LISTS).getAllKeys().onsuccess=e=>r(e.target.result)); const idx=document.getElementById('playlist-index'); idx.innerHTML=''; for(const k of ks){ const d=await dbGet(STORE_LISTS,k); const dv=document.createElement('div'); dv.className='list-item'; dv.innerHTML=`<div>📑 ${k}</div><div style="font-size:0.7em; color:#888;">${d.updatedAt||''}</div>`; dv.onclick=()=>{ if(isS) document.getElementById('saveNameInput').value=k; else { playlist.songs=d.songs; currentPlaylistName=k; document.getElementById('appTitle').innerText=`🎵 ${k}`; renderPlaylist(); closeModal(); }}; idx.appendChild(dv); } }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    function editBpmDirectly() { if(originalBpm===0)return; const i=prompt("目標BPM", document.getElementById('currentBpmDisplay').innerText); if(i && !isNaN(i)) applyTempo(parseInt(i)/originalBpm, true); }
    function editPitchBpmDirectly() { const i=prompt("目標BPM", metronomeBpm); if(i && !isNaN(i)){ metronomeBpm=Math.min(Math.max(parseInt(i),40),250); document.getElementById('pitchBpmDisplay').innerText=metronomeBpm; drawRuler(pitchCtx, pitchCanvas, metronomeBpm); } }
    document.getElementById('exitBtn').onclick=()=>{ if(confirm("終了前に保存しますか？")) openSaveModal(); else if(confirm("終了しますか？")) { stopPlayback(); document.getElementById('exit-screen').style.display='flex'; } };
    document.getElementById('stopBtn').onclick=stopPlayback;
    document.getElementById('resetBpmBtn').onclick=()=>{ if(originalBpm!==0) applyTempo(1.0, true); };
    document.getElementById('addSongs').onclick=async()=>{ try{ const fs=await window.showOpenFilePicker({multiple:true, types:[{accept:{'audio/*':['.mp3','.m4a']}}]}); for(const h of fs){ if(!playlist.songs.some(s=>s.name===h.name)) playlist.songs.push({name:h.name, handle:h, baseBpm:0, userBpm:0, manualBpm:0}); } renderPlaylist(); }catch(e){} };
</script>
