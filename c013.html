<script>
// ============================================================
// 0. 定数定義
// ============================================================
// データベース名
const DB_NAME = "NoriRunDB";

// IndexedDBバージョン
const DB_VERSION = 1;

// ---------- ストア名 ----------

// アプリ設定
const STORE_SETTINGS = "settings";

// 曲マスター
const STORE_MUSIC = "music_library";

// プレイリスト
const STORE_PLAYLISTS = "playlists";

// Musicフォルダ管理
const STORE_FOLDER_ROOTS = "folder_roots";

// Musicフォルダの管理番号
const ROOT_MUSIC_ID = "root_music";

// ============================================================
// 1. 画面部品取得
// ============================================================
// アプリ全体
const app = document.getElementById("app");

// Musicフォルダ確認ボタン
const startButton = document.getElementById("start-button");

// ============================================================
// 2. IndexedDB
// ============================================================
/**
 * NoriRunDBを開く
 *
 * c012で作成済みのNoriRunDBへ接続します。
 * DBが存在しない場合だけ onupgradeneeded が実行されます。
 */
function openNoriRunDB() {

    return new Promise(function (resolve, reject) {

        // IndexedDBを開く
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        // DB新規作成時
        request.onupgradeneeded = function (event) {

            console.log("NoriRunDB 新規作成");

        };

        // 接続成功
        request.onsuccess = function (event) {

            console.log("NoriRunDB 接続成功");

            resolve(event.target.result);

        };

        // 接続失敗
        request.onerror = function () {

            reject("NoriRunDBを開けませんでした。");

        };

    });

}
