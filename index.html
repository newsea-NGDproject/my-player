<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>竹弘の夢のプレイヤー Ver 6.1</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; color: #333; margin: 0; overflow-x: hidden; touch-action: pan-y; }
        .player-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: 20px auto; }
        .controls { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 12px 15px; border-radius: 10px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; font-size: 0.9em; flex-grow: 1; min-width: 140px; }
        button:active { filter: brightness(0.8); }

        /* BPM定規セクション */
        .bpm-panel { background: #f8f9fa; border-radius: 10px; padding: 20px 0; margin: 15px 0; border: 1px solid #dee2e6; position: relative; text-align: center; }
        .bpm-display-main { font-size: 2.5em; font-weight: bold; color: #007bff; margin-bottom: 2px; cursor: pointer; }
        .original-info { font-size: 0.8em; color: #888; margin-bottom: 10px; }

        .ruler-viewport { width: 100%; height: 100px; position: relative; overflow: hidden; background: #fff; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; touch-action: none; cursor: grab; }
        .ruler-center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #dc3545; z-index: 30; transform: translateX(-50%); pointer-events: none; }
        
        .ruler-track { position: absolute; height: 100%; will-change: transform; display: flex; align-items: flex-start; z-index: 10; }
        
        /* 目盛りの高さ調整 */
        .ruler-tick { width: 10px; height: 20px; border-left: 1px solid #bbb; flex-shrink: 0; position: relative; }
        .ruler-tick.mid { height: 35px; border-left: 1.5px solid #888; } /* 5刻みの中目盛り */
        .ruler-tick.major { height: 50px; border-left: 2px solid #333; } /* 10刻みの大目盛り */
        .ruler-tick.major::after { content: attr(data-val); position: absolute; top: 55px; left: -15px; width: 30px; text-align: center; font-size: 11px; color: #333; font-weight: bold; }

        .ruler-safe-zone { position: absolute; height: 100%; background: rgba(0, 0, 0, 0.1); z-index: 1; pointer-events: none; }
        #resetBpmBtn { background: #6c757d; font-size: 0.75em; padding: 6px 15px; border-radius: 20px; min-width: auto; margin-top: 10px; }

        /* プレイリスト・UI */
        #playlist { list-style: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 8px; margin-bottom: 5px; }
        .playing { background: #e7f3ff; border: 2px solid #007bff; font-weight: bold; }
        .song-info { flex-grow: 1; cursor: pointer; padding: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-bpm-tag { font-size: 0.7em; color: #666; background: #eee; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .item-controls { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 10px; font-size: 0.8em; background: #6c757d; min-width: 35px; flex-grow: 0; }
        .btn-del { background: #dc3545; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; justify-content: center; align-items: center; text-align: center; z-index: 1000; padding: 20px; cursor: pointer; }
        #exit-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 1.5em; }
    </style>
</head>
<body>

<div id="overlay" onclick="handleAuth()">
    <div id="message">読み込み中...</div>
</div>

<div id="exit-screen">
    <div>🏃‍♂️ プレイヤーを終了しました<br><span style="font-size: 0.6em; color: #aaa;">タブを閉じてください</span></div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">📑 プレイリストを選択</h3>
        <div id="playlist-index"></div>
        <hr>
        <button onclick="closeModal()" style="width:100%; background:#666;">閉じる</button>
    </div>
</div>

<div class="player-card">
    <h2 id="appTitle">🎵 夢のプレイヤー Ver 6.1</h2>
    <div id="status" style="margin-bottom:10px; color:#666; font-size: 0.85em;">フォルダを認証してください</div>

    <div class="bpm-panel">
        <div id="currentBpmDisplay" class="bpm-display-main" onclick="inputBpmManually()">120</div>
        <div class="original-info">元BPM: <span id="originalBpmValue">---</span></div>
        
        <div class="ruler-viewport" id="rulerViewport">
            <div class="ruler-center-line"></div>
            <div id="rulerTrack" class="ruler-track">
                <div id="safeZoneLeft" class="ruler-safe-zone" style="left: 0;"></div>
                <div id="safeZoneRight" class="ruler-safe-zone"></div>
            </div>
        </div>

        <button id="resetBpmBtn">元のBPMに戻す</button>
    </div>
    
    <div class="controls">
        <button id="addSongs">📂 曲を追加</button>
        <button id="stopBtn" style="background: #dc3545;">⏹ 停止</button>
        <button id="savePlaylist" style="background: #28a745;">💾 保存</button>
        <button id="loadPlaylist" style="background: #17a2b8;">📑 読込</button>
        <button id="exitBtn" style="background: #343a40;">🚪 終了</button>
    </div>
    <ul id="playlist"></ul>
    <audio id="hiddenAudio" style="display:none;"></audio>
</div>

<script>
    const audioTag = document.getElementById('hiddenAudio');
    let playlist = { songs: [] };
    let currentPlaylistName = "マイリスト";
    let rootHandle = null;
    let currentPlayingIdx = -1;
    let originalBpm = 0;

    // 定規設定 (1BPM = 10px)
    const TICK_PX = 10;
    const MIN_BPM = 1;
    const MAX_BPM = 1000;
    let currentBpm = 120;
    let isDragging = false;
    let startX = 0;
    let velocity = 0;
    let rafId = null;

    const DB_NAME = "PlayerDB_V5";
    const STORE_LISTS = "playlists";
    const STORE_CONFIG = "config";

    async function openDB() {
        return new Promise((r) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_LISTS)) db.createObjectStore(STORE_LISTS);
                if (!db.objectStoreNames.contains(STORE_CONFIG)) db.createObjectStore(STORE_CONFIG);
            };
            req.onsuccess = (e) => r(e.target.result);
        });
    }

    async function dbPut(s, k, v) { const db = await openDB(); db.transaction(s, "readwrite").objectStore(s).put(v, k); }
    async function dbGet(s, k) { const db = await openDB(); return new Promise(r => db.transaction(s).objectStore(s).get(k).onsuccess = e => r(e.target.result)); }

    window.onload = async () => {
        buildRulerTicks();
        const savedHandle = await dbGet(STORE_CONFIG, "rootFolder");
        if (savedHandle) { rootHandle = savedHandle; document.getElementById('message').innerHTML = "おかえりなさい！<br>[ タップして開始 ]"; }
        else { document.getElementById('message').innerHTML = "Musicフォルダを選択してください<br>[ タップして選択 ]"; }
        
        // 起動時の初期位置合わせ (ズレ防止)
        setTimeout(() => updateRulerPosition(false), 100);
    };

    function buildRulerTicks() {
        const track = document.getElementById('rulerTrack');
        for (let i = MIN_BPM; i <= MAX_BPM; i++) {
            const tick = document.createElement('div');
            // 10刻み(major)、5刻み(mid)、それ以外
            if (i % 10 === 0) {
                tick.className = 'ruler-tick major';
                tick.setAttribute('data-val', i);
            } else if (i % 5 === 0) {
                tick.className = 'ruler-tick mid';
            } else {
                tick.className = 'ruler-tick';
            }
            track.appendChild(tick);
        }
    }

    async function handleAuth() {
        try {
            if (!rootHandle) { rootHandle = await window.showDirectoryPicker(); await dbPut(STORE_CONFIG, "rootFolder", rootHandle); }
            else { if (await rootHandle.requestPermission() !== 'granted') return; }
            document.getElementById('overlay').style.display = 'none';
        } catch (e) { alert("フォルダの選択が必要です"); }
    }

    async function estimateBPM(file) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await file.arrayBuffer();
        const buffer = await audioCtx.decodeAudioData(arrayBuffer);
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        let peaks = [];
        for (let i = 0; i < data.length; i += 441) { if (Math.abs(data[i]) > 0.8) peaks.push(i); }
        if (peaks.length < 10) return 120;
        let intervals = [];
        for (let i = 1; i < peaks.length; i++) intervals.push(peaks[i] - peaks[i-1]);
        const avg = intervals.reduce((a, b) => a + b) / intervals.length;
        let bpm = Math.round(60 / (avg / sampleRate));
        while (bpm < 60) bpm *= 2; while (bpm > 180) bpm /= 2;
        return Math.round(bpm);
    }

    async function playSong(idx) {
        const song = playlist.songs[idx];
        currentPlayingIdx = idx;
        document.getElementById('status').innerText = "解析中...";
        try {
            let h = song.handle || await findFileRecursive(rootHandle, song.name);
            const file = await h.getFile();
            if (!song.baseBpm) song.baseBpm = await estimateBPM(file);
            originalBpm = song.baseBpm;
            
            audioTag.src = URL.createObjectURL(file);
            audioTag.preservesPitch = true;
            
            currentBpm = (song.userBpm && song.userBpm !== 0) ? song.userBpm : originalBpm;
            updateRulerPosition(false);
            
            audioTag.play();
            renderPlaylist();
            updateSafeZone();
            document.getElementById('status').innerText = `再生中: ${song.name}`;
        } catch (e) { alert("再生エラー"); }
    }

    function updateRulerPosition(animate = true) {
        if (originalBpm > 0) {
            const minS = Math.ceil(originalBpm * 0.5);
            const maxS = Math.floor(originalBpm * 2.0);
            currentBpm = Math.max(minS, Math.min(maxS, currentBpm));
        }

        const track = document.getElementById('rulerTrack');
        const viewportWidth = document.getElementById('rulerViewport').clientWidth;
        // 中央基準の絶対計算 (ズレ解消の鍵)
        const targetX = (viewportWidth / 2) - ((currentBpm - MIN_BPM) * TICK_PX) - (TICK_PX / 2);

        track.style.transition = animate ? "transform 0.3s ease-out" : "none";
        track.style.transform = `translateX(${targetX}px)`;
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('currentBpmDisplay').innerText = Math.round(currentBpm);
        document.getElementById('originalBpmValue').innerText = originalBpm || "---";
        if (originalBpm > 0) {
            audioTag.playbackRate = currentBpm / originalBpm;
            if (currentPlayingIdx !== -1) {
                playlist.songs[currentPlayingIdx].userBpm = Math.round(currentBpm);
            }
        }
    }

    function updateSafeZone() {
        if (originalBpm === 0) return;
        const minS = Math.ceil(originalBpm * 0.5);
        const maxS = Math.floor(originalBpm * 2.0);
        document.getElementById('safeZoneLeft').style.width = `${(minS - MIN_BPM) * TICK_PX}px`;
        const rightStart = (maxS - MIN_BPM) * TICK_PX + TICK_PX;
        document.getElementById('safeZoneRight').style.left = `${rightStart}px`;
        document.getElementById('safeZoneRight').style.width = `${(MAX_BPM - maxS) * TICK_PX}px`;
    }

    const viewport = document.getElementById('rulerViewport');
    viewport.addEventListener('mousedown', (e) => onStart(e.clientX));
    viewport.addEventListener('touchstart', (e) => onStart(e.touches[0].clientX));

    function onStart(x) {
        isDragging = true; startX = x; velocity = 0;
        cancelAnimationFrame(rafId);
        document.getElementById('rulerTrack').style.transition = "none";
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onTouchMove, {passive:false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function onTouchMove(e) { e.preventDefault(); onMove(e.touches[0]); }
    function onMove(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        currentBpm -= (dx / TICK_PX);
        currentBpm = Math.max(MIN_BPM, Math.min(MAX_BPM, currentBpm));
        startX = e.clientX;
        velocity = dx;
        updateRulerPosition(false);
    }

    function onEnd() {
        isDragging = false;
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('touchmove', onTouchMove);
        if (Math.abs(velocity) > 1) startInertia();
        else snapToBpm();
    }

    function startInertia() {
        velocity *= 0.95;
        currentBpm -= (velocity / TICK_PX);
        currentBpm = Math.max(MIN_BPM, Math.min(MAX_BPM, currentBpm));
        updateRulerPosition(false);
        if (Math.abs(velocity) > 0.5) rafId = requestAnimationFrame(startInertia);
        else snapToBpm();
    }

    function snapToBpm() {
        currentBpm = Math.round(currentBpm);
        updateRulerPosition(true);
        renderPlaylist();
    }

    window.addEventListener('resize', () => updateRulerPosition(false));

    function inputBpmManually() {
        if (originalBpm === 0) return;
        const val = prompt("目標BPMを入力:", Math.round(currentBpm));
        if (val && !isNaN(val)) { currentBpm = parseInt(val); updateRulerPosition(true); }
    }

    function renderPlaylist() {
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        playlist.songs.forEach((song, i) => {
            const li = document.createElement('li');
            if (i === currentPlayingIdx) li.className = 'playing';
            const info = document.createElement('div');
            info.className = 'song-info';
            const bpmTag = song.userBpm ? `<span class="song-bpm-tag">🏃 ${song.userBpm}</span>` : song.baseBpm ? `<span class="song-bpm-tag">${song.baseBpm}</span>` : '';
            info.innerHTML = `▶ ${song.name} ${bpmTag}`;
            info.onclick = () => playSong(i);
            
            const ctrl = document.createElement('div');
            ctrl.className = 'item-controls';
            const upBtn = document.createElement('button'); upBtn.className = 'btn-sm'; upBtn.innerText = '↑';
            upBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, -1); };
            const downBtn = document.createElement('button'); downBtn.className = 'btn-sm'; downBtn.innerText = '↓';
            downBtn.onclick = (e) => { e.stopPropagation(); moveSong(i, 1); };
            const delBtn = document.createElement('button'); delBtn.className = 'btn-sm btn-del'; delBtn.innerText = '❌';
            delBtn.onclick = (e) => { e.stopPropagation(); removeSong(i); };
            
            ctrl.appendChild(upBtn); ctrl.appendChild(downBtn); ctrl.appendChild(delBtn);
            li.appendChild(info); li.appendChild(ctrl);
            list.appendChild(li);
        });
    }

    async function performSave() {
        let name = prompt("プレイリスト名を入力してください", currentPlaylistName);
        if (!name) return false;
        currentPlaylistName = name;
        const data = { 
            songs: playlist.songs.map(s => ({name: s.name, baseBpm: s.baseBpm, userBpm: s.userBpm})), 
            updatedAt: new Date().toLocaleString() 
        };
        await dbPut(STORE_LISTS, name, data);
        document.getElementById('appTitle').innerText = `🎵 ${name}`;
        return true;
    }

    document.getElementById('savePlaylist').onclick = async () => { if (await performSave()) alert("保存しました"); };
    document.getElementById('loadPlaylist').onclick = async () => {
        const db = await openDB();
        const keys = await new Promise(r => db.transaction(STORE_LISTS).objectStore(STORE_LISTS).getAllKeys().onsuccess = e => r(e.target.result));
        const indexDiv = document.getElementById('playlist-index');
        indexDiv.innerHTML = '';
        for (const key of keys) {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div>📑 ${key}</div>`;
            div.onclick = async () => { 
                const data = await dbGet(STORE_LISTS, key); 
                playlist.songs = data.songs; 
                currentPlaylistName = key;
                document.getElementById('appTitle').innerText = `🎵 ${key}`;
                renderPlaylist(); 
                closeModal(); 
            };
            indexDiv.appendChild(div);
        }
        document.getElementById('modal').style.display = 'flex';
    };

    document.getElementById('exitBtn').addEventListener('click', async () => {
        const choice = confirm("終了する前にプレイリストを保存しますか？\n\n[OK] 保存して終了\n[キャンセル] 保存せずに終了（または戻る）");
        if (choice) { if (await performSave()) executeExit(); }
        else { if (confirm("保存せずに終了してよろしいですか？")) executeExit(); }
    });

    function executeExit() { audioTag.pause(); document.getElementById('exit-screen').style.display = 'flex'; }
    document.getElementById('stopBtn').onclick = () => { audioTag.pause(); document.getElementById('status').innerText = "停止中"; };
    document.getElementById('resetBpmBtn').onclick = () => { if (originalBpm > 0) { currentBpm = originalBpm; updateRulerPosition(true); } };
    
    document.getElementById('addSongs').addEventListener('click', async () => {
        try {
            const handles = await window.showOpenFilePicker({ multiple: true, types: [{ accept: {'audio/*': ['.mp3', '.m4a']} }] });
            for (const h of handles) { if (!playlist.songs.some(s => s.name === h.name)) playlist.songs.push({ name: h.name, handle: h, baseBpm: 0, userBpm: 0 }); }
            renderPlaylist();
        } catch(e){}
    });

    async function findFileRecursive(h, n) {
        for await (const e of h.values()) {
            if (e.kind === 'file' && e.name === n) return e;
            if (e.kind === 'directory') { const r = await findFileRecursive(e, n); if (r) return r; }
        }
        return null;
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
