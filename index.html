<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEAT-LINK Ver 1.2</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 25px; border: 1px solid #333; }
        .monitor-panel { background: #000; margin: 10px 0; padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .bpm-main { font-size: 3em; font-weight: bold; color: #00ff88; margin: 5px 0; }
        .tap-area { width: 100%; height: 200px; background: #252525; border: 4px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; user-select: none; touch-action: none; position: relative; }
        .tap-area.active { border-style: solid; border-color: #007bff; background: #1a1a2e; }
        .seek-box { margin-top: 15px; display: none; }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        .log-box { margin-top: 10px; background: #000; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.7em; text-align: left; color: #00ff00; height: 100px; overflow-y: auto; }
        .btn-start { padding: 18px; border-radius: 15px; border: none; font-weight: bold; background: #6f42c1; color: white; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="statusLabel" style="font-size: 0.8em; color: #888;">READY</div>
    <div class="monitor-panel">
        <div class="bpm-main" id="bpmDisplay">--.----</div>
        <div style="font-family: monospace;">TIME: <span id="currentTimeDisplay">0.000</span> s</div>
    </div>
    <div class="tap-area" id="tapArea"><div id="tapLabel">フォルダを選択</div></div>
    <div class="seek-box" id="seekBox">
        <input type="range" id="seekBar" value="0" step="0.01">
        <div style="display:flex; gap:5px;">
            <button onclick="seekTo(scanOffsets[0])" style="flex:1;">P1</button>
            <button onclick="seekTo(scanOffsets[1])" style="flex:1;">P2</button>
            <button onclick="seekTo(scanOffsets[2])" style="flex:1;">P3</button>
        </div>
    </div>
    <div id="btnArea" style="margin-top: 15px;"><button id="folderBtn" class="btn-start">📁 フォルダ選択</button></div>
    <div class="log-box" id="log"></div>
</div>

<script>
    let audioCtx, audioBuf, currentSource, currentPhase = 0, scanOffsets = [], tapResults = [];
    let phaseStartTime = 0, currentOffset = 0, isPlaying = false, finalBpm = 0, refPhase = 0;
    let scheduledNodes = []; // 予約された音源を管理

    const log = (msg) => { const d = document.getElementById('log'); d.innerHTML = `> ${msg}<br>${d.innerHTML}`; };

    function clearScheduledBeats() {
        scheduledNodes.forEach(node => { try { node.stop(); } catch(e){} });
        scheduledNodes = [];
    }

    function updateLoop() {
        if (isPlaying && audioCtx) {
            const currentPos = (audioCtx.currentTime - phaseStartTime) + currentOffset;
            document.getElementById('currentTimeDisplay').innerText = currentPos.toFixed(3);
            document.getElementById('seekBar').value = currentPos;
        }
        requestAnimationFrame(updateLoop);
    }
    updateLoop();

    document.getElementById('folderBtn').onclick = async () => {
        const root = await window.showDirectoryPicker();
        for await (const entry of root.values()) {
            if (entry.name === "02-HANABI_1.m4a") {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioBuf = await audioCtx.decodeAudioData(await (await entry.getFile()).arrayBuffer());
                scanOffsets = [5, audioBuf.duration * 0.5, audioBuf.duration * 0.9];
                document.getElementById('seekBar').max = audioBuf.duration;
                document.getElementById('btnArea').style.display = 'none';
                startPhase();
                return;
            }
        }
    };

    async function startPhase() {
        currentPhase++;
        if (currentPhase > 3) { calculateFinal(); return; }
        isPlaying = false;
        for (let i = 3; i > 0; i--) { document.getElementById('tapLabel').innerText = `準備: ${i}`; await new Promise(r => setTimeout(r, 1000)); }
        document.getElementById('tapArea').className = 'tap-area active';
        document.getElementById('tapLabel').innerText = "TAP! (12回)";
        currentOffset = scanOffsets[currentPhase - 1];
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        phaseStartTime = audioCtx.currentTime;
        currentSource.start(0, currentOffset, 45);
        isPlaying = true;
        this.tempTaps = [];
    }

    document.getElementById('tapArea').onpointerdown = () => {
        if (currentPhase > 3) return;
        const pos = (audioCtx.currentTime - phaseStartTime) + currentOffset;
        this.tempTaps.push(pos);
        if (this.tempTaps.length >= 12) {
            const stable = this.tempTaps.slice(4);
            const avgPos = stable.reduce((a,b)=>a+b, 0) / stable.length;
            let ivls = [];
            for (let i = 1; i < stable.length; i++) ivls.push(stable[i] - stable[i-1]);
            const median = [...ivls].sort()[Math.floor(ivls.length / 2)];
            let tB = 0, tT = 0;
            ivls.forEach(v => { const b = Math.round(v / median); if (b >= 1 && b <= 3) { tB += b; tT += v; } });
            tapResults.push({ absPos: avgPos, bpm: (tB * 60) / tT });
            log(`P${currentPhase} 確定: ${avgPos.toFixed(3)}s`);
            currentSource.stop();
            startPhase();
        }
    };

    function calculateFinal() {
        const p1 = tapResults[0], p2 = tapResults[1], p3 = tapResults[2];
        // --- 竹弘式：三点相関BPM算出ロジック ---
        // P1-P2間、P1-P3間の拍数を暫定BPMで整数化
        const beats12 = Math.round((p2.absPos - p1.absPos) * (p1.bpm / 60));
        const beats13 = Math.round((p3.absPos - p1.absPos) * (p1.bpm / 60));
        // 二つの区間から最も矛盾の少ない共通BPMを算出
        finalBpm = ((beats12 + beats13) * 60) / ( (p2.absPos - p1.absPos) + (p3.absPos - p1.absPos) );
        // 位相（1拍目のズレ）はP1に完全固定！
        refPhase = p1.absPos % (60 / finalBpm);

        document.getElementById('bpmDisplay').innerText = finalBpm.toFixed(4);
        document.getElementById('seekBox').style.display = 'block';
        document.getElementById('tapArea').style.display = 'none';
        seekTo(0);
    }

    function seekTo(time) {
        time = parseFloat(time);
        clearScheduledBeats();
        if (currentSource) currentSource.stop();
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = audioBuf;
        currentSource.connect(audioCtx.destination);
        phaseStartTime = audioCtx.currentTime;
        currentOffset = time;
        currentSource.start(0, time);
        isPlaying = true;
        
        const ivl = 60 / finalBpm;
        for (let t = 0; t < audioBuf.duration; t += ivl) {
            const beatInSong = t + refPhase;
            if (beatInSong >= time) {
                const scheduleT = phaseStartTime + (beatInSong - time);
                if (scheduleT >= audioCtx.currentTime) scheduleTick(scheduleT);
            }
        }
    }

    function scheduleTick(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1200, t);
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
        scheduledNodes.push(osc);
    }
    document.getElementById('seekBar').oninput = (e) => seekTo(e.target.value);
</script>
</body>
</html>
