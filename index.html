<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoriRun Ver.9 - メインメニュー実験場</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f2f2f7;
            margin: 0; padding: 15px;
            color: #1c1c1e;
            -webkit-user-select: none; user-select: none;
        }
        .container {
            max-width: 500px; margin: 0 auto;
            background: #fff; padding: 15px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 { font-size: 1.3rem; margin-top: 0; text-align: center; margin-bottom: 15px; }

        /* --- 📋 曲一覧リストのコンテナ --- */
        .music-list {
            display: flex; flex-direction: column; gap: 8px;
        }

        /* --- 📏 黄金比率（合計11）を司る1行のスタイル --- */
        .music-row {
            display: flex; align-items: center;
            background: #f8f8f8; border-radius: 12px;
            padding: 6px; box-sizing: border-box;
            border: 1px solid #e5e5ea;
        }

        /* 共通ボタン（完全正方形ベース） */
        .row-btn {
            display: flex; align-items: center; justify-content: center;
            background: #ffffff; border: 1px solid #d1d1d6;
            border-radius: 8px; font-size: 1.1rem; cursor: pointer;
            aspect-ratio: 1 / 1; padding: 0; height: 40px; width: 40px;
        }
        .row-btn:active { background: #e5e5ea; }

        /* 【割合 1】ノリノリ設定ボタン */
        .norinori-btn { flex: 1; min-width: 0; }

        /* 【割合 6】曲名エリア（将来のジャケット聖域） */
        .title-area {
            flex: 6; min-width: 0;
            padding: 0 10px; overflow: hidden;
            white-space: nowrap; cursor: pointer;
        }
        .title-text {
            display: inline-block; font-size: 0.95rem; font-weight: 600;
            color: #1c1c1e; transition: transform 0.1s linear;
        }

        /* 【割合 2】アーティスト名エリア */
        .artist-area {
            flex: 2; min-width: 0;
            font-size: 0.75rem; color: #8e8e93;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding-right: 8px;
        }

        /* 【割合 1】上矢印ボタン */
        .up-btn { flex: 1; min-width: 0; margin-right: 4px; color: #007aff; }

        /* 【割合 1】下矢印ボタン */
        .down-btn { flex: 1; min-width: 0; color: #007aff; }

        /* --- 📜 電光掲示板スクロールアニメーション --- */
        @keyframes marquee {
            0% { transform: translateX(0); }
            10% { transform: translateX(0); }
            90% { transform: translateX(calc(-100% + 200px)); } /* 枠外までスライド */
            100% { transform: translateX(0); }
        }
        .scroll-active {
            animation: marquee 4s linear 1; /* タップ時に1回だけ発動 */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>メインメニュー（黄金比率テスト版）</h2>
    <div id="menu-list" class="music-list">
        </div>
</div>

<script>
/**
 * NoriRun Ver.9 - メインメニュー描画＆並び替えエンジン
 * (C) 2026 Takehiro & つよぽん
 */

let dbInstance = null;
let currentOrderList = []; // playlistsストアに保存する背番号（file_path）の並び順リスト

// 1. 起動時に IndexedDB（NoriRunDB）に接続するぜ
window.addEventListener('DOMContentLoaded', () => {
    const request = indexedDB.open("NoriRunDB", 1);
    
    request.onsuccess = (e) => {
        dbInstance = e.target.result;
        loadMenuData();
    };
    request.onerror = () => {
        alert("データベースを開けませんでした。scan-test.htmlを先に実行してくれ！");
    };
});

// 2. データベースからデータを引っこ抜いてメインメニューを組み立てるコア関数
function loadMenuData() {
    if (!dbInstance) return;

    const tx = dbInstance.transaction(['music_library', 'playlists'], 'readonly');
    const libraryStore = tx.objectStore('music_library');
    const playlistStore = tx.objectStore('playlists');

    let libraryMap = {};
    
    // 全曲データを一発全取得
    libraryStore.getAll().onsuccess = (e) => {
        const allSongs = e.target.result;
        allSongs.forEach(song => {
            libraryMap[song.file_path] = song;
        });

        // プレイリストストアからメインメニュー用の並び順（"main_menu_default"）を取得
        playlistStore.get("main_menu_default").onsuccess = (ev) => {
            const playlistData = ev.target.result;
            
            if (playlistData && playlistData.file_path_list.length > 0) {
                // 保存された曲順リストがある場合はそれを採用
                currentOrderList = playlistData.file_path_list.filter(path => libraryMap[path]);
                
                // 新しくスキャンされてリストから漏れている曲があれば、お尻に追加するぜ
                allSongs.forEach(song => {
                    if (!currentOrderList.includes(song.file_path)) {
                        currentOrderList.push(song.file_path);
                    }
                });
            } else {
                // 初回起動時はスキャンした順番のまま並び順リストを作成
                currentOrderList = allSongs.map(song => song.file_path);
            }

            // 確定した順番を元に、画面のHTML要素をドバッと生成するぜ
            renderList(libraryMap);
        };
    };
}

// 3. 画面に 1 : 6 : 2 : 1 : 1 の黄金比率行をレンダリングするぜ
function renderList(libraryMap) {
    const listContainer = document.getElementById('menu-list');
    listContainer.innerHTML = ''; // 画面を一度クリア

    if (currentOrderList.length === 0) {
        listContainer.innerHTML = '<div style="text-align:center;color:#8e8e93;padding:20px;">曲がありません。先に音楽スキャンをしてね！</div>';
        return;
    }

    currentOrderList.forEach((filePath, index) => {
        const song = libraryMap[filePath];
        if (!song) return;

        // テスト表示用：もしタグ曲名が空ならファイル名を使用。
        // スクリプト検証用にわざと超長い名前のダミーを混ぜるテストロジック
        let displayName = song.title || song.file_path;
        if (index === 0 && displayName.length < 15) {
            displayName = "【ロングテスト曲名】明日への鼓動 - Falcom Sound Team jdk Special Running Long Edition.mp3";
        }
        
        const displayArtist = song.artist || "Falcom Team";

        // 竹弘の指定通り、フラグの状態（is_analyzed）で🕺と🛌を自動切り替え！
        const icon = song.is_analyzed ? "🕺" : "🛌";

        // HTML要素の組み立て
        const row = document.createElement('div');
        row.className = 'music-row';
        row.dataset.filePath = filePath;

        row.innerHTML = `
            <button class="row-btn norinori-btn" onclick="openNoriNori('${displayName}')">${icon}</button>
            
            <div class="title-area" onclick="triggerMarquee(this)">
                <span class="title-text">${displayName}</span>
            </div>
            
            <div class="artist-area">${displayArtist}</div>
            
            <button class="row-btn up-btn" onclick="moveOrder(${index}, -1)">↑</button>
            
            <button class="row-btn down-btn" onclick="moveOrder(${index}, 1)">↓</button>
        `;
        listContainer.appendChild(row);
    });
}

// 4. 【竹弘指定】ノリノリ設定ボタンをポチッと押したときの仮動作ポップアップ
function openNoriNori(songName) {
    alert(`[ノリノリ設定] ${songName} のタップ補正画面を開発中だぜ！`);
}

// 5. 【竹弘指定】曲名エリアだけをタップしたときに発動する電光掲示板スクロール
function triggerMarquee(areaElement) {
    const textElement = areaElement.querySelector('.title-text');
    
    // アニメーションが重複しないように一度クラスを剥がす
    textElement.classList.remove('scroll-active');
    
    // ブラウザのリフローを発生させてアニメーションを強制リセット
    void textElement.offsetWidth;
    
    // スクロールクラスを貼り付けて電光掲示板スタート！
    textElement.classList.add('scroll-active');
    
    // 4秒（アニメーション終了時）にクラスを自動で綺麗に回収するぜ（負荷ゼロ設計）
    textElement.addEventListener('animationend', () => {
        textElement.classList.remove('scroll-active');
    }, { once: true });
}

// 6. 「↑」「↓」ボタンで曲順をガシガシ入れ替えてデータベースに永続保存するロジック
function moveOrder(currentIndex, direction) {
    const targetIndex = currentIndex + direction;

    // リストの天井と底を突き破らないための防壁
    if (targetIndex < 0 || targetIndex >= currentOrderList.length) return;

    // 配列の要素をシュッと入れ替え
    const temp = currentOrderList[currentIndex];
    currentOrderList[currentIndex] = currentOrderList[targetIndex];
    currentOrderList[targetIndex] = temp;

    // 入れ替わった新しい並び順を IndexedDB の 'playlists' ストアへ保存するぜ！
    const tx = dbInstance.transaction('playlists', 'readwrite');
    const store = tx.objectStore('playlists');

    const playlistData = {
        playlist_id: "main_menu_default",
        playlist_name: "メイン全曲リスト",
        file_path_list: currentOrderList
    };

    store.put(playlistData);

    // 保存が完了したら、最新の状態の並びで画面を再描画！
    tx.oncomplete = () => {
        loadMenuData();
    };
}
</script>
</body>
</html>
