<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>NoriRun</title>

<style>
/* 全体設定 */
html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    color:#ffffff;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
}

/* 画面中央配置 */
body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* コンテンツ全体 */
.splash{
    text-align:center;
    width:100%;
}

/* タイトル */
.main-title{
    font-size:1.6rem;
    font-weight:300;
    letter-spacing:0.06em;
    white-space:nowrap;
    margin-bottom:60px;
}

/* 絵文字列 */
.icons{
    display:flex;
    justify-content:center;
    gap:40px;
    font-size:2rem;
    margin-bottom:80px;
}

/* NoriRun */
.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3.2rem;
    margin-bottom:80px;
}

.logo span{
    margin-right:0.08em;
}

.logo b{
    font-weight:700;
}

/* サブタイトル */
.sub-title{
    font-size:clamp(1.6rem,6vw,3rem);
    font-weight:700;
    margin-bottom:15px;
}

/* フッター */
.footer{
    font-size:clamp(1.4rem,5vw,2.5rem);
    font-weight:300;
    letter-spacing:0.05em;
}

.splash{
    transform:translateY(-5%);
}
</style>

</head>
<body>

<div class="splash">

    <div class="main-title">
        ノッて 走る プレイヤー
    </div>

    <div class="icons">
        <span>🕺</span>
        <span>🏃‍♂️</span>
        <span>📱</span>
    </div>

    <div class="logo">
        <span>ノリ</span><b>Run</b>
    </div>

    <div class="sub-title">
        Music Player NoriRun
    </div>

    <div class="footer">
        TOKYO JAPAN since 2026
    </div>

</div>

</body>
</html>
