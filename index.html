<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13=0 接続テストモジュール V4.5 (入力機能付き)</title>
    <style>
        :root { --bg: #1a1a1a; --text: #e0e0e0; --accent: #00ffcc; --warn: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .monitor { background: #000; border: 2px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; }
        .status-lamp { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #333; margin-right: 8px; }
        .lamp-on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .step-box { border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        button { background: #333; color: var(--text); border: 1px solid var(--accent); padding: 10px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .slider-group { margin-top: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--accent); }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        input[type="number"], input[type="file"] { width: 90%; background: #222; color: #fff; border: 1px solid #555; padding: 5px; margin-bottom: 10px; }
        .val { float: right; color: var(--warn); }
        h3 { margin-top: 0; font-size: 1rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
    </style>
</head>
<body>

    <h2>📘 13=0 接続テストモジュール <small>V4.5 (Full Set)</small></h2>

    <div class="monitor">
        <div>D1: <span id="d1-info">No Data</span> | D2: <span id="d2-info">No Data</span></div>
        <div style="font-size: 1.5rem; margin: 10px 0;">
            COUNT: <span id="timer-display">-00.000s</span>
        </div>
        <div>
            <span id="res-lamp" class="status-lamp"></span> RESERVATION: <span id="res-status">WAITING</span>
        </div>
        <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">
            Target BPM: <span id="target-bpm-val">---</span> | Pitch: <span id="pitch-val">1.000</span>
        </div>
    </div>

    <div class="control-panel">
        <div class="step-box" style="grid-column: span 2;">
            <h3>🎵 テスト曲・データ入力</h3>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>L1 (先行曲) ファイル</label>
                    <input type="file" id="file1" accept="audio/*">
                    <label>BPM</label>
                    <input type="number" id="in-bpm1" value="128" step="0.01">
                    <label>EndTS (13拍目)</label>
                    <input type="number" id="in-endts" value="30.000" step="0.001">
                </div>
                <div style="flex: 1;">
                    <label>L2 (後続曲) ファイル</label>
                    <input type="file" id="file2" accept="audio/*">
                    <label>BPM</label>
                    <input type="number" id="in-bpm2" value="128" step="0.01">
                    <label>StartTS (1拍目)</label>
                    <input type="number" id="in-startts" value="5.000" step="0.001">
                </div>
            </div>
            <button id="btn-save-data" style="background: var(--accent); color: #000;">データを保存して準備完了</button>
        </div>

        <div class="step-box">
            <h3>検証ステップ</h3>
            <button id="btn-step1">STEP 1: 資産ロード</button><br><br>
            <button id="btn-step2" disabled>STEP 2: L1逆算同期</button><br><br>
            <button id="btn-final" disabled>FINAL: 総合接続試験</button><hr>
            <button id="btn-stop" style="border-color: #ff4444; color: #ff4444;">STOP (Emergency)</button>
        </div>

        <div class="step-box">
            <h3>リアルタイム・ミキサー</h3>
            <div class="slider-group">
                <label>L1 Vol (先行曲) <span id="l1-vol-val" class="val">0.5</span></label>
                <input type="range" id="l1-vol" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-group">
                <label>L2 Vol (後続曲) <span id="l2-vol-val" class="val">0.5</span></label>
                <input type="range" id="l2-vol" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-group" style="border-top: 1px dashed #555; padding-top: 10px;">
                <label>🛡️ レイテンシ補正 (ms) <span id="latency-val" class="val">0</span></label>
                <input type="range" id="latency-adj" min="-200" max="200" step="1" value="0">
            </div>
            <div class="slider-group">
                <label>検証モード</label>
                <select id="mode-select" style="width:100%; background:#222; color:#fff; padding:5px;">
                    <option value="seamless">シームレス (重なり検証)</option>
                    <option value="brain-sync">脳内整理 (フェード検証)</option>
                </select>
            </div>
        </div>
    </div>

    <audio id="audio1"></audio>
    <audio id="audio2"></audio>

<script>
class ConnectionEngine {
    constructor() {
        this.ctx = null;
        this.deck1 = { audio: document.getElementById('audio1'), gainRes: null, gainMan: null, source: null };
        this.deck2 = { audio: document.getElementById('audio2'), gainRes: null, gainMan: null, source: null };
        this.clickBuffer = null;
        this.isReserved = false;
        this.clean = (val, dec) => parseFloat(parseFloat(val).toFixed(dec));
    }

    async step1_LoadAssets() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const res = await fetch('click.wav');
            const ab = await res.arrayBuffer();
            this.clickBuffer = await this.ctx.decodeAudioData(ab);
            document.getElementById('btn-step2').disabled = false;
            document.getElementById('btn-final').disabled = false;
            console.log("Assets Loaded.");
        } catch (e) {
            alert("click.wav を同じフォルダに置いてくれ！");
        }
    }

    async startTest(isFinal = false) {
        const d1 = JSON.parse(localStorage.getItem('d1_test'));
        const d2 = JSON.parse(localStorage.getItem('d2_test'));
        if (!d1 || !d2 || !this.deck1.audio.src) {
            alert("ファイル選択とデータ保存を先にやってくれ！");
            return;
        }

        const targetBPM = this.clean(d1.bpm, 2);
        const beatDur = this.clean(60 / targetBPM, 3);
        const endTS = this.clean(d1.endTS, 3);
        
        this.setupGraph();

        // EndTSの25秒前からスタート
        const startOffset = Math.max(0, endTS - 25);
        this.deck1.audio.currentTime = startOffset;
        this.deck1.audio.play();

        const monitor = setInterval(() => {
            const curr = this.deck1.audio.currentTime;
            const remain = endTS - curr;
            document.getElementById('timer-display').innerText = (remain * -1).toFixed(3) + "s";

            if (!this.isReserved && remain <= 20) {
                this.executeL4Reservation(endTS, beatDur, isFinal, d2.startTS);
            }
            if (curr >= endTS + 15) clearInterval(monitor);
        }, 16);
    }

    setupGraph() {
        if (this.deck1.source) return; // 二重接続防止
        this.deck1.source = this.ctx.createMediaElementSource(this.deck1.audio);
        this.deck1.gainRes = this.ctx.createGain();
        this.deck1.gainMan = this.ctx.createGain();
        this.deck1.source.connect(this.deck1.gainRes).connect(this.deck1.gainMan).connect(this.ctx.destination);

        this.deck2.source = this.ctx.createMediaElementSource(this.deck2.audio);
        this.deck2.gainRes = this.ctx.createGain();
        this.deck2.gainMan = this.ctx.createGain();
        this.deck2.source.connect(this.deck2.gainRes).connect(this.deck2.gainMan).connect(this.ctx.destination);
    }

    executeL4Reservation(endTS, beatDur, isFinal, d2StartTS) {
        const now = this.ctx.currentTime;
        const mode = document.getElementById('mode-select').value;
        const latency = parseInt(document.getElementById('latency-adj').value) / 1000;
        const curr = this.deck1.audio.currentTime;

        if (mode === 'brain-sync') {
            this.deck1.gainRes.gain.setValueAtTime(1, now + (endTS - 12 - curr));
            this.deck1.gainRes.gain.linearRampToValueAtTime(0, now + (endTS - 2 - curr));
        }

        if (isFinal) {
            const l2PlayTrigger = now + (endTS - beatDur - curr) - (d2StartTS - beatDur);
            setTimeout(() => this.deck2.audio.play(), (l2PlayTrigger - now) * 1000);
            
            if (mode === 'brain-sync') {
                this.deck2.gainRes.gain.setValueAtTime(0, now + (endTS + 2 - curr));
                this.deck2.gainRes.gain.linearRampToValueAtTime(1, now + (endTS + 12 - curr));
            }
        }

        // メトロノーム予約
        for (let i = -20; i <= 20; i++) {
            const beatTime = now + (endTS - curr) + (i * beatDur) + latency;
            if (beatTime > now) {
                const osc = this.ctx.createBufferSource();
                osc.buffer = this.clickBuffer;
                osc.connect(this.ctx.destination);
                osc.start(beatTime);
            }
        }
        this.isReserved = true;
        document.getElementById('res-lamp').classList.add('lamp-on');
        document.getElementById('res-status').innerText = "RESERVED";
    }
}

const engine = new ConnectionEngine();

// UI Events
document.getElementById('file1').onchange = (e) => {
    document.getElementById('audio1').src = URL.createObjectURL(e.target.files[0]);
};
document.getElementById('file2').onchange = (e) => {
    document.getElementById('audio2').src = URL.createObjectURL(e.target.files[0]);
};

document.getElementById('btn-save-data').onclick = () => {
    const d1 = { bpm: document.getElementById('in-bpm1').value, endTS: document.getElementById('in-endts').value };
    const d2 = { bpm: document.getElementById('in-bpm2').value, startTS: document.getElementById('in-startts').value };
    localStorage.setItem('d1_test', JSON.stringify(d1));
    localStorage.setItem('d2_test', JSON.stringify(d2));
    document.getElementById('d1-info').innerText = `BPM:${d1.bpm} End:${d1.endTS}`;
    document.getElementById('d2-info').innerText = `BPM:${d2.bpm} Start:${d2.startTS}`;
    document.getElementById('target-bpm-val').innerText = d1.bpm;
    alert("データ保存完了！準備OKだぜ。");
};

document.getElementById('btn-step1').onclick = () => engine.step1_LoadAssets();
document.getElementById('btn-step2').onclick = () => engine.startTest(false);
document.getElementById('btn-final').onclick = () => engine.startTest(true);
document.getElementById('btn-stop').onclick = () => location.reload();

document.getElementById('l1-vol').oninput = (e) => {
    document.getElementById('l1-vol-val').innerText = e.target.value;
    if (engine.deck1.gainMan) engine.deck1.gainMan.gain.value = e.target.value;
};
document.getElementById('l2-vol').oninput = (e) => {
    document.getElementById('l2-vol-val').innerText = e.target.value;
    if (engine.deck2.gainMan) engine.deck2.gainMan.gain.value = e.target.value;
};
document.getElementById('latency-adj').oninput = (e) => {
    document.getElementById('latency-val').innerText = e.target.value;
};
</script>
</body>
</html>
